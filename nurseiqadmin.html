    <style>

        .btn-warning { background: #f59e0b; color: white; }

</head>

<script>
    const SB_URL = 'https://lwhtjozfsmbyihenfunw.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3aHRqb3pmc21ieWloZW5mdW53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk2NTgxMjcsImV4cCI6MjA3NTIzNDEyN30.7Z8AYvPQwTAEEEhODlW6Xk-IR1FK3Uj5ivZS7P17Wpk';
    let sb = null, currentAdmin = null, allCourses = [], allStudents = [], allQuestions = [], userProgress = {};
    let selectedQuestionsForDelete = [];
    let reorderMode = false;
    let currentQuestionsList = [];
    let dragSourceIndex = null;
    let pendingImportData = [];

    document.addEventListener('DOMContentLoaded', async () => {
        sb = window.supabase.createClient(SB_URL, SB_KEY, { auth: { persistSession: false } });
        const session = localStorage.getItem('nurseiq_admin_session');
        if (session) { 
            currentAdmin = JSON.parse(session); 
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('admin-section').classList.remove('hidden');
            await loadAllData(); 
            updateSidebarByRole();
            document.getElementById('user-name').innerHTML = `<i class="fas ${currentAdmin.role === 'superadmin' ? 'fa-crown' : currentAdmin.role === 'admin' ? 'fa-user-shield' : 'fa-chalkboard-teacher'}"></i> ${currentAdmin.full_name || 'User'}`;
            document.getElementById('user-role-badge').innerHTML = `<span class="badge badge-primary">${currentAdmin.role.toUpperCase()}</span> Portal`;
            if (currentAdmin.role === 'superadmin') renderSuperAdminDashboard();
            else if (currentAdmin.role === 'admin') renderDashboard();
            else renderLecturerDashboard();
        }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        const email = document.getElementById('login-email').value.trim(); 
        const btn = document.getElementById('login-btn');
        btn.disabled = true; 
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
        try {
            const { data, error } = await sb.from('consolidated_user_profiles_table').select('*').eq('email', email).limit(1);
            if (error || !data?.length) throw new Error('User not found');
            const userData = data[0];
            const userRole = userData.role || 'student';
            if (!['superadmin', 'admin', 'lecturer'].includes(userRole)) throw new Error('Access denied');
            localStorage.setItem('nurseiq_admin_session', JSON.stringify({ id: userData.id, email, name: userData.full_name, role: userRole }));
            currentAdmin = userData;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('admin-section').classList.remove('hidden');
            await loadAllData();
            updateSidebarByRole();
            document.getElementById('user-name').innerHTML = `<i class="fas ${userRole === 'superadmin' ? 'fa-crown' : userRole === 'admin' ? 'fa-user-shield' : 'fa-chalkboard-teacher'}"></i> ${userData.full_name || 'User'}`;
            document.getElementById('user-role-badge').innerHTML = `<span class="badge badge-primary">${userRole.toUpperCase()}</span> Portal`;
            if (userRole === 'superadmin') renderSuperAdminDashboard();
            else if (userRole === 'admin') renderDashboard();
            else renderLecturerDashboard();
        } catch (err) { 
            const errorDiv = document.getElementById('login-error');
            errorDiv.classList.remove('hidden');
            errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + err.message; 
            btn.disabled = false; 
            btn.innerHTML = 'Login to Dashboard';
        }
    });

    function updateSidebarByRole() {
        const role = currentAdmin?.role;
        const isAdmin = role === 'admin' || role === 'superadmin';
        document.getElementById('nav-add-question').style.display = 'flex';
        document.getElementById('nav-bulk-import').style.display = isAdmin ? 'flex' : 'flex';
        document.getElementById('nav-courses').style.display = isAdmin ? 'flex' : 'none';
        document.getElementById('nav-students').style.display = isAdmin ? 'flex' : 'none';
        document.getElementById('nav-pending').style.display = isAdmin ? 'flex' : 'none';
        document.querySelectorAll('.superadmin-only').forEach(el => el.style.display = role === 'superadmin' ? 'flex' : 'none');
    }

    async function loadAllData() {
    const { data: q } = await sb.from('medical_assessments').select('*, courses(course_name)'); 
    allQuestions = q || [];
    const { data: s } = await sb.from('consolidated_user_profiles_table').select('*'); 
    allStudents = s || [];
    const { data: c } = await sb.from('courses').select('*'); 
    allCourses = c || [];
    const { data: prog } = await sb.from('user_progress').select('*'); 
    userProgress = {};
    if (prog) prog.forEach(p => { userProgress[p.user_id] = p.progress_data; });
    
    document.getElementById('stat-questions').innerText = allQuestions.length;
    document.getElementById('stat-approved').innerText = allQuestions.filter(q => q.status === 'approved').length;
    document.getElementById('stat-pending').innerText = allQuestions.filter(q => q.status === 'pending').length;
    document.getElementById('stat-students').innerText = allStudents.length;
    
    // 🔥 Update TVETIQ counts
    updateTVETIQCounts();
    updateAdminModuleName();
}

    function logout() { localStorage.removeItem('nurseiq_admin_session'); location.reload(); }
    const panel = document.getElementById('main-panel');

    function getStudentProgress(studentId) {
        const progress = userProgress[studentId] || {};
        let answers = [], markedQuestions = [];
        if (progress.answers) {
            answers = Object.values(progress.answers).filter(a => a && a.answered);
            if (progress.markedForReview) markedQuestions = Object.entries(progress.markedForReview).map(([qid, data]) => ({ qid, ...data }));
        } else {
            answers = Object.entries(progress).filter(([key, val]) => val && val.answered && !key.includes('version')).map(([key, val]) => ({ ...val, questionId: key }));
            markedQuestions = Object.entries(progress).filter(([key, val]) => val && val.marked && !key.includes('version')).map(([key, val]) => ({ qid: key, timestamp: val.timestamp }));
        }
        const correct = answers.filter(a => a.correct).length;
        const total = answers.length;
        const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
        const answersWithDetails = answers.map(ans => {
            const question = allQuestions.find(q => q.id === ans.questionId || q.id === ans.id);
            return { ...ans, questionText: question?.question_text || ans.questionText || 'Unknown', correctAnswer: ans.correctAnswer || question?.correct_answer || 'N/A', selectedOption: ans.selectedOption || 'Not recorded' };
        });
        const markedWithDetails = markedQuestions.map(marked => {
            const question = allQuestions.find(q => q.id === marked.qid);
            return { ...marked, questionText: question?.question_text || 'Question not found' };
        });
        return { answers: answersWithDetails, markedQuestions: markedWithDetails, totalAnswered: total, correctCount: correct, accuracy, hasProgress: total > 0 };
    }

// TVET PROGRAM CODES & DETECTION
// ============================================
const TVET_PROGRAMS = [
    'DPOTT', 'DCH', 'DHRIT', 'DSL', 'DSW', 'DCJS', 'DHSS', 'DICT', 'DME',
    'CPOTT', 'CCH', 'CHRIT', 'CPC', 'CSL', 'CSW', 'CCJS', 'CAG', 'CHSS', 'CICT',
    'ACH', 'AAG', 'ASW', 'CCA', 'PTE'
];

function getStudentProgram(student) {
    if (!student) return 'nursing';
    
    const programCode = String(student.program || '').toUpperCase().trim();
    if (TVET_PROGRAMS.includes(programCode)) {
        return 'tvet';
    }
    
    const progLower = String(student.program || '').toLowerCase();
    if (progLower.includes('nursing') || progLower.includes('krchn') || 
        progLower.includes('health') || progLower.includes('medical')) {
        return 'nursing';
    }
    
    const typeLower = String(student.program_type || '').toLowerCase();
    if (typeLower === 'tvet' || typeLower === 'vocational' || typeLower === 'technical') {
        return 'tvet';
    }
    
    return 'nursing';
}

function getProgramDisplayName(student) {
    if (!student) return 'KRCHN Nursing';
    
    const programCode = String(student.program || '').toUpperCase().trim();
    const displayNames = {
        'DPOTT': 'Diploma in Perioperative Theatre Technology',
        'DCH': 'Diploma in Community Health',
        'DHRIT': 'Diploma in Health Records and IT',
        'DSL': 'Diploma in Science Lab',
        'DSW': 'Diploma in Social Work & Community Development',
        'DCJS': 'Diploma in Criminal Justice',
        'DHSS': 'Diploma in Health Support Services',
        'DICT': 'Diploma in ICT',
        'DME': 'Diploma in Medical Engineering',
        'CPOTT': 'Certificate in Perioperative Theatre Technology',
        'CCH': 'Certificate in Community Health',
        'CHRIT': 'Certificate in Health Records and IT',
        'CPC': 'Certificate in Patient Care',
        'CSL': 'Certificate in Science Lab',
        'CSW': 'Certificate in Social Work & Community Development',
        'CCJS': 'Certificate in Criminal Justice',
        'CAG': 'Certificate in Agriculture',
        'CHSS': 'Certificate in Health Support Services',
        'CICT': 'Certificate in ICT',
        'ACH': 'Artisan in Community Health',
        'AAG': 'Artisan in Agriculture',
        'ASW': 'Artisan in Social Work & Community Development',
        'CCA': 'Certificate in Computer Applications',
        'PTE': 'TVET/CDACC (PTE)'
    };
    return displayNames[programCode] || programCode;
}

    window.previewBulkImport = () => {
        const courseId = document.getElementById('bulk-course').value;
        if (!courseId) { alert('Select course'); return; }
        const raw = document.getElementById('bulk-text').value;
        if (!raw.trim()) { alert('Paste content'); return; }
        const blocks = raw.split(/\n(?=\d+\.)/);
        const extracted = [];
        for (let block of blocks) {
            if (!block.trim()) continue;
            const qMatch = block.match(/^\s*\d+\.\s*(.+?)(?:\n|$)/);
            if (!qMatch) continue;
            const options = { A: '', B: '', C: '', D: '' };
            let correctLetter = '', explanation = '';
            const optionLines = block.match(/([A-D])[\.\)]\s*([^\n]+)/gi);
            if (optionLines) {
                for (let opt of optionLines) {
                    const letterMatch = opt.match(/([A-D])[\.\)]/i);
                    if (!letterMatch) continue;
                    const letter = letterMatch[1].toUpperCase();
                    let optText = opt.replace(/^[A-D][\.\)]\s*/i, '').trim();
                    const isCorrect = optText.includes('✓');
                    optText = optText.replace(/[✓✔]/g, '').trim();
                    options[letter] = optText;
                    if (isCorrect) correctLetter = letter;
                }
            }
            const answerMatch = block.match(/Answer\s+is\s+([A-D])[:\s-]*([^\n]*)/i);
            if (answerMatch) { correctLetter = answerMatch[1].toUpperCase(); explanation = answerMatch[2]?.trim() || ''; }
            if (!correctLetter) correctLetter = 'A';
            if (!explanation) explanation = `The correct answer is ${correctLetter}: ${options[correctLetter]}`;
            extracted.push({ question: qMatch[1].trim(), options, correctLetter, correctText: options[correctLetter], explanation });
        }
        if (extracted.length === 0) { document.getElementById('bulk-result').innerHTML = '<div class="alert alert-error">No questions found</div>'; return; }
        pendingImportData = extracted;
        document.getElementById('preview-area').style.display = 'block';
        document.getElementById('preview-container').innerHTML = extracted.map((q, idx) => `<div class="preview-item"><div class="preview-question">${idx+1}. ${escapeHtml(q.question)}</div><div class="preview-options"><div><span class="badge ${q.correctLetter === 'A' ? 'badge-success' : 'badge-primary'}">A.</span> ${escapeHtml(q.options.A)}</div><div><span class="badge ${q.correctLetter === 'B' ? 'badge-success' : 'badge-primary'}">B.</span> ${escapeHtml(q.options.B)}</div><div><span class="badge ${q.correctLetter === 'C' ? 'badge-success' : 'badge-primary'}">C.</span> ${escapeHtml(q.options.C)}</div><div><span class="badge ${q.correctLetter === 'D' ? 'badge-success' : 'badge-primary'}">D.</span> ${escapeHtml(q.options.D)}</div></div><div class="preview-correct">Correct: ${escapeHtml(q.correctText)}</div><div class="preview-explanation">${escapeHtml(q.explanation)}</div></div>`).join('');
        document.getElementById('confirm-import-btn').classList.remove('hidden');
        document.getElementById('bulk-result').innerHTML = `<div class="alert alert-info">Found ${extracted.length} questions. Review and confirm.</div>`;
    };

    window.resetStudentProgress = async (id) => { if(confirm('Reset progress?')) { await sb.from('user_progress').delete().eq('user_id', id); await loadAllData(); renderStudents(); showToast('Progress reset', 'success'); } };
async function renderMarkedReview() {
    let allMarked = [];
    
    console.log('🔍 Searching for marked questions...');
    
    for (const student of allStudents) {
        const progress = userProgress[student.id] || {};
        
        // Look for marked questions in answers object (Student Portal structure)
        if (progress.answers) {
            const markedInAnswers = Object.entries(progress.answers)
                .filter(([qid, answer]) => answer && answer.marked === true)
                .map(([qid, answer]) => ({
                    qid: qid,
                    timestamp: answer.timestamp || new Date().toISOString(),
                    note: answer.markedNote || '',
                    student: student
                }));
            
            if (markedInAnswers.length > 0) {
                console.log(`✅ Found ${markedInAnswers.length} marked questions for student: ${student.full_name}`);
            }
            
            allMarked.push(...markedInAnswers);
        }
        
        // Also check for markedForReview property (alternative structure)
        if (progress.markedForReview) {
            const additionalMarked = Object.entries(progress.markedForReview).map(([qid, data]) => ({
                qid: qid,
                timestamp: data.timestamp,
                note: data.note || '',
                student: student
            }));
            allMarked.push(...additionalMarked);
        }
    }
    
    // Remove duplicates
    const uniqueMarked = [];
    const seen = new Set();
    for (const marked of allMarked) {
        const key = `${marked.student.id}-${marked.qid}`;
        if (!seen.has(key)) {
            seen.add(key);
            uniqueMarked.push(marked);
        }
    }
    
    uniqueMarked.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    
    if (uniqueMarked.length === 0) {
        panel.innerHTML = `<div class="card"><div class="card-header"><h3><i class="fas fa-flag-checkered"></i> Students' Marked for Review Questions</h3></div><div class="empty-state"><i class="fas fa-inbox"></i><p>No questions marked for review by any student</p><p style="margin-top:10px; font-size:12px;">Students can mark questions by clicking the "Mark for Review" button during practice.</p></div></div>`;
        return;
    }
    
    // Get question details for each marked question
    const markedWithDetails = [];
    for (let marked of uniqueMarked) {
        const question = allQuestions.find(q => q.id === marked.qid);
        if (question) {
            markedWithDetails.push({
                ...marked,
                questionText: question.question_text,
                courseName: question.courses?.course_name || 'Unknown',
                options: { A: question.option_a, B: question.option_b, C: question.option_c, D: question.option_d }
            });
        }
    }
    
    // Group by student
    const groupedByStudent = {};
    for (let marked of markedWithDetails) {
        const studentId = marked.student.id;
        if (!groupedByStudent[studentId]) {
            groupedByStudent[studentId] = {
                student: marked.student,
                questions: []
            };
        }
        groupedByStudent[studentId].questions.push(marked);
    }
    
    panel.innerHTML = `
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-flag-checkered"></i> Students' Marked for Review Questions (${markedWithDetails.length})</h3>
            </div>
            ${Object.values(groupedByStudent).map(group => `
                <div class="student-group" style="margin-bottom:20px; border:1px solid #e2e8f0; border-radius:16px; overflow:hidden;">
                    <div onclick="toggleStudentMarked('${group.student.id}')" style="cursor:pointer; background:#f1f5f9; padding:15px; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <i class="fas fa-user-graduate"></i> <strong>${escapeHtml(group.student.full_name || 'Unknown')}</strong>
                            <div style="font-size:12px; color:#64748b;">${group.student.email}</div>
                        </div>
                        <span class="badge badge-warning">${group.questions.length} marked</span>
                    </div>
                    <div id="student-marked-${group.student.id}" style="display:none; padding:15px;">
                        ${group.questions.map(q => `
                            <div style="border:1px solid #e2e8f0; border-radius:12px; padding:15px; margin-bottom:15px; background:#fffbeb;">
                                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                                    <span class="badge badge-primary">${escapeHtml(q.courseName)}</span>
                                    <span class="badge badge-warning"><i class="fas fa-clock"></i> ${new Date(q.timestamp).toLocaleString()}</span>
                                </div>
                                <div style="margin-bottom:10px;"><strong>${escapeHtml(q.questionText)}</strong></div>
                                <div style="margin:10px 0; padding-left:20px;">
                                    <div>A. ${escapeHtml(q.options.A || 'N/A')}</div>
                                    <div>B. ${escapeHtml(q.options.B || 'N/A')}</div>
                                    <div>C. ${escapeHtml(q.options.C || 'N/A')}</div>
                                    <div>D. ${escapeHtml(q.options.D || 'N/A')}</div>
                                </div>
                                ${q.note ? `<div style="margin-top:10px; padding:8px; background:#fef3c7; border-radius:8px;"><i class="fas fa-sticky-note"></i> Note: ${escapeHtml(q.note)}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}
    // Add this function to your Admin Portal JavaScript
function toggleStudentMarked(studentId) {
    const div = document.getElementById(`student-marked-${studentId}`);
    if (div) {
        if (div.style.display === 'none' || div.style.display === '') {
            div.style.display = 'block';
        } else {
            div.style.display = 'none';
        }
    }
}

// Also make sure it's globally accessible
window.toggleStudentMarked = toggleStudentMarked;
    async function renderIndividualProgress() {
        panel.innerHTML = `<div class="card"><div class="card-header"><h3>Student Progress</h3></div><input type="text" id="searchStudent" class="search-input" placeholder="Search..."><div id="studentsList"></div></div>`;
        filterIndividualStudents();
        document.getElementById('searchStudent')?.addEventListener('input', () => filterIndividualStudents());
    }
    function filterIndividualStudents() {
        const search = document.getElementById('searchStudent')?.value.toLowerCase() || '';
        const filtered = allStudents.filter(s => s.full_name?.toLowerCase().includes(search) || s.email?.toLowerCase().includes(search));
        const container = document.getElementById('studentsList');
        if (!container) return;
        container.innerHTML = filtered.map(s => { const prog = getStudentProgress(s.id); return `<div class="student-progress-card" onclick="viewStudentDetails('${s.id}')"><div><strong>${s.full_name || 'Unknown'}</strong><span class="badge ${prog.accuracy >= 70 ? 'badge-success' : prog.accuracy >= 50 ? 'badge-warning' : 'badge-danger'}" style="float:right;">${prog.accuracy}%</span></div><div class="progress-bar"><div class="progress-fill" style="width: ${prog.accuracy}%"></div></div><div><small>${prog.correctCount}/${prog.totalAnswered} correct | ${prog.markedQuestions.length} marked</small></div></div>`; }).join('');
        if (filtered.length === 0) container.innerHTML = '<div class="empty-state">No students found</div>';
    }

    async function renderAttempts() {
        await loadAllData();
        const stats = allStudents.map(s => { const prog = getStudentProgress(s.id); return { student: s, total: prog.totalAnswered, correct: prog.correctCount, accuracy: prog.accuracy, marked: prog.markedQuestions.length }; }).filter(s => s.total > 0).sort((a,b) => b.total - a.total);
        panel.innerHTML = `<div class="card"><div class="card-header"><h2>Progress Summary</h2></div>${stats.length === 0 ? '<div class="empty-state">No attempts yet</div>' : stats.map(s => `<div class="student-progress-card" onclick="viewStudentDetails('${s.student.id}')"><div><strong>${s.student.full_name || 'Unknown'}</strong><span class="badge ${s.accuracy >= 70 ? 'badge-success' : s.accuracy >= 50 ? 'badge-warning' : 'badge-danger'}" style="float:right;">${s.accuracy}%</span></div><div class="progress-bar"><div class="progress-fill" style="width: ${s.accuracy}%"></div></div><div><small>${s.total} answered | ${s.correct} correct | ${s.marked} marked</small></div></div>`).join('')}</div>`;
    }

    function renderSettings() {
        panel.innerHTML = `<div class="card"><div class="card-header"><h2>Settings</h2></div><div><button onclick="exportAllData()" class="btn btn-primary">Export All (JSON)</button> <button onclick="exportAllQuestions()" class="btn btn-success">Export Questions (CSV)</button> <button onclick="exportStudentProgressCSV()" class="btn btn-info">Export Progress (CSV)</button></div><div style="margin-top:15px;"><button onclick="clearAllStudentProgress()" class="btn btn-danger">Clear All Progress</button></div></div><div class="card"><h3>System Info</h3><div class="stats-grid-main"><div class="stat-card-main"><div class="stat-value-main">${allQuestions.length}</div><div>Questions</div></div><div class="stat-card-main"><div class="stat-value-main">${allQuestions.filter(q => q.status === 'pending').length}</div><div>Pending Approval</div></div><div class="stat-card-main"><div class="stat-value-main">${allStudents.length}</div><div>Users</div></div><div class="stat-card-main"><div class="stat-value-main">${allCourses.length}</div><div>Courses</div></div></div></div>`;
    }

    window.exportAllData = () => { const data = { questions: allQuestions, courses: allCourses, students: allStudents, progress: userProgress }; const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup_${Date.now()}.json`; a.click(); showToast('Exported', 'success'); };
    window.exportAllQuestions = () => { const csv = ['Question,Correct Answer,Course,Difficulty,Status', ...allQuestions.map(q => `"${(q.question_text || '').replace(/"/g, '""')}","${(q.correct_answer || '').replace(/"/g, '""')}","${q.courses?.course_name || ''}","${q.difficulty || ''}","${q.status || ''}"`)].join('\n'); const blob = new Blob([csv], { type: 'text/csv' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `questions_${Date.now()}.csv`; a.click(); showToast('Exported', 'success'); };
    window.exportStudentProgressCSV = () => { const rows = [['Student', 'Email', 'Answered', 'Correct', 'Accuracy', 'Marked']]; for (const student of allStudents) { const prog = getStudentProgress(student.id); rows.push([student.full_name || 'Unknown', student.email || '', prog.totalAnswered, prog.correctCount, prog.accuracy, prog.markedQuestions.length]); } const csv = rows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n'); const blob = new Blob([csv], { type: 'text/csv' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `progress_${Date.now()}.csv`; a.click(); showToast('Exported', 'success'); };
    window.clearAllStudentProgress = async () => { if(confirm('Delete ALL student progress?')) { await sb.from('user_progress').delete().neq('user_id', ''); await loadAllData(); showToast('All progress cleared', 'success'); } };

    function escapeHtml(text) { if(!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    function showToast(msg, type) { const toast = document.createElement('div'); toast.className = 'toast'; toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'info-circle'}"></i> ${msg}`; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }

   window.showPage = (page) => {
    if(page === 'dashboard') renderDashboard();
    else if(page === 'question-bank') renderQuestionBank();
    else if(page === 'add-question') renderAddQuestion();
    else if(page === 'bulk-import') renderBulkImport();

    else if(page === 'tvetiq-dashboard') renderTVETIQDashboard();  // 🔥 NEW
    else if(page === 'tvetiq-students') renderTVETIQStudents();    // 🔥 NEW
    else if(page === 'tvetiq-questions') renderTVETIQQuestions();  // 🔥 NEW
};
