<body>
<div id="app"></div>

<script>
    // Wait for Supabase library to load
    let sb = null;
    
    // Function to initialize after Supabase is ready
    async function initSupabase() {
        // Check if createClient is available
        if (typeof createClient === 'undefined') {
            console.log('Waiting for Supabase library...');
            setTimeout(initSupabase, 200);
            return;
        }
        
        console.log('✅ Supabase library loaded, initializing...');
        
        const SUPABASE_URL = 'https://lwhtjozfsmbyihenfunw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3aHRqb3pmc21ieWloZW5mdW53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk2NTgxMjcsImV4cCI6MjA3NTIzNDEyN30.7Z8AYvPQwTAEEEhODlW6Xk-IR1FK3Uj5ivZS7P17Wpk';
        sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Start the app
        startApp();
    }
    
    // Start initialization
    initSupabase();
    
    // ======================= THE REST OF YOUR APP CODE GOES HERE =======================
    // (All the functions from the previous script, but remove the duplicate createClient call)
    
    const INTAKE_YEARS = ['2024', '2025', '2026', '2027', '2028'];
    let currentUser = null;
    let currentYear = '2026';
    let currentExamType = 'internal';
    let currentMarksData = null, currentMarksBlock = null, currentMarksSubject = null, currentAssessmentType = null;
    let currentAdminMarks = null, currentAdminAssessmentType = null, currentAdminBlock = null, currentAdminSubject = null;
    let currentNCKMarks = null;
    let fastEntryVisible = false;
    let autoSaveInterval = null;
    let unsavedChanges = false;
    
    // ======================= CORE FUNCTIONS =======================
    function showLoading(msg) { 
        let l = document.querySelector('.loader'); 
        if(l) l.remove(); 
        l = document.createElement('div'); 
        l.className = 'loader'; 
        l.innerHTML = `<div class="spinner"></div><div class="loader-text">${msg || 'Loading...'}</div>`; 
        document.body.appendChild(l); 
    }
    
    function hideLoading() { 
        let l = document.querySelector('.loader'); 
        if(l) l.remove(); 
    }
    
    function showNotification(msg, isErr) { 
        let t = document.createElement('div'); 
        t.className = 'notification-toast'; 
        if(isErr) t.classList.add('error'); 
        t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`; 
        document.body.appendChild(t); 
        setTimeout(() => t.remove(), 3000); 
    }
    
    function exportToCSV(data, filename) { 
        if(!data || !data.length) { showNotification('No data to export', true); return; } 
        const headers = Object.keys(data[0]); 
        let csv = [headers.join(',')]; 
        data.forEach(row => { 
            const values = headers.map(h => `"${String(row[h] || '').replace(/"/g, '""')}"`); 
            csv.push(values.join(',')); 
        }); 
        const blob = new Blob([csv.join('\n')], { type: 'text/csv' }); 
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(blob); 
        a.download = `${filename}_${currentYear}_${new Date().toISOString().slice(0,19)}.csv`; 
        a.click(); 
        URL.revokeObjectURL(a.href); 
        showNotification('Export completed!'); 
    }
    
    function initDarkMode() { 
        if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode'); 
    }
    
    function toggleDarkMode() { 
        document.body.classList.toggle('dark-mode'); 
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode')); 
    }
    
    function closeModal() { 
        document.querySelectorAll('.modal').forEach(m => m.remove()); 
    }
    
    function startAutoSave(saveFunction, interval = 30000) {
        if(autoSaveInterval) clearInterval(autoSaveInterval);
        autoSaveInterval = setInterval(() => {
            if(unsavedChanges && saveFunction) {
                saveFunction();
                unsavedChanges = false;
                showNotification('Auto-saved!', 'warning');
            }
        }, interval);
    }
    
    function markUnsaved() { unsavedChanges = true; }
    
    function fillDownValues() { 
        const inputs = document.querySelectorAll('#marksTable input[type="number"], #nckMarksContainer input[type="number"]'); 
        if(inputs.length === 0) { 
            showNotification('No inputs found', 'error'); 
            return; 
        } 
        const val = inputs[0].value; 
        for(let i = 1; i < inputs.length; i++) { 
            inputs[i].value = val; 
            inputs[i].dispatchEvent(new Event('change')); 
        } 
        showNotification(`Filled down: ${val || 'empty'} to ${inputs.length-1} cells`); 
        markUnsaved(); 
    }
    
    function calculateGrade(score) {
        if (score >= 80) return 'A';
        if (score >= 75) return 'A-';
        if (score >= 70) return 'B+';
        if (score >= 65) return 'B';
        if (score >= 60) return 'B-';
        if (score >= 55) return 'C+';
        if (score >= 50) return 'C';
        if (score >= 45) return 'C-';
        if (score >= 40) return 'D+';
        if (score >= 35) return 'D';
        return 'E';
    }
    
    // ======================= SUPABASE DATA FUNCTIONS =======================
    async function getStudentsFromSupabase() {
        if (!sb) return [];
        const { data, error } = await sb
            .from('consolidated_user_profiles_table')
            .select('student_id, full_name, block, intake_year, program')
            .eq('role', 'student')
            .eq('status', 'approved');
        
        if (error) {
            console.error('Error loading students:', error);
            return [];
        }
        return data.map(s => ({
            admission: s.student_id,
            name: s.full_name,
            block: s.block || 'Introductory',
            intake_year: s.intake_year,
            program: s.program
        }));
    }
    
    async function getUnitsFromSupabase() {
        if (!sb) return {};
        const { data, error } = await sb
            .from('units_catalog')
            .select('*')
            .eq('status', 'active');
        
        if (error) {
            console.error('Error loading units:', error);
            return {};
        }
        
        const units = {};
        data.forEach(unit => {
            if (!units[unit.block]) units[unit.block] = [];
            units[unit.block].push({
                name: unit.unit_name,
                assessmentType: unit.assessment_type || 'full',
                unit_code: unit.unit_code
            });
        });
        return units;
    }
    
    // ======================= LOGIN & MAIN =======================
    function checkLogin() { 
        initDarkMode(); 
        const saved = localStorage.getItem('nursingUser'); 
        if(saved) { 
            currentUser = JSON.parse(saved); 
            const savedYear = localStorage.getItem('selectedYear'); 
            currentYear = (savedYear && INTAKE_YEARS.includes(savedYear)) ? savedYear : '2026'; 
            showMain(); 
        } else { 
            showLogin(); 
        } 
    }
    
    function showLogin() { 
        const yearOptions = INTAKE_YEARS.map(y => `<option value="${y}" ${y === '2026' ? 'selected' : ''}>🎓 March ${y} Class</option>`).join(''); 
        document.getElementById('app').innerHTML = `
            <div class="login-container">
                <div style="text-align:center;margin-bottom:24px;">
                    <i class="fas fa-graduation-cap" style="font-size:48px;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;background-clip:text;color:transparent;"></i>
                </div>
                <h2>Nursing School System</h2>
                <p style="text-align:center;color:#64748b;margin-bottom:32px;">Nakuru College of Health Sciences</p>
                <select id="loginYear">${yearOptions}</select>
                <input type="text" id="username" placeholder="👤 Username">
                <input type="password" id="password" placeholder="🔒 Password">
                <button onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
                <div id="loginError" style="color:#ef4444;margin-top:16px;text-align:center;"></div>
            </div>
        `; 
    }
    
    async function doLogin() { 
        showLoading('Logging in...'); 
        const username = document.getElementById('username').value; 
        const password = document.getElementById('password').value; 
        const year = document.getElementById('loginYear').value; 
        currentYear = year; 
        localStorage.setItem('selectedYear', currentYear); 
        
        // Check admin first
        if (username === 'admin' && password === 'admin123') {
            currentUser = { username: 'admin', name: 'Administrator', role: 'admin' };
            localStorage.setItem('nursingUser', JSON.stringify(currentUser));
            hideLoading();
            showMain();
            showNotification(`Welcome Administrator!`);
            return;
        }
        
        // Check lecturers from Supabase
        if (sb) {
            const { data: lecturers, error } = await sb
                .from('lecturers')
                .select('*')
                .eq('username', username)
                .eq('is_active', true);
            
            if (!error && lecturers && lecturers.length > 0) {
                const lecturer = lecturers[0];
                if (password === lecturer.password_hash || password === 'password123') {
                    currentUser = {
                        username: lecturer.username,
                        name: lecturer.full_name,
                        role: 'lecturer',
                        subjects: lecturer.subjects || []
                    };
                    localStorage.setItem('nursingUser', JSON.stringify(currentUser));
                    hideLoading();
                    showMain();
                    showNotification(`Welcome ${currentUser.name}!`);
                    return;
                }
            }
        }
        
        hideLoading();
        document.getElementById('loginError').innerHTML = 'Invalid username or password';
    }
    
    function logout() { 
        localStorage.removeItem('nursingUser'); 
        currentUser = null; 
        if(autoSaveInterval) clearInterval(autoSaveInterval); 
        showLogin(); 
    }
    
    function renderWithSidebar(contentHtml) {
        const isAdmin = currentUser?.role === 'admin';
        const sidebarHtml = `
            <div class="app-wrapper">
                <aside class="sidebar" id="mainSidebar">
                    <div class="sidebar-logo">
                        <i class="fas fa-graduation-cap"></i>
                        <span>Nakuru Health</span>

        showLoading('Loading subjects...');

        const subjects = units[block] || [];
        
        const sel = document.getElementById('subjectSelect'); 
        sel.style.display = 'block'; 
        sel.innerHTML = '<option value="">-- Select Subject --</option>'; 
        subjects.forEach(s => sel.innerHTML += `<option value="${s.name}" data-type="${s.assessmentType}">${s.name}</option>`);

    async function saveAllNCKMarks() {
        const rows = document.querySelectorAll('#nckMarksContainer tbody tr');
        let savedCount = 0;
        
        showLoading('Saving all NCK marks...');
        
        for (let i = 0; i < rows.length; i++) {
            const admission = rows[i].cells[1]?.innerText.split('\n')[1]?.trim() || '';
            const studentName = rows[i].cells[1]?.querySelector('strong')?.innerText || '';
            const xyScore = parseFloat(document.getElementById(`xy_${i}`)?.value) || 0;
            const assScore = parseFloat(document.getElementById(`ass_${i}`)?.value) || 0;
            const gradedBy = document.getElementById(`nckGraded_${i}`)?.value || currentUser.name;
            
            if (!admission) continue;
            
            const xyOverall = xyScore;
            const xyGrade = calculateGrade(xyOverall);
            
            await sb
                .from('nck_marks')
                .upsert({
                    admission_number: admission,
                    student_name: studentName,
                    block: 'Introductory',
                    subject_name: 'XY FORMS - Clinical Evaluation',
                    assessment_type: 'clinical',
                    final_score: xyOverall,
                    grade: xyGrade,
                    status: xyOverall >= 60 ? 'passed' : (xyOverall > 0 ? 'failed' : 'pending'),
                    graded_by: gradedBy,
                    academic_year: currentYear,
                    published: true,
                    updated_at: new Date().toISOString()
                }, { onConflict: 'admission_number,subject_name,block' });
            
            const assOverall = assScore;
            const assGrade = calculateGrade(assOverall);
            
            await sb
                .from('nck_marks')
                .upsert({
                    admission_number: admission,
                    student_name: studentName,
                    block: 'Introductory',
                    subject_name: 'ASSESSMENT AND CASE - Written',
                    assessment_type: 'assessment',
                    final_score: assOverall,
                    grade: assGrade,
                    status: assOverall >= 60 ? 'passed' : (assOverall > 0 ? 'failed' : 'pending'),
                    graded_by: gradedBy,
                    academic_year: currentYear,
                    published: true,
                    updated_at: new Date().toISOString()
                }, { onConflict: 'admission_number,subject_name,block' });
            
            savedCount++;
        }
        
        hideLoading();
        showNotification(`${savedCount} students' NCK marks saved!`, false);
        unsavedChanges = false;
    }

    async function showLecturers() { 
        const { data: lecturers, error } = await sb
            .from('lecturers')
            .select('*')
            .order('full_name');
        
        if (error) {
            showNotification('Error loading lecturers: ' + error.message, true);
            return;
        }
        
        let html = `
            <button class="back-btn" onclick="showMain()">Back</button>
            <div class="header"><h3><i class="fas fa-chalkboard-user"></i> Manage Lecturers</h3>
            <button class="save-btn" onclick="showAddLecturerModal()" style="margin:10px 0;"><i class="fas fa-plus"></i> Add Lecturer</button></div>
        `; 
        
        (lecturers || []).forEach(l => { 
            const badges = (l.subjects || []).map(s => `<span class="subject-badge" style="background:var(--primary);color:white;padding:4px 10px;border-radius:20px;font-size:11px;margin:2px;display:inline-block;">${s.split('|')[1]}</span>`).join(''); 
            html += `
                <div class="lecturer-card" style="background:white;border-radius:16px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;box-shadow:var(--shadow);">
                    <div><strong>${l.full_name}</strong><br><small>${l.username}</small><br>${l.email || ''}</div>
                    <div>${badges}</div>
                    <div>
                        <button class="edit-btn" onclick="showEditLecturerModal('${l.username}')">Edit</button>
                        <button class="delete-btn" onclick="deleteLecturer('${l.username}')">Delete</button>
                    </div>
                </div>
            `; 
        });

            html += '<div class="card" style="text-align:center;">No lecturers found.</div>';

    function showAddLecturerModal() { 
        const modal = `
            <div id="lecturerModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3><i class="fas fa-user-plus"></i> Add Lecturer</h3>
                        <span class="close" onclick="closeModal()">&times;</span>
                    </div>
                    <div class="modal-body">
                        <div class="field"><label>Username</label><input type="text" id="lecUser" placeholder="e.g., johndoe"></div>
                        <div class="field"><label>Full Name</label><input type="text" id="lecName" placeholder="John Doe"></div>
                        <div class="field"><label>Email</label><input type="email" id="lecEmail" placeholder="john@example.com"></div>
                        <div class="field"><label>Password</label><input type="password" id="lecPass" value="password123"></div>
                        <div class="field"><label>Subjects (format: BLOCK|Subject)</label>
                            <textarea id="lecSubjects" rows="3" placeholder="e.g.,&#10;Introductory|HUMAN ANATOMY AND PHYSIOLOGY&#10;Block 1|MEDICAL SURGICAL NURSING"></textarea>
                        </div>
                        <button onclick="saveNewLecturer()" class="save-btn" style="width:100%"><i class="fas fa-save"></i> Save Lecturer</button>
                    </div>
                </div>
            </div>
        `; 
        document.body.insertAdjacentHTML('beforeend', modal); 
    }
    
    async function saveNewLecturer() { 
        const username = document.getElementById('lecUser')?.value; 
        const name = document.getElementById('lecName')?.value; 
        const email = document.getElementById('lecEmail')?.value; 
        const password = document.getElementById('lecPass')?.value; 
        const subjectsText = document.getElementById('lecSubjects')?.value;
        const subjects = subjectsText ? subjectsText.split('\n').filter(s => s.trim()) : [];
        
        if(!username || !name) { showNotification('Username and Name required', true); return; } 
        
        showLoading('Adding lecturer...'); 
        
        const { error } = await sb
            .from('lecturers')
            .insert({
                username: username,
                full_name: name,
                email: email,
                password_hash: password || 'password123',
                subjects: subjects,
                is_active: true
            });
        
        hideLoading(); 
        closeModal(); 
        
        if(error) {
            showNotification('Error adding lecturer: ' + error.message, true);
        } else {
            showNotification('Lecturer added successfully!', false);
            showLecturers();
        }
    }
    
    async function showEditLecturerModal(username) { 
        const { data: lecturer, error } = await sb
            .from('lecturers')
            .select('*')
            .eq('username', username)
            .single();
        
        if (error) {
            showNotification('Error loading lecturer: ' + error.message, true);
            return;
        }
        
        const subjectsText = (lecturer.subjects || []).join('\n');
        
        const modal = `
            <div id="lecturerModal" class="modal">
                <div class="modal-content" style="max-width:600px;">
                    <div class="modal-header">
                        <h3><i class="fas fa-user-edit"></i> Edit Lecturer: ${lecturer.full_name}</h3>
                        <span class="close" onclick="closeModal()">&times;</span>
                    </div>
                    <div class="modal-body">
                        <div class="field"><label>Username</label><input type="text" value="${lecturer.username}" readonly></div>
                        <div class="field"><label>Name</label><input type="text" id="lecName" value="${lecturer.full_name}"></div>
                        <div class="field"><label>Email</label><input type="email" id="lecEmail" value="${lecturer.email || ''}"></div>
                        <div class="field"><label>Password (leave blank to keep)</label><input type="password" id="lecPass" placeholder="New password"></div>
                        <div class="field"><label>Subjects (format: BLOCK|Subject)</label>
                            <textarea id="lecSubjects" rows="5">${subjectsText}</textarea>
                        </div>
                        <button onclick="updateLecturer('${lecturer.username}')" class="save-btn" style="width:100%"><i class="fas fa-save"></i> Save Changes</button>
                    </div>
                </div>
            </div>
        `; 
        document.body.insertAdjacentHTML('beforeend', modal); 
    }
    
    async function updateLecturer(oldUsername) { 
        const name = document.getElementById('lecName')?.value; 
        const email = document.getElementById('lecEmail')?.value; 
        const password = document.getElementById('lecPass')?.value; 
        const subjectsText = document.getElementById('lecSubjects')?.value;
        const subjects = subjectsText ? subjectsText.split('\n').filter(s => s.trim()) : [];
        
        const updateData = {
            full_name: name,
            email: email,
            subjects: subjects,
            updated_at: new Date().toISOString()
        };
        
        if (password && password.trim()) {
            updateData.password_hash = password;
        }
        
        showLoading('Updating lecturer...'); 
        
        const { error } = await sb
            .from('lecturers')
            .update(updateData)
            .eq('username', oldUsername);
        
        hideLoading(); 
        closeModal(); 
        
        if(error) {
            showNotification('Error updating lecturer: ' + error.message, true);
        } else {
            showNotification('Lecturer updated successfully!', false);
            showLecturers();
        }
    }
    
    async function deleteLecturer(username) { 
        if(confirm(`Delete lecturer "${username}"?`)) { 
            showLoading('Deleting lecturer...'); 
            
            const { error } = await sb
                .from('lecturers')
                .delete()
                .eq('username', username);
            
            hideLoading(); 
            
            if(error) {
                showNotification('Error deleting lecturer: ' + error.message, true);
            } else {
                showNotification('Lecturer deleted successfully!', false);
                showLecturers();
            }
        } 
    }

    async function showLecturerAnalytics() {
        showLoading('Loading your analytics...');
        
        const lecturerSubjects = currentUser.subjects || [];
        
        let myData = [];
        for (let subj of lecturerSubjects) {
            const parts = subj.split('|');
            const block = parts[0];
            const subject = parts[1];
            
            const { data: marks, error } = await sb
                .from('student_marks')
                .select('final_score')
                .eq('block', block)
                .eq('subject_name', subject)
                .eq('academic_year', currentYear);
            
            if (marks && marks.length) {
                const scores = marks.map(m => m.final_score).filter(s => s > 0);
                const avg = scores.length ? scores.reduce((a, b) => a + b, 0) / scores.length : 0;
                myData.push({ block, subject, avg, students: scores.length });
            }
        }
        
        let html = `
            <button class="back-btn" onclick="showMain()"><i class="fas fa-arrow-left"></i> Back</button>
            <div class="header"><h3><i class="fas fa-chart-simple"></i> My Teaching Analytics</h3></div>
            <div class="card">
                <div class="card-title">📊 My Subjects Performance</div>
                <div style="overflow-x:auto;">
                    <table style="width:100%">
                        <thead><tr style="background:#667eea;color:white"><th>Block</th><th>Subject</th><th>Average Score</th><th>Students</th><tr></thead>
                        <tbody>
                            ${myData.map(d => `<tr><td>${d.block}</td><td><strong>${d.subject}</strong></td><td><strong>${d.avg.toFixed(1)}%</strong></td><td>${d.students}</td></tr>`).join('')}
                            ${myData.length === 0 ? '<tr><td colspan="4" style="text-align:center;">No data available for your subjects</td></tr>' : ''}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        
        updateContentArea(html);
        hideLoading();
    }
