<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Nursing School System | NCK & Internal Marks | Nakuru College</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --secondary: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --info: #3b82f6;
      --dark: #1e293b;
      --light: #f8fafc;
      --gray: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      --radius: 24px;
      --radius-sm: 12px;
    }
    
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      min-height: 100vh; 
      padding: 24px; 
      transition: all 0.3s ease;
    }
    
    body.dark-mode {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    }
    
    body.dark-mode .card,
    body.dark-mode .header,
    body.dark-mode .stat-card,
    body.dark-mode .selector-group,
    body.dark-mode .user-info,
    body.dark-mode .subject-card,
    body.dark-mode table,
    body.dark-mode .lecturer-card,
    body.dark-mode .unit-card,
    body.dark-mode .modal-content,
    body.dark-mode .login-container {
      background: #1e293b;
      color: #f1f5f9;
      border-color: #334155;
    }
    
    body.dark-mode th {
      background: #0f172a;
    }
    
    body.dark-mode td {
      border-bottom-color: #334155;
    }
    
    body.dark-mode input,
    body.dark-mode select,
    body.dark-mode textarea {
      background: #0f172a;
      color: #f1f5f9;
      border-color: #475569;
    }
    
    .container { max-width: 1400px; margin: 0 auto; }
    
    /* Glassmorphism Header */
    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 24px;
      text-align: center;
      box-shadow: var(--shadow-xl);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    body.dark-mode .header {
      background: rgba(30, 41, 59, 0.95);
    }
    
    .header h1 {
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 32px;
      font-weight: 800;
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: white;
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    
    .stat-card:hover::before {
      transform: scaleX(1);
    }
    
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-xl);
    }
    
    .stat-number {
      font-size: 42px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .stat-label {
      margin-top: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--gray);
    }
    
    /* Selector Group */
    .selector-group {
      background: white;
      border-radius: 20px;
      padding: 20px 24px;
      margin-bottom: 24px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: center;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    
    .selector-group label {
      font-weight: 600;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* Modern Select & Input */
    select, input {
      padding: 12px 20px;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 500;
      background: white;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }
    
    select:focus, input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    
    /* Menu Buttons */
    .admin-menu-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .menu-btn {
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      transition: all 0.3s ease;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .menu-btn i {
      font-size: 16px;
    }
    
    .menu-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); }
    .btn-success { background: linear-gradient(135deg, #10b981, #059669); }
    .btn-info { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .btn-export { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
    .btn-dark { background: linear-gradient(135deg, #1e293b, #0f172a); }
    
    /* User Info Bar */
    .user-info {
      background: white;
      border-radius: 20px;
      padding: 16px 24px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      box-shadow: var(--shadow);
    }
    
    .logout-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .logout-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.3);
    }
    
    /* Cards */
    .card {
      background: white;
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    
    .card-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #1e293b;
      border-left: 4px solid var(--primary);
      padding-left: 16px;
    }
    
    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 16px;
      overflow: hidden;
    }
    
    th, td {
      padding: 14px 16px;
      text-align: left;
    }
    
    th {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-weight: 600;
      font-size: 13px;
    }
    
    tr:hover {
      background: rgba(99, 102, 241, 0.05);
    }
    
    .pass-row { background-color: #d1fae5 !important; }
    .fail-row { background-color: #fee2e2 !important; }
    
    body.dark-mode .pass-row { background-color: #064e3b !important; }
    body.dark-mode .fail-row { background-color: #7f1d1d !important; }
    
    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      gap: 6px;
    }
    
    .badge-pass { background: #d1fae5; color: #065f46; }
    .badge-fail { background: #fee2e2; color: #991b1b; }
    .badge-full { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .badge-single { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
    .badge-exam { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
    
    /* Subject Cards */
    .subject-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    
    .subject-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      border-left: 5px solid var(--primary);
    }
    
    .subject-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-xl);
    }
    
    .subject-card h4 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1e293b;
    }
    
    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    
    .modal-content {
      background: white;
      border-radius: 28px;
      width: 520px;
      max-width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: var(--shadow-xl);
      animation: slideUp 0.3s ease;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 28px;
      border-bottom: 2px solid #f1f5f9;
    }
    
    .modal-header h3 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .close {
      cursor: pointer;
      font-size: 28px;
      color: #94a3b8;
      transition: all 0.2s;
    }
    
    .close:hover {
      color: #ef4444;
      transform: rotate(90deg);
    }
    
    .modal-body {
      padding: 28px;
    }
    
    .modal-body .field {
      margin-bottom: 20px;
    }
    
    .modal-body label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #334155;
    }
    
    /* Buttons */
    .save-btn, .export-btn, .edit-btn, .delete-btn, .back-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    
    .save-btn { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .export-btn { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; }
    .edit-btn { background: #3b82f6; color: white; }
    .delete-btn { background: #ef4444; color: white; }
    .back-btn { background: #64748b; color: white; }
    
    /* Loader */
    .loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loader-text {
      color: white;
      margin-top: 16px;
      font-size: 14px;
    }
    
    /* Notification */
    .notification-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #10b981;
      color: white;
      padding: 14px 24px;
      border-radius: 60px;
      z-index: 10000;
      animation: slideInRight 0.3s ease;
      box-shadow: var(--shadow-lg);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    /* Charts Grid */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      margin-bottom: 24px;
    }
    
    .full-width {
      grid-column: span 2;
    }
    
    /* Rankings */
    .rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: white; }
    .rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); color: white; }
    .rank-3 { background: linear-gradient(135deg, #fb923c, #f97316); color: white; }
    
    /* Responsive */
    @media (max-width: 768px) {
      body { padding: 16px; }
      .stats-grid, .admin-menu-grid, .menu-grid, .charts-grid { grid-template-columns: repeat(2, 1fr); }
      .full-width { grid-column: span 1; }
      .admin-menu-grid { grid-template-columns: repeat(3, 1fr); }
      .header h1 { font-size: 24px; }
    }
    
    /* Login */
    .login-container {
      max-width: 460px;
      margin: 80px auto;
      background: white;
      padding: 48px 40px;
      border-radius: 32px;
      box-shadow: var(--shadow-xl);
    }
    
    .login-container h2 {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .login-container button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
    }
    
    .lecturer-card, .unit-card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      box-shadow: var(--shadow);
    }
    
    .subject-badge {
      background: var(--primary);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      margin: 2px;
      display: inline-block;
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
  // ======================= CONFIGURATION =======================
  const API_BASE_URL = 'https://nchsm-marks-proxy.onrender.com';
  const INTAKE_YEARS = ['2024', '2025', '2026'];
  
  let currentUser = null;
  let currentYear = '2026';
  let currentExamType = 'internal';
  let configCache = null;
  
  // Marks entry globals
  let currentMarksData = null;
  let currentMarksBlock = null;
  let currentMarksSubject = null;
  let currentAssessmentType = null;
  let currentAdminMarks = null;
  let currentAdminAssessmentType = null;
  let currentAdminBlock = null;
  let currentAdminSubject = null;
  let currentNCKMarks = null;
  let currentNCKSheet = null;
  
  // ======================= UTILITIES =======================
  function showLoading(msg) {
    let existing = document.querySelector('.loader');
    if (existing) existing.remove();
    let loader = document.createElement('div');
    loader.className = 'loader';
    loader.innerHTML = `<div class="spinner"></div><div class="loader-text">${msg || 'Loading...'}</div>`;
    document.body.appendChild(loader);
  }
  
  function hideLoading() {
    let loader = document.querySelector('.loader');
    if (loader) loader.remove();
  }
  
  function showNotification(msg, isErr) {
    let toast = document.createElement('div');
    toast.className = 'notification-toast';
    toast.style.background = isErr ? 'linear-gradient(135deg, #ef4444, #dc2626)' : 'linear-gradient(135deg, #10b981, #059669)';
    toast.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  async function apiCall(endpoint, opts = {}) {
    try {
      const headers = {
        'Content-Type': 'application/json',
        'X-Year': currentYear,
        'X-Exam-Type': currentExamType
      };
      const res = await fetch(API_BASE_URL + endpoint, { headers, ...opts });
      const ct = res.headers.get('content-type');
      if (ct && ct.includes('application/json')) return await res.json();
      return { error: 'Non-JSON response' };
    } catch (e) {
      console.error(e);
      return { error: e.message };
    }
  }
  
  async function getConfig() {
    if (configCache) return configCache;
    configCache = await apiCall('/api/units', {});
    return configCache;
  }
  
  function exportToCSV(data, filename) {
    if (!data || !data.length) { showNotification('No data to export', true); return; }
    const headers = Object.keys(data[0]);
    let csv = [headers.join(',')];
    data.forEach(row => {
      const values = headers.map(h => `"${String(row[h] || '').replace(/"/g, '""')}"`);
      csv.push(values.join(','));
    });
    const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${filename}_${new Date().toISOString().slice(0, 19)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showNotification('Export completed!', false);
  }
  
  function initDarkMode() {
    if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
  }
  
  function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    showNotification(`Dark mode ${document.body.classList.contains('dark-mode') ? 'enabled' : 'disabled'}`, false);
  }
  
  function closeModal() {
    document.querySelectorAll('.modal').forEach(m => m.remove());
  }
  
  // ======================= LOGIN & MAIN =======================
  function checkLogin() {
    initDarkMode();
    const saved = localStorage.getItem('nursingUser');
    if (saved) {
      currentUser = JSON.parse(saved);
      const savedYear = localStorage.getItem('selectedYear');
      currentYear = (savedYear && INTAKE_YEARS.includes(savedYear)) ? savedYear : '2026';
      showMain();
    } else {
      showLogin();
    }
  }
  
  function showLogin() {
    const yearOptions = INTAKE_YEARS.map(y => `<option value="${y}" ${y === '2026' ? 'selected' : ''}>🎓 March ${y} Class</option>`).join('');
    document.getElementById('app').innerHTML = `
      <div class="login-container">
        <div style="text-align: center; margin-bottom: 24px;">
          <i class="fas fa-graduation-cap" style="font-size: 48px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent;"></i>
        </div>
        <h2>Nursing School System</h2>
        <p style="text-align: center; color: #64748b; margin-bottom: 32px;">Nakuru College of Health Sciences</p>
        <select id="loginYear">${yearOptions}</select>
        <input type="text" id="username" placeholder="👤 Username">
        <input type="password" id="password" placeholder="🔒 Password">
        <button onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
        <div id="loginError" class="error" style="color: #ef4444; margin-top: 16px; text-align: center;"></div>
      </div>
    `;
  }
  
  async function doLogin() {
    showLoading('Logging in...');
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const year = document.getElementById('loginYear').value;
    currentYear = year;
    localStorage.setItem('selectedYear', currentYear);
    const result = await apiCall('/api/login', {
      method: 'POST',
      body: JSON.stringify({ username, password, year: currentYear })
    });
    hideLoading();
    if (result.success) {
      currentUser = result.user;
      localStorage.setItem('nursingUser', JSON.stringify(currentUser));
      showMain();
      showNotification(`Welcome ${currentUser.name}!`, false);
    } else {
      document.getElementById('loginError').innerHTML = result.message;
    }
  }
  
  function logout() {
    localStorage.removeItem('nursingUser');
    currentUser = null;
    configCache = null;
    showLogin();
  }
  
  async function showMain() {
    showLoading('Loading Dashboard...');
    const isAdmin = (currentUser.role === 'admin');
    const yearOptions = INTAKE_YEARS.map(y => `<option value="${y}" ${y === currentYear ? 'selected' : ''}>🎓 March ${y} Class</option>`).join('');
    const examTypeOptions = `
      <option value="internal" ${currentExamType === 'internal' ? 'selected' : ''}>📝 Internal Exams (CAT1 + CAT2 + Exam)</option>
      <option value="nck" ${currentExamType === 'nck' ? 'selected' : ''}>🏥 NCK Score Sheet (Clinical Assessment)</option>

  async function loadNCKMarks() {
    const sheetName = document.getElementById('nckSheetSelect').value;

  function displayXYFormsMarks(marks) {
    if (!marks || marks.length === 0) {
      document.getElementById('nckMarksContainer').innerHTML = '<div class="card" style="text-align:center;">No data found. Ensure students are in the STUDENTS sheet.</div>';
      return;
    }
    
    const clinicalAreas = ['MED1', 'MED2', 'MED3', 'MCH1', 'MCH2', 'MCH3', 'MAT1', 'MAT2', 'MAT3', 'PEAD1', 'PEAD2', 'SURG1', 'SURG2', 'SURG3', 'OPD', 'NBU1', 'NBU2', 'THEATRE', 'PSYCHIATRY', 'RURALS', 'DISTRICT', 'SPECIAL'];
    
    let html = `<div style="overflow-x:auto; max-height: 70vh;"><table style="min-width: 1200px;"><thead><tr style="background: linear-gradient(135deg, #667eea, #764ba2); color: white; position: sticky; top: 0;">
      <th style="position: sticky; left: 0; background: #667eea;">#</th>
      <th style="position: sticky; left: 60px; background: #667eea;">Student Name</th>`;
    
    for (let area of clinicalAreas) {
      html += `<th style="min-width: 70px;"><div style="font-size: 11px;">${area}</div><div style="font-size: 9px;">(0-100)</div></th>`;
    }
    html += `<th>Average</th><th>Status</th><th>Graded By</th></tr></thead><tbody>`;
    
    currentNCKMarks = marks;
    currentNCKSheet = 'XY FORMS';
    
    for (let i = 0; i < marks.length; i++) {
      const m = marks[i];
      let scores = [];
      if (m.clinicalAreas) {
        scores = m.clinicalAreas.map(ca => ca.score || 0);
      } else {
        for (let c = 0; c < clinicalAreas.length; c++) scores.push(0);
      }
      
      const validScores = scores.filter(s => s > 0);
      const avg = validScores.length ? scores.reduce((a,b) => a+b,0) / validScores.length : 0;
      const status = avg >= 60 ? 'PASS' : (validScores.length ? 'FAIL' : 'PENDING');
      const rowClass = status === 'PASS' ? 'pass-row' : (status === 'FAIL' ? 'fail-row' : '');
      
      html += `<tr class="${rowClass}">`;
      html += `<td style="position: sticky; left: 0; background: white;">${i+1}</td>`;
      html += `<td style="position: sticky; left: 60px; background: white; font-weight: 500;">${m.name || 'Unnamed'}</td>`;
      
      for (let c = 0; c < clinicalAreas.length; c++) {
        const score = scores[c] || 0;
        html += `<td style="padding: 4px;"><input type="number" id="xy_${i}_${c}" value="${score}" min="0" max="100" step="0.5" style="width: 65px; padding: 6px; border-radius: 8px;" onchange="updateXYAverage(${i})"></td>`;
      }
      
      html += `<td id="xyAvg_${i}" style="font-weight: bold;">${avg.toFixed(2)}%</td>`;
      html += `<td id="xyStatus_${i}"><span class="badge ${status === 'PASS' ? 'badge-pass' : 'badge-fail'}">${status}</span></td>`;
      html += `<td><input type="text" id="xyGraded_${i}" value="${m.gradedBy || ''}" placeholder="Lecturer name" style="width: 120px; padding: 6px; border-radius: 8px;"></td>`;
      html += `</tr>`;
    }
    
    html += `</tbody></table></div><div style="text-align: center; margin-top: 24px;"><button class="save-btn" onclick="saveNCKMarks()"><i class="fas fa-save"></i> Save All NCK Marks</button></div>`;
    document.getElementById('nckMarksContainer').innerHTML = html;
  }
  
  function displayAssessmentMarks(marks) {
    if (!marks || marks.length === 0) {
      document.getElementById('nckMarksContainer').innerHTML = '<div class="card" style="text-align:center;">No assessment data found.</div>';
      return;
    }
    
    let html = `<div style="overflow-x:auto;"><table style="min-width: 800px;"><thead><tr style="background: linear-gradient(135deg, #667eea, #764ba2); color: white;">
      <th>#</th><th>Student Name</th><th>ANC Assessment</th><th>CWC Immunization</th><th>Ward Nursing Care</th><th>Total</th><th>Status</th><th>Graded By</th></tr></thead><tbody>`;
    
    currentNCKMarks = marks;
    currentNCKSheet = 'ASSESSMENT AND CASE';
    
    for (let i = 0; i < marks.length; i++) {
      const m = marks[i];
      const scores = m.scores || [0, 0, 0];
      const total = scores.reduce((a,b) => a+b, 0);
      const status = total >= 60 ? 'PASS' : (scores.some(s => s > 0) ? 'FAIL' : 'PENDING');
      const rowClass = status === 'PASS' ? 'pass-row' : (status === 'FAIL' ? 'fail-row' : '');
      
      html += `<tr class="${rowClass}">`;
      html += `<td>${i+1}</td>`;
      html += `<td style="font-weight: 500;">${m.name || 'Unnamed'}</td>`;
      html += `<td><input type="number" id="ac_${i}_0" value="${scores[0] || 0}" min="0" max="100" step="0.5" style="width: 80px; padding: 6px; border-radius: 8px;" onchange="updateACTotal(${i})"></td>`;
      html += `<td><input type="number" id="ac_${i}_1" value="${scores[1] || 0}" min="0" max="100" step="0.5" style="width: 80px; padding: 6px; border-radius: 8px;" onchange="updateACTotal(${i})"></td>`;
      html += `<td><input type="number" id="ac_${i}_2" value="${scores[2] || 0}" min="0" max="100" step="0.5" style="width: 80px; padding: 6px; border-radius: 8px;" onchange="updateACTotal(${i})"></td>`;
      html += `<td id="acTotal_${i}" style="font-weight: bold;">${total}</td>`;
      html += `<td id="acStatus_${i}"><span class="badge ${status === 'PASS' ? 'badge-pass' : 'badge-fail'}">${status}</span></td>`;
      html += `<td><input type="text" id="acGraded_${i}" value="${m.gradedBy || ''}" placeholder="Lecturer name" style="width: 120px; padding: 6px; border-radius: 8px;"></td>`;
      html += `</tr>`;
    }
    
    html += `</tbody></table></div><div style="text-align: center; margin-top: 24px;"><button class="save-btn" onclick="saveNCKMarks()"><i class="fas fa-save"></i> Save All NCK Marks</button></div>`;
    document.getElementById('nckMarksContainer').innerHTML = html;
  }
  
  window.updateXYAverage = function(idx) {
    const areas = 22;
    let scores = [];
    for (let c = 0; c < areas; c++) {
      const val = parseFloat(document.getElementById(`xy_${idx}_${c}`)?.value);
      if (!isNaN(val) && val > 0) scores.push(val);
    }
    const avg = scores.length ? scores.reduce((a,b) => a+b,0) / scores.length : 0;
    const status = avg >= 60 ? 'PASS' : (scores.length ? 'FAIL' : 'PENDING');
    document.getElementById(`xyAvg_${idx}`).innerHTML = avg.toFixed(2) + '%';
    document.getElementById(`xyStatus_${idx}`).innerHTML = `<span class="badge ${status === 'PASS' ? 'badge-pass' : 'badge-fail'}">${status}</span>`;
    const row = document.getElementById(`xy_${idx}_0`)?.parentElement?.parentElement;
    if (row) row.className = status === 'PASS' ? 'pass-row' : (status === 'FAIL' ? 'fail-row' : '');
  };
  
  window.updateACTotal = function(idx) {
    const s0 = parseFloat(document.getElementById(`ac_${idx}_0`)?.value) || 0;
    const s1 = parseFloat(document.getElementById(`ac_${idx}_1`)?.value) || 0;
    const s2 = parseFloat(document.getElementById(`ac_${idx}_2`)?.value) || 0;
    const total = s0 + s1 + s2;
    const status = total >= 60 ? 'PASS' : ((s0 || s1 || s2) ? 'FAIL' : 'PENDING');
    document.getElementById(`acTotal_${idx}`).innerHTML = total;
    document.getElementById(`acStatus_${idx}`).innerHTML = `<span class="badge ${status === 'PASS' ? 'badge-pass' : 'badge-fail'}">${status}</span>`;
    const row = document.getElementById(`ac_${idx}_0`)?.parentElement?.parentElement;
    if (row) row.className = status === 'PASS' ? 'pass-row' : (status === 'FAIL' ? 'fail-row' : '');
  };
  
  window.saveNCKMarks = async function() {
    const sheetName = document.getElementById('nckSheetSelect').value;
    let marksData = [];
    
    if (sheetName === 'XY FORMS') {
      const rows = document.querySelectorAll('#nckMarksContainer tbody tr');
      for (let i = 0; i < rows.length; i++) {
        let scores = [];
        for (let c = 0; c < 22; c++) {
          const val = parseFloat(document.getElementById(`xy_${i}_${c}`)?.value) || 0;
          scores.push(val);
        }
        marksData.push({
          row: i + 2,
          scores: scores,
          gradedBy: document.getElementById(`xyGraded_${i}`)?.value || ''
        });
      }
    } else {
      const rows = document.querySelectorAll('#nckMarksContainer tbody tr');
      for (let i = 0; i < rows.length; i++) {
        let scores = [
          parseFloat(document.getElementById(`ac_${i}_0`)?.value) || 0,
          parseFloat(document.getElementById(`ac_${i}_1`)?.value) || 0,
          parseFloat(document.getElementById(`ac_${i}_2`)?.value) || 0
        ];
        marksData.push({
          row: i + 2,
          scores: scores,
          gradedBy: document.getElementById(`acGraded_${i}`)?.value || ''
        });
      }
    }
    
    showLoading('Saving NCK marks...');
    const result = await apiCall('/api/marks', {
      method: 'POST',
      body: JSON.stringify({
        block: 'BLOCK_0',
        subject: sheetName,
        marksData: marksData,
        lecturerName: currentUser.name,
        examType: 'nck'
      })
    });
    hideLoading();
    showNotification(result?.success ? 'NCK marks saved successfully!' : 'Error saving NCK marks', !result?.success);
    if (result?.success) loadNCKMarks();
  };

  async function loadAdminMarks(block, subject, at) {
    showLoading('Loading marks...');
    const marks = await apiCall(`/api/marks/${block}/${subject}`, {});
    let html = `<div class="export-bar"><button class="export-btn" onclick="exportAdminMarks()"><i class="fas fa-download"></i> Export</button></div><div style="overflow-x:auto;"><table style="width:100%"><thead><tr style="background:#667eea;color:white"><th>Admission</th><th>Name</th>`;
    if (at === 'full') html += '<th>CAT1 (0-30)</th><th>CAT2 (0-30)</th><th>Exam (0-70)</th>';
    else if (at === 'single_cat') html += '<th>CAT (0-30)</th><th>Exam (0-70)</th>';
    else html += '<th>Exam (0-100)</th>';
    html += '<th>Total</th><th>Status</th><th>Graded By</th></tr></thead><tbody>';
    
    window.currentAdminMarks = marks;
    window.currentAdminAssessmentType = at;
    window.currentAdminBlock = block;
    window.currentAdminSubject = subject;
    
    for (let i = 0; i < marks.length; i++) {
      const m = marks[i];
      const cat1 = m.cat1 || '', cat2 = m.cat2 || '', exam = m.exam || '';
      let ncat1 = parseFloat(cat1)||0, ncat2 = parseFloat(cat2)||0, nexam = parseFloat(exam)||0, total = 0;
      if (at === 'full') total = Math.round(((Math.min(ncat1,30)+Math.min(ncat2,30))/60*30 + Math.min(nexam,70))*10)/10;
      else if (at === 'single_cat') total = Math.round((Math.min(ncat1,30)+Math.min(nexam,70))*10)/10;
      else total = Math.round(Math.min(nexam,100)*10)/10;
      const status = total >= 60 ? 'PASS' : (total > 0 ? 'FAIL' : '');
      const rowClass = total >= 60 ? 'pass-row' : 'fail-row';
      html += `<tr class="${rowClass}"><td>${m.admission}</td><td>${m.name}</td>`;
      if (at === 'full') {
        html += `<td><input type="number" id="acat1_${i}" value="${cat1}" min="0" max="30" step="0.5" onchange="updateAdminTotal(${i})"></td>`;
        html += `<td><input type="number" id="acat2_${i}" value="${cat2}" min="0" max="30" step="0.5" onchange="updateAdminTotal(${i})"></td>`;
        html += `<td><input type="number" id="aexam_${i}" value="${exam}" min="0" max="70" step="0.5" onchange="updateAdminTotal(${i})"></td>`;
      } else if (at === 'single_cat') {
        html += `<td><input type="number" id="acat1_${i}" value="${cat1}" min="0" max="30" step="0.5" onchange="updateAdminTotal(${i})"></td>`;
        html += `<td><input type="number" id="aexam_${i}" value="${exam}" min="0" max="70" step="0.5" onchange="updateAdminTotal(${i})"></td>`;
      } else {
        html += `<td><input type="number" id="aexam_${i}" value="${exam}" min="0" max="100" step="0.5" onchange="updateAdminTotal(${i})"></td>`;
      }
      html += `<td id="atotal_${i}">${total}</td><td id="astatus_${i}">${status}</td><td>${m.gradedBy || '-'}</td></tr>`;

    const modal = `<div id="unitModal" class="modal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-edit"></i> Edit Unit</h3><span class="close" onclick="closeModal()">&times;</span></div><div class="modal-body">
      <div class="field"><label>Subject Name</label><input type="text" id="editUnitName" value="${name}"></div>
      <div class="field"><label>Assessment Type</label><select id="editUnitType"><option value="full" ${curType === 'full' ? 'selected' : ''}>Full (CAT1+CAT2+Exam)</option><option value="single_cat" ${curType === 'single_cat' ? 'selected' : ''}>Single CAT (CAT+Exam)</option><option value="exam_only" ${curType === 'exam_only' ? 'selected' : ''}>Exam Only</option></select></div>
      <button onclick="updateUnit('${block}','${name}')" class="save-btn" style="width:100%"><i class="fas fa-save"></i> Save Changes</button>
    </div></div></div>`;
    document.body.insertAdjacentHTML('beforeend', modal);
  }
  
  async function updateUnit(block, oldName) {
    const newName = document.getElementById('editUnitName').value.trim().toUpperCase();
    const newType = document.getElementById('editUnitType').value;
    if (!newName) { showNotification('Enter subject name', true); return; }
    showLoading('Updating...');
    await apiCall('/api/update-unit', { method: 'POST', body: JSON.stringify({ block, oldName, newName, assessmentType: newType }) });
    hideLoading(); closeModal(); configCache = null; showNotification('Unit updated!', false); showUnits();
  }
  
  async function deleteUnit(block, name) {
    if (confirm(`Delete unit "${name}"? This will delete ALL marks!`)) {
      showLoading('Deleting...');
      await apiCall('/api/delete-unit', { method: 'POST', body: JSON.stringify({ block, name }) });
      hideLoading(); configCache = null; showNotification('Unit deleted!', false); showUnits();
    }
  }
  
  // Initialize
  let sy = localStorage.getItem('selectedYear');
  if (sy && INTAKE_YEARS.includes(sy)) currentYear = sy;
  let set = localStorage.getItem('selectedExamType');
  if (set) currentExamType = set;
  checkLogin();
</script>
</body>
</html>
