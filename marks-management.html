<body>
<div id="app"></div>

<script>
  // ======================= YOUR ORIGINAL CODE - 100% PRESERVED =======================
  const API_BASE_URL = 'https://nchsm-marks-proxy.onrender.com';
  const INTAKE_YEARS = ['2024', '2025', '2026'];
  
  let currentUser = null;
  let currentYear = '2026';
  let currentExamType = 'internal';
  let configCache = null;
  let currentMarksData = null, currentMarksBlock = null, currentMarksSubject = null, currentAssessmentType = null;
  let currentAdminMarks = null, currentAdminAssessmentType = null, currentAdminBlock = null, currentAdminSubject = null;
  let currentNCKMarks = null, currentNCKSheet = null;
  let fastEntryVisible = false;
  let autoSaveInterval = null;
  let unsavedChanges = false;
  
  // ======================= CORE FUNCTIONS =======================
  function showLoading(msg) { let l=document.querySelector('.loader'); if(l) l.remove(); l=document.createElement('div'); l.className='loader'; l.innerHTML=`<div class="spinner"></div><div class="loader-text">${msg||'Loading...'}</div>`; document.body.appendChild(l); }
  function hideLoading() { let l=document.querySelector('.loader'); if(l) l.remove(); }
  function showNotification(msg,isErr) { let t=document.createElement('div'); t.className='notification-toast'; if(isErr) t.classList.add('error'); t.innerHTML=`<i class="fas ${isErr?'fa-exclamation-circle':'fa-check-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
  
  async function apiCall(endpoint,opts={}) { 
    try { 
      const headers={'Content-Type':'application/json','X-Year':currentYear,'X-Exam-Type':currentExamType,'X-User-Role':currentUser?.role||''}; 
      const res=await fetch(API_BASE_URL+endpoint,{headers,...opts}); 
      if(!res.ok){
        const errorData=await res.json().catch(()=>({message:`HTTP ${res.status}`}));
        return {success:false,message:errorData.message};
      }
      const ct=res.headers.get('content-type'); 
      if(ct&&ct.includes('application/json')) return await res.json(); 
      return {error:'Non-JSON response'}; 
    } catch(e){ console.error(e); return {success:false,error:e.message}; } 
  }
  
  async function getConfig() { if(configCache) return configCache; configCache=await apiCall('/api/units',{}); return configCache; }
  function exportToCSV(data,filename) { if(!data||!data.length){ showNotification('No data to export',true); return; } const headers=Object.keys(data[0]); let csv=[headers.join(',')]; data.forEach(row=>{ const values=headers.map(h=>`"${String(row[h]||'').replace(/"/g,'""')}"`); csv.push(values.join(',')); }); const blob=new Blob([csv.join('\n')],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${filename}_${currentYear}_${new Date().toISOString().slice(0,19)}.csv`; a.click(); URL.revokeObjectURL(a.href); showNotification('Export completed!'); }
// ======================= IMPORT MARKS FROM CSV =======================
window.importMarks = function() {
    // Create file input
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = '.csv';
    fileInput.style.display = 'none';
    document.body.appendChild(fileInput);
    
    fileInput.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = async function(event) {
            try {
                let csvText = event.target.result;
                
                // Handle BOM
                if (csvText.charCodeAt(0) === 0xFEFF) {
                    csvText = csvText.slice(1);
                }
                
                const lines = csvText.split(/\r?\n/).filter(line => line.trim());
                
                if (lines.length < 2) {
                    showNotification('CSV file is empty or invalid', true);
                    return;
                }
                
                // Parse headers with support for quoted fields
                const headerLine = lines[0];
                const headers = parseCSVLine(headerLine);
                
                // Find column indices
                const nameIdx = findColumnIndex(headers, ['name', 'student name', 'student', 'full name', 'candidate name']);
                const admissionIdx = findColumnIndex(headers, ['admission', 'admission no', 'registration', 'reg no', 'student id', 'id', 'student_id']);
                const cat1Idx = findColumnIndex(headers, ['cat 1', 'cat1', 'cat1 score', 'cat 1 score', 'assignment 1']);
                const cat2Idx = findColumnIndex(headers, ['cat 2', 'cat2', 'cat2 score', 'cat 2 score', 'assignment 2']);
                const examIdx = findColumnIndex(headers, ['exam', 'exam score', 'final exam', 'theory exam', 'exam_score']);
                const totalIdx = findColumnIndex(headers, ['total', 'total score', 'final score', 'average', 'total_score']);
                const gradeIdx = findColumnIndex(headers, ['grade', 'status', 'result', 'result_status']);
                const blockIdx = findColumnIndex(headers, ['block', 'year', 'semester', 'block_term']);
                const subjectIdx = findColumnIndex(headers, ['subject', 'unit', 'course', 'module', 'exam_name']);
                
                if (admissionIdx === -1 || nameIdx === -1) {
                    showNotification('CSV must contain "Admission Number" and "Student Name" columns', true);
                    return;
                }
                
                // Parse data rows
                const importData = [];
                let warnings = [];
                let hasValidScores = false;
                
                for (let i = 1; i < lines.length; i++) {
                    const values = parseCSVLine(lines[i]);
                    
                    if (values.length < 2 || !values[nameIdx]?.trim() || !values[admissionIdx]?.trim()) continue;
                    
                    const name = values[nameIdx]?.trim() || '';
                    const admission = values[admissionIdx]?.trim() || '';
                    
                    let cat1 = parseFloat(values[cat1Idx]) || 0;
                    let cat2 = parseFloat(values[cat2Idx]) || 0;
                    let exam = parseFloat(values[examIdx]) || 0;
                    
                    if (cat1 > 0 || cat2 > 0 || exam > 0) hasValidScores = true;
                    
                    if (cat1 > 30) {
                        warnings.push(`${name}: CAT1 (${cat1}) exceeds max 30, will be capped`);
                        cat1 = Math.min(cat1, 30);
                    }
                    if (cat2 > 30) {
                        warnings.push(`${name}: CAT2 (${cat2}) exceeds max 30, will be capped`);
                        cat2 = Math.min(cat2, 30);
                    }
                    if (exam > 70) {
                        const isHundredMark = headers.some(h => 
                            h.toLowerCase().includes('100') || 
                            h.toLowerCase().includes('final') ||
                            h.toLowerCase().includes('theory') ||
                            h.toLowerCase().includes('marks_out_of')
                        );
                        if (!isHundredMark && exam > 70) {
                            warnings.push(`${name}: Exam (${exam}) exceeds max 70, will be capped`);
                            exam = Math.min(exam, 70);
                        }
                    }
                    
                    let total = 0;
                    if (totalIdx !== -1) {
                        total = parseFloat(values[totalIdx]) || 0;
                    } else if (exam > 0 && cat1 > 0 && cat2 > 0) {
                        const cappedCat1 = Math.min(cat1, 30);
                        const cappedCat2 = Math.min(cat2, 30);
                        const cappedExam = Math.min(exam, 70);
                        total = ((cappedCat1 + cappedCat2) / 60 * 30) + cappedExam;
                        total = Math.round(total * 10) / 10;
                    } else if (exam > 0 && cat1 > 0) {
                        const cappedCat1 = Math.min(cat1, 30);
                        const cappedExam = Math.min(exam, 70);
                        total = cappedCat1 + cappedExam;
                        total = Math.round(total * 10) / 10;
                    } else if (exam > 0) {
                        total = Math.min(exam, 100);
                        total = Math.round(total * 10) / 10;
                    }
                    
                    let grade = gradeIdx !== -1 ? (values[gradeIdx]?.trim() || '') : '';
                    if (!grade && total > 0) {
                        grade = total >= 60 ? 'PASS' : 'FAIL';
                    }
                    
                    const block = blockIdx !== -1 ? (values[blockIdx]?.trim() || '') : '';
                    const subjectName = subjectIdx !== -1 ? (values[subjectIdx]?.trim() || '') : '';
                    
                    importData.push({
                        name: name,
                        admission: admission,
                        cat1: cat1,
                        cat2: cat2,
                        exam: exam,
                        total: total,
                        grade: grade,
                        block: block,
                        subject: subjectName
                    });
                }
                
                if (importData.length === 0) {
                    showNotification('No valid data rows found in CSV', true);
                    return;
                }
                
                if (warnings.length > 0) {
                    console.warn('Import warnings:', warnings);
                    const warningMsg = warnings.slice(0, 3).join('\n') + 
                                      (warnings.length > 3 ? `\n... and ${warnings.length - 3} more` : '');
                    if (!confirm(`⚠️ ${warnings.length} warnings found:\n${warningMsg}\n\nContinue with import?`)) {
                        return;
                    }
                }
                
                // Auto-detect assessment type
                let detectedType = 'full';
                const sample = importData[0];
                if (sample.exam > 0 && sample.cat1 > 0 && sample.cat2 > 0) detectedType = 'full';
                else if (sample.exam > 0 && (sample.cat1 > 0 || sample.cat2 > 0)) detectedType = 'single_cat';
                else if (sample.exam > 0) detectedType = 'exam_only';
                
                showEnhancedImportPreview(importData, detectedType);
                
            } catch (err) {
                console.error('Import error:', err);
                showNotification('Error parsing CSV: ' + err.message, true);
            }
        };
        reader.readAsText(file);
        document.body.removeChild(fileInput);
    };
    
    fileInput.click();
};

// ======================= HELPER: Parse CSV Line =======================
function parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    
    for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
            if (inQuotes && line[i + 1] === '"') {
                current += '"';
                i++;
            } else {
                inQuotes = !inQuotes;
            }
        } else if (char === ',' && !inQuotes) {
            result.push(current.trim());
            current = '';
        } else {
            current += char;
        }
    }
    result.push(current.trim());
    return result;
}

// ======================= HELPER: Find Column Index =======================
function findColumnIndex(headers, keywords) {
    for (let i = 0; i < headers.length; i++) {
        const header = headers[i].toLowerCase().trim();
        for (const keyword of keywords) {
            if (header.includes(keyword.toLowerCase())) {
                return i;
            }
        }
    }
    return -1;
}

window.confirmEnhancedImport = async function() {
    const checkedBoxes = document.querySelectorAll('.import-row-checkbox:checked');
    if (checkedBoxes.length === 0) {
        showNotification('Please select at least one record to import', true);
        return;
    }
    
    const block = document.getElementById('importBlockSelect')?.value || 'BLOCK_0';
    const subject = document.getElementById('importSubjectName')?.value.trim().toUpperCase();
    const examType = document.getElementById('importExamType')?.value || 'full';
    
    if (!subject) {
        showNotification('Please enter a subject name', true);
        return;
    }
    
    if (!confirm(`Import ${checkedBoxes.length} records to ${block} - ${subject} (${examType})?`)) {
        return;
    }
    
    showLoading(`Importing ${checkedBoxes.length} records...`);
    
    try {
        const existingMarks = await apiCall(`/api/marks/${block}/${encodeURIComponent(subject)}`, {});
        const existingMap = {};
        if (existingMarks && !existingMarks.error) {
            existingMarks.forEach(m => {
                existingMap[m.admission] = true;
            });
        }
        
        const importData = [];
        let skipped = 0;
        let imported = 0;
        
        checkedBoxes.forEach(cb => {
            const idx = parseInt(cb.dataset.idx);
            const row = window._importData[idx];
            if (!row) return;
            
            if (existingMap[row.admission]) {
                skipped++;
                return;
            }
            
            importData.push({
                row: importData.length + 2,
                admission: row.admission,
                name: row.name,
                cat1: row.cat1 || 0,
                cat2: row.cat2 || 0,
                exam: row.exam || 0
            });
            imported++;
        });
        
        if (importData.length === 0) {
            hideLoading();
            if (skipped > 0) {
                showNotification(`All ${skipped} records already exist in this subject`, true);
            } else {
                showNotification('No valid records to import', true);
            }
            return;
        }
        
        const result = await apiCall('/api/marks', {
            method: 'POST',
            body: JSON.stringify({
                block: block,
                subject: subject,
                marksData: importData,
                lecturerName: currentUser?.name || 'System Import',
                examType: 'internal',
                userRole: currentUser?.role || 'admin'
            })
        });
        
        hideLoading();
        
        if (result.success) {
            let msg = `✅ Imported ${importData.length} records to ${block} - ${subject}`;
            if (skipped > 0) msg += ` (${skipped} skipped - already exist)`;
            showNotification(msg, false);
            const modal = document.querySelector('.modal');
            if (modal) modal.remove();
            if (currentTab === 'marks') showAdminMarks();
            else if (currentTab === 'nck') loadNCKMarks();
        } else {
            showNotification('Import failed: ' + (result.message || 'Unknown error'), true);
        }
        
    } catch (err) {
        hideLoading();
        showNotification('Import error: ' + err.message, true);
    }
};

// ======================= EXPORT MARKS (Compatible with Import) =======================
window.exportMarksForImport = function(marks, block, subject, examType) {
    if (!marks || marks.length === 0) {
        showNotification('No data to export', true);
        return;
    }
    
    const headers = ['Admission Number', 'Student Name', 'CAT 1', 'CAT 2', 'Exam Score', 'Total', 'Grade', 'Block', 'Subject'];
    let csv = headers.join(',') + '\n';
    
    const isFull = examType === 'full';
    const isSingleCat = examType === 'single_cat';
    const isExamOnly = examType === 'exam_only';
    
    marks.forEach(m => {
        const cat1 = m.cat1 || 0;
        const cat2 = m.cat2 || 0;
        const exam = m.exam || 0;
        
        let total = 0;
        if (isFull) {
            total = Math.round(((Math.min(cat1,30) + Math.min(cat2,30)) / 60 * 30 + Math.min(exam,70)) * 10) / 10;
        } else if (isSingleCat) {
            total = Math.round((Math.min(cat1,30) + Math.min(exam,70)) * 10) / 10;
        } else {
            total = Math.round(Math.min(exam,100) * 10) / 10;
        }
        
        const grade = total >= 60 ? 'PASS' : (total > 0 ? 'FAIL' : 'PENDING');
        
        const row = [
            `"${m.admission}"`,
            `"${m.name}"`,
            cat1,
            isExamOnly ? '' : cat2,
            exam,
            total,
            `"${grade}"`,
            `"${block}"`,
            `"${subject}"`
        ];
        
        csv += row.join(',') + '\n';
    });
    
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `${subject}_${block}_marks_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
    URL.revokeObjectURL(link.href);
    
    showNotification(`✅ Exported ${marks.length} records for ${subject}`, false);
};

 // ======================= COMPLETE ENHANCED ANALYTICS DASHBOARD WITH UNITS & MEANS TAB =======================
async function showComprehensiveAnalytics() {
  showLoading('Loading advanced analytics...');
  
  const students = await apiCall('/api/students', {});
  const blocks = ['BLOCK_0', 'BLOCK_1', 'BLOCK_2', 'BLOCK_3', 'BLOCK_4', 'BLOCK_5'];
  let allStudentPerformance = {};
  let subjectPerformance = {};
  let blockPerformance = {};
  let clinicalPerformance = [];
  const config = await getConfig();
  
  // Collect all marks data
  for (let block of blocks) {
    blockPerformance[block] = { scores: [], subjects: [] };
    const subjects = config[block] || [];
    for (let subject of subjects) {
      const marks = await apiCall(`/api/marks/${block}/${subject.name}`, {});
      if (marks && marks.length) {
        for (let mark of marks) {
          const admission = mark.admission;
          if (!allStudentPerformance[admission]) {
            allStudentPerformance[admission] = { 
              name: mark.name, 
              admission: admission,
              subjects: [], 
              totalScore: 0, 
              subjectCount: 0,
              cat1Scores: [],
              cat2Scores: [],
              examScores: [],
              blockScores: {}
            };
          }
          
          let finalScore = 0;
          let cat1 = parseFloat(mark.cat1) || 0;
          let cat2 = parseFloat(mark.cat2) || 0;
          let exam = parseFloat(mark.exam) || 0;
          
          if (subject.assessmentType === 'full') {
            finalScore = Math.round(((Math.min(cat1,30) + Math.min(cat2,30)) / 60 * 30 + Math.min(exam,70)) * 10) / 10;
            if (cat1 > 0) allStudentPerformance[admission].cat1Scores.push(cat1);
            if (cat2 > 0) allStudentPerformance[admission].cat2Scores.push(cat2);
            if (exam > 0) allStudentPerformance[admission].examScores.push(exam);
          } else if (subject.assessmentType === 'single_cat') {
            finalScore = Math.round((Math.min(cat1,30) + Math.min(exam,70)) * 10) / 10;
            if (cat1 > 0) allStudentPerformance[admission].cat1Scores.push(cat1);
            if (exam > 0) allStudentPerformance[admission].examScores.push(exam);
          } else {
            finalScore = Math.round(Math.min(exam,100) * 10) / 10;
            if (exam > 0) allStudentPerformance[admission].examScores.push(exam);
          }
          
          if (finalScore > 0) {
            allStudentPerformance[admission].subjects.push({ name: subject.name, score: finalScore, block: block });
            allStudentPerformance[admission].totalScore += finalScore;
            allStudentPerformance[admission].subjectCount++;
            
            if (!allStudentPerformance[admission].blockScores[block]) {
              allStudentPerformance[admission].blockScores[block] = [];
            }
            allStudentPerformance[admission].blockScores[block].push(finalScore);
            
            if (!subjectPerformance[subject.name]) {
              subjectPerformance[subject.name] = { scores: [], block: block, assessmentType: subject.assessmentType };
            }

window.filterUnitsTable = function() {
  const searchTerm = document.getElementById('unitSearchInput')?.value.toLowerCase() || '';
  const blockFilter = document.getElementById('blockFilterSelect')?.value || 'all';
  
  document.querySelectorAll('.block-content').forEach(blockContent => {
    const rows = blockContent.querySelectorAll('tbody tr');
    let visibleCount = 0;
    
    rows.forEach(row => {
      const unitName = row.getAttribute('data-unit-name') || row.cells[1]?.innerText.toLowerCase() || '';
      const unitBlock = row.getAttribute('data-block') || '';
      
      const matchesSearch = unitName.includes(searchTerm);
      const matchesBlock = blockFilter === 'all' || unitBlock === blockFilter;
      
      if (matchesSearch && matchesBlock) {
        row.style.display = '';
        visibleCount++;
      } else {
        row.style.display = 'none';
      }
    });
    
    // Hide block header if no visible rows
    const blockHeader = blockContent.previousElementSibling;
    if (blockHeader && blockHeader.classList.contains('block-collapse-header')) {
      blockHeader.style.display = visibleCount === 0 ? 'none' : 'flex';
    }
  });
};

  const config = await getConfig();
  
  // Collect performance data
  let allStudentPerformance = {};
  let subjectPerformance = {};
  let clinicalPerformance = [];
  
  for (let block of blocks) {
    const subjects = config[block] || [];
    for (let subject of subjects) {
      const marks = await apiCall(`/api/marks/${block}/${subject.name}`, {});
      if (marks && marks.length) {
        for (let mark of marks) {
          const admission = mark.admission;
          if (!allStudentPerformance[admission]) {
            allStudentPerformance[admission] = {
              name: mark.name,
              admission: admission,
              block: mark.block || block,
              subjects: [],
              totalScore: 0,
              subjectCount: 0,
              cat1Scores: [],
              cat2Scores: [],
              examScores: []
            };
          }
          
          let finalScore = 0;
          let cat1 = parseFloat(mark.cat1) || 0;
          let cat2 = parseFloat(mark.cat2) || 0;
          let exam = parseFloat(mark.exam) || 0;
          
          if (subject.assessmentType === 'full') {
            finalScore = Math.round(((Math.min(cat1,30) + Math.min(cat2,30)) / 60 * 30 + Math.min(exam,70)) * 10) / 10;
          } else if (subject.assessmentType === 'single_cat') {
            finalScore = Math.round((Math.min(cat1,30) + Math.min(exam,70)) * 10) / 10;
          } else {
            finalScore = Math.round(Math.min(exam,100) * 10) / 10;
          }
          
          if (finalScore > 0) {
            allStudentPerformance[admission].subjects.push({ name: subject.name, score: finalScore, block: block });
            allStudentPerformance[admission].totalScore += finalScore;
            allStudentPerformance[admission].subjectCount++;
            
            if (!subjectPerformance[subject.name]) {
              subjectPerformance[subject.name] = { scores: [], block: block, assessmentType: subject.assessmentType };

async function generateAndDownloadPDF(reportType, data) {
  showLoading('Generating PDF report...');
  
  if (typeof html2pdf === 'undefined') {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
    await new Promise((resolve) => {
      script.onload = resolve;
      document.head.appendChild(script);
    });
  }
  
  let content = '';
  let filename = '';
  
  switch(reportType) {
    case 'class_performance':
      content = generateClassPerformanceHTML(data);
      filename = `class_performance_report_${data.currentYear}.pdf`;
      break;
    case 'subject_analysis':
      content = generateSubjectAnalysisHTML(data);
      filename = `subject_analysis_report_${data.currentYear}.pdf`;
      break;
    case 'clinical_report':
      content = generateClinicalReportHTML(data);
      filename = `clinical_performance_report_${data.currentYear}.pdf`;
      break;
    case 'honor_roll':
      content = generateHonorRollHTML(data);
      filename = `honor_roll_${data.currentYear}.pdf`;
      break;
    case 'intervention_list':
      content = generateInterventionListHTML(data);
      filename = `intervention_list_${data.currentYear}.pdf`;
      break;
    default:
      content = generateClassPerformanceHTML(data);
      filename = `report_${data.currentYear}.pdf`;
  }
  
  const element = document.createElement('div');
  element.innerHTML = content;
  document.body.appendChild(element);
  
  const opt = {
    margin: [0.5, 0.5, 0.5, 0.5],
    filename: filename,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, letterRendering: true, useCORS: true },
    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
  };
  
  html2pdf().set(opt).from(element).save().then(() => {
    document.body.removeChild(element);
    hideLoading();
    showNotification('PDF report generated successfully!', false);
  }).catch(err => {
    document.body.removeChild(element);
    hideLoading();
    showNotification('Error generating PDF: ' + err.message, true);
  });
}

  window.updateXYAverage = function(idx) { 
    let scores=[]; 
    for(let c=0;c<22;c++){ 
      const val=parseFloat(document.getElementById(`xy_${idx}_${c}`)?.value); 
      if(!isNaN(val)&&val>0) scores.push(val); 
    } 
    const avg=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:0; 
    const status=avg>=60?'PASS':(scores.length?'FAIL':'PENDING'); 
    const avgEl = document.getElementById(`xyAvg_${idx}`);

    const row=document.getElementById(`xy_${idx}_0`)?.parentElement?.parentElement; 
    if(row) row.className=status==='PASS'?'pass-row':(status==='FAIL'?'fail-row':'pending-row'); 
  };
  
  window.updateACTotal = function(idx) { 
    const columnCount = 12;
    let scores = []; 
    let hasAnyScore = false; 
    for (let c = 0; c < columnCount; c++) { 
      const input = document.getElementById(`ac_${idx}_${c}`); 
      if (input) { 
        const val = input.value; 
        if (val !== '' && !isNaN(parseFloat(val)) && parseFloat(val) > 0) { 
          scores.push(parseFloat(val)); 
          hasAnyScore = true; 
        } else { 
          scores.push(0); 
        } 
      } else { 
        scores.push(0); 
      } 
    } 
    const total = scores.reduce((a, b) => a + b, 0); 
    const average = hasAnyScore ? (total / columnCount).toFixed(2) : 0; 
    const status = average >= 60 ? 'PASS' : (hasAnyScore ? 'FAIL' : 'PENDING'); 
    const totalEl = document.getElementById(`acTotal_${idx}`);
    const avgEl = document.getElementById(`acAverage_${idx}`);
    const statusEl = document.getElementById(`acStatus_${idx}`);
    if(totalEl) totalEl.innerHTML = total; 
    if(avgEl) avgEl.innerHTML = average + '%'; 
    if(statusEl) statusEl.innerHTML = `<span class="badge ${status === 'PASS' ? 'badge-pass' : (status === 'FAIL' ? 'badge-fail' : 'badge-pending')}">${status}</span>`; 
    if(avgEl){ avgEl.style.background = average >= 60 ? '#d1fae5' : (hasAnyScore ? '#fee2e2' : '#fef3c7'); } 
    const row = document.getElementById(`ac_${idx}_0`)?.parentElement?.parentElement; 
    if(row) row.className = status === 'PASS' ? 'pass-row' : (status === 'FAIL' ? 'fail-row' : 'pending-row'); 
  };

  async function saveCurrentStudentToDB(studentIdx, sheetName, scores, gradedBy) {
    const marksData = [{ row: studentIdx+2, scores: scores, gradedBy: gradedBy }];
    showLoading(`Saving ${currentNCKMarks[studentIdx]?.name} to database...`);
    const result = await apiCall('/api/marks', {
      method: 'POST',
      body: JSON.stringify({ block:'BLOCK_0', subject:sheetName, marksData, lecturerName:currentUser.name, examType:'nck', userRole:currentUser?.role })
    });
    hideLoading();
    if(result.success){
      if(currentNCKMarks[studentIdx]) currentNCKMarks[studentIdx].scores = scores;
      showNotification(`✅ ${currentNCKMarks[studentIdx]?.name} saved to database!`, false);
      return true;
    } else { showNotification(`Save failed: ${result.message}`, true); return false; }
  }
  
  window.saveNCKMarks = async function() { 
    const sheetName = document.getElementById('nckSheetSelect').value; 
    let marksData = []; 
    if (sheetName === 'XY FORMS') { 
      const rows = document.querySelectorAll('#nckMarksContainer tbody tr'); 
      for (let i = 0; i < rows.length; i++) { 
        let scores = []; 
        for (let c = 0; c < 22; c++) { 
          scores.push(parseFloat(document.getElementById(`xy_${i}_${c}`)?.value) || 0); 
        } 
        marksData.push({ row: i + 2, scores: scores, gradedBy: document.getElementById(`xyGraded_${i}`)?.value || '' }); 
      } 
    } else { 
      const columnCount = 12;
      const rows = document.querySelectorAll('#nckMarksContainer tbody tr'); 
      for (let i = 0; i < rows.length; i++) { 
        let scores = []; 
        for (let c = 0; c < columnCount; c++) { 
          const val = document.getElementById(`ac_${i}_${c}`)?.value; 
          const score = (val !== '' && !isNaN(parseFloat(val))) ? parseFloat(val) : ''; 
          scores.push(score); 
        } 
        marksData.push({ row: i + 2, scores: scores, gradedBy: document.getElementById(`acGraded_${i}`)?.value || '' }); 
      } 
    } 
    showLoading('Saving NCK marks...'); 
    const result = await apiCall('/api/marks', { 
      method: 'POST', 
      body: JSON.stringify({ 
        block: 'BLOCK_0', 
        subject: sheetName, 
        marksData: marksData, 
        lecturerName: currentUser.name, 
        examType: 'nck', 
        userRole: currentUser?.role 
      }) 
    }); 
    hideLoading(); 
    showNotification(result.success ? 'NCK marks saved successfully!' : (result.message || 'Error saving NCK marks'), !result.success); 
    if (result.success) loadNCKMarks(); 
  };

  function handleFastEntryKeyboard(e) { 
    if(!fastEntryVisible) return; 
    if(e.key === 'Escape'){ 
      closeFastEntryModal(); 
    } else if(e.key === 'Enter' && !e.shiftKey){ 
      e.preventDefault(); 
      applyFastEntry(); 
    } else if(e.key === 'Enter' && e.shiftKey){ 
      e.preventDefault(); 
      applyFastEntryAndStay(); 
    } 
  }
  
  function closeFastEntryModal() { 
    const modal = document.getElementById('fastEntryModal'); 
    if(modal) modal.remove(); 
    fastEntryVisible = false; 
    document.removeEventListener('keydown', handleFastEntryKeyboard); 
  }

  async function applyFastAssessmentEntry() {

    let scores = [];
    for(let c = 0; c < 12; c++){

    hideLoading();

      for(let c=0;c<12;c++){ let mi=document.getElementById(`ac_${studentIdx}_${c}`); if(mi) mi.value=scores[c]; }

  async function loadAdminMarks(block, subject, at) { 
    showLoading('Loading marks...'); 
    const marks = await apiCall(`/api/marks/${block}/${subject}`, {}); 
    
    let html = `<div class="export-bar" style="margin-bottom:16px;"><button class="export-btn" onclick="exportAdminMarks()">Export CSV</button><button class="btn-info" onclick="fillDownValues()" style="margin-left:10px;">Fill Down</button></div>
      <div style="overflow-x:auto;"><table style="width:100%"><thead><tr style="background:#667eea;color:white"><th>Admission</th><th>Name</th>`;
    
    if(at === 'full') html += '<th>CAT1 (0-30)</th><th>CAT2 (0-30)</th><th>Exam (0-70)</th>';
    else if(at === 'single_cat') html += '<th>CAT (0-30)</th><th>Exam (0-70)</th>';
    else html += '<th>Exam (0-100)</th>';
    
    html += '<th>Total</th><th>Status</th><th>Graded By</th></tr></thead><tbody>';
    
    window.currentAdminMarks = marks; 
    window.currentAdminAssessmentType = at; 
    window.currentAdminBlock = block; 
    window.currentAdminSubject = subject; 
    window.currentSaveFunction = saveAdminMarks;
    
    for(let i = 0; i < marks.length; i++){ 
      const m = marks[i]; 
      const cat1 = m.cat1 || ''; 
      const cat2 = m.cat2 || ''; 
      const exam = m.exam || ''; 
      let ncat1 = parseFloat(cat1) || 0; 
      let ncat2 = parseFloat(cat2) || 0; 
      let nexam = parseFloat(exam) || 0; 
      let total = 0; 
      
      if(at === 'full') total = Math.round(((Math.min(ncat1,30) + Math.min(ncat2,30)) / 60 * 30 + Math.min(nexam,70)) * 10) / 10;
      else if(at === 'single_cat') total = Math.round((Math.min(ncat1,30) + Math.min(nexam,70)) * 10) / 10;
      else total = Math.round(Math.min(nexam,100) * 10) / 10;
      
      const status = total >= 60 ? 'PASS' : (total > 0 ? 'FAIL' : ''); 
      const rowClass = total >= 60 ? 'pass-row' : 'fail-row';
      
      html += `<tr class="${rowClass}"><td style="padding:10px;">${m.admission}<\/td><td style="padding:10px;"><strong>${m.name}</strong><\/td>`;
      
      if(at === 'full'){ 
        html += `<td style="padding:10px;"><input type="number" id="acat1_${i}" value="${cat1}" min="0" max="30" step="0.5" onchange="updateAdminTotal(${i})"><\/td>
          <td style="padding:10px;"><input type="number" id="acat2_${i}" value="${cat2}" min="0" max="30" step="0.5" onchange="updateAdminTotal(${i})"><\/td>
          <td style="padding:10px;"><input type="number" id="aexam_${i}" value="${exam}" min="0" max="70" step="0.5" onchange="updateAdminTotal(${i})"><\/td>`; 
      } else if(at === 'single_cat'){ 
        html += `<td style="padding:10px;"><input type="number" id="acat1_${i}" value="${cat1}" min="0" max="30" step="0.5" onchange="updateAdminTotal(${i})"><\/td>
          <td style="padding:10px;"><input type="number" id="aexam_${i}" value="${exam}" min="0" max="70" step="0.5" onchange="updateAdminTotal(${i})"><\/td>`; 
      } else { 
        html += `<td style="padding:10px;"><input type="number" id="aexam_${i}" value="${exam}" min="0" max="100" step="0.5" onchange="updateAdminTotal(${i})"><\/td>`; 
      } 
      
      html += `<td id="atotal_${i}" style="font-weight:bold;">${total}<\/td>
        <td id="astatus_${i}">${status}<\/td>
        <td style="padding:10px;">${m.gradedBy || '-'}<\/td><\/tr>`; 
    } 
    
    html += `</tbody><\/table><\/div>
      <div style="text-align:center;margin-top:20px"><button class="save-btn" onclick="saveAdminMarks()">💾 Save All Marks<\/button><\/div>`; 
    
    document.getElementById('marksTable').innerHTML = html; 
    hideLoading(); 
    startAutoSave(saveAdminMarks, 30000);
  }
  
  window.updateAdminTotal = function(idx){ 
    const at = window.currentAdminAssessmentType || 'full'; 
    let cat1 = parseFloat(document.getElementById(`acat1_${idx}`)?.value) || 0; 
    let cat2 = parseFloat(document.getElementById(`acat2_${idx}`)?.value) || 0; 
    let exam = parseFloat(document.getElementById(`aexam_${idx}`)?.value) || 0; 
    let total = 0; 
    
    if(at === 'full') total = Math.round(((Math.min(cat1,30) + Math.min(cat2,30)) / 60 * 30 + Math.min(exam,70)) * 10) / 10;
    else if(at === 'single_cat') total = Math.round((Math.min(cat1,30) + Math.min(exam,70)) * 10) / 10;
    else total = Math.round(Math.min(exam,100) * 10) / 10;
    
    document.getElementById(`atotal_${idx}`).innerHTML = total; 
    document.getElementById(`astatus_${idx}`).innerHTML = total >= 60 ? 'PASS' : 'FAIL'; 
    const row = document.getElementById(`acat1_${idx}`)?.parentElement?.parentElement; 
    if(row) row.className = total >= 60 ? 'pass-row' : 'fail-row'; 
  };
  
  window.saveAdminMarks = async function(){ 
    let marksData = []; 
    const len = window.currentAdminMarks?.length || 0; 
    const at = window.currentAdminAssessmentType || 'full'; 
    
    for(let i = 0; i < len; i++){ 
      if(at === 'full') marksData.push({ row: i + 2, cat1: document.getElementById(`acat1_${i}`)?.value || '', cat2: document.getElementById(`acat2_${i}`)?.value || '', exam: document.getElementById(`aexam_${i}`)?.value || '' }); 
      else if(at === 'single_cat') marksData.push({ row: i + 2, cat1: document.getElementById(`acat1_${i}`)?.value || '', cat2: '', exam: document.getElementById(`aexam_${i}`)?.value || '' }); 
      else marksData.push({ row: i + 2, cat1: '', cat2: '', exam: document.getElementById(`aexam_${i}`)?.value || '' }); 
    } 
    
    showLoading('Saving marks...'); 
    const result = await apiCall('/api/marks', { method: 'POST', body: JSON.stringify({ block: window.currentAdminBlock, subject: window.currentAdminSubject, marksData: marksData, lecturerName: currentUser.name }) }); 
    hideLoading(); 
    showNotification(result?.success ? 'Marks saved successfully!' : 'Error saving marks', !result?.success); 
    if(result?.success) loadAdminMarks(window.currentAdminBlock, window.currentAdminSubject, window.currentAdminAssessmentType); 
  };
  
  window.exportAdminMarks = function(){

      exportToCSV(data, 'internal_marks'); 
    } 
  };

    const lecturerSubjects = currentUser.subjects || []; 
    const config = await getConfig(); 
    const settings = await apiCall('/api/mark-entry/settings', {});
    
    const subjectsByBlock = {}; 
    for(let b of blocks) subjectsByBlock[b] = []; 
    
    for(let subj of lecturerSubjects){ 
      const parts = subj.split('|'); 
      const block = parts[0]; 
      const name = parts[1]; 
      let atype = 'full'; 
      if(config && config[block]){ 
        const found = config[block].find(c => c.name === name); 
        if(found) atype = found.assessmentType || 'full'; 
      } 
      
      let isSubjectOpen = true;
      let closedReason = '';

        isSubjectOpen = false; 
        closedReason = 'Global entry closed by administrator';
      } else if(settings[`${currentYear}_all`] && settings[`${currentYear}_all`].enabled === false){ 
        isSubjectOpen = false; 
        closedReason = `Entry closed for March ${currentYear} class`;
      } else if(settings[`${block}_${name}`] && settings[`${block}_${name}`].enabled === false){ 
        isSubjectOpen = false; 
        closedReason = `Entry closed for this subject`;
      }
      
      subjectsByBlock[block].push({ name, assessmentType: atype, isOpen: isSubjectOpen, closedReason }); 
    } 
    
    let html = `<button class="back-btn" onclick="showMain()"><i class="fas fa-arrow-left"></i> Back</button>

    for(let b of blocks){ 
      if(subjectsByBlock[b] && subjectsByBlock[b].length){ 
        html += `<div style="margin:20px 0 10px;"><h3 style="display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:8px 24px;border-radius:40px;">${b.replace('_', ' ')}</h3></div><div class="subject-list">`;

          const onclickAttr = s.isOpen ? `onclick="openMarksEntry('${b}', '${s.name.replace(/'/g, "\\'")}', '${s.assessmentType}')"` : `onclick="showNotification('${s.closedReason}', true)"`;
          html += `<div class="subject-card ${!s.isOpen ? 'closed' : ''}" ${onclickAttr}>
            <div style="display:flex; justify-content:space-between; align-items:center;"><h4>${typeIcon} ${s.name}</h4>${statusBadge}</div>
            <p><i class="fas fa-layer-group"></i> ${b.replace('_', ' ')} | ${typeLabel}</p>

          </div>`; 
        } 
        html += `</div>`; 
      } 
    } 
    updateContentArea(html); 
    hideLoading(); 
  }

    window.currentSaveFunction = saveLecturerMarks;
    
    for(let i = 0; i < marks.length; i++){ 
      const m = marks[i]; 
      const cat1 = m.cat1 || ''; 
      const cat2 = m.cat2 || ''; 
      const exam = m.exam || ''; 
      let ncat1 = parseFloat(cat1) || 0; 
      let ncat2 = parseFloat(cat2) || 0; 
      let nexam = parseFloat(exam) || 0; 
      let total = 0; 
      
      if(atype === 'full') total = Math.round(((Math.min(ncat1,30) + Math.min(ncat2,30)) / 60 * 30 + Math.min(nexam,70)) * 10) / 10;
      else if(atype === 'single_cat') total = Math.round((Math.min(ncat1,30) + Math.min(nexam,70)) * 10) / 10;
      else total = Math.round(Math.min(nexam,100) * 10) / 10;
      
      const status = total >= 60 ? 'PASS' : (total > 0 ? 'FAIL' : ''); 
      const rowClass = total >= 60 ? 'pass-row' : 'fail-row';
      
      html += `<tr class="${rowClass}"><td style="padding:10px;">${m.admission}<\/td><td style="padding:10px;"><strong>${m.name}</strong><\/td>`;

          <td style="padding:10px;"><input type="number" id="exam_${i}" value="${exam}" min="0" max="70" step="0.5" onchange="updateLecturerTotal(${i})"><\/td>`; 
      } else {

      } 
      
      html += `<td id="ltotal_${i}" style="font-weight:bold;">${total}<\/td>
        <td id="lstatus_${i}">${status}<\/td>

  window.updateLecturerTotal = function(idx){

    document.getElementById(`ltotal_${idx}`).innerHTML = total;

  // ======================= SCORE PUBLISHING CONTROL (NEW) =======================
// Admin can publish/unpublish scores for students to see

// Store published status in localStorage (will be synced to API in production)
let publishedScores = new Set();

// Load published status from storage
function loadPublishedStatus() {
    const saved = localStorage.getItem('nck_published_scores');
    if (saved) {
        publishedScores = new Set(JSON.parse(saved));
    }
}

// Save published status
function savePublishedStatus() {
    localStorage.setItem('nck_published_scores', JSON.stringify([...publishedScores]));
}

// Check if a score is published
function isScorePublished(examId, studentId, examType) {
    const key = `${examType}_${examId}_${studentId}`;
    return publishedScores.has(key);
}

// Publish a single score
async function publishScore(examId, studentId, examType, studentName, examName) {
    const key = `${examType}_${examId}_${studentId}`;
    publishedScores.add(key);
    savePublishedStatus();
    
    // Log the action
    await apiCall('/api/publish-log', {
        method: 'POST',
        body: JSON.stringify({
            action: 'publish',
            examId,
            studentId,
            examType,
            studentName,
            examName,
            publishedBy: currentUser?.name,
            timestamp: new Date().toISOString()
        })
    });
    
    showNotification(`✅ Published ${studentName} - ${examName}`, false);
}

// Unpublish a score
async function unpublishScore(examId, studentId, examType, studentName, examName) {
    const key = `${examType}_${examId}_${studentId}`;
    publishedScores.delete(key);
    savePublishedStatus();
    
    await apiCall('/api/publish-log', {
        method: 'POST',
        body: JSON.stringify({
            action: 'unpublish',
            examId,
            studentId,
            examType,
            studentName,
            examName,
            publishedBy: currentUser?.name,
            timestamp: new Date().toISOString()
        })
    });
    
    showNotification(`🔒 Unpublished ${studentName} - ${examName}`, false);
}

// Bulk publish - publish all scores for an exam
async function bulkPublishExam(examId, examName, examType, studentIds) {
    if (!confirm(`Publish ALL scores for "${examName}"? This will make all ${studentIds.length} results visible to students.`)) {
        return;
    }
    
    showLoading(`Publishing ${studentIds.length} scores...`);
    let count = 0;
    
    for (const studentId of studentIds) {
        const key = `${examType}_${examId}_${studentId}`;
        if (!publishedScores.has(key)) {
            publishedScores.add(key);
            count++;
        }
    }
    
    savePublishedStatus();
    hideLoading();
    showNotification(`✅ Published ${count} scores for ${examName}`, false);
    showScorePublishPanel(); // Refresh the panel
}

// Bulk unpublish - unpublish all scores for an exam
async function bulkUnpublishExam(examId, examName, examType, studentIds) {
    if (!confirm(`UNPUBLISH ALL scores for "${examName}"? This will hide all ${studentIds.length} results from students.`)) {
        return;
    }
    
    showLoading(`Unpublishing ${studentIds.length} scores...`);
    let count = 0;
    
    for (const studentId of studentIds) {
        const key = `${examType}_${examId}_${studentId}`;
        if (publishedScores.has(key)) {
            publishedScores.delete(key);
            count++;
        }
    }
    
    savePublishedStatus();
    hideLoading();
    showNotification(`🔒 Unpublished ${count} scores for ${examName}`, false);
    showScorePublishPanel(); // Refresh the panel
}

// Main Score Publishing Panel (Admin only)
async function showScorePublishPanel() {
    if (currentUser?.role !== 'admin') {
        showNotification('Only administrators can access this panel', true);
        return;
    }
    
    showLoading('Loading Score Publishing Panel...');
    loadPublishedStatus();
    
    // Fetch all exams with marks
    const blocks = ['BLOCK_0', 'BLOCK_1', 'BLOCK_2', 'BLOCK_3', 'BLOCK_4', 'BLOCK_5'];
    const config = await getConfig();
    let allExamsWithMarks = [];
    
    for (const block of blocks) {
        const subjects = config[block] || [];
        for (const subject of subjects) {
            const marks = await apiCall(`/api/marks/${block}/${subject.name}`, {});
            if (marks && marks.length > 0) {
                // Check if any student has scores
                const hasScores = marks.some(m => {
                    const cat1 = parseFloat(m.cat1) || 0;
                    const cat2 = parseFloat(m.cat2) || 0;
                    const exam = parseFloat(m.exam) || 0;
                    return cat1 > 0 || cat2 > 0 || exam > 0;
                });
                
                if (hasScores) {
                    allExamsWithMarks.push({
                        block,
                        subjectName: subject.name,
                        assessmentType: subject.assessmentType,
                        marks: marks,
                        studentCount: marks.length
                    });
                }
            }
        }
    }
    
    // Also get NCK XY Forms
    const nckMarks = await apiCall(`/api/marks/BLOCK_0/XY FORMS`, {});
    if (nckMarks && nckMarks.length > 0) {
        allExamsWithMarks.push({
            block: 'NCK',
            subjectName: 'XY FORMS (Clinical Evaluation)',
            assessmentType: 'nck',
            marks: nckMarks,
            studentCount: nckMarks.length,
            isNCK: true
        });
    }
    
    // Get NCK Assessment marks
    const assessmentMarks = await apiCall(`/api/marks/BLOCK_0/ASSESSMENT AND CASE`, {});
    if (assessmentMarks && assessmentMarks.length > 0) {
        allExamsWithMarks.push({
            block: 'NCK',
            subjectName: 'ASSESSMENT AND CASE (Written)',
            assessmentType: 'nck',
            marks: assessmentMarks,
            studentCount: assessmentMarks.length,
            isNCK: true
        });
    }
    
    // Calculate publish statistics
    let totalPublished = 0;
    let totalScores = 0;
    
    for (const exam of allExamsWithMarks) {
        for (const mark of exam.marks) {
            totalScores++;
            const examType = exam.isNCK ? 'nck' : 'internal';
            const examId = `${exam.block}_${exam.subjectName}`;
            const studentId = mark.admission || mark.name;
            if (isScorePublished(examId, studentId, examType)) {
                totalPublished++;
            }
        }
    }
    
    const publishRate = totalScores > 0 ? ((totalPublished / totalScores) * 100).toFixed(1) : 0;
    
    const html = `
        <button class="back-btn" onclick="showMain()"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>
        
        <div class="header">
            <h3><i class="fas fa-eye-slash"></i> Score Publishing Control Panel</h3>
            <p>Control which exam results students can see - Publish only when ready</p>
        </div>
        
        <div class="stats-grid" style="margin-bottom: 20px;">
            <div class="stat-card">
                <div class="stat-number">${totalScores}</div>
                <div class="stat-label">Total Scores Entered</div>
            </div>
            <div class="stat-card" style="background: #d1fae5;">
                <div class="stat-number" style="color: #065f46;">${totalPublished}</div>
                <div class="stat-label">Published to Students</div>
            </div>
            <div class="stat-card" style="background: #fee2e2;">
                <div class="stat-number" style="color: #991b1b;">${totalScores - totalPublished}</div>
                <div class="stat-label">Hidden from Students</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${publishRate}%</div>
                <div class="stat-label">Publication Rate</div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">
                <i class="fas fa-chart-line"></i> 
                Exam Scores - Manage Publication
                <span style="margin-left: auto;">
                    <button class="save-btn" onclick="showScorePublishPanel()" style="background: #6366f1;">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </span>
            </div>
            
            <div style="overflow-x: auto;">
                <table style="width: 100%;">
                    <thead>
                        <tr>
                            <th>Exam / Assessment</th>
                            <th>Block</th>
                            <th>Students</th>
                            <th>Published</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${allExamsWithMarks.map(exam => {
                            const examId = `${exam.block}_${exam.subjectName}`;
                            const examType = exam.isNCK ? 'nck' : 'internal';
                            
                            let publishedCount = 0;
                            const studentIds = [];
                            
                            for (const mark of exam.marks) {
                                const studentId = mark.admission || mark.name;
                                studentIds.push(studentId);
                                if (isScorePublished(examId, studentId, examType)) {
                                    publishedCount++;
                                }
                            }
                            
                            const isFullyPublished = publishedCount === exam.marks.length;
                            const isPartiallyPublished = publishedCount > 0 && publishedCount < exam.marks.length;
                            
                            let statusBadge = '';
                            if (isFullyPublished) {
                                statusBadge = '<span class="badge badge-pass"><i class="fas fa-eye"></i> Fully Published</span>';
                            } else if (isPartiallyPublished) {
                                statusBadge = '<span class="badge badge-warning"><i class="fas fa-eye-half"></i> Partially Published</span>';
                            } else {
                                statusBadge = '<span class="badge badge-fail"><i class="fas fa-eye-slash"></i> Not Published</span>';
                            }
                            
                            return `
                                <tr style="border-bottom: 1px solid #e2e8f0;">
                                    <td style="padding: 12px;">
                                        <strong>${exam.subjectName}</strong>
                                        <br><small style="color: #64748b;">${exam.assessmentType === 'full' ? 'CAT1+CAT2+Exam' : (exam.assessmentType === 'single_cat' ? 'CAT+Exam' : 'Exam Only')}</small>
                                    </td>
                                    <td style="padding: 12px;">${exam.block.replace('_', ' ')}</td>
                                    <td style="padding: 12px; text-align: center;">${exam.studentCount}</td>
                                    <td style="padding: 12px; text-align: center;">
                                        <strong>${publishedCount}</strong> / ${exam.marks.length}
                                        <div class="progress-bar" style="margin-top: 5px; width: 80px;">
                                            <div class="progress-fill" style="width: ${(publishedCount/exam.marks.length)*100}%; background: #10b981;"></div>
                                        </div>
                                    </td>
                                    <td style="padding: 12px;">${statusBadge}</td>
                                    <td style="padding: 12px;">
                                        <button class="save-btn" onclick="showExamStudentsPanel('${examId}', '${exam.subjectName.replace(/'/g, "\\'")}', '${examType}', ${JSON.stringify(exam.marks).replace(/"/g, '&quot;')})" style="padding: 6px 12px; font-size: 11px; margin-right: 5px;">
                                            <i class="fas fa-users"></i> Manage Students
                                        </button>
                                        <button class="${isFullyPublished ? 'btn-warning' : 'btn-success'}" onclick="bulkPublishExam('${examId}', '${exam.subjectName.replace(/'/g, "\\'")}', '${examType}', ${JSON.stringify(studentIds)})" style="padding: 6px 12px; font-size: 11px; margin-right: 5px;">
                                            <i class="fas ${isFullyPublished ? 'fa-eye-slash' : 'fa-eye'}"></i> ${isFullyPublished ? 'Unpublish All' : 'Publish All'}
                                        </button>
                                    </td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="card" id="studentsDetailPanel" style="display: none;">
            <div class="card-title">
                <i class="fas fa-user-graduate"></i> 
                Student Scores - <span id="selectedExamName">Loading...</span>
                <button class="back-btn" onclick="document.getElementById('studentsDetailPanel').style.display='none'" style="margin-left: auto;">
                    <i class="fas fa-times"></i> Close
                </button>
            </div>
            <div id="studentsDetailContent"></div>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-history"></i> Publication Logs</div>
            <div id="publishLogs" style="max-height: 300px; overflow-y: auto;">
                <div class="loading-spinner"></div>
            </div>
        </div>
    `;
    
    updateContentArea(html);
    
    // Load publication logs
    const logs = await apiCall('/api/publish-logs', {});
    const logsContainer = document.getElementById('publishLogs');
    if (logsContainer) {
        if (logs && logs.length > 0) {
            logsContainer.innerHTML = logs.slice(0, 50).map(log => `
                <div class="log-entry">
                    <i class="fas fa-${log.action === 'publish' ? 'eye' : 'eye-slash'}" style="color: ${log.action === 'publish' ? '#10b981' : '#ef4444'};"></i>
                    <strong>${log.publishedBy || 'System'}</strong> 
                    ${log.action === 'publish' ? 'published' : 'unpublished'} 
                    <strong>${log.studentName}</strong> - ${log.examName}
                    <br><small>${new Date(log.timestamp).toLocaleString()}</small>
                </div>
            `).join('');
        } else {
            logsContainer.innerHTML = '<p style="text-align: center; padding: 20px;">No publication logs yet</p>';
        }
    }
    
    hideLoading();
}

// ======================= FIXED: Show individual student scores for an exam =======================
function showExamStudentsPanel(examId, examName, examType, marks) {
    const panel = document.getElementById('studentsDetailPanel');
    const examNameSpan = document.getElementById('selectedExamName');
    const contentDiv = document.getElementById('studentsDetailContent');
    
    if (!panel || !contentDiv) return;
    
    examNameSpan.innerHTML = examName;
    
    // Get assessment type from the exam
    let assessmentType = 'full'; // default
    if (examName.includes('CAT+Exam')) assessmentType = 'single_cat';
    else if (examName.includes('Exam Only')) assessmentType = 'exam_only';
    
    const studentsHtml = `
        <table style="width: 100%;">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Student Name</th>
                    <th>Admission</th>
                    <th>CAT 1<br><small>(0-30)</small></th>
                    <th>CAT 2<br><small>(0-30)</small></th>
                    <th>Exam<br><small>(${assessmentType === 'exam_only' ? '0-100' : '0-70'})</small></th>
                    <th>Final<br><small>Score</small></th>
                    <th>Status</th>
                    <th>Publication</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                ${marks.map((mark, idx) => {
                    const studentId = mark.admission || mark.name;
                    const isPublished = isScorePublished(examId, studentId, examType);
                    
                    // ===== FIXED: Calculate scores correctly based on assessment type =====
                    let cat1 = parseFloat(mark.cat1) || 0;
                    let cat2 = parseFloat(mark.cat2) || 0;
                    let examScore = parseFloat(mark.exam) || 0;
                    
                    // Also check if scores are in 'scores' array (for NCK)
                    let nckAvg = 0;
                    if (mark.scores && mark.scores.length > 0) {
                        const validScores = mark.scores.filter(s => s > 0);
                        if (validScores.length > 0) {
                            nckAvg = validScores.reduce((a,b) => a+b, 0) / validScores.length;
                        }
                    }
                    
                    // Calculate final score based on assessment type
                    let finalScore = 0;
                    let displayCat1 = '--';
                    let displayCat2 = '--';
                    let displayExam = '--';
                    let displayFinal = '--';
                    
                    if (examType === 'nck') {
                        // NCK scores use averages
                        finalScore = nckAvg;
                        displayFinal = finalScore > 0 ? `${finalScore.toFixed(1)}%` : '--';
                        displayExam = mark.scores ? `${mark.scores.filter(s => s > 0).length} assessments` : '--';
                    } else {
                        // Internal marks - calculate based on assessment type
                        if (assessmentType === 'full') {
                            // Full: CAT1(30%) + CAT2(30%) + Exam(70%) but each capped
                            const cappedCat1 = Math.min(cat1, 30);
                            const cappedCat2 = Math.min(cat2, 30);
                            const cappedExam = Math.min(examScore, 70);
                            
                            // Formula: ((CAT1+CAT2)/60 * 30) + Exam
                            finalScore = ((cappedCat1 + cappedCat2) / 60 * 30) + cappedExam;
                            finalScore = Math.round(finalScore * 10) / 10;
                            
                            displayCat1 = cat1 > 0 ? `${cat1}` : '--';
                            displayCat2 = cat2 > 0 ? `${cat2}` : '--';
                            displayExam = examScore > 0 ? `${examScore}` : '--';
                            
                        } else if (assessmentType === 'single_cat') {
                            // Single CAT: CAT(30%) + Exam(70%)
                            const cappedCat1 = Math.min(cat1, 30);
                            const cappedExam = Math.min(examScore, 70);
                            
                            finalScore = cappedCat1 + cappedExam;
                            finalScore = Math.round(finalScore * 10) / 10;
                            
                            displayCat1 = cat1 > 0 ? `${cat1}` : '--';
                            displayCat2 = '--';
                            displayExam = examScore > 0 ? `${examScore}` : '--';
                            
                        } else {
                            // Exam only: Exam(100%)
                            finalScore = Math.min(examScore, 100);
                            finalScore = Math.round(finalScore * 10) / 10;
                            
                            displayCat1 = '--';
                            displayCat2 = '--';
                            displayExam = examScore > 0 ? `${examScore}` : '--';
                        }
                        
                        displayFinal = finalScore > 0 ? `${finalScore}%` : '--';
                    }
                    
                    const statusText = finalScore >= 60 ? 'PASS' : (finalScore > 0 ? 'FAIL' : 'PENDING');
                    const statusClass = finalScore >= 60 ? 'badge-pass' : (finalScore > 0 ? 'badge-fail' : 'badge-pending');
                    
                    return `
                        <tr style="border-bottom: 1px solid #e2e8f0;">
                            <td style="padding: 8px;">${idx + 1}</td>
                            <td style="padding: 8px;"><strong>${mark.name || 'Unknown'}</strong></td>
                            <td style="padding: 8px;">${mark.admission || 'N/A'}</td>
                            <td style="padding: 8px; text-align: center;">${displayCat1}</td>
                            <td style="padding: 8px; text-align: center;">${displayCat2}</td>
                            <td style="padding: 8px; text-align: center;">${displayExam}</td>
                            <td style="padding: 8px; text-align: center;">
                                <span class="badge ${statusClass}" style="font-size: 14px; font-weight: bold;">${displayFinal}</span>
                            </td>
                            <td style="padding: 8px; text-align: center;">
                                <span class="badge ${statusClass}">${statusText}</span>
                            </td>
                            <td style="padding: 8px; text-align: center;">
                                ${isPublished ? 
                                    '<span class="badge badge-pass"><i class="fas fa-eye"></i> Published</span>' : 
                                    '<span class="badge badge-fail"><i class="fas fa-eye-slash"></i> Hidden</span>'}
                            </td>
                            <td style="padding: 8px; text-align: center;">
                                ${isPublished ? 
                                    `<button class="btn-warning" onclick="unpublishScore('${examId}', '${studentId}', '${examType}', '${(mark.name || '').replace(/'/g, "\\'")}', '${examName.replace(/'/g, "\\'")}'); showExamStudentsPanel('${examId}', '${examName.replace(/'/g, "\\'")}', '${examType}', ${JSON.stringify(marks).replace(/"/g, '&quot;')})" style="padding: 4px 10px; font-size: 11px;">
                                        <i class="fas fa-eye-slash"></i> Hide
                                    </button>` :
                                    `<button class="save-btn" onclick="publishScore('${examId}', '${studentId}', '${examType}', '${(mark.name || '').replace(/'/g, "\\'")}', '${examName.replace(/'/g, "\\'")}'); showExamStudentsPanel('${examId}', '${examName.replace(/'/g, "\\'")}', '${examType}', ${JSON.stringify(marks).replace(/"/g, '&quot;')})" style="padding: 4px 10px; font-size: 11px;">
                                        <i class="fas fa-eye"></i> Publish
                                    </button>`
                                }
                            </td>
                        </tr>
                    `;
                }).join('')}
            </tbody>
        </table>
        <div style="margin-top: 15px; text-align: center;">
            <button class="save-btn" onclick="bulkPublishExam('${examId}', '${examName.replace(/'/g, "\\'")}', '${examType}', ${JSON.stringify(marks.map(m => m.admission || m.name))})">
                <i class="fas fa-eye"></i> Publish All Students
            </button>
            <button class="btn-warning" onclick="bulkUnpublishExam('${examId}', '${examName.replace(/'/g, "\\'")}', '${examType}', ${JSON.stringify(marks.map(m => m.admission || m.name))})" style="margin-left: 10px;">
                <i class="fas fa-eye-slash"></i> Hide All Students
            </button>
        </div>
    `;
    
    contentDiv.innerHTML = studentsHtml;
    panel.style.display = 'block';
    panel.scrollIntoView({ behavior: 'smooth' });
}

// Add navigation to Score Publishing Panel in sidebar (for admin only)
// Add this to the existing nav items when user is admin
function addScorePublishNavItem() {
    if (currentUser?.role !== 'admin') return;
    
    const navMenu = document.querySelector('.nav-menu');
    if (navMenu && !document.querySelector('[data-nav="scorePublish"]')) {
        const publishNav = document.createElement('div');
        publishNav.className = 'nav-item';
        publishNav.setAttribute('data-nav', 'scorePublish');
        publishNav.innerHTML = '<i class="fas fa-eye-slash"></i><span>Score Publishing</span>';
        
        // Insert before logout
        const logoutNav = navMenu.querySelector('.logout-side');
        if (logoutNav) {
            navMenu.insertBefore(publishNav, logoutNav);
        } else {
            navMenu.appendChild(publishNav);
        }
        
        publishNav.addEventListener('click', () => {
            showScorePublishPanel();
            if (window.innerWidth <= 768) {
                document.getElementById('mainSidebar')?.classList.remove('mobile-open');
            }
        });
    }
}

// Override the renderWithSidebar function to include Score Publishing nav
// Add this call after user login
function initScorePublishForAdmin() {
    if (currentUser?.role === 'admin') {
        setTimeout(addScorePublishNavItem, 500);
    }
}

// Call this after successful login
const originalShowMain = showMain;
window.showMain = async function() {
    await originalShowMain();
    initScorePublishForAdmin();
};

</script>
