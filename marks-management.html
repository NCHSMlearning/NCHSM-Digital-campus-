<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Nursing School System | NCK & Internal Marks | Nakuru College</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --info: #3b82f6;
      --dark: #1e293b;
      --gray: #64748b;
      --radius: 24px;
      --radius-sm: 12px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }
    
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      min-height: 100vh; 
      padding: 24px; 
      transition: all 0.3s ease;
    }
    
    body.dark-mode { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
    
    body.dark-mode .card, body.dark-mode .header, body.dark-mode .stat-card,
    body.dark-mode .selector-group, body.dark-mode .user-info, body.dark-mode .subject-card,
    body.dark-mode table, body.dark-mode .modal-content, body.dark-mode .login-container {
      background: #1e293b;
      color: #f1f5f9;
      border-color: #334155;
    }
    
    body.dark-mode th { background: #0f172a; }
    body.dark-mode td { border-bottom-color: #334155; }
    body.dark-mode input, body.dark-mode select { background: #0f172a; color: #f1f5f9; border-color: #475569; }
    
    .container { max-width: 1400px; margin: 0 auto; }
    
    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 24px;
      text-align: center;
      box-shadow: var(--shadow-xl);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .header h1 {
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 32px;
      font-weight: 800;
    }
    
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
    
    .stat-card {
      background: white;
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: var(--shadow);
      border: 1px solid #e2e8f0;
      position: relative;
      overflow: hidden;
    }
    
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    
    .stat-card:hover::before { transform: scaleX(1); }
    .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-xl); }
    
    .stat-number {
      font-size: 42px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .stat-label { margin-top: 8px; font-size: 14px; font-weight: 500; color: var(--gray); }
    
    .selector-group {
      background: white;
      border-radius: 20px;
      padding: 20px 24px;
      margin-bottom: 24px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: center;
      box-shadow: var(--shadow);
    }
    
    select, input {
      padding: 12px 20px;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 500;
      background: white;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    select:focus, input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
    
    .admin-menu-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 16px; margin-bottom: 24px; }
    .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    
    .menu-btn {
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      transition: all 0.3s ease;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .menu-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); }
    .btn-success { background: linear-gradient(135deg, #10b981, #059669); }
    .btn-info { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .btn-export { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
    .btn-dark { background: linear-gradient(135deg, #1e293b, #0f172a); }
    
    .user-info {
      background: white;
      border-radius: 20px;
      padding: 16px 24px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      box-shadow: var(--shadow);
    }
    
    .logout-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .card {
      background: white;
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      border: 1px solid #e2e8f0;
    }
    
    .card-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 4px solid var(--primary);
      padding-left: 16px;
    }
    
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; }
    th, td { padding: 14px 16px; text-align: left; }
    th { background: linear-gradient(135deg, #667eea, #764ba2); color: white; font-weight: 600; font-size: 13px; }
    tr:hover { background: rgba(99, 102, 241, 0.05); }
    .pass-row { background-color: #d1fae5 !important; }
    .fail-row { background-color: #fee2e2 !important; }
    body.dark-mode .pass-row { background-color: #064e3b !important; }
    body.dark-mode .fail-row { background-color: #7f1d1d !important; }
    
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      gap: 6px;
    }
    .badge-pass { background: #d1fae5; color: #065f46; }
    .badge-fail { background: #fee2e2; color: #991b1b; }
    
    .subject-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
    .subject-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: var(--shadow);
      border-left: 5px solid var(--primary);
    }
    .subject-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-xl); }
    .subject-card h4 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal-content {
      background: white;
      border-radius: 28px;
      width: 520px;
      max-width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: var(--shadow-xl);
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 28px;
      border-bottom: 2px solid #f1f5f9;
    }
    
    .modal-header h3 { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .close { cursor: pointer; font-size: 28px; color: #94a3b8; transition: all 0.2s; }
    .close:hover { color: #ef4444; transform: rotate(90deg); }
    .modal-body { padding: 28px; }
    .modal-body .field { margin-bottom: 20px; }
    .modal-body label { display: block; font-weight: 600; margin-bottom: 8px; }
    
    .save-btn, .export-btn, .edit-btn, .delete-btn, .back-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .save-btn { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .export-btn { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; }
    .edit-btn { background: #3b82f6; color: white; }
    .delete-btn { background: #ef4444; color: white; }
    .back-btn { background: #64748b; color: white; }
    
    .loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .notification-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #10b981;
      color: white;
      padding: 14px 24px;
      border-radius: 60px;
      z-index: 10000;
      animation: slideInRight 0.3s ease;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    .login-container {
      max-width: 460px;
      margin: 80px auto;
      background: white;
      padding: 48px 40px;
      border-radius: 32px;
      box-shadow: var(--shadow-xl);
    }
    
    .login-container h2 {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .login-container button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
    }
    
    .lecturer-card, .unit-card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      box-shadow: var(--shadow);
    }
    
    .subject-badge {
      background: var(--primary);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      margin: 2px;
      display: inline-block;
    }
    
    /* Fast Entry Panel */
    .fast-entry-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 380px;
      background: white;
      border-radius: 20px;
      box-shadow: var(--shadow-xl);
      z-index: 1001;
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .fast-entry-header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 15px 20px;
      border-radius: 20px 20px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .fast-entry-body {
      padding: 20px;
      max-height: 400px;
      overflow-y: auto;
    }
    
    .fast-entry-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #e2e8f0;
    }
    
    .fast-entry-row label {
      font-size: 13px;
      font-weight: 500;
      flex: 1;
    }
    
    .fast-entry-row input {
      width: 80px;
      padding: 8px;
      text-align: center;
    }
    
    .student-selector {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 12px;
    }
    
    @media (max-width: 768px) {
      body { padding: 16px; }
      .stats-grid, .admin-menu-grid, .menu-grid { grid-template-columns: repeat(2, 1fr); }
      .admin-menu-grid { grid-template-columns: repeat(3, 1fr); }
      .fast-entry-panel { width: 95%; right: 2.5%; left: 2.5%; bottom: 10px; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
  // ======================= CONFIGURATION =======================
  const API_BASE_URL = 'https://nchsm-marks-proxy.onrender.com';
  const INTAKE_YEARS = ['2024', '2025', '2026'];
  
  let currentUser = null;
  let currentYear = '2026';
  let currentExamType = 'internal';
  let configCache = null;
  let currentMarksData = null, currentMarksBlock = null, currentMarksSubject = null, currentAssessmentType = null;
  let currentAdminMarks = null, currentAdminAssessmentType = null, currentAdminBlock = null, currentAdminSubject = null;
  let currentNCKMarks = null, currentNCKSheet = null;
  let fastEntryVisible = false;
  
  // ======================= UTILITIES =======================
  function showLoading(msg) {
    let existing = document.querySelector('.loader');
    if (existing) existing.remove();
    let loader = document.createElement('div');
    loader.className = 'loader';
    loader.innerHTML = `<div class="spinner"></div><div class="loader-text">${msg || 'Loading...'}</div>`;
    document.body.appendChild(loader);
  }
  
  function hideLoading() { let loader = document.querySelector('.loader'); if (loader) loader.remove(); }
  
  function showNotification(msg, isErr) {
    let toast = document.createElement('div');
    toast.className = 'notification-toast';
    toast.style.background = isErr ? 'linear-gradient(135deg, #ef4444, #dc2626)' : 'linear-gradient(135deg, #10b981, #059669)';
    toast.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  async function apiCall(endpoint, opts = {}) {
    try {
      const headers = { 'Content-Type': 'application/json', 'X-Year': currentYear, 'X-Exam-Type': currentExamType };
      const res = await fetch(API_BASE_URL + endpoint, { headers, ...opts });
      const ct = res.headers.get('content-type');
      if (ct && ct.includes('application/json')) return await res.json();
      return { error: 'Non-JSON response' };
    } catch (e) { console.error(e); return { error: e.message }; }
  }
  
  async function getConfig() { if (configCache) return configCache; configCache = await apiCall('/api/units', {}); return configCache; }
  
  function exportToCSV(data, filename) {
    if (!data || !data.length) { showNotification('No data to export', true); return; }
    const headers = Object.keys(data[0]);
    let csv = [headers.join(',')];
    data.forEach(row => { const values = headers.map(h => `"${String(row[h] || '').replace(/"/g, '""')}"`); csv.push(values.join(',')); });
    const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `${filename}_${new Date().toISOString().slice(0, 19)}.csv`;
    a.click(); URL.revokeObjectURL(a.href);
    showNotification('Export completed!', false);
  }
  
  function initDarkMode() { if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode'); }
  function toggleDarkMode() { document.body.classList.toggle('dark-mode'); localStorage.setItem('darkMode', document.body.classList.contains('dark-mode')); }
  function closeModal() { document.querySelectorAll('.modal').forEach(m => m.remove()); }
  
  // ======================= LOGIN & MAIN =======================
  function checkLogin() {
    initDarkMode();
    const saved = localStorage.getItem('nursingUser');
    if (saved) {
      currentUser = JSON.parse(saved);
      const savedYear = localStorage.getItem('selectedYear');
      currentYear = (savedYear && INTAKE_YEARS.includes(savedYear)) ? savedYear : '2026';
      showMain();
    } else { showLogin(); }
  }
  
  function showLogin() {
    const yearOptions = INTAKE_YEARS.map(y => `<option value="${y}" ${y === '2026' ? 'selected' : ''}>🎓 March ${y} Class</option>`).join('');
    document.getElementById('app').innerHTML = `
      <div class="login-container">
        <div style="text-align: center; margin-bottom: 24px;"><i class="fas fa-graduation-cap" style="font-size: 48px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent;"></i></div>
        <h2>Nursing School System</h2>
        <p style="text-align: center; color: #64748b; margin-bottom: 32px;">Nakuru College of Health Sciences</p>
        <select id="loginYear">${yearOptions}</select>
        <input type="text" id="username" placeholder="👤 Username">
        <input type="password" id="password" placeholder="🔒 Password">
        <button onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
        <div id="loginError" class="error" style="color: #ef4444; margin-top: 16px; text-align: center;"></div>
      </div>`;
  }
  
  async function doLogin() {
    showLoading('Logging in...');
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const year = document.getElementById('loginYear').value;
    currentYear = year;
    localStorage.setItem('selectedYear', currentYear);
    const result = await apiCall('/api/login', { method: 'POST', body: JSON.stringify({ username, password, year: currentYear }) });
    hideLoading();
    if (result.success) {
      currentUser = result.user;
      localStorage.setItem('nursingUser', JSON.stringify(currentUser));
      showMain();
      showNotification(`Welcome ${currentUser.name}!`, false);
    } else { document.getElementById('loginError').innerHTML = result.message; }
  }
  
  function logout() { localStorage.removeItem('nursingUser'); currentUser = null; configCache = null; showLogin(); }
  
  async function showMain() {
    showLoading('Loading Dashboard...');
    const isAdmin = (currentUser.role === 'admin');
    const yearOptions = INTAKE_YEARS.map(y => `<option value="${y}" ${y === currentYear ? 'selected' : ''}>🎓 March ${y} Class</option>`).join('');
    const examTypeOptions = `<option value="internal" ${currentExamType === 'internal' ? 'selected' : ''}>📝 Internal Exams (CAT1 + CAT2 + Exam)</option><option value="nck" ${currentExamType === 'nck' ? 'selected' : ''}>🏥 NCK Score Sheet (Clinical Assessment)</option>`;
    
    const statsHtml = `<div class="selector-group"><div><label><i class="fas fa-calendar-alt"></i> Class Year:</label> <select id="yearSelectMain" onchange="changeYear()">${yearOptions}</select></div><div><label><i class="fas fa-file-alt"></i> Exam Type:</label> <select id="examTypeSelect" onchange="changeExamType()">${examTypeOptions}</select></div></div><div class="stats-grid"><div class="stat-card"><div class="stat-number" id="totalStudents">-</div><div class="stat-label"><i class="fas fa-users"></i> Total Students</div></div><div class="stat-card"><div class="stat-number">6</div><div class="stat-label"><i class="fas fa-layer-group"></i> Academic Blocks</div></div><div class="stat-card"><div class="stat-number" id="totalSubjects">-</div><div class="stat-label"><i class="fas fa-book"></i> Active Units</div></div><div class="stat-card"><div class="stat-number">60%</div><div class="stat-label"><i class="fas fa-flag-checkered"></i> Pass Mark</div></div></div>`;
    
    let menuHtml = '';
    if (isAdmin) {
      menuHtml = `<div class="admin-menu-grid"><button class="menu-btn btn-primary" id="marksBtn"><i class="fas fa-pen-alt"></i> Internal Marks</button><button class="menu-btn btn-info" id="nckBtn"><i class="fas fa-file-medical"></i> NCK Scores</button><button class="menu-btn btn-success" id="dashboardBtn"><i class="fas fa-chart-line"></i> Analytics</button><button class="menu-btn btn-warning" id="studentsBtn"><i class="fas fa-user-graduate"></i> Students</button><button class="menu-btn btn-danger" id="lecturersBtn"><i class="fas fa-chalkboard-user"></i> Lecturers</button><button class="menu-btn btn-export" id="unitsBtn"><i class="fas fa-book-open"></i> Units</button><button class="menu-btn btn-secondary" id="reportsBtn"><i class="fas fa-download"></i> Reports</button></div>`;
    } else {
      menuHtml = `<div class="menu-grid"><button class="menu-btn btn-primary" id="lecturerMarksBtn"><i class="fas fa-pen-alt"></i> My Subjects</button><button class="menu-btn btn-info" id="lecturerNckBtn"><i class="fas fa-file-medical"></i> NCK Scores</button><button class="menu-btn btn-success" id="lecturerDashboardBtn"><i class="fas fa-chart-simple"></i> My Analytics</button><button class="menu-btn btn-export" id="lecturerReportsBtn"><i class="fas fa-download"></i> Reports</button></div>`;
    }

    if (!marks || marks.length === 0) { document.getElementById('nckMarksContainer').innerHTML = '<div class="card" style="text-align:center;">No data found.</div>'; return; }
    
    const areaGroups = [

      { name: '🤰 MCH', areas: ['MCH1', 'MCH2', 'MCH3'] },
      { name: '🤱 MATERNITY', areas: ['MAT1', 'MAT2', 'MAT3'] },
      { name: '👶 PAEDIATRICS', areas: ['PEAD1', 'PEAD2'] },
      { name: '🔪 SURGERY', areas: ['SURG1', 'SURG2', 'SURG3'] },
      { name: '🚑 OTHER', areas: ['OPD', 'NBU1', 'NBU2', 'THEATRE', 'PSYCHIATRY', 'RURALS', 'DISTRICT', 'SPECIAL'] }

    let html = `<div style="margin-bottom: 15px; padding: 12px; background: linear-gradient(135deg, #667eea20, #764ba220); border-radius: 12px;">

        <button class="save-btn" onclick="openFastEntryPanel()" style="padding: 5px 12px; background: #8b5cf6;"><i class="fas fa-bolt"></i> Fast Entry Mode</button>
        ${currentUser.role === 'admin' ? `<button class="save-btn" onclick="showNCKColumnManager()" style="padding: 5px 12px; background: #ef4444;"><i class="fas fa-columns"></i> Manage Columns</button>` : ''}
      </div>
      <div style="font-size: 12px; color: #666; margin-top: 8px;"><i class="fas fa-info-circle"></i> Tip: Click "Fast Entry Mode" for a focused, keyboard-friendly interface</div>
    </div>
    <div id="nckTableView" style="overflow-x:auto; max-height: 60vh;">
      <table style="min-width: 1000px;">
        <thead><tr style="background: linear-gradient(135deg, #667eea, #764ba2); color: white; position: sticky; top: 0;">
          <th style="position: sticky; left: 0; background: #667eea;">#</th>
          <th style="position: sticky; left: 50px; background: #667eea;">Student Name</th>`;
    
    for (let group of areaGroups) { html += `<th colspan="${group.areas.length}" style="text-align: center; background: #4f46e5;">${group.name}</th>`; }
    html += `<th>Avg</th><th>Status</th><th>Graded By</th></tr><tr style="background: #818cf8; color: white;"><th></th><th></th>`;
    for (let group of areaGroups) { for (let area of group.areas) { html += `<th style="min-width: 55px; font-size: 10px;">${area}</th>`; } }
    html += `<th></th><th></th><th></th></tr></thead><tbody>`;
    
    currentNCKMarks = marks;
    currentNCKSheet = 'XY FORMS';
    
    for (let i = 0; i < marks.length; i++) {
      const m = marks[i];
      let scores = m.scores || [];
      while (scores.length < 22) scores.push(0);
      const validScores = scores.filter(s => s > 0);
      let avg = validScores.length ? validScores.reduce((a,b) => a+b,0) / validScores.length : (m.final || 0);
      const status = avg >= 60 ? 'PASS' : (validScores.length ? 'FAIL' : 'PENDING');
      const rowClass = status === 'PASS' ? 'pass-row' : (status === 'FAIL' ? 'fail-row' : '');
      let gradedBy = m.gradedBy || '';
      if (gradedBy && !isNaN(parseFloat(gradedBy)) && gradedBy.toString().includes('.')) gradedBy = '';
      
      html += `<tr class="${rowClass}">`;
      html += `<td style="position: sticky; left: 0; background: white;">${i+1}</td>`;
      html += `<td style="position: sticky; left: 50px; background: white; font-weight: 500; cursor: pointer;" onclick="openFastEntryForStudent(${i}, '${m.name}')">${m.name || 'Unnamed'} <i class="fas fa-edit" style="font-size: 10px;"></i></td>`;
      
      let scoreIdx = 0;
      for (let group of areaGroups) {
        for (let area of group.areas) {

          scoreIdx++;

      html += `<td id="xyAvg_${i}" style="font-weight: bold; text-align: center; background: ${avg >= 60 ? '#d1fae5' : '#fee2e2'};">${displayAvg}</td>`;

    if (fastEntryVisible) closeFastEntryPanel();

  function displayAssessmentMarks(marks) {
    if (!marks || marks.length === 0) { document.getElementById('nckMarksContainer').innerHTML = '<div class="card" style="text-align:center;">No assessment data found.</div>'; return; }
    let html = `<div style="overflow-x:auto;"><table style="min-width: 700px;"><thead><tr style="background: linear-gradient(135deg, #667eea, #764ba2); color: white;"><th>#</th><th>Student Name</th><th>ANC Assessment</th><th>CWC Immunization</th><th>Ward Nursing Care</th><th>Total</th><th>Status</th><th>Graded By</th></tr></thead><tbody>`;

    currentNCKSheet = 'ASSESSMENT AND CASE';
    for (let i = 0; i < marks.length; i++) {
      const m = marks[i];
      const scores = m.scores || [0, 0, 0];
      const total = scores.reduce((a, b) => a + b, 0);
      const status = total >= 60 ? 'PASS' : (scores.some(s => s > 0) ? 'FAIL' : 'PENDING');
      const rowClass = status === 'PASS' ? 'pass-row' : (status === 'FAIL' ? 'fail-row' : '');
      html += `<tr class="${rowClass}">`;
      html += `<td>${i+1}</td>`;
      html += `<td style="font-weight: 500; cursor: pointer;" onclick="openFastAssessmentEntry(${i}, '${m.name}')">${m.name || 'Unnamed'} <i class="fas fa-edit" style="font-size: 10px;"></i></td>`;

      html += `<td><input type="number" id="ac_${i}_1" value="${scores[1] || 0}" min="0" max="100" step="0.5" style="width: 70px; padding: 6px; border-radius: 8px;" onchange="updateACTotal(${i})"></td>`;
      html += `<td><input type="number" id="ac_${i}_2" value="${scores[2] || 0}" min="0" max="100" step="0.5" style="width: 70px; padding: 6px; border-radius: 8px;" onchange="updateACTotal(${i})"></td>`;
      html += `<td id="acTotal_${i}" style="font-weight: bold;">${total}</td>`;
      html += `<td id="acStatus_${i}"><span class="badge ${status === 'PASS' ? 'badge-pass' : 'badge-fail'}">${status}</span></td>`;
      html += `<td><input type="text" id="acGraded_${i}" value="${m.gradedBy || ''}" placeholder="Lecturer" style="width: 100px; padding: 6px;"></td>`;
      html += `</tr>`;
    }
    html += `</tbody></table></div><div style="text-align: center; margin-top: 20px;"><button class="save-btn" onclick="saveNCKMarks()"><i class="fas fa-save"></i> Save All NCK Marks</button></div>`;
    document.getElementById('nckMarksContainer').innerHTML = html;
    if (fastEntryVisible) closeFastEntryPanel();
  }
  
  // ======================= FAST ENTRY PANEL (KEYBOARD FRIENDLY) =======================
  function openFastEntryPanel() {
    if (!currentNCKMarks || currentNCKMarks.length === 0) { showNotification('No data loaded', true); return; }
    if (fastEntryVisible) { closeFastEntryPanel(); return; }
    
    const areaGroups = [
      { title: '🏥 MEDICAL', cols: [0,1,2], names: ['MED1', 'MED2', 'MED3'] },
      { title: '🤰 MCH', cols: [3,4,5], names: ['MCH1', 'MCH2', 'MCH3'] },
      { title: '🤱 MATERNITY', cols: [6,7,8], names: ['MAT1', 'MAT2', 'MAT3'] },
      { title: '👶 PAEDIATRICS', cols: [9,10], names: ['PEAD1', 'PEAD2'] },
      { title: '🔪 SURGERY', cols: [11,12,13], names: ['SURG1', 'SURG2', 'SURG3'] },
      { title: '🚑 OTHER', cols: [14,15,16,17,18,19,20,21], names: ['OPD', 'NBU1', 'NBU2', 'THEATRE', 'PSYCHIATRY', 'RURALS', 'DISTRICT', 'SPECIAL'] }
    ];

    panel.id = 'fastEntryPanel';
    panel.className = 'fast-entry-panel';
    panel.innerHTML = `
      <div class="fast-entry-header">
        <span><i class="fas fa-bolt"></i> Fast Entry Mode</span>
        <span><i class="fas fa-times" onclick="closeFastEntryPanel()" style="cursor: pointer;"></i></span>
      </div>
      <div class="fast-entry-body">
        <select id="fastStudentSelect" class="student-selector">
          ${currentNCKMarks.map((m, i) => `<option value="${i}">${i+1}. ${m.name}</option>`).join('')}
        </select>
        <div id="fastEntryFields"></div>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
          <button class="save-btn" onclick="applyFastEntry()" style="flex: 1;"><i class="fas fa-save"></i> Save & Next</button>
          <button class="back-btn" onclick="applyFastEntryAndStay()" style="flex: 1;">Save & Stay</button>
        </div>
        <div style="margin-top: 10px; text-align: center; font-size: 11px; color: #666;">
          <i class="fas fa-keyboard"></i> Press Enter to save and move to next student
        </div>
      </div>
    `;
    document.body.appendChild(panel);
    fastEntryVisible = true;
    loadFastEntryFields(0);
    
    document.getElementById('fastStudentSelect').onchange = () => {
      loadFastEntryFields(parseInt(document.getElementById('fastStudentSelect').value));
    };
  }
  
  function loadFastEntryFields(studentIdx) {
    const container = document.getElementById('fastEntryFields');
    if (!container) return;
    
    const scores = [];
    for (let c = 0; c < 22; c++) {
      const input = document.getElementById(`xy_${studentIdx}_${c}`);
      scores.push(input ? input.value : 0);
    }
    
    const areaGroups = [
      { title: '🏥 MEDICAL', cols: [0,1,2], names: ['MED1', 'MED2', 'MED3'] },
      { title: '🤰 MCH', cols: [3,4,5], names: ['MCH1', 'MCH2', 'MCH3'] },
      { title: '🤱 MATERNITY', cols: [6,7,8], names: ['MAT1', 'MAT2', 'MAT3'] },
      { title: '👶 PAEDIATRICS', cols: [9,10], names: ['PEAD1', 'PEAD2'] },
      { title: '🔪 SURGERY', cols: [11,12,13], names: ['SURG1', 'SURG2', 'SURG3'] },
      { title: '🚑 OTHER', cols: [14,15,16,17,18,19,20,21], names: ['OPD', 'NBU1', 'NBU2', 'THEATRE', 'PSYCHIATRY', 'RURALS', 'DISTRICT', 'SPECIAL'] }
    ];
    
    let html = `<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">`;
    for (let group of areaGroups) {
      html += `<div style="border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px;">
        <h4 style="margin-bottom: 10px; color: #667eea;">${group.title}</h4>`;
      for (let i = 0; i < group.cols.length; i++) {
        const colIdx = group.cols[i];
        const score = scores[colIdx] || 0;
        html += `<div class="fast-entry-row">
          <label>${group.names[i]}:</label>
          <input type="number" id="fast_${colIdx}" value="${score}" min="0" max="100" step="0.5" onkeypress="handleFastEntryKey(event, ${colIdx})">
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
    container.innerHTML = html;
    
    // Focus first input
    setTimeout(() => { const firstInput = container.querySelector('input'); if (firstInput) firstInput.focus(); }, 100);
  }
  
  function handleFastEntryKey(event, colIdx) {
    if (event.key === 'Enter') {
      event.preventDefault();
      const nextCol = colIdx + 1;
      const nextInput = document.getElementById(`fast_${nextCol}`);
      if (nextInput) { nextInput.focus(); }
      else { applyFastEntry(); }
    }
  }
  
  function applyFastEntry() {
    const studentIdx = parseInt(document.getElementById('fastStudentSelect').value);
    for (let c = 0; c < 22; c++) {
      const fastVal = document.getElementById(`fast_${c}`)?.value;
      if (fastVal !== undefined) {
        const mainInput = document.getElementById(`xy_${studentIdx}_${c}`);
        if (mainInput) mainInput.value = fastVal;
      }
    }
    updateXYAverage(studentIdx);
    
    const nextIdx = studentIdx + 1;
    if (nextIdx < currentNCKMarks.length) {
      document.getElementById('fastStudentSelect').value = nextIdx;
      loadFastEntryFields(nextIdx);
      showNotification(`Saved ${currentNCKMarks[studentIdx]?.name}. Now entering ${currentNCKMarks[nextIdx]?.name}`, false);
    } else {
      closeFastEntryPanel();
      showNotification('All students done! Click Save All to save to server.', false);
    }
  }
  
  function applyFastEntryAndStay() {
    const studentIdx = parseInt(document.getElementById('fastStudentSelect').value);
    for (let c = 0; c < 22; c++) {
      const fastVal = document.getElementById(`fast_${c}`)?.value;
      if (fastVal !== undefined) {
        const mainInput = document.getElementById(`xy_${studentIdx}_${c}`);
        if (mainInput) mainInput.value = fastVal;
      }
    }
    updateXYAverage(studentIdx);
    showNotification(`Saved ${currentNCKMarks[studentIdx]?.name}. Continue editing.`, false);
  }
  
  function openFastEntryForStudent(studentIdx, studentName) {
    if (!fastEntryVisible) openFastEntryPanel();
    setTimeout(() => {
      const select = document.getElementById('fastStudentSelect');
      if (select) { select.value = studentIdx; loadFastEntryFields(studentIdx); }
    }, 200);
  }
  
  function openFastAssessmentEntry(studentIdx, studentName) {

    const panel = document.createElement('div');
    panel.id = 'fastEntryPanel';
    panel.className = 'fast-entry-panel';
    panel.innerHTML = `
      <div class="fast-entry-header">
        <span><i class="fas fa-bolt"></i> Fast Entry - ${studentName}</span>
        <span><i class="fas fa-times" onclick="closeFastEntryPanel()" style="cursor: pointer;"></i></span>
      </div>
      <div class="fast-entry-body">
        <div style="margin-bottom: 15px;"><strong>ANC Assessment:</strong> <input type="number" id="fast_ac_0" value="${document.getElementById(`ac_${studentIdx}_0`)?.value || 0}" min="0" max="100" step="0.5" style="width: 100%; padding: 10px;"></div>
        <div style="margin-bottom: 15px;"><strong>CWC Immunization:</strong> <input type="number" id="fast_ac_1" value="${document.getElementById(`ac_${studentIdx}_1`)?.value || 0}" min="0" max="100" step="0.5" style="width: 100%; padding: 10px;"></div>
        <div style="margin-bottom: 15px;"><strong>Ward Nursing Care:</strong> <input type="number" id="fast_ac_2" value="${document.getElementById(`ac_${studentIdx}_2`)?.value || 0}" min="0" max="100" step="0.5" style="width: 100%; padding: 10px;"></div>
        <div><strong>Graded By:</strong> <input type="text" id="fast_ac_graded" value="${document.getElementById(`acGraded_${studentIdx}`)?.value || ''}" style="width: 100%; padding: 10px;"></div>
        <button class="save-btn" onclick="saveFastAssessment(${studentIdx})" style="width: 100%; margin-top: 15px;"><i class="fas fa-save"></i> Save & Close</button>
      </div>
    `;
    document.body.appendChild(panel);
    fastEntryVisible = true;

  function saveFastAssessment(studentIdx) {
    for (let i = 0; i < 3; i++) {
      const input = document.getElementById(`ac_${studentIdx}_${i}`);
      const fastInput = document.getElementById(`fast_ac_${i}`);
      if (input && fastInput) input.value = fastInput.value;
    }
    const gradedInput = document.getElementById(`acGraded_${studentIdx}`);
    const fastGraded = document.getElementById('fast_ac_graded');
    if (gradedInput && fastGraded) gradedInput.value = fastGraded.value;
    updateACTotal(studentIdx);
    closeFastEntryPanel();
    showNotification('Saved!', false);
  }
  
  function closeFastEntryPanel() {
    const panel = document.getElementById('fastEntryPanel');
    if (panel) panel.remove();
    fastEntryVisible = false;
  }
  
  window.updateXYAverage = function(idx) {

  async function showStudents() {
    const students = await apiCall('/api/students', {});
    let html = `<button class="back-btn" onclick="showMain()"><i class="fas fa-arrow-left"></i> Back</button><div class="header"><h3><i class="fas fa-user-graduate"></i> Manage Students</h3><button class="save-btn" onclick="showAddStudentModal()" style="margin: 10px 0;"><i class="fas fa-plus"></i> Add Student</button><button class="export-btn" onclick="exportToCSV(students,'students')"><i class="fas fa-download"></i> Export</button></div><div style="overflow-x:auto;"><table style="width:100%"><thead><tr style="background:#667eea;color:white"><th>Admission</th><th>Name</th><th>Block</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
    students.forEach(s => { html += `<tr><td>${s.admission}</td><td>${s.name}</td><td>${s.block}</td><td><span class="badge ${s.status === 'ACTIVE' ? 'badge-pass' : 'badge-fail'}">${s.status}</span></td><td><button class="edit-btn" onclick="showEditStudentModal('${s.admission}','${s.name}','${s.block}')">Edit</button> <button class="delete-btn" onclick="deleteStudent('${s.admission}')">Delete</button></td></tr>`; });
    html += `</tbody></table></div>`; document.getElementById('contentArea').innerHTML = html;
  }
  
  function showAddStudentModal() {
    const modal = `<div id="studentModal" class="modal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-user-plus"></i> Add Student</h3><span class="close" onclick="closeModal()">&times;</span></div><div class="modal-body"><div class="field"><label>Admission Number</label><input type="text" id="studentAdmission" placeholder="e.g., KRCHN/0001/25"></div><div class="field"><label>Full Name</label><input type="text" id="studentName" placeholder="Full Name"></div><div class="field"><label>Block</label><select id="studentBlock">${['BLOCK_0','BLOCK_1','BLOCK_2','BLOCK_3','BLOCK_4','BLOCK_5'].map(b => `<option>${b}</option>`).join('')}</select></div><button onclick="saveNewStudent()" class="save-btn" style="width:100%"><i class="fas fa-save"></i> Save Student</button></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend', modal);
  }
  
  async function saveNewStudent() { const admission = document.getElementById('studentAdmission').value, name = document.getElementById('studentName').value, block = document.getElementById('studentBlock').value; if (!admission || !name) { showNotification('Fill all fields', true); return; } showLoading('Adding...'); await apiCall('/api/add-student', { method: 'POST', body: JSON.stringify({ admission, name, block }) }); hideLoading(); closeModal(); showNotification('Student added!', false); showStudents(); }
  
  function showEditStudentModal(adm, name, block) {
    const modal = `<div id="studentModal" class="modal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-user-edit"></i> Edit Student</h3><span class="close" onclick="closeModal()">&times;</span></div><div class="modal-body"><div class="field"><label>Admission</label><input type="text" value="${adm}" readonly></div><div class="field"><label>Name</label><input type="text" id="studentName" value="${name}"></div><div class="field"><label>Block</label><select id="studentBlock">${['BLOCK_0','BLOCK_1','BLOCK_2','BLOCK_3','BLOCK_4','BLOCK_5'].map(b => `<option ${b === block ? 'selected' : ''}>${b}</option>`).join('')}</select></div><button onclick="updateStudent('${adm}')" class="save-btn" style="width:100%"><i class="fas fa-save"></i> Update</button></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend', modal);
  }
  
  async function updateStudent(adm) { const name = document.getElementById('studentName').value, block = document.getElementById('studentBlock').value; showLoading('Updating...'); await apiCall('/api/update-student', { method: 'POST', body: JSON.stringify({ admission: adm, name, block }) }); hideLoading(); closeModal(); showNotification('Updated!', false); showStudents(); }
  async function deleteStudent(adm) { if (confirm('Delete this student?')) { showLoading('Deleting...'); await apiCall('/api/delete-student', { method: 'POST', body: JSON.stringify({ admission: adm }) }); hideLoading(); showNotification('Deleted!', false); showStudents(); } }
  
  async function showLecturers() {
    const lecturers = await apiCall('/api/lecturers', {});
    let html = `<button class="back-btn" onclick="showMain()"><i class="fas fa-arrow-left"></i> Back</button><div class="header"><h3><i class="fas fa-chalkboard-user"></i> Manage Lecturers</h3><button class="save-btn" onclick="showAddLecturerModal()" style="margin: 10px 0;"><i class="fas fa-plus"></i> Add Lecturer</button></div>`;
    lecturers.forEach(l => { const badges = (l.subjects || []).map(s => `<span class="subject-badge">${s.split('|')[1]}</span>`).join(''); html += `<div class="lecturer-card"><div><strong>${l.name}</strong><br><small>${l.username}</small></div><div>${badges}</div><div><button class="edit-btn" onclick="showEditLecturerModal('${l.username}')">Edit</button> <button class="delete-btn" onclick="deleteLecturer('${l.username}')">Delete</button></div></div>`; });
    document.getElementById('contentArea').innerHTML = html;
  }
  
  function showAddLecturerModal() {
    const modal = `<div id="lecturerModal" class="modal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-user-plus"></i> Add Lecturer</h3><span class="close" onclick="closeModal()">&times;</span></div><div class="modal-body"><div class="field"><label>Username</label><input type="text" id="lecUser"></div><div class="field"><label>Full Name</label><input type="text" id="lecName"></div><div class="field"><label>Email</label><input type="email" id="lecEmail"></div><div class="field"><label>Password</label><input type="password" id="lecPass" value="password123"></div><button onclick="saveNewLecturer()" class="save-btn" style="width:100%"><i class="fas fa-save"></i> Save</button></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend', modal);
  }
  
  async function saveNewLecturer() { const username = document.getElementById('lecUser').value, name = document.getElementById('lecName').value, email = document.getElementById('lecEmail').value, pass = document.getElementById('lecPass').value; if (!username || !name) { showNotification('Fill required fields', true); return; } showLoading('Adding...'); await apiCall('/api/add-lecturer', { method: 'POST', body: JSON.stringify({ username, name, email, password: pass, subjects: [] }) }); hideLoading(); closeModal(); showNotification('Lecturer added!', false); showLecturers(); }
  
  async function showEditLecturerModal(username) {
    const lecturer = await apiCall(`/api/lecturer/${username}`, {}); const config = await getConfig(); let subjectOptions = '';
    for (let b of ['BLOCK_0','BLOCK_1','BLOCK_2','BLOCK_3','BLOCK_4','BLOCK_5']) { const units = config[b] || []; if (units.length) { subjectOptions += `<optgroup label="${b.replace('_', ' ')}">`; units.forEach(u => { const selected = (lecturer.subjects || []).includes(`${b}|${u.name}`); subjectOptions += `<option value="${b}|${u.name}" ${selected ? 'selected' : ''}>${u.name} (${u.assessmentType})</option>`; }); subjectOptions += `</optgroup>`; } }
    const modal = `<div id="lecturerModal" class="modal"><div class="modal-content" style="max-width:600px;"><div class="modal-header"><h3><i class="fas fa-user-edit"></i> Edit Lecturer: ${lecturer.name}</h3><span class="close" onclick="closeModal()">&times;</span></div><div class="modal-body"><div class="field"><label>Username</label><input type="text" value="${lecturer.username}" readonly></div><div class="field"><label>Name</label><input type="text" id="lecName" value="${lecturer.name}"></div><div class="field"><label>Email</label><input type="email" id="lecEmail" value="${lecturer.email || ''}"></div><div class="field"><label>Password (leave blank to keep)</label><input type="password" id="lecPass" placeholder="New password"></div><div class="field"><label>Assigned Subjects</label><select id="lecSubjects" multiple size="6" style="width:100%">${subjectOptions}</select><small>Hold Ctrl/Cmd to select multiple</small></div><button onclick="updateLecturer('${lecturer.username}')" class="save-btn" style="width:100%"><i class="fas fa-save"></i> Save Changes</button></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend', modal);
  }
  
  async function updateLecturer(oldUsername) { const name = document.getElementById('lecName').value, email = document.getElementById('lecEmail').value, password = document.getElementById('lecPass').value, select = document.getElementById('lecSubjects'), subjects = Array.from(select.selectedOptions).map(o => o.value); showLoading('Updating...'); await apiCall('/api/update-lecturer', { method: 'POST', body: JSON.stringify({ oldUsername, username: oldUsername, name, email, password, subjects }) }); hideLoading(); closeModal(); showNotification('Updated!', false); showLecturers(); }
  async function deleteLecturer(username) { if (confirm('Delete this lecturer?')) { showLoading('Deleting...'); await apiCall('/api/delete-lecturer', { method: 'POST', body: JSON.stringify({ username }) }); hideLoading(); showNotification('Deleted!', false); showLecturers(); } }
  
  async function showUnits() {
    const units = await apiCall('/api/units', {});
    let html = `<button class="back-btn" onclick="showMain()"><i class="fas fa-arrow-left"></i> Back</button><div class="header"><h3><i class="fas fa-book-open"></i> Manage Units</h3></div><div class="card"><h4><i class="fas fa-plus-circle"></i> Add New Unit</h4><div style="display:grid; grid-template-columns: 1fr 1fr 1fr auto; gap:12px; align-items:end;"><div><label>Block</label><select id="newUnitBlock">${['BLOCK_0','BLOCK_1','BLOCK_2','BLOCK_3','BLOCK_4','BLOCK_5'].map(b => `<option>${b}</option>`).join('')}</select></div><div><label>Subject Name</label><input type="text" id="newUnitName" placeholder="Subject Name"></div><div><label>Assessment Type</label><select id="newUnitType"><option value="full">📊 Full (CAT1+CAT2+Exam)</option><option value="single_cat">📝 Single CAT (CAT+Exam)</option><option value="exam_only">📖 Exam Only</option></select></div><div><button class="save-btn" onclick="addNewUnit()"><i class="fas fa-plus"></i> Add Unit</button></div></div></div>`;
    for (let b of ['BLOCK_0','BLOCK_1','BLOCK_2','BLOCK_3','BLOCK_4','BLOCK_5']) { const blockUnits = units[b] || []; if (blockUnits.length) { html += `<div style="margin-top:24px;"><h3><i class="fas fa-layer-group"></i> ${b.replace('_', ' ')}</h3><div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:16px; margin-top:12px;">`; blockUnits.forEach(u => { html += `<div class="unit-card"><div><strong>${u.name}</strong><span class="badge badge-${u.assessmentType}" style="margin-left:8px;">${u.assessmentType}</span></div><div style="margin-top:12px;"><button class="edit-btn" onclick="showEditUnitModal('${b}','${u.name}','${u.assessmentType}')">Edit</button> <button class="delete-btn" onclick="deleteUnit('${b}','${u.name}')">Delete</button></div></div>`; }); html += `</div></div>`; } }
    document.getElementById('contentArea').innerHTML = html;
  }
  
  async function addNewUnit() { const block = document.getElementById('newUnitBlock').value, name = document.getElementById('newUnitName').value.trim().toUpperCase(), type = document.getElementById('newUnitType').value; if (!name) { showNotification('Enter subject name', true); return; } showLoading('Adding...'); await apiCall('/api/add-unit', { method: 'POST', body: JSON.stringify({ block, name, assessmentType: type }) }); hideLoading(); configCache = null; showNotification('Unit added!', false); showUnits(); }
  function showEditUnitModal(block, name, curType) { const modal = `<div id="unitModal" class="modal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-edit"></i> Edit Unit</h3><span class="close" onclick="closeModal()">&times;</span></div><div class="modal-body"><div class="field"><label>Subject Name</label><input type="text" id="editUnitName" value="${name}"></div><div class="field"><label>Assessment Type</label><select id="editUnitType"><option value="full" ${curType === 'full' ? 'selected' : ''}>Full (CAT1+CAT2+Exam)</option><option value="single_cat" ${curType === 'single_cat' ? 'selected' : ''}>Single CAT (CAT+Exam)</option><option value="exam_only" ${curType === 'exam_only' ? 'selected' : ''}>Exam Only</option></select></div><button onclick="updateUnit('${block}','${name}')" class="save-btn" style="width:100%"><i class="fas fa-save"></i> Save Changes</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', modal); }
  async function updateUnit(block, oldName) { const newName = document.getElementById('editUnitName').value.trim().toUpperCase(), newType = document.getElementById('editUnitType').value; if (!newName) { showNotification('Enter subject name', true); return; } showLoading('Updating...'); await apiCall('/api/update-unit', { method: 'POST', body: JSON.stringify({ block, oldName, newName, assessmentType: newType }) }); hideLoading(); closeModal(); configCache = null; showNotification('Unit updated!', false); showUnits(); }
  async function deleteUnit(block, name) { if (confirm(`Delete unit "${name}"? This will delete ALL marks!`)) { showLoading('Deleting...'); await apiCall('/api/delete-unit', { method: 'POST', body: JSON.stringify({ block, name }) }); hideLoading(); configCache = null; showNotification('Unit deleted!', false); showUnits(); } }
  
  // ======================= INITIALIZE =======================
  let sy = localStorage.getItem('selectedYear'); if (sy && INTAKE_YEARS.includes(sy)) currentYear = sy;
  let set = localStorage.getItem('selectedExamType'); if (set) currentExamType = set;
  checkLogin();
</script>
</body>
</html>
