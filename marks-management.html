    const bottomStudents = [...studentList].sort((a, b) => a.overallAvg - b.overallAvg).slice(0, 5);
    const topSubjects = Object.entries(subjectPerformance).map(([name, data]) => ({

      studentCount: data.scores.length,

    let allUnitsData = [], totalScoreSum = 0, totalUnitCount = 0;

  window.switchAnalyticsTab = function(tabName) {
    document.querySelectorAll('.tab-content').forEach(tab => { tab.classList.remove('active'); });
    document.getElementById(`${tabName}Tab`).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(btn => { btn.classList.remove('active'); });
    document.querySelector(`.tab-btn[data-tab="${tabName}"]`).classList.add('active');
  };

  window.filterUnitsTable = function() {
    const searchTerm = document.getElementById('unitSearchInput')?.value.toLowerCase() || '';
    const blockFilter = document.getElementById('blockFilterSelect')?.value || 'all';
    document.querySelectorAll('.block-content').forEach(blockContent => {
      const rows = blockContent.querySelectorAll('tbody tr');
      let visibleCount = 0;
      rows.forEach(row => {
        const unitName = row.getAttribute('data-unit-name') || row.cells[1]?.innerText.toLowerCase() || '';
        const unitBlock = row.getAttribute('data-block') || '';
        const matchesSearch = unitName.includes(searchTerm);
        const matchesBlock = blockFilter === 'all' || unitBlock === blockFilter;
        if (matchesSearch && matchesBlock) { row.style.display = ''; visibleCount++; } else { row.style.display = 'none'; }
      });
      const blockHeader = blockContent.previousElementSibling;
      if (blockHeader && blockHeader.classList.contains('block-collapse-header')) {
        blockHeader.style.display = visibleCount === 0 ? 'none' : 'flex';
      }
    });
  };

  window.toggleBlockContent = function(blockId) {
    const content = document.getElementById(`${blockId}_content`);
    const icon = document.getElementById(`${blockId}_icon`);
    if (content) {
      content.classList.toggle('collapsed');
      if (icon) { icon.classList.toggle('fa-chevron-down'); icon.classList.toggle('fa-chevron-right'); }
    }
  };

  window.exportUnitsData = function() {
    const units = [];
    document.querySelectorAll('.units-table tbody tr').forEach(row => {
      if (row.style.display !== 'none') {
        units.push({
          Block: row.cells[0]?.innerText || '',
          Subject: row.cells[1]?.innerText || '',
          Assessment_Type: row.cells[2]?.innerText || '',
          Mean_Score: row.cells[3]?.innerText || '',
          Pass_Rate: row.cells[4]?.innerText || '',
          Students: row.cells[5]?.innerText || ''
        });
      }
    });
    if (units.length > 0) {
      const headers = Object.keys(units[0]);
      let csv = [headers.join(',')];
      units.forEach(row => {
        const values = headers.map(h => `"${String(row[h] || '').replace(/"/g, '""')}"`);
        csv.push(values.join(','));
      });
      const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `all_units_performance_${currentYear}_${new Date().toISOString().slice(0,19)}.csv`;
      a.click();
      URL.revokeObjectURL(a.href);
      showNotification('Units data exported successfully!', false);
    } else {
      showNotification('No data to export', true);
    }
  };

  async function showLecturerAnalytics() { 
    showLoading('Loading your analytics...'); 
    const lecturerSubjects = currentUser.subjects || []; 
    const settings = await apiCall('/api/mark-entry/settings', {});
    let myData = []; 
    for (let subj of lecturerSubjects) { 
      const parts = subj.split('|'); 
      const block = parts[0]; 
      const subject = parts[1]; 
      let isOpen = true;
      if (settings.global?.enabled === false) isOpen = false;
      else if (settings[`${currentYear}_all`]?.enabled === false) isOpen = false;
      else if (settings[`${block}_${subject}`]?.enabled === false) isOpen = false;
      const marks = await apiCall(`/api/marks/${block}/${subject}`, {}); 
      if (marks && marks.length) { 
        const scores = marks.map(m => parseFloat(m.final)).filter(s => s > 0); 
        const avg = scores.length ? scores.reduce((a, b) => a + b, 0) / scores.length : 0; 
        myData.push({ block, subject, avg, students: scores.length, isOpen }); 
      } 
    } 
    let html = `<button class="back-btn" onclick="showMain()"><i class="fas fa-arrow-left"></i> Back</button><div class="header"><h3><i class="fas fa-chart-simple"></i> My Teaching Analytics</h3></div><div class="card"><div class="card-title">📊 My Subjects Performance</div><div style="overflow-x:auto;"><table style="width:100%"><thead><tr style="background:#667eea;color:white"><th>Block</th><th>Subject</th><th>Average Score</th><th>Students</th><th>Status</th></tr></thead><tbody>`; 
    for (let d of myData) { 
      const statusBadge = d.isOpen ? '<span class="badge badge-pass">🔓 Open</span>' : '<span class="badge badge-fail">🔒 Closed</span>';
      html += `<tr class="${d.avg >= 60 ? 'pass-row' : 'fail-row'}"><td style="padding:8px;">${d.block.replace('_', ' ')}</td><td style="padding:8px;"><strong>${d.subject}</strong></td><td style="padding:8px;"><strong>${d.avg.toFixed(1)}%</strong></td><td style="padding:8px;">${d.students}</td><td style="padding:8px;">${statusBadge}</td></tr>`; 
    } 
    html += `</tbody></table></div></div>`; 
    updateContentArea(html); 
    hideLoading(); 
  }

function generateResultSlip(student, reportData) {
    if (!student) {
        showNotification('No student data available', true);
        return;
    }

    showLoading('Generating result slip from latest data...');

    const sortedSubjects = [...(student.subjects || [])].sort((a, b) => b.score - a.score);
    const overallAvg = student.overallAvg || 0;
    const year = reportData?.currentYear || currentYear || '2026';
    const issueDate = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    const generatedAt = new Date().toISOString();

    function getGrade(score) {
        if (score >= 75) return 'A';
        else if (score >= 69) return 'B+';
        else if (score >= 60) return 'B';
        else if (score >= 54) return 'C+';
        else if (score >= 50) return 'C';
        else return 'E';
    }

    let subjectsHtml = '';
    if (sortedSubjects.length > 0) {
        subjectsHtml = sortedSubjects.map((subj, idx) => {
            const safeName = (subj.name || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const grade = getGrade(subj.score);
            const blockDisplay = subj.block ? subj.block.replace('_', ' ') : 'N/A';
            return `

let _transcriptStudents = [];
let _selectedStudents = new Set();
let _transcriptMode = 'single'; // 'single' | 'all'

// ===== LOAD STUDENTS FOR TRANSCRIPT - FIXED =====
async function loadTranscriptStudents() {
    const block = document.getElementById('transcriptBlock').value;
    const subject = document.getElementById('transcriptSubject').value;
    const year = document.getElementById('transcriptYear').value;
    
    // Check if "All" is selected
    const isAllBlocks = block === 'all';
    const isAllSubjects = subject === 'all';
    
    if (isAllBlocks && isAllSubjects) {
        showNotification('Please select a specific block or subject', true);
        return;
    }
    
    showLoading(`Loading students...`);
    
    try {
        let allMarks = [];
        let blocksToProcess = [];
        let subjectsToProcess = [];
        
        // Determine which blocks to process
        if (isAllBlocks) {
            const blocksRes = await apiCall('/api/blocks', {});
            blocksToProcess = blocksRes;
        } else {
            blocksToProcess = [block];
        }
        
        // Determine which subjects to process
        if (isAllSubjects) {
            // Load ALL subjects for selected blocks
            const config = await getConfig(true);
            for (let b of blocksToProcess) {
                if (config[b]) {
                    subjectsToProcess.push(...config[b].map(s => ({ 
                        name: s.name, 
                        block: b, 
                        assessmentType: s.assessmentType 
                    })));
                }
            }
        } else {
            // Load specific subject
            const config = await getConfig(true);
            let foundBlock = null;
            let foundSubject = null;
            
            // If block is 'all', search all blocks
            const searchBlocks = isAllBlocks ? Object.keys(config) : [block];
            
            for (let b of searchBlocks) {
                if (config[b]) {
                    const s = config[b].find(sub => sub.name === subject);
                    if (s) {
                        foundBlock = b;
                        foundSubject = { 
                            name: subject, 
                            block: b, 
                            assessmentType: s.assessmentType 
                        };
                        break;
                    }
                }
            }
            
            if (foundSubject) {
                subjectsToProcess.push(foundSubject);
            } else {
                showNotification(`Subject "${subject}" not found in selected blocks`, true);
                hideLoading();
                return;
            }
        }
        
        console.log(`📊 Processing ${subjectsToProcess.length} subjects across ${blocksToProcess.length} blocks`);
        
        // Fetch marks for each subject
        for (let subj of subjectsToProcess) {
            try {
                // ✅ FIX: Use encodeURIComponent for subject name
                const encodedSubject = encodeURIComponent(subj.name);
                const marks = await apiCall(`/api/marks/${subj.block}/${encodedSubject}`, {});
                
                console.log(`📊 ${subj.name}: ${marks ? (Array.isArray(marks) ? marks.length : 'non-array') : 'null'}`);
                
                if (marks && Array.isArray(marks) && marks.length > 0) {
                    marks.forEach(m => {
                        m._subject = subj.name;
                        m._block = subj.block;
                        m._assessmentType = subj.assessmentType;
                    });
                    allMarks = allMarks.concat(marks);
                }
            } catch(e) {
                console.log(`⚠️ Could not fetch marks for ${subj.name}:`, e.message);
            }
        }
        
        console.log('📊 Total marks loaded:', allMarks.length);
        
        if (allMarks.length === 0) {
            hideLoading();
            document.getElementById('transcriptResult').innerHTML = `
                <div style="text-align: center; padding: 40px; color: #94a3b8;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 48px; margin-bottom: 16px; display: block; color: #f59e0b;"></i>
                    <h4>No marks found</h4>
                    <p>No marks have been entered for the selected criteria</p>
                    <p style="font-size:12px; margin-top:8px;">Try selecting a different subject or block</p>
                    <button class="save-btn" onclick="loadTranscriptStudents()" style="margin-top: 12px;">
                        <i class="fas fa-sync-alt"></i> Retry
                    </button>
                </div>
            `;
            return;
        }
        
        // Get student details
        const students = await apiCall('/api/students', {});
        const studentMap = {};
        students.forEach(s => { studentMap[s.admission] = s; });
        
        // Group marks by student
        const studentMarksMap = {};
        allMarks.forEach(mark => {
            const adm = mark.admission;
            if (!adm) return;
            
            if (!studentMarksMap[adm]) {
                studentMarksMap[adm] = {
                    admission: adm,
                    name: studentMap[adm]?.name || mark.name || 'Unknown',
                    block: mark._block || studentMap[adm]?.block || 'BLOCK_0',
                    year: studentMap[adm]?.year || year,
                    subjects: [],
                    totalScore: 0,
                    subjectCount: 0
                };
            }
            
            let total = 0;
            let cat1 = parseFloat(mark.cat1) || 0;
            let cat2 = parseFloat(mark.cat2) || 0;
            let exam = parseFloat(mark.exam) || 0;
            
            const assessmentType = mark._assessmentType || 'full';
            
            if (assessmentType === 'full') {
                total = Math.round(((Math.min(cat1,30) + Math.min(cat2,30)) / 60 * 30 + Math.min(exam,70)) * 10) / 10;
            } else if (assessmentType === 'single_cat') {
                total = Math.round((Math.min(cat1,30) + Math.min(exam,70)) * 10) / 10;
            } else {
                total = Math.round(Math.min(exam,100) * 10) / 10;
            }
            
            if (total > 0) {
                studentMarksMap[adm].subjects.push({
                    name: mark._subject,
                    score: total
                });
                studentMarksMap[adm].totalScore += total;
                studentMarksMap[adm].subjectCount++;
            }
        });
        
        // Convert to array and calculate averages
        const studentData = Object.values(studentMarksMap).map(s => {
            const avg = s.subjectCount > 0 ? Math.round((s.totalScore / s.subjectCount) * 10) / 10 : 0;
            let grade = 'D', status = 'FAIL';
            if (avg >= 75) { grade = 'A'; status = 'DISTINCTION'; }
            else if (avg >= 65) { grade = 'B'; status = 'CREDIT'; }
            else if (avg >= 60) { grade = 'C'; status = 'PASS'; }
            
            return {
                admission: s.admission,
                name: s.name,
                block: s.block,
                year: s.year,
                subjects: s.subjects,
                total: avg,
                grade: grade,
                status: status,
                hasScore: s.subjectCount > 0,
                subjectCount: s.subjectCount
            };
        });
        
        // Sort by name
        studentData.sort((a, b) => a.name.localeCompare(b.name));
        
        _transcriptStudents = studentData;
        _selectedStudents = new Set();
        
        displayTranscriptStudents(studentData);
        updateTranscriptButtons();
        
        hideLoading();
        showNotification(`Loaded ${studentData.length} students from ${subjectsToProcess.length} subjects`, false);
        
    } catch (error) {
        hideLoading();
        console.error('Error loading students:', error);
        showNotification('Error loading students: ' + error.message, true);
    }
}

function toggleTranscriptStudent(admission) {
    if (_selectedStudents.has(admission)) {
        _selectedStudents.delete(admission);
    } else {
        _selectedStudents.add(admission);
    }
    
    document.querySelectorAll('.student-item').forEach(el => {
        const adm = el.dataset.admission;
        if (adm === admission) {
            el.classList.toggle('selected');
            const checkbox = el.querySelector('input[type="checkbox"]');
            if (checkbox) checkbox.checked = _selectedStudents.has(admission);
        }
    });
    
    updateTranscriptButtons();
}

function selectAllTranscriptStudents() {
    _transcriptStudents.forEach(s => _selectedStudents.add(s.admission));
    document.querySelectorAll('.student-item').forEach(el => {
        el.classList.add('selected');
        const checkbox = el.querySelector('input[type="checkbox"]');
        if (checkbox) checkbox.checked = true;
    });
    updateTranscriptButtons();
}

function deselectAllTranscriptStudents() {
    _selectedStudents.clear();
    document.querySelectorAll('.student-item').forEach(el => {
        el.classList.remove('selected');
        const checkbox = el.querySelector('input[type="checkbox"]');
        if (checkbox) checkbox.checked = false;
    });
    updateTranscriptButtons();
}

function selectPassingTranscriptStudents() {
    _transcriptStudents.forEach(s => {
        if (s.hasScore && s.total >= 60) {
            _selectedStudents.add(s.admission);
        }
    });
    document.querySelectorAll('.student-item').forEach(el => {
        const adm = el.dataset.admission;
        const student = _transcriptStudents.find(s => s.admission === adm);
        if (student && student.hasScore && student.total >= 60) {
            el.classList.add('selected');
            const checkbox = el.querySelector('input[type="checkbox"]');
            if (checkbox) checkbox.checked = true;
        }
    });
    updateTranscriptButtons();
}

function selectFailingTranscriptStudents() {
    _transcriptStudents.forEach(s => {
        if (s.hasScore && s.total < 60) {
            _selectedStudents.add(s.admission);
        }
    });
    document.querySelectorAll('.student-item').forEach(el => {
        const adm = el.dataset.admission;
        const student = _transcriptStudents.find(s => s.admission === adm);
        if (student && student.hasScore && student.total < 60) {
            el.classList.add('selected');
            const checkbox = el.querySelector('input[type="checkbox"]');
            if (checkbox) checkbox.checked = true;
        }
    });
    updateTranscriptButtons();
}

function updateTranscriptButtons() {
    const count = _selectedStudents.size;
    const btn = document.getElementById('generateTranscriptBtn');
    const countSpan = document.getElementById('selectedStudentCount');
    
    if (countSpan) countSpan.textContent = count;
    if (btn) {
        btn.disabled = count === 0;
        btn.innerHTML = count > 0 ? 
            `<i class="fas fa-file-pdf"></i> Generate ${count} Transcript${count > 1 ? 's' : ''}` : 
            `<i class="fas fa-file-pdf"></i> Generate Transcripts`;
    }
}

function generateSelectedTranscripts() {
    if (_selectedStudents.size === 0) {
        showNotification('Please select at least one student', true);
        return;
    }
    
    const selectedStudents = _transcriptStudents.filter(s => _selectedStudents.has(s.admission));
    
    if (!confirm(`Generate transcripts for ${selectedStudents.length} students?`)) {
        return;
    }
    
    showLoading(`Generating ${selectedStudents.length} transcripts...`);
    
    let generated = 0;
    let failed = 0;
    
    selectedStudents.forEach((s, index) => {
        // Build student data with ALL their subjects
        const subjects = s.subjects.map(subj => ({
            name: subj.name,
            code: '',
            score: subj.score,
            block: s.block
        }));
        
        const studentData = {
            name: s.name,
            admission: s.admission,
            block: s.block,
            subjects: subjects,
            overallAvg: s.total,
            subjectCount: s.subjectCount,
            status: s.total >= 60 ? 'PASS' : 'FAIL'
        };
        
        setTimeout(() => {
            try {
                generateStudentTranscriptPDF(studentData, { currentYear: document.getElementById('transcriptYear').value });
                generated++;
            } catch(e) {
                failed++;
                console.error(`Failed for ${s.name}:`, e);
            }
            
            const total = selectedStudents.length;
            
            if (generated + failed === total) {
                hideLoading();
                if (failed > 0) {
                    showNotification(`Generated ${generated} transcripts, ${failed} failed`, true);
                } else {
                    showNotification(`✅ Generated ${generated} transcripts successfully!`, false);
                }
            }
        }, index * 600);
    });
    
    setTimeout(() => {
        hideLoading();
    }, (selectedStudents.length * 600) + 5000);
}

        return;
    }

    console.log('📊 Generating transcript for:', student.name);
    console.log('📚 Subjects:', student.subjects.length);

    showLoading('Generating transcript...');

    const sortedSubjects = [...student.subjects].sort((a, b) => b.score - a.score);
    const passedSubjects = sortedSubjects.filter(s => s.score >= 60);
    const overallAvg = student.overallAvg || 0;
    const status = overallAvg >= 60 ? 'PASS' : (student.subjectCount > 0 ? 'FAIL' : 'PENDING');

    let gradeLetter = 'D';
    let classification = 'FAIL';
    
    if (overallAvg >= 75) { 
        gradeLetter = 'A'; 
        classification = 'DISTINCTION';
    } else if (overallAvg >= 65) { 
        gradeLetter = 'B'; 
        classification = 'CREDIT';
    } else if (overallAvg >= 60) { 
        gradeLetter = 'C'; 
        classification = 'PASS';
    } else { 
        gradeLetter = 'D'; 
        classification = 'FAIL';
    }

    const creditsPassed = passedSubjects.length * 3;
    const creditsFailed = (student.subjectCount - passedSubjects.length) * 3;

        const imgData = canvas.toDataURL('image/png', 1.0);
        
        const pdf = new jsPDF('p', 'mm', 'a4');
        const margin = 15;
        const imgWidth = 180;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        
        pdf.addImage(imgData, 'PNG', margin, margin, imgWidth, imgHeight);
        
        const pageHeight = 297;
        if (imgHeight > (pageHeight - margin * 2)) {
            let position = -(pageHeight - margin * 2);
            let heightLeft = imgHeight - (pageHeight - margin * 2);
            while (heightLeft > 0) {
                pdf.addPage();
                pdf.addImage(imgData, 'PNG', margin, position, imgWidth, imgHeight);
                position -= (pageHeight - margin * 2);
                heightLeft -= (pageHeight - margin * 2);
            }
        }
        
        pdf.save(`TRANSCRIPT_${student.admission}_${year.replace('/', '_')}.pdf`);

    }
}
// ===== GENERATE SELECTED STUDENT PDF - FIXED =====
function generateSelectedStudentPDF(type) {
    console.log('🔄 generateSelectedStudentPDF called with type:', type || 'transcript');
    const select = document.getElementById('studentSelectForReport');
    if (!select) {
        showNotification('Student selection not found. Please refresh the page.', true);
        return;
    }
    
    const admission = select.value;
    if (!admission) {
        showNotification('Please select a student from the dropdown', true);
        return;
    }

    // ✅ STEP 1: Try CACHE FIRST (no API call)
    let student = null;
    
    // Normalize admission function
    function normalizeAdm(adm) {
        if (!adm) return '';
        let a = adm.toString().trim().toUpperCase();
        a = a.replace(/MAR\/(\d{2})(?![0-9])/g, 'MAR/20$1');
        a = a.replace(/\/(\d{2})(?![0-9])/g, (match, year) => {
            if (year >= 24 && year <= 26) return `/20${year}`;
            return match;
        });
        return a;
    }
    
    const normAdmission = normalizeAdm(admission);
    console.log('🔍 Looking for student in cache:', admission);
    console.log('📡 Normalized:', normAdmission);
    
    // Try to find in cache - CHECK BOTH DATA SOURCES
    if (window._studentDataCache) {
        // Try direct match
        if (window._studentDataCache[admission]) {
            student = window._studentDataCache[admission];
            console.log('✅ Found in cache (direct):', student.name);
        }
        // Try normalized match
        if (!student) {
            for (const key in window._studentDataCache) {
                if (normalizeAdm(key) === normAdmission) {
                    student = window._studentDataCache[key];
                    console.log('✅ Found in cache (normalized):', student.name, 'key:', key);
                    break;
                }
            }
        }
    }
    
    // If not found in _studentDataCache, try reportData
    if (!student && window.reportData && window.reportData.studentMap) {
        if (window.reportData.studentMap[admission]) {
            student = window.reportData.studentMap[admission];
            console.log('✅ Found in reportData.studentMap:', student.name);
        } else {
            for (const key in window.reportData.studentMap) {
                if (normalizeAdm(key) === normAdmission) {
                    student = window.reportData.studentMap[key];
                    console.log('✅ Found in reportData.studentMap (normalized):', student.name);
                    break;
                }
            }
        }
    }
    
    // If still not found, try _studentList
    if (!student && window._studentList) {
        student = window._studentList.find(s => s.admission === admission);
        if (!student) {
            student = window._studentList.find(s => normalizeAdm(s.admission) === normAdmission);
        }
        if (student) {
            console.log('✅ Found in _studentList:', student.name);
        }
    }
    
    // ✅ If found in cache, generate PDF immediately
    if (student) {
        console.log('✅ Using cached student data for:', student.name);
        console.log('📊 Subjects:', student.subjects ? student.subjects.length : 0);
        
        // ✅ Ensure subjects is an array
        const subjects = Array.isArray(student.subjects) ? student.subjects : [];
        
        // ✅ If no subjects, try to fetch fresh data
        if (subjects.length === 0) {
            console.log('⚠️ No subjects in cache, fetching fresh...');
            fetchFreshStudentData(admission).then(freshStudent => {
                if (freshStudent && freshStudent.subjects && freshStudent.subjects.length > 0) {
                    // Update cache
                    if (window._studentDataCache) {
                        window._studentDataCache[admission] = freshStudent;
                    }
                    if (window.reportData && window.reportData.studentMap) {
                        window.reportData.studentMap[admission] = freshStudent;
                    }
                    // Generate PDF with fresh data
                    const enhancedStudent = {
                        name: freshStudent.name || 'Unknown Student',
                        admission: freshStudent.admission || admission,
                        subjects: freshStudent.subjects || [],
                        overallAvg: freshStudent.overallAvg || 0,
                        subjectCount: freshStudent.subjectCount || 0,
                        cat1Scores: freshStudent.cat1Scores || [],
                        cat2Scores: freshStudent.cat2Scores || [],
                        examScores: freshStudent.examScores || []
                    };
                    
                    if (type === 'result_slip') {
                        generateResultSlip(enhancedStudent, window.reportData || { currentYear: currentYear });
                    } else {
                        generateStudentTranscriptPDF(enhancedStudent, window.reportData || { currentYear: currentYear });
                    }
                } else {
                    showNotification(`No marks found for student "${student.name}". Please enter marks first.`, true);
                }
            });
            return;
        }
        
        const enhancedStudent = {
            name: student.name || 'Unknown Student',
            admission: student.admission || admission,
            subjects: subjects,
            overallAvg: student.overallAvg || 0,
            subjectCount: student.subjectCount || subjects.length,
            cat1Scores: student.cat1Scores || [],
            cat2Scores: student.cat2Scores || [],
            examScores: student.examScores || []
        };
        
        if (type === 'result_slip') {
            generateResultSlip(enhancedStudent, window.reportData || { currentYear: currentYear });
        } else {
            generateStudentTranscriptPDF(enhancedStudent, window.reportData || { currentYear: currentYear });
        }
        return;
    }
    
    // ✅ STEP 2: If NOT in cache, try API (fallback)
    console.log('⚠️ Student not in cache, trying API...');
    showLoading('Loading student data from server...');
    
    fetchFreshStudentData(admission).then(freshStudent => {
        hideLoading();
        if (freshStudent) {
            console.log('✅ Fresh student data loaded:', freshStudent.name);
            console.log('📊 Subjects:', freshStudent.subjects ? freshStudent.subjects.length : 0);
            
            if (!freshStudent.subjects || freshStudent.subjects.length === 0) {
                showNotification(`No marks found for student "${freshStudent.name}". Please enter marks first.`, true);
                return;

            // Cache the fresh data

                window._studentDataCache[admission] = freshStudent;
            }

                window.reportData.studentMap[admission] = freshStudent;

            if (type === 'result_slip') {
                generateResultSlip(freshStudent, window.reportData || { currentYear: currentYear });
            } else {
                generateStudentTranscriptPDF(freshStudent, window.reportData || { currentYear: currentYear });
            }
        } else {
            showNotification(`Student "${admission}" not found. Please refresh the page.`, true);
        }
    }).catch(err => {
        hideLoading();
        showNotification('Error loading student data: ' + err.message, true);
        console.error('❌ Error:', err);
    });
}
// ===== FETCH FRESH STUDENT DATA DIRECTLY FROM API =====
async function fetchFreshStudentData(admission) {
    try {
        console.log('📡 Fetching fresh data for student:', admission);
        
        // ✅ Get student info
        const studentInfo = await apiCall(`/api/student/${admission}`, {});
        console.log('📡 Student info response:', studentInfo);
        
        if (!studentInfo || !studentInfo.success) {
            console.error('❌ Student not found:', studentInfo);
            return null;
        }
        
        // ✅ Get config
        const config = await getConfig(true);
        const blocks = ['BLOCK_0', 'BLOCK_1', 'BLOCK_2', 'BLOCK_3', 'BLOCK_4', 'BLOCK_5'];
        const subjects = [];
        let totalScore = 0;
        let subjectCount = 0;
        let cat1Scores = [];
        let cat2Scores = [];
        let examScores = [];
        
        // ✅ Get marks for each subject
        for (let block of blocks) {
            const blockSubjects = config[block] || [];
            for (let subject of blockSubjects) {
                try {
                    const marks = await apiCall(`/api/marks/${block}/${subject.name}`, {});
                    if (marks && marks.length) {
                        for (let mark of marks) {
                            if (mark.admission === admission) {
                                console.log(`📡 Found marks for ${subject.name}:`, mark);
                                
                                let finalScore = 0;
                                let cat1 = parseFloat(mark.cat1) || 0;
                                let cat2 = parseFloat(mark.cat2) || 0;
                                let exam = parseFloat(mark.exam) || 0;
                                
                                if (subject.assessmentType === 'full') {
                                    finalScore = Math.round(((Math.min(cat1,30) + Math.min(cat2,30)) / 60 * 30 + Math.min(exam,70)) * 10) / 10;
                                    if (cat1 > 0) cat1Scores.push(cat1);
                                    if (cat2 > 0) cat2Scores.push(cat2);
                                    if (exam > 0) examScores.push(exam);
                                } else if (subject.assessmentType === 'single_cat') {
                                    finalScore = Math.round((Math.min(cat1,30) + Math.min(exam,70)) * 10) / 10;
                                    if (cat1 > 0) cat1Scores.push(cat1);
                                    if (exam > 0) examScores.push(exam);
                                } else {
                                    finalScore = Math.round(Math.min(exam,100) * 10) / 10;
                                    if (exam > 0) examScores.push(exam);
                                }
                                
                                if (finalScore > 0) {
                                    subjects.push({ 
                                        name: subject.name,
                                        code: subject.code || '',
                                        score: finalScore, 
                                        block: block 
                                    });
                                    totalScore += finalScore;
                                    subjectCount++;
                                }
                                break;
                            }
                        }
                    }
                } catch(e) {
                    console.log(`⚠️ Could not fetch marks for ${subject.name}:`, e.message);
                }
            }
        }
        
        const overallAvg = subjectCount > 0 ? parseFloat((totalScore / subjectCount).toFixed(2)) : 0;
        
        const studentData = {
            name: studentInfo.student?.name || 'Unknown',
            admission: admission,
            block: studentInfo.student?.block || 'BLOCK_0',
            subjects: subjects,
            totalScore: totalScore,
            subjectCount: subjectCount,
            cat1Scores: cat1Scores,
            cat2Scores: cat2Scores,
            examScores: examScores,
            overallAvg: overallAvg,
            status: overallAvg >= 60 ? 'PASS' : (subjectCount > 0 ? 'FAIL' : 'PENDING')
        };
        
        console.log('✅ Fresh student data assembled:', studentData);
        console.log('📊 Subjects count:', studentData.subjects.length);
        console.log('📊 Overall average:', studentData.overallAvg);
        
        return studentData;
        
    } catch (error) {
        console.error('❌ Error fetching fresh student data:', error);
        return null;
    }
}
// ===== GENERATE MASS TRANSCRIPTS =====
function generateMassTranscripts() {
    const checkedBoxes = document.querySelectorAll('.mass-student-checkbox:checked');
    if (checkedBoxes.length === 0) {
        showNotification('Please select at least one student', true);
        return;
    }
    
    if (!confirm(`Generate transcripts for ${checkedBoxes.length} students? This will create multiple PDFs.`)) {
        return;
    }
    
    showLoading(`Generating ${checkedBoxes.length} transcripts...`);
    
    let generated = 0;
    let failed = 0;
    
    checkedBoxes.forEach((cb, index) => {
        const admission = cb.dataset.admission;
        const student = window._studentDataCache?.[admission];
        
        if (student) {
            const enhancedStudent = {
                name: student.name || 'Unknown',
                admission: student.admission || admission,
                subjects: student.subjects || [],
                overallAvg: student.overallAvg || 0,
                subjectCount: student.subjectCount || 0,
                cat1Scores: student.cat1Scores || [],
                cat2Scores: student.cat2Scores || [],
                examScores: student.examScores || []
            };
            
            // Delay each generation to avoid browser blocking
            setTimeout(() => {
                try {
                    generateStudentTranscriptPDF(enhancedStudent, window.reportData || { currentYear: currentYear });
                    generated++;
                } catch(e) {
                    failed++;
                    console.error(`Failed to generate transcript for ${student.name}:`, e);
                }
                
                // Update progress
                const total = checkedBoxes.length;
                const progress = Math.round(((generated + failed) / total) * 100);
                showNotification(`Progress: ${progress}% (${generated} generated, ${failed} failed)`, false);
                
                if (generated + failed === total) {
                    hideLoading();
                    if (failed > 0) {
                        showNotification(`✅ Generated ${generated} transcripts, ${failed} failed`, true);
                    } else {
                        showNotification(`✅ Generated ${generated} transcripts successfully!`, false);
                    }
                }
            }, index * 800); // Stagger downloads
        } else {
            failed++;
        }
    });
    
    // Fallback hide after timeout
    setTimeout(() => {
        hideLoading();
    }, (checkedBoxes.length * 800) + 5000);
}

// ===== GENERATE BLOCK TRANSCRIPTS =====
function generateBlockTranscripts() {
    const block = document.getElementById('blockTranscriptSelect')?.value;
    const scope = document.getElementById('blockTranscriptScope')?.value || 'all';
    
    if (!block) {
        showNotification('Please select a block', true);
        return;
    }
    
    const students = window._studentList || [];
    let filtered = students.filter(s => s.block === block);
    
    if (scope === 'passing') {
        filtered = filtered.filter(s => s.overallAvg >= 60);
    } else if (scope === 'failing') {
        filtered = filtered.filter(s => s.overallAvg < 60 && s.subjectCount > 0);
    }
    
    if (filtered.length === 0) {
        showNotification('No students found for this selection', true);
        return;
    }
    
    if (!confirm(`Generate transcripts for ${filtered.length} students in ${block.replace('_', ' ')}?`)) {
        return;
    }
    
    // Select all filtered students in mass panel
    const massCheckboxes = document.querySelectorAll('.mass-student-checkbox');
    massCheckboxes.forEach(cb => {
        const admission = cb.dataset.admission;
        const student = window._studentDataCache?.[admission];
        if (student && student.block === block) {
            cb.checked = true;
        }
    });
    
    // Switch to mass tab and generate
    switchTranscriptTab('mass');
    setTimeout(() => generateMassTranscripts(), 300);
}

// ===== GENERATE TRANSCRIPTS FOR BLOCK 0 TO CURRENT =====
function generateProgressiveTranscripts() {
    const blocks = ['BLOCK_0', 'BLOCK_1', 'BLOCK_2', 'BLOCK_3', 'BLOCK_4', 'BLOCK_5'];
    const students = window._studentList || [];
    
    // Find the highest block with data
    let highestBlock = 'BLOCK_0';
    for (const block of blocks) {
        const hasStudents = students.some(s => s.block === block && s.subjectCount > 0);
        if (hasStudents) highestBlock = block;
    }
    
    const blockIndex = blocks.indexOf(highestBlock);
    const selectedBlocks = blocks.slice(0, blockIndex + 1);
    
    const studentsInBlocks = students.filter(s => selectedBlocks.includes(s.block) && s.subjectCount > 0);
    
    if (studentsInBlocks.length === 0) {
        showNotification('No students found with data in any block', true);
        return;
    }
    
    if (!confirm(`Generate transcripts for ${studentsInBlocks.length} students from BLOCK_0 to ${highestBlock}?`)) {
        return;
    }
    
    // Select students in mass panel
    const massCheckboxes = document.querySelectorAll('.mass-student-checkbox');
    const studentAdmissions = new Set(studentsInBlocks.map(s => s.admission));
    massCheckboxes.forEach(cb => {
        if (studentAdmissions.has(cb.dataset.admission)) {
            cb.checked = true;
        }
    });
    
    // Switch to mass tab and generate
    switchTranscriptTab('mass');

    let menuHtml=''; 
    if(isAdmin){ 
      menuHtml=`<div class="admin-menu-grid">
        <button class="menu-btn btn-primary" id="marksBtn"><i class="fas fa-pen-alt"></i> Internal Marks</button>
        <button class="menu-btn btn-info" id="nckBtn"><i class="fas fa-file-medical"></i> NCK Scores</button>
        <button class="menu-btn btn-success" id="dashboardBtn"><i class="fas fa-chart-line"></i> Analytics</button>
        <button class="menu-btn btn-warning" id="studentsBtn"><i class="fas fa-user-graduate"></i> Students</button>
        <button class="menu-btn btn-danger" id="lecturersBtn"><i class="fas fa-chalkboard-user"></i> Lecturers</button>
        <button class="menu-btn btn-export" id="unitsBtn"><i class="fas fa-book-open"></i> Units</button>
        <button class="menu-btn btn-secondary" id="reportsBtn"><i class="fas fa-download"></i> Reports</button>
        <button class="menu-btn btn-lock" id="entryControlBtn"><i class="fas fa-lock"></i> Entry Control</button>
        <button class="menu-btn" style="background:linear-gradient(135deg,#f59e0b,#d97706);color:white;" id="importMarksBtn"><i class="fas fa-file-import"></i> Import Marks</button>
      </div>`; 
    } else { 
      menuHtml=`<div class="menu-grid">
        <button class="menu-btn btn-primary" id="lecturerMarksBtn"><i class="fas fa-pen-alt"></i> My Subjects</button>
        <button class="menu-btn btn-info" id="lecturerNckBtn"><i class="fas fa-file-medical"></i> NCK Scores</button>
        <button class="menu-btn btn-success" id="lecturerDashboardBtn"><i class="fas fa-chart-simple"></i> My Analytics</button>
        <button class="menu-btn btn-export" id="lecturerReportsBtn"><i class="fas fa-download"></i> Reports</button>
      </div>`; 
    } 
    const contentHtml = `<div class="container"><div class="header"><h1><i class="fas fa-hospital-user"></i> Nakuru College of Health Sciences</h1><p style="margin-top:8px;">${currentUser.name} (${currentUser.role}) | March ${currentYear} Class | Pass Mark: 60%</p></div><div class="user-info"><span><i class="fas fa-user-circle"></i> Welcome, ${currentUser.name}</span><div><button onclick="toggleDarkMode()" class="menu-btn btn-dark" style="padding:8px 20px;margin-right:12px;"><i class="fas fa-moon"></i> Dark Mode</button><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div>${statsHtml}${menuHtml}<div id="contentArea"></div></div>`;
    renderWithSidebar(contentHtml);
    if(isAdmin){ 
      document.getElementById('marksBtn')?.addEventListener('click', () => showAdminMarks()); 
      document.getElementById('nckBtn')?.addEventListener('click', () => showNCKMarks()); 
      document.getElementById('dashboardBtn')?.addEventListener('click', () => showComprehensiveAnalytics()); 
      document.getElementById('studentsBtn')?.addEventListener('click', () => showStudents()); 
      document.getElementById('lecturersBtn')?.addEventListener('click', () => showLecturers()); 
      document.getElementById('unitsBtn')?.addEventListener('click', () => showUnits()); 
      document.getElementById('reportsBtn')?.addEventListener('click', () => showFullReports());

  window.changeYear = function() { 
    const newYear = document.getElementById('yearSelectMain').value;
    if (newYear !== currentYear) {
      currentYear = newYear; 
      localStorage.setItem('selectedYear', currentYear);
      configCache = null;
      showMain();
      showNotification(`📅 Switched to March ${currentYear} Class`, false);
    }
  };  
  window.changeExamType=function(){ currentExamType=document.getElementById('examTypeSelect').value; localStorage.setItem('selectedExamType',currentExamType); showMain(); };
  
  function updateContentArea(html) {
    const contentArea = document.getElementById('contentArea');
    if(contentArea) {
      contentArea.innerHTML = html;
    } else {
      const dynamicContent = document.getElementById('dynamicContent');
      if(dynamicContent) {
        dynamicContent.innerHTML = `<div class="container">${html}</div>`;
      }
    }
  }
// ===== REFRESH FUNCTION (MANUAL ONLY) =====
async function refreshAllData() {
    console.log('🔄 Refreshing data from server...');
    showLoading('Refreshing data...');
    configCache = null;
    currentAdminMarks = null;
    currentMarksData = null;
    currentNCKMarks = null;
    try {
        if (window.currentAdminBlock && window.currentAdminSubject) {
            await loadAdminMarks(window.currentAdminBlock, window.currentAdminSubject, window.currentAdminAssessmentType);
        } else if (currentUser?.role === 'lecturer') {
            await showLecturerSubjects();
        } else if (document.getElementById('nckSheetSelect')) {
            await loadNCKMarks();
        } else if (document.getElementById('studentSelectForReport')) {
            await showTranscriptsPage();
        } else {
            await showMain();
        }
    } catch(e) {
        console.log('View reload error:', e);
        await showMain();
    }
    hideLoading();
    showNotification('✅ Data refreshed from server!', false);
}

// Ctrl+R shortcut
document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'r') {
        if (document.getElementById('app')) {
            e.preventDefault();
            refreshAllData();
            showNotification('🔄 Refreshing data...', false);
        }
    }
});

// Add refresh button
function addGlobalRefreshButton() {
    const existing = document.querySelector('.global-refresh-btn');
    if (existing) existing.remove();
    const refreshBtn = document.createElement('button');
    refreshBtn.className = 'menu-btn btn-info global-refresh-btn';
    refreshBtn.style.cssText = 'padding:6px 12px;border:none;border-radius:40px;color:white;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#3b82f6,#2563eb);margin-left:10px;font-size:11px;';
    refreshBtn.innerHTML = '<i class="fas fa-sync-alt"></i> Refresh';
    refreshBtn.onclick = refreshAllData;
    const userInfo = document.querySelector('.user-info');
    if (userInfo) {
        const div = userInfo.querySelector('div');
        if (div) {
            div.appendChild(refreshBtn);
        }
    }
    const adminMenu = document.querySelector('.admin-menu-grid');
    if (adminMenu && !adminMenu.querySelector('.refresh-btn')) {
        const btn = document.createElement('button');
        btn.className = 'menu-btn btn-info refresh-btn';
        btn.style.cssText = 'background:linear-gradient(135deg,#3b82f6,#2563eb);padding:10px;border:none;border-radius:16px;color:white;font-weight:600;cursor:pointer;';
        btn.innerHTML = '<i class="fas fa-sync-alt"></i> Refresh All';
        btn.onclick = refreshAllData;
        adminMenu.appendChild(btn);
    }
}
setTimeout(addGlobalRefreshButton, 1000);
