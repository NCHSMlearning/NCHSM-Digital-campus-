    .save-btn, .export-btn, .edit-btn, .delete-btn, .back-btn { padding: 8px 16px; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; }

    .login-container button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .lecturer-card, .unit-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; box-shadow: var(--shadow); }

<body>
<div id="app"></div>

<script>
  // ======================= ORIGINAL CODE - 100% PRESERVED =======================
  const API_BASE_URL = 'https://nchsm-marks-proxy.onrender.com';
  const INTAKE_YEARS = ['2024', '2025', '2026'];
  
  let currentUser = null;
  let currentYear = '2026';
  let currentExamType = 'internal';
  let configCache = null;
  let currentMarksData = null, currentMarksBlock = null, currentMarksSubject = null, currentAssessmentType = null;
  let currentAdminMarks = null, currentAdminAssessmentType = null, currentAdminBlock = null, currentAdminSubject = null;
  let currentNCKMarks = null, currentNCKSheet = null;
  let fastEntryVisible = false;
  let autoSaveInterval = null;
  let unsavedChanges = false;
  
  function showLoading(msg) { let l=document.querySelector('.loader'); if(l) l.remove(); l=document.createElement('div'); l.className='loader'; l.innerHTML=`<div class="spinner"></div><div class="loader-text">${msg||'Loading...'}</div>`; document.body.appendChild(l); }
  function hideLoading() { let l=document.querySelector('.loader'); if(l) l.remove(); }
  function showNotification(msg,isErr) { let t=document.createElement('div'); t.className='notification-toast'; if(isErr) t.classList.add('error'); t.innerHTML=`<i class="fas ${isErr?'fa-exclamation-circle':'fa-check-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }

  function exportToCSV(data, filename) {
    if (!data || data.length === 0) {
        showNotification('No data to export', true);
        return;
    }
    const headers = Object.keys(data[0]);
    let csv = headers.join(',') + '\n';
    data.forEach(row => {
        const values = headers.map(header => {
            let value = row[header] || '';
            if (typeof value === 'string' && (value.includes(',') || value.includes('"'))) {
                value = `"${value.replace(/"/g, '""')}"`;
            }
            return value;
        });
        csv += values.join(',') + '\n';
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `${filename || 'export'}_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
    showNotification(`✅ Exported ${data.length} records`, false);
  }

  async function apiCall(endpoint, opts = {}) { 
    try { 
        const headers = {
            'Content-Type': 'application/json',
            'X-Year': currentYear,
            'X-Exam-Type': currentExamType,
            'X-User-Role': currentUser?.role || '',
            'Cache-Control': 'no-cache, no-store, must-revalidate',
            'Pragma': 'no-cache',
            'Expires': '0'
        }; 
        if (opts.headers) Object.assign(headers, opts.headers);
        const separator = endpoint.includes('?') ? '&' : '?';
        const url = API_BASE_URL + endpoint + separator + '_t=' + Date.now();
        const res = await fetch(url, { headers, ...opts }); 
        if (!res.ok){
            const errorData = await res.json().catch(() => ({ message: `HTTP ${res.status}` }));
            return { success: false, message: errorData.message };
        }
        const ct = res.headers.get('content-type'); 
        if (ct && ct.includes('application/json')) return await res.json(); 
        return { error: 'Non-JSON response' }; 
    } catch(e){ 
        console.error('❌ API Error:', e); 
        return { success: false, error: e.message }; 
    } 
  }

  async function getConfig(forceRefresh = false) { 
    if (forceRefresh || !configCache) {
        configCache = await apiCall('/api/units', {});
    }
    return configCache; 
  }

  async function refreshConfig() {
    configCache = null;
    return await getConfig(true);
  }

  async function refreshAllData() {
    console.log('🔄 Refreshing all data from server...');
    showLoading('Refreshing data...');
    configCache = null;
    currentAdminMarks = null;
    currentMarksData = null;
    currentNCKMarks = null;
    const stats = await apiCall('/api/stats', {});
    console.log('📊 Stats refreshed:', stats);
    if (window.currentAdminBlock && window.currentAdminSubject) {
        await loadAdminMarks(
            window.currentAdminBlock,
            window.currentAdminSubject,
            window.currentAdminAssessmentType
        );
    } else if (currentUser?.role === 'lecturer') {
        await showLecturerSubjects();
    } else if (document.getElementById('nckSheetSelect')) {
        await loadNCKMarks();
    } else {
        await showMain();
    }
    hideLoading();
    showNotification('✅ Data refreshed from server!', false);
  }

  function addGlobalRefreshButton() {
    const existing = document.querySelector('.global-refresh-btn');
    if (existing) existing.remove();
    const refreshBtn = document.createElement('button');
    refreshBtn.className = 'menu-btn btn-info global-refresh-btn';
    refreshBtn.style.cssText = 'padding:6px 12px;border:none;border-radius:40px;color:white;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#3b82f6,#2563eb);margin-left:10px;font-size:11px;';
    refreshBtn.innerHTML = '<i class="fas fa-sync-alt"></i> Refresh';
    refreshBtn.onclick = refreshAllData;
    const userInfo = document.querySelector('.user-info');
    if (userInfo) {
        const div = userInfo.querySelector('div');
        if (div) {
            div.appendChild(refreshBtn);
        }
    }
    const adminMenu = document.querySelector('.admin-menu-grid');
    if (adminMenu && !adminMenu.querySelector('.refresh-btn')) {
        const btn = document.createElement('button');
        btn.className = 'menu-btn btn-info refresh-btn';
        btn.style.cssText = 'background:linear-gradient(135deg,#3b82f6,#2563eb);padding:10px;border:none;border-radius:16px;color:white;font-weight:600;cursor:pointer;';
        btn.innerHTML = '<i class="fas fa-sync-alt"></i> Refresh All';
        btn.onclick = refreshAllData;
        adminMenu.appendChild(btn);
    }
  }

  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'r') {
        if (document.getElementById('app')) {
            e.preventDefault();
            refreshAllData();
            showNotification('🔄 Refreshing data...', false);
        }
    }
  });

  setTimeout(addGlobalRefreshButton, 1000);

  const originalRenderWithSidebar = window.renderWithSidebar;

  // ======================= IMPORT MARKS FROM CSV =======================
  window.importMarks = function() {
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = '.csv';
    fileInput.style.display = 'none';
    document.body.appendChild(fileInput);
    
    fileInput.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async function(event) {
            try {
                let csvText = event.target.result;
                if (csvText.charCodeAt(0) === 0xFEFF) csvText = csvText.slice(1);
                const lines = csvText.split(/\r?\n/).filter(line => line.trim());
                if (lines.length < 2) {
                    showNotification('CSV file is empty or invalid', true);
                    return;
                }
                const headers = parseCSVLine(lines[0]);
                const sampleRow = parseCSVLine(lines[1]);
                const detection = detectColumns(headers, sampleRow);
                
                let detectedInfo = '';
                if (detection.detectedType === 'cat_only') {
                    detectedInfo = '🔍 Detected: Only CAT 1 scores (no exam yet)';
                } else if (detection.detectedType === 'full') {
                    detectedInfo = '🔍 Detected: Full format (CAT1 + CAT2 + Exam)';
                } else if (detection.detectedType === 'single_cat') {
                    detectedInfo = '🔍 Detected: Single CAT + Exam';
                } else if (detection.detectedType === 'exam_only') {
                    detectedInfo = '🔍 Detected: Exam only';
                } else if (detection.detectedType === 'cats_only') {
                    detectedInfo = '🔍 Detected: CAT1 + CAT2 only (no exam)';
                }
                
                let autoSubject = '';
                if (detection.subjectIdx !== -1 && sampleRow) {
                    const subjectValue = sampleRow[detection.subjectIdx]?.trim() || '';
                    if (subjectValue && isNaN(parseFloat(subjectValue))) {
                        autoSubject = subjectValue;
                    }
                }
                
                const importData = [];
                for (let i = 1; i < lines.length; i++) {
                    const values = parseCSVLine(lines[i]);
                    if (values.length < 2 || !values[detection.nameIdx]?.trim() || !values[detection.admissionIdx]?.trim()) {
                        continue;
                    }
                    const name = values[detection.nameIdx]?.trim() || '';
                    const admission = values[detection.admissionIdx]?.trim() || '';
                    let cat1 = 0, cat2 = 0, exam = 0;
                    if (detection.cat1Idx !== -1) {
                        const val = parseFloat(values[detection.cat1Idx]);
                        cat1 = !isNaN(val) ? val : 0;
                    }
                    if (detection.cat2Idx !== -1) {
                        const val = parseFloat(values[detection.cat2Idx]);
                        cat2 = !isNaN(val) ? val : 0;
                    }
                    if (detection.examIdx !== -1 && detection.hasValidExamScores) {
                        const val = parseFloat(values[detection.examIdx]);
                        exam = !isNaN(val) ? val : 0;
                    }
                    importData.push({
                        name: name,
                        admission: admission,
                        cat1: cat1,
                        cat2: cat2,
                        exam: exam,
                        total: 0,
                        grade: '',
                        block: '',
                        subject: autoSubject
                    });
                }
                if (importData.length === 0) {
                    showNotification('No valid data rows found in CSV', true);
                    return;
                }
                showEnhancedImportPreview(importData, detection.detectedType, detectedInfo, autoSubject, detection);
            } catch (err) {
                console.error('Import error:', err);
                showNotification('Error parsing CSV: ' + err.message, true);
            }
        };
        reader.readAsText(file);
        document.body.removeChild(fileInput);
    };
    fileInput.click();
  };

  function parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
            if (inQuotes && line[i + 1] === '"') {
                current += '"';
                i++;
            } else {
                inQuotes = !inQuotes;
            }
        } else if (char === ',' && !inQuotes) {
            result.push(current.trim());
            current = '';
        } else {
            current += char;
        }
    }
    result.push(current.trim());
    return result;
  }

  function findColumnIndex(headers, keywords) {
    for (let i = 0; i < headers.length; i++) {
        const header = headers[i].toLowerCase().trim();
        for (const keyword of keywords) {
            if (header.includes(keyword.toLowerCase())) {
                return i;
            }
        }
    }
    return -1;
  }

  function detectColumns(headers, sampleRow) {
    const headerLower = headers.map(h => h.toLowerCase().trim());
    const result = {
        admissionIdx: -1,
        nameIdx: -1,
        cat1Idx: -1,
        cat2Idx: -1,
        examIdx: -1,
        totalIdx: -1,
        gradeIdx: -1,
        subjectIdx: -1,
        hasValidExamScores: false,
        detectedType: 'unknown'
    };
    for (let i = 0; i < headers.length; i++) {
        const h = headerLower[i];
        if (h.includes('admission') || h.includes('registration') || h.includes('reg no') || h === 'student id') {
            result.admissionIdx = i;
        }
        if (h.includes('student name') || h.includes('full name') || h === 'name' || h === 'student') {
            result.nameIdx = i;
        }
    }
    for (let i = 0; i < headers.length; i++) {
        const h = headerLower[i];
        if (h === 'cat 1' || h === 'cat1' || h.includes('cat 1 score')) {
            if (result.cat1Idx === -1) result.cat1Idx = i;
        }
        if (h === 'cat 2' || h === 'cat2' || h.includes('cat 2 score')) {
            result.cat2Idx = i;
        }
    }
    let possibleExamIdx = -1;
    for (let i = 0; i < headers.length; i++) {
        const h = headerLower[i];
        if (h.includes('exam score') || h.includes('exam marks') || h.includes('final exam')) {
            possibleExamIdx = i;
            break;
        }
        if (h === 'exam' || (h.includes('exam') && possibleExamIdx === -1)) {
            possibleExamIdx = i;
        }
    }
    if (possibleExamIdx !== -1 && sampleRow && sampleRow[possibleExamIdx]) {
        const examValue = sampleRow[possibleExamIdx].trim();
        if (!isNaN(parseFloat(examValue)) && examValue !== '--' && examValue !== '') {
            result.examIdx = possibleExamIdx;
            result.hasValidExamScores = true;
        }
    }
    if (possibleExamIdx !== -1 && sampleRow) {
        const examValue = sampleRow[possibleExamIdx].trim();
        if (isNaN(parseFloat(examValue)) || examValue === '--') {
            result.subjectIdx = possibleExamIdx;
        }
    }
    for (let i = 0; i < headers.length; i++) {
        const h = headerLower[i];
        if (h.includes('total') || h.includes('total score')) {
            result.totalIdx = i;
        }
        if (h.includes('grade') || h.includes('status')) {
            result.gradeIdx = i;
        }
    }
    const hasCat1 = result.cat1Idx !== -1;
    const hasCat2 = result.cat2Idx !== -1;
    const hasValidExam = result.hasValidExamScores;
    if (hasCat1 && hasCat2 && hasValidExam) {
        result.detectedType = 'full';
    } else if (hasCat1 && hasValidExam) {
        result.detectedType = 'single_cat';
    } else if (hasCat1 && hasCat2) {
        result.detectedType = 'cats_only';
    } else if (hasValidExam) {
        result.detectedType = 'exam_only';
    } else if (hasCat1) {
        result.detectedType = 'cat_only';
    }
    return result;
  }

  window.confirmEnhancedImport = async function() {
    const checkedBoxes = document.querySelectorAll('.import-row-checkbox:checked');
    if (checkedBoxes.length === 0) {
        showNotification('Please select at least one record to import', true);
        return;
    }
    const block = document.getElementById('importBlockSelect')?.value || 'BLOCK_0';
    const subject = document.getElementById('importSubjectName')?.value.trim().toUpperCase();
    const examType = document.getElementById('importExamType')?.value || 'full';
    if (!subject) {
        showNotification('Please enter a subject name', true);
        return;
    }
    if (!confirm(`Import ${checkedBoxes.length} records to ${block} - ${subject} (${examType})?`)) {
        return;
    }
    showLoading(`Importing ${checkedBoxes.length} records...`);
    try {
        let existingMarks = [];
        try {
            const response = await apiCall(`/api/marks/${encodeURIComponent(block)}/${encodeURIComponent(subject)}`, {});
            if (response && !response.error && Array.isArray(response)) {
                existingMarks = response;
            }
        } catch (e) {
            console.log('No existing data, starting fresh');
        }
        const existingMap = {};
        existingMarks.forEach(m => { existingMap[m.admission] = true; });
        let maxRow = 1;
        existingMarks.forEach(m => { if (m.row && m.row > maxRow) maxRow = m.row; });
        let rowCounter = maxRow + 1;
        const marksData = [];
        let skipped = 0, invalidCount = 0;
        const detection = window._detection || { cat1Idx: -1, cat2Idx: -1, hasValidExamScores: false };
        checkedBoxes.forEach(cb => {
            const idx = parseInt(cb.dataset.idx);
            const row = window._importData[idx];
            if (!row) return;
            if (existingMap[row.admission]) { skipped++; return; }
            let cat1 = row.cat1 || 0, cat2 = row.cat2 || 0, exam = row.exam || 0;
            if (examType === 'cat_only') { cat2 = 0; exam = 0; }
            if (examType === 'cats_only') { exam = 0; }
            if (examType === 'exam_only') { cat1 = 0; cat2 = 0; }
            if (cat1 === 0 && cat2 === 0 && exam === 0) { invalidCount++; return; }
            marksData.push({ row: rowCounter++, admission: row.admission, name: row.name, cat1: cat1, cat2: cat2, exam: exam, gradedBy: currentUser?.name || 'System Import' });
        });
        if (marksData.length === 0) {
            hideLoading();
            let msg = 'No valid records to import';
            if (skipped > 0) msg += ` (${skipped} already exist)`;
            if (invalidCount > 0) msg += ` (${invalidCount} have no scores)`;
            showNotification(msg, true);
            return;
        }
        const result = await apiCall('/api/marks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Year': currentYear, 'X-Exam-Type': 'internal', 'X-User-Role': currentUser?.role || 'admin' },
            body: JSON.stringify({ block: block, subject: subject, marksData: marksData, lecturerName: currentUser?.name || 'System Import', examType: 'internal', userRole: currentUser?.role || 'admin' })
        });
        hideLoading();
        if (result && result.success) {
            let msg = `✅ Imported ${marksData.length} records to ${block} - ${subject}`;
            if (skipped > 0) msg += ` (${skipped} skipped - already exist)`;
            if (invalidCount > 0) msg += ` (${invalidCount} had no scores)`;
            showNotification(msg, false);
            const modal = document.querySelector('.modal');
            if (modal) modal.remove();
            setTimeout(() => {
                if (typeof loadAdminMarks === 'function') {
                    loadAdminMarks(block, subject, examType);
                } else if (typeof loadMarksForSubject === 'function') {
                    loadMarksForSubject(block, subject, examType);
                } else {
                    showMain();
                }
            }, 500);
        } else {
            const errorMsg = result?.message || result?.error || 'Unknown error';
            console.error('❌ Import failed:', errorMsg);
            showNotification(`Import failed: ${errorMsg}`, true);
        }
    } catch (err) {
        hideLoading();
        console.error('❌ Import error:', err);
        showNotification('Import error: ' + err.message, true);
    }
  };

  window.exportMarksForImport = function(marks, block, subject, examType) {
    if (!marks || marks.length === 0) {
        showNotification('No data to export', true);
        return;
    }
    const headers = ['Admission Number', 'Student Name', 'CAT 1', 'CAT 2', 'Exam Score', 'Total', 'Grade', 'Block', 'Subject'];
    let csv = headers.join(',') + '\n';
    const isFull = examType === 'full';
    const isSingleCat = examType === 'single_cat';
    const isExamOnly = examType === 'exam_only';
    marks.forEach(m => {
        const cat1 = m.cat1 || 0;
        const cat2 = m.cat2 || 0;
        const exam = m.exam || 0;
        let total = 0;
        if (isFull) {
            total = Math.round(((Math.min(cat1,30) + Math.min(cat2,30)) / 60 * 30 + Math.min(exam,70)) * 10) / 10;
        } else if (isSingleCat) {
            total = Math.round((Math.min(cat1,30) + Math.min(exam,70)) * 10) / 10;
        } else {
            total = Math.round(Math.min(exam,100) * 10) / 10;
        }
        const grade = total >= 60 ? 'PASS' : (total > 0 ? 'FAIL' : 'PENDING');
        const row = [
            `"${m.admission}"`,
            `"${m.name}"`,
            cat1,
            isExamOnly ? '' : cat2,
            exam,
            total,
            `"${grade}"`,
            `"${block}"`,
            `"${subject}"`
        ];
        csv += row.join(',') + '\n';
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `${subject}_${block}_marks_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
    URL.revokeObjectURL(link.href);
    showNotification(`✅ Exported ${marks.length} records for ${subject}`, false);
  };

  window.confirmImport = async function() {
    const checkedBoxes = document.querySelectorAll('.import-row-checkbox:checked');
    if (checkedBoxes.length === 0) {
        showNotification('Please select at least one record to import', true);
        return;
    }
    const block = document.getElementById('importBlockSelect')?.value || 'BLOCK_0';
    const subject = document.getElementById('importSubjectName')?.value.trim();
    const examType = document.getElementById('importExamType')?.value || 'full';
    if (!subject) {
        showNotification('Please enter a subject name', true);
        return;
    }
    if (!confirm(`Import ${checkedBoxes.length} records to ${block} - ${subject} (${examType})?`)) {
        return;
    }
    showLoading(`Importing ${checkedBoxes.length} records...`);
    try {
        const existingMarks = await apiCall(`/api/marks/${block}/${encodeURIComponent(subject)}`, {});
        const existingMap = {};
        if (existingMarks) {
            existingMarks.forEach(m => { existingMap[m.admission] = true; });
        }
        const importData = [];
        let skipped = 0, imported = 0;
        checkedBoxes.forEach(cb => {
            const idx = parseInt(cb.dataset.idx);
            const row = window._importData[idx];
            if (!row) return;
            if (existingMap[row.admission]) { skipped++; return; }
            importData.push({ row: importData.length + 2, admission: row.admission, name: row.name, cat1: row.cat1 || 0, cat2: row.cat2 || 0, exam: row.exam || 0 });
            imported++;
        });
        if (importData.length === 0) {
            hideLoading();
            if (skipped > 0) {
                showNotification(`All ${skipped} records already exist in this subject`, true);
            } else {
                showNotification('No valid records to import', true);
            }
            return;
        }
        const result = await apiCall('/api/marks', {
            method: 'POST',
            body: JSON.stringify({ block: block, subject: subject, marksData: importData, lecturerName: currentUser?.name || 'System Import', examType: 'internal', userRole: currentUser?.role || 'admin' })
        });
        hideLoading();
        if (result.success) {
            let msg = `✅ Imported ${importData.length} records to ${block} - ${subject}`;
            if (skipped > 0) msg += ` (${skipped} skipped - already exist)`;
            showNotification(msg, false);
            const modal = document.querySelector('.modal');
            if (modal) modal.remove();
            if (currentTab === 'marks') showAdminMarks();
            else if (currentTab === 'nck') loadNCKMarks();
        } else {
            showNotification('Import failed: ' + (result.message || 'Unknown error'), true);
        }
    } catch (err) {
        hideLoading();
        showNotification('Import error: ' + err.message, true);
    }
  };

  // ===== ENHANCED: Generate and download PDF with fallbacks =====
  async function generateAndDownloadPDF(reportType, data) {
    showLoading('Generating PDF report...');
    
    if (typeof html2pdf === 'undefined') {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
        await new Promise((resolve) => { script.onload = resolve; document.head.appendChild(script); });
    }
    
    let content = '';
    let filename = '';
    
    switch(reportType) {
        case 'class_performance':
            content = generateClassPerformanceHTML(data);
            filename = `class_performance_report_${data.currentYear}.pdf`;
            break;
        case 'subject_analysis':
            content = generateSubjectAnalysisHTML(data);
            filename = `subject_analysis_report_${data.currentYear}.pdf`;
            break;
        case 'clinical_report':
            content = generateClinicalReportHTML(data);
            filename = `clinical_performance_report_${data.currentYear}.pdf`;
            break;
        case 'honor_roll':
            content = generateHonorRollHTML(data);
            filename = `honor_roll_${data.currentYear}.pdf`;
            break;
        case 'intervention_list':
            content = generateInterventionListHTML(data);
            filename = `intervention_list_${data.currentYear}.pdf`;
            break;
        default:
            content = generateClassPerformanceHTML(data);
            filename = `report_${data.currentYear}.pdf`;
    }
    
    const element = document.createElement('div');
    element.innerHTML = content;
    document.body.appendChild(element);
    
    const opt = {
        margin: [0.5, 0.5, 0.5, 0.5],
        filename: filename,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, letterRendering: true, useCORS: true },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    };
    
    html2pdf().set(opt).from(element).save().then(() => {
        document.body.removeChild(element);
        hideLoading();
        showNotification('PDF report generated successfully!', false);
    }).catch(err => {
        document.body.removeChild(element);
        hideLoading();
        showNotification('Error generating PDF: ' + err.message, true);
    });
  }

  async function loadNCKMarks() { 
    const sheetName = document.getElementById('nckSheetSelect').value; 
    showLoading(`Loading ${sheetName}...`); 
    const marks = await apiCall(`/api/marks/BLOCK_0/${encodeURIComponent(sheetName)}`, {}); 
    if (sheetName === 'NCK_XY_FORMS') { 
      displayXYFormsMarks(marks); 
    } else if (sheetName === 'NCK_ASSESSMENT_AND_CASE') {
      displayAssessmentMarks(marks); 
    } else {
      if (sheetName === 'XY FORMS') displayXYFormsMarks(marks);
      else displayAssessmentMarks(marks);
    }
    hideLoading(); 
  }

  function displayXYFormsMarks(marks) { 
    if(!marks||marks.length===0){ 
      document.getElementById('nckMarksContainer').innerHTML='<div class="card" style="text-align:center;">No data found.</div>'; 
      return; 
    } 
    const areaGroups = [
      {name:'🏥 MEDICAL', areas:['MED1','MED2','MED3']},
      {name:'🤰 MCH', areas:['MCH1','MCH2','MCH3']},
      {name:'🤱 MATERNITY', areas:['MAT1','MAT2','MAT3']},
      {name:'👶 PAEDIATRICS', areas:['PEAD1','PEAD2']},
      {name:'🔪 SURGERY', areas:['SURG1','SURG2','SURG3']},
      {name:'🚑 OTHER', areas:['OPD','NBU1','NBU2','THEATRE','PSYCHIATRY','RURALS','DISTRICT','SPECIAL']}
    ]; 
    let html = `<div style="margin-bottom:15px;padding:12px;background:linear-gradient(135deg,#667eea20,#764ba220);border-radius:12px;">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
        <strong><i class="fas fa-bolt"></i> Quick Actions:</strong>
        <button class="save-btn" onclick="openFastEntryPanel()" style="padding:5px 12px;background:#8b5cf6;"><i class="fas fa-bolt"></i> Fast Entry Mode (Saves to DB instantly)</button>
        ${currentUser.role==='admin'?`<button class="save-btn" onclick="showNCKColumnManagerWithClass()" style="padding:5px 12px;background:#ef4444;"><i class="fas fa-columns"></i> Manage Columns</button>`:''}
      </div>
      <div style="font-size:12px;color:#666;margin-top:8px;">
        <i class="fas fa-info-circle"></i> Tip: Click on student name to edit all marks in popup
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table style="min-width:1200px;">
        <thead>
          <tr style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;">
            <th style="position:sticky;left:0;background:#667eea;">#</th>
            <th style="position:sticky;left:60px;background:#667eea;">Student Name</th>`;
    for(let group of areaGroups){ 
      html += `<th colspan="${group.areas.length}" style="text-align:center;">${group.name}</th>`; 
    } 
    html += `<th>Avg</th><th>Status</th><th>Graded By</th>
             </tr>
        </thead>
        <tbody>`;
    currentNCKMarks = marks; 
    for(let i = 0; i < marks.length; i++){ 
      const m = marks[i]; 
      let scores = m.scores || []; 
      while(scores.length < 22) scores.push(0); 
      const validScores = scores.filter(s => s > 0); 
      let avg = validScores.length ? validScores.reduce((a,b) => a+b, 0) / validScores.length : (m.final || 0); 
      const status = avg >= 60 ? 'PASS' : (validScores.length ? 'FAIL' : 'PENDING'); 
      const rowClass = status === 'PASS' ? 'pass-row' : (status === 'FAIL' ? 'fail-row' : 'pending-row');
      const safeName = (m.name || 'Unnamed').replace(/'/g, "\\'");
      html += `<tr class="${rowClass}">
        <td style="position:sticky;left:0;background:white;font-weight:500;">${i+1}</td>
        <td style="position:sticky;left:60px;background:white;font-weight:500;cursor:pointer;color:#6366f1;text-decoration:underline;" 
            onclick="openXYEditModal(${i}, '${safeName}')">
          ${m.name || 'Unnamed'} <i class="fas fa-edit" style="font-size:10px;"></i>
        </td>`;
      let scoreIdx = 0; 
      for(let group of areaGroups){ 
        for(let area of group.areas){ 
          const score = scores[scoreIdx] || 0; 
          const scoreStyle = score > 0 ? 'background:#d1fae5;' : 'background:#fff3e0;';
          html += `<td style="padding:4px;">
            <input type="number" id="xy_${i}_${scoreIdx}" value="${score}" min="0" max="100" step="0.5" 
                   style="width:55px;padding:4px;border-radius:6px;text-align:center;${scoreStyle}" 
                   onchange="updateXYAverage(${i})">
            </td>`;
          scoreIdx++; 
        } 
      } 
      html += `<td id="xyAvg_${i}" style="font-weight:bold;text-align:center;background:${avg>=60?'#d1fae5':'#fee2e2'};">${avg.toFixed(2)}</td>
        <td id="xyStatus_${i}" style="text-align:center;"><span class="badge ${status === 'PASS' ? 'badge-pass' : (status === 'FAIL' ? 'badge-fail' : 'badge-pending')}">${status}</span></td>
        <td style="padding:4px;"><input type="text" id="xyGraded_${i}" value="${m.gradedBy || ''}" placeholder="Lecturer" style="width:80px;padding:4px;border-radius:6px;"></td>
       </tr>`; 
    } 
    html += `</tbody>
      </table>
    </div>
    <div style="text-align:center;margin-top:20px;">
      <button class="save-btn" onclick="saveNCKMarks()"><i class="fas fa-save"></i> Save All NCK Marks</button>
    </div>`; 
    document.getElementById('nckMarksContainer').innerHTML = html; 
    if(fastEntryVisible) closeFastEntryModal(); 
  }

  function displayAssessmentMarks(marks) {
    if (!marks || marks.length === 0) { 
      document.getElementById('nckMarksContainer').innerHTML = '<div class="card" style="text-align:center;">No assessment data found.</div>'; 
      return; 
    }
    const columnCount = 12;
    let assessmentNames = [
      'ANC WARD', 'IMMUNIZATION ASSESSMENTT', 'NURSING CARE', 'PSYCHIATRY ASSESSMENT',
      'NBU ASSESSMENT', 'MIDWIFERY ASSESSMENT', 'WARD MANAGEMENT', 'MCH/FP CLINIC',
      'PSYCHIATRY CASE STUDY', 'GENERAL NURSING CASE STUDY', 'MIDWIFERY CASE STUDY', 'COMMUNITY DIAGNOSIS'
    ];
    localStorage.setItem(`assessmentColumnNames_${currentYear}`, JSON.stringify(assessmentNames));
    let columnHeaders = ''; 
    for (let i = 0; i < columnCount; i++) { 
      columnHeaders += `<th>${assessmentNames[i]}<br><span style="font-size:9px;font-weight:normal;">(0-100)</span></th>`; 
    }
    let html = `<div style="margin-bottom:15px;padding:12px;background:linear-gradient(135deg,#667eea20,#764ba220);border-radius:12px;">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
        <strong><i class="fas fa-bolt"></i> Quick Actions:</strong>
        ${currentUser.role==='admin'?`<button class="save-btn" onclick="showAssessmentColumnManagerWithClass()" style="padding:5px 12px;background:#ef4444;"><i class="fas fa-columns"></i> Manage Columns</button>`:''}
        <button class="save-btn" onclick="openFastAssessmentPanel()" style="padding:5px 12px;background:#8b5cf6;"><i class="fas fa-bolt"></i> Fast Entry Mode (Saves to DB instantly)</button>
      </div>
      <div style="font-size:12px;color:#666;margin-top:8px;">
        <i class="fas fa-info-circle"></i> Tip: Click on student name to edit marks
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table style="min-width:1300px;">
        <thead>
          <tr style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;">
            <th style="position:sticky;left:0;background:#667eea;">#</th>
            <th style="position:sticky;left:60px;background:#667eea;">Student Name</th>
            ${columnHeaders}
            <th style="background:#10b981;">Total</th>
            <th style="background:#f59e0b;">Average</th>
            <th>Status</th>
            <th>Graded By</th>
           </tr>
        </thead>
        <tbody>`;
    currentNCKMarks = marks;
    for (let i = 0; i < marks.length; i++) { 
      const m = marks[i]; 
      let scores = m.scores || []; 
      while (scores.length < columnCount) scores.push(0);
      scores = scores.slice(0, columnCount);
      const validScores = scores.filter(s => typeof s === 'number' && !isNaN(s) && s > 0);
      const total = validScores.reduce((a, b) => a + b, 0);
      const average = validScores.length > 0 ? (total / columnCount) : 0;
      const status = average >= 60 ? 'PASS' : (validScores.length > 0 ? 'FAIL' : 'PENDING');
      const rowClass = status === 'PASS' ? 'pass-row' : (status === 'FAIL' ? 'fail-row' : 'pending-row');
      let gradedBy = m.gradedBy || ''; 
      if (gradedBy && !isNaN(parseFloat(gradedBy)) && gradedBy.toString().includes('.')) gradedBy = ''; 
      const safeName = (m.name || 'Unnamed').replace(/'/g, "\\'");
      html += `<tr class="${rowClass}">
        <td style="position:sticky;left:0;background:white;font-weight:500;">${i+1}</td>
        <td style="position:sticky;left:60px;background:white;font-weight:500;cursor:pointer;color:#6366f1;text-decoration:underline;" 
            onclick="openAssessmentEditModal(${i}, '${safeName}')">
          ${m.name || 'Unnamed'} <i class="fas fa-edit" style="font-size:10px;"></i>
        </td>`;
      for (let c = 0; c < columnCount; c++) { 
        const score = scores[c]; 
        const hasScore = typeof score === 'number' && !isNaN(score) && score > 0;
        const scoreStyle = hasScore ? 'background:#d1fae5;' : 'background:#fff3e0;';
        const displayValue = hasScore ? score : '';
        html += `<td style="padding:4px;">
          <input type="number" id="ac_${i}_${c}" value="${displayValue}" min="0" max="100" step="0.5" 
                 style="width:70px;padding:6px;border-radius:8px;text-align:center;${scoreStyle}" placeholder="-" onchange="updateACTotal(${i})">
        </td>`; 
      } 
      html += `<td id="acTotal_${i}" style="font-weight:bold;text-align:center;background:#d1fae5;">${total}</td>
        <td id="acAverage_${i}" style="font-weight:bold;text-align:center;background:${average >= 60 ? '#d1fae5' : '#fee2e2'};">${average.toFixed(2)}%</td>
        <td id="acStatus_${i}" style="text-align:center;"><span class="badge ${status === 'PASS' ? 'badge-pass' : (status === 'FAIL' ? 'badge-fail' : 'badge-pending')}">${status}</span></td>
        <td style="padding:4px;"><input type="text" id="acGraded_${i}" value="${gradedBy}" placeholder="Lecturer" style="width:100px;padding:6px;border-radius:8px;"></td>
      </tr>`; 
    } 
    html += `</tbody>
      </table>
    </div>
    <div style="text-align:center;margin-top:20px;">
      <button class="save-btn" onclick="saveNCKMarks()"><i class="fas fa-save"></i> Save All NCK Marks</button>
    </div>`; 
    document.getElementById('nckMarksContainer').innerHTML = html; 
    if (fastEntryVisible) closeFastEntryModal(); 
  }

  window.updateXYAverage = function(idx) { 
    let scores=[]; 
    for(let c=0;c<22;c++){ 
      const val=parseFloat(document.getElementById(`xy_${idx}_${c}`)?.value); 
      if(!isNaN(val)&&val>0) scores.push(val); 
    } 
    const avg=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:0; 
    const status=avg>=60?'PASS':(scores.length?'FAIL':'PENDING'); 
    const avgEl = document.getElementById(`xyAvg_${idx}`);
    const statusEl = document.getElementById(`xyStatus_${idx}`);
    if(avgEl) avgEl.innerHTML=avg.toFixed(2); 
    if(statusEl) statusEl.innerHTML=`<span class="badge ${status==='PASS'?'badge-pass':'badge-fail'}">${status}</span>`; 
    const row=document.getElementById(`xy_${idx}_0`)?.parentElement?.parentElement; 
    if(row) row.className=status==='PASS'?'pass-row':(status==='FAIL'?'fail-row':'pending-row'); 
  };

  window.updateACTotal = function(idx) { 
    const columnCount = 12;
    let scores = [], hasAnyScore = false; 
    for (let c = 0; c < columnCount; c++) { 
      const input = document.getElementById(`ac_${idx}_${c}`); 
      if (input) { 
        const val = input.value; 
        if (val !== '' && !isNaN(parseFloat(val)) && parseFloat(val) > 0) { 
          scores.push(parseFloat(val)); 
          hasAnyScore = true; 
        } else { 
          scores.push(0); 
        } 
      } else { 
        scores.push(0); 
      } 
    } 
    const total = scores.reduce((a, b) => a + b, 0); 
    const average = hasAnyScore ? (total / columnCount).toFixed(2) : 0; 
    const status = average >= 60 ? 'PASS' : (hasAnyScore ? 'FAIL' : 'PENDING'); 
    const totalEl = document.getElementById(`acTotal_${idx}`);
    const avgEl = document.getElementById(`acAverage_${idx}`);
    const statusEl = document.getElementById(`acStatus_${idx}`);
    if(totalEl) totalEl.innerHTML = total; 
    if(avgEl) avgEl.innerHTML = average + '%'; 
    if(statusEl) statusEl.innerHTML = `<span class="badge ${status === 'PASS' ? 'badge-pass' : (status === 'FAIL' ? 'badge-fail' : 'badge-pending')}">${status}</span>`; 
    if(avgEl){ avgEl.style.background = average >= 60 ? '#d1fae5' : (hasAnyScore ? '#fee2e2' : '#fef3c7'); } 
    const row = document.getElementById(`ac_${idx}_0`)?.parentElement?.parentElement; 
    if(row) row.className = status === 'PASS' ? 'pass-row' : (status === 'FAIL' ? 'fail-row' : 'pending-row'); 
  };

  async function saveCurrentStudentToDB(studentIdx, sheetName, scores, gradedBy) {
    const studentName = currentNCKMarks[studentIdx]?.name || 'Unknown';
    const marksData = [{ 
        row: studentIdx + 2,
        name: studentName,
        scores: scores, 
        gradedBy: gradedBy,
        year: currentYear
    }];
    showLoading(`Saving ${studentName} to database...`);
    const result = await apiCall('/api/marks', {
        method: 'POST',
        body: JSON.stringify({ 
            block: 'BLOCK_0', 
            subject: sheetName, 
            marksData: marksData, 
            lecturerName: currentUser.name, 
            examType: 'nck', 
            userRole: currentUser?.role || 'admin'
        })
    });
    hideLoading();
    if (result && (result.success === true || result.message === 'NCK marks saved successfully')) {
        if (currentNCKMarks[studentIdx]) {
            currentNCKMarks[studentIdx].scores = scores;
            currentNCKMarks[studentIdx].gradedBy = gradedBy;
            currentNCKMarks[studentIdx].year = currentYear;
        }
        showNotification(`✅ ${studentName} saved to database!`, false);
        return true;
    } else { 
        showNotification(`Save failed: ${result?.message || result?.error || 'Unknown error'}`, true); 
        return false; 
    }
  }

  window.saveNCKMarks = async function() { 
    const sheetName = document.getElementById('nckSheetSelect').value; 
    if (!sheetName) {
      showNotification('No sheet selected', true);
      return;
    }
    let marksData = []; 
    if (sheetName === 'NCK_XY_FORMS' || sheetName === 'XY FORMS') { 
      const rows = document.querySelectorAll('#nckMarksContainer tbody tr'); 
      for (let i = 0; i < rows.length; i++) { 
        const nameCell = rows[i].querySelectorAll('td')[1];
        const studentName = nameCell?.innerText?.trim() || '';
        let scores = []; 
        for (let c = 0; c < 22; c++) { 
          const val = document.getElementById(`xy_${i}_${c}`)?.value;
          scores.push(val !== '' && !isNaN(parseFloat(val)) ? parseFloat(val) : 0); 
        } 
        const gradedBy = document.getElementById(`xyGraded_${i}`)?.value || currentUser.name;
        const admissionCell = rows[i].querySelector('td:first-child');
        const admission = admissionCell?.innerText?.trim() || '';
        marksData.push({ 
          row: i + 2,
          admission: admission,
          name: studentName,
          scores: scores, 
          gradedBy: gradedBy,
          year: currentYear
        }); 
      } 
    } else { 
      const columnCount = 12;
      const rows = document.querySelectorAll('#nckMarksContainer tbody tr'); 
      for (let i = 0; i < rows.length; i++) { 
        const nameCell = rows[i].querySelectorAll('td')[1];
        const studentName = nameCell?.innerText?.trim() || '';
        let scores = []; 
        for (let c = 0; c < columnCount; c++) { 
          const val = document.getElementById(`ac_${i}_${c}`)?.value; 
          const score = (val !== '' && !isNaN(parseFloat(val))) ? parseFloat(val) : 0; 
          scores.push(score); 
        } 
        const gradedBy = document.getElementById(`acGraded_${i}`)?.value || currentUser.name;
        const admissionCell = rows[i].querySelector('td:first-child');
        const admission = admissionCell?.innerText?.trim() || '';
        marksData.push({ 
          row: i + 2,
          admission: admission,
          name: studentName,
          scores: scores, 
          gradedBy: gradedBy,
          year: currentYear
        }); 
      } 
    } 
    if (marksData.length === 0) {
      showNotification('No marks to save', true);
      return;
    }
    showLoading('Saving NCK marks...'); 
    const payload = { 
      block: 'BLOCK_0', 
      subject: sheetName, 
      marksData: marksData, 
      lecturerName: currentUser.name, 
      examType: 'nck', 
      userRole: currentUser?.role || 'admin'
    };
    const result = await apiCall('/api/marks', { method: 'POST', body: JSON.stringify(payload) }); 
    hideLoading(); 
    if (result && (result.success === true || result.message === 'NCK marks saved successfully')) { 
      showNotification(`✅ NCK marks saved successfully! (${marksData.length} records)`, false);
      setTimeout(() => loadNCKMarks(), 500);
    } else { 
      console.error('❌ NCK save failed:', result);
      showNotification(result?.message || result?.error || 'Error saving NCK marks', true); 
    } 
  };

  function handleFastEntryKeyboard(e) { 
    if(!fastEntryVisible) return; 
    if(e.key === 'Escape'){ 
      closeFastEntryModal(); 
    } else if(e.key === 'Enter' && !e.shiftKey){ 
      e.preventDefault(); 
      applyFastEntry(); 
    } else if(e.key === 'Enter' && e.shiftKey){ 
      e.preventDefault(); 
      applyFastEntryAndStay(); 
    } 
  }

    const container = document.getElementById('fastAssessmentFields'); 
    if(!container) return; 
    const columnCount = 12; 
    const scores = []; 
    for(let c = 0; c < columnCount; c++){ 
      const input = document.getElementById(`ac_${studentIdx}_${c}`); 
      let val = input ? input.value : ''; 
      if(val === '' || val === undefined) val = 0; 
      scores.push(parseFloat(val) || 0); 
    } 
    let gradedBy = document.getElementById(`acGraded_${studentIdx}`)?.value || ''; 
    if(gradedBy && !isNaN(parseFloat(gradedBy)) && gradedBy.toString().length > 2 && !isNaN(parseInt(gradedBy))){ 
      gradedBy = ''; 
    } 
    const total = scores.reduce((a,b) => a + b, 0); 
    const average = columnCount > 0 ? (total / columnCount).toFixed(2) : 0; 
    const status = average >= 60 ? 'PASS' : (scores.some(s => s > 0) ? 'FAIL' : 'PENDING'); 
    let assessmentNames = [
      'ANC WARD', 'IMMUNIZATION ASSESSMENT', 'NURSING CARE', 'PSYCHIATRY ASSESSMENT',

    if(savedNames){ 
      assessmentNames = JSON.parse(savedNames); 
    } 
    let assessmentInputs = ''; 
    for(let c = 0; c < columnCount; c++){ 
      const colName = assessmentNames[c] || `Assessment ${c+1}`;

  function updateFastAssessmentPreview() {

      scores.push(val); 
      total += val; 
    }

    const status = average >= 60 ? 'PASS' : (scores.some(s => s > 0) ? 'FAIL' : 'PENDING'); 
    const totalEl = document.getElementById('currentTotalDisplay');
    const avgEl = document.getElementById('currentAverageDisplay');

    if(avgEl) avgEl.innerHTML = average + '%'; 
    if(statusEl) statusEl.innerHTML = status; 
    if(statusEl) statusEl.className = `badge ${status === 'PASS' ? 'badge-pass' : 'badge-fail'}`;

  async function applyFastAssessmentEntry() { 
    const studentIdx = parseInt(document.getElementById('fastStudentSelect').value);
    const sheetName = document.getElementById('nckSheetSelect')?.value || 'NCK_ASSESSMENT_AND_CASE';
    const studentName = currentNCKMarks[studentIdx]?.name || 'Unknown';
    let scores = [];
    for(let c = 0; c < 12; c++){ 
        const fastVal = document.getElementById(`fast_ac_${c}`)?.value;
        scores.push(fastVal !== undefined ? (fastVal==='' ? 0 : parseFloat(fastVal)) : 0);
    }
    const gradedVal = document.getElementById('fast_ac_graded')?.value || currentUser.name;
    const marksData = [{ 
        row: studentIdx + 2,
        name: studentName,
        scores: scores, 
        gradedBy: gradedVal,
        year: currentYear
    }];
    showLoading(`Saving ${studentName} to database...`);
    const result = await apiCall('/api/marks', { 
        method:'POST', 
        body:JSON.stringify({ 
            block:'BLOCK_0', 
            subject:sheetName, 
            marksData, 
            lecturerName:currentUser.name, 
            examType:'nck', 
            userRole:currentUser?.role || 'admin'
        }) 
    });
    hideLoading();
    if (result && (result.success === true || result.message === 'NCK marks saved successfully')) {
        for(let c=0; c<12; c++){ 
            let mi = document.getElementById(`ac_${studentIdx}_${c}`); 
            if(mi) mi.value = scores[c]; 
        }
        let gi = document.getElementById(`acGraded_${studentIdx}`); 
        if(gi) gi.value = gradedVal;
        if(window.updateACTotal) updateACTotal(studentIdx);
        const nextIdx = studentIdx + 1;
        if(nextIdx < currentNCKMarks.length){ 
            document.getElementById('fastStudentSelect').value = nextIdx; 
            loadFastAssessmentFields(nextIdx); 
            showNotification(`Now entering ${currentNCKMarks[nextIdx]?.name}`, false);
        } else { 
            closeFastEntryModal(); 
            showNotification('🎉 All assessments saved to database!', false);
            setTimeout(() => loadNCKMarks(), 500);
        }
    } else {
        showNotification('Save failed: ' + (result?.message || result?.error || 'Unknown error'), true);
    }
  }

  async function addAssessmentColumnForClass(classIntake, sheetName) { 
    const newName = document.getElementById('newAreaName')?.value.trim(); 
    if (!newName) { 
      showNotification('Enter column name', true); 
      return; 
    } 
    let currentAreas = []; 
    const savedConfig = localStorage.getItem(`assessment_columns_${classIntake}_${sheetName}`); 
    if (savedConfig) { 
      currentAreas = JSON.parse(savedConfig); 
    } else { 
      currentAreas = ['ANC WARD','IMMUNIZATION ASSESSMENT','NURSING CARE','PSYCHIATRY assesment','NBU ASSESSMENT','MIDWIFERYASSESSMENT','PSYCHIATRY CASE STUDY','GENERAL NURSING CASE STUDY','MIDWIFERY CASE STUDY','MCH CASE STUDY','PROJECT']; 
    } 
    currentAreas.push(newName); 
    localStorage.setItem(`assessment_columns_${classIntake}_${sheetName}`, JSON.stringify(currentAreas)); 
    showNotification(`Added assessment column for March ${classIntake} class: ${newName}`, false); 
    closeModal(); 
    setTimeout(() => showAssessmentColumnManagerWithClass(), 500); 
  }

  async function deleteAssessmentColumnForClass(colIdx, classIntake, sheetName) { 
    if (!confirm(`Delete column ${colIdx+1} for March ${classIntake} class?`)) return; 
    let currentAreas = []; 
    const savedConfig = localStorage.getItem(`assessment_columns_${classIntake}_${sheetName}`); 
    if (savedConfig) { 
      currentAreas = JSON.parse(savedConfig); 
    } 
    if (currentAreas[colIdx]) { 
      currentAreas.splice(colIdx, 1); 
      localStorage.setItem(`assessment_columns_${classIntake}_${sheetName}`, JSON.stringify(currentAreas)); 
      showNotification(`Deleted column ${colIdx+1} for March ${classIntake} class`, false); 
    } 
    closeModal(); 
    setTimeout(() => showAssessmentColumnManagerWithClass(), 500); 
  }

      const name = parts[1]; 
      let atype = 'full';
      let unitCode = '';
      if(config && config[block]){ 
        const found = config[block].find(c => c.name === name); 
        if(found) {
            atype = found.assessmentType || 'full';
            unitCode = found.code || '';
        }
      } 
      let isSubjectOpen = true, closedReason = '';
      if(settings.global && settings.global.enabled === false){ 
        isSubjectOpen = false; 
        closedReason = 'Global entry closed by administrator';
      } else if(settings[`${currentYear}_all`] && settings[`${currentYear}_all`].enabled === false){ 
        isSubjectOpen = false; 
        closedReason = `Entry closed for March ${currentYear} class`;
      } else if(settings[`${block}_${name}`] && settings[`${block}_${name}`].enabled === false){ 
        isSubjectOpen = false; 
        closedReason = `Entry closed for this subject`;
      }
      subjectsByBlock[block].push({ name, assessmentType: atype, isOpen: isSubjectOpen, closedReason, code: unitCode }); 
    } 
    let html = `<button class="back-btn" onclick="showMain()"><i class="fas fa-arrow-left"></i> Back</button>

          const typeLabel = s.assessmentType === 'full' ? 'CAT1+CAT2+Exam' : (s.assessmentType === 'single_cat' ? 'CAT+Exam' : 'Exam Only');

          const displayName = s.code ? `${s.code} - ${s.name}` : s.name;
          const onclickAttr = s.isOpen ? `onclick="openMarksEntry('${b}', '${s.name.replace(/'/g, "\\'")}', '${s.assessmentType}')"` : `onclick="showNotification('${s.closedReason}', true)"`;
          html += `<div class="subject-card ${!s.isOpen ? 'closed' : ''}" ${onclickAttr}>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h4>${typeIcon} ${displayName}</h4>
                ${statusBadge}
            </div>
            <p><i class="fas fa-layer-group"></i> ${b.replace('_', ' ')} | ${typeLabel}</p>
            ${s.code ? `<p style="font-size:12px; color:#64748b;"><i class="fas fa-hashtag"></i> ${s.code}</p>` : ''}
            ${!s.isOpen ? `<p style="color:#dc2626; font-size:12px; margin-top:8px;"><i class="fas fa-exclamation-triangle"></i> ${s.closedReason}</p>` : ''}
          </div>`; 
        } 
        html += `</div>`; 
      }

    updateContentArea(html); 
    hideLoading();

  window.updateLecturerTotal = function(idx){

    let cat2 = parseFloat(document.getElementById(`cat2_${idx}`)?.value) || 0; 
    let exam = parseFloat(document.getElementById(`exam_${idx}`)?.value) || 0; 
    let total = 0; 
    
    if(at === 'full') {
        total = Math.round(((Math.min(cat1,30) + Math.min(cat2,30)) / 60 * 30 + Math.min(exam,70)) * 10) / 10;
    } else if(at === 'single_cat') {
        total = Math.round((Math.min(cat1,30) + Math.min(exam,70)) * 10) / 10;
    } else {
        total = Math.round(Math.min(exam,100) * 10) / 10;
    }
    
    // ===== YOUR GRADING SYSTEM =====
    function getGrade(score, isSecondAttempt = false) {
        if (isSecondAttempt) {
            if (score >= 80) return { grade: 'A', rating: 'Distinction', points: 4 };
            else if (score >= 70) return { grade: 'B', rating: 'Credit', points: 3 };
            else if (score >= 60) return { grade: 'C', rating: 'Pass', points: 2 };
            else return { grade: 'D', rating: 'Fail', points: 0 };
        } else {
            if (score >= 75) return { grade: 'A', rating: 'Distinction', points: 4 };
            else if (score >= 65) return { grade: 'B', rating: 'Credit', points: 3 };
            else if (score >= 60) return { grade: 'C', rating: 'Pass', points: 2 };
            else return { grade: 'D', rating: 'Fail', points: 0 };
        }
    }
    
    function getPointsColor(points) {
        if (points >= 4) return '#065f46';
        else if (points >= 3) return '#1e40af';
        else if (points >= 2) return '#92400e';
        else return '#991b1b';
    }
    
    const isSecondAttempt = false;
    const gradeInfo = getGrade(total, isSecondAttempt);
    const pointsColor = getPointsColor(gradeInfo.points);
    
    // Update Total
    const totalEl = document.getElementById(`ltotal_${idx}`);
    if(totalEl) {
        totalEl.innerHTML = total > 0 ? total : '--';
        totalEl.style.color = total >= 60 ? '#065f46' : (total > 0 ? '#991b1b' : '#f59e0b');
    }
    
    // Update Grade
    const gradeEl = document.getElementById(`lgrade_${idx}`);
    if(gradeEl) {
        gradeEl.innerHTML = total > 0 ? gradeInfo.grade : '--';
        gradeEl.style.color = pointsColor;
    }
    
    // Update Points
    const pointsEl = document.getElementById(`lpoints_${idx}`);
    if(pointsEl) {
        pointsEl.innerHTML = total > 0 ? gradeInfo.points.toFixed(1) : '--';
        pointsEl.style.color = pointsColor;
    }
    
    // Update Rating
    const ratingEl = document.getElementById(`lrating_${idx}`);
    if(ratingEl) {
        if(total > 0) {
            const bgColor = total >= 60 ? '#d1fae5' : '#fee2e2';
            const textColor = total >= 60 ? '#065f46' : '#991b1b';
            ratingEl.innerHTML = `<span style="background:${bgColor}; padding:3px 12px; border-radius:12px; color:${textColor}; font-weight:600; display:inline-block;">${gradeInfo.rating}</span>`;
        } else {
            ratingEl.innerHTML = '<span style="color:#94a3b8;">PENDING</span>';
        }
    }
    
    // Update row class
    const row = document.getElementById(`cat1_${idx}`)?.parentElement?.parentElement; 
    if(row) {
        row.className = total >= 60 ? 'pass-row' : (total > 0 ? 'fail-row' : 'pending-row');
    }
};
  window.saveLecturerMarks = async function(){ 
    let marksData = []; 
    const len = window.currentMarksData?.length || 0; 
    const at = window.currentAssessmentType || 'full'; 
    for(let i = 0; i < len; i++){ 
        const admission = window.currentMarksData[i]?.admission || '';
        let cat1 = document.getElementById(`cat1_${i}`)?.value || ''; 
        let cat2 = document.getElementById(`cat2_${i}`)?.value || ''; 
        let exam = document.getElementById(`exam_${i}`)?.value || ''; 
        marksData.push({ 
            row: i + 2,
            admission: admission,
            cat1: parseFloat(cat1) || 0, 
            cat2: parseFloat(cat2) || 0, 
            exam: parseFloat(exam) || 0 
        }); 
    } 
    showLoading('Saving marks...'); 
    const result = await apiCall('/api/marks', { 
        method: 'POST', 
        body: JSON.stringify({ 
            block: window.currentMarksBlock, 
            subject: window.currentMarksSubject, 
            marksData: marksData, 
            lecturerName: currentUser.name,
            examType: 'internal',
            userRole: currentUser?.role || 'lecturer'
        }) 
    }); 
    hideLoading(); 
    if (result && (result.success === true || result.message === 'Marks saved successfully')) { 
        showNotification(`✅ Saved ${result.updated || 0} updated + ${result.inserted || 0} new marks`, false);
        unsavedChanges = false;
        setTimeout(() => {
            loadMarksForSubject(window.currentMarksBlock, window.currentMarksSubject, window.currentAssessmentType);
        }, 500);
    } else { 
        showNotification(result?.message || result?.error || 'Error saving marks', true); 
    } 
  };

  async function saveNewStudent() {

    const block = document.getElementById('studentBlock').value;

    showNotification(result.success ? 'Student added successfully!' : (result.message || 'Error adding student'), !result.success);

  // ======================= SCORE PUBLISHING CONTROL =======================
  let publishedScores = new Set();

  function loadPublishedStatus() {
    const saved = localStorage.getItem('nck_published_scores');
    if (saved) { publishedScores = new Set(JSON.parse(saved)); }
  }

  function savePublishedStatus() {
    localStorage.setItem('nck_published_scores', JSON.stringify([...publishedScores]));
  }

  function isScorePublished(examId, studentId, examType) {
    const key = `${examType}_${examId}_${studentId}`;
    return publishedScores.has(key);
  }

  async function publishScore(examId, studentId, examType, studentName, examName) {
    const key = `${examType}_${examId}_${studentId}`;
    publishedScores.add(key);
    savePublishedStatus();
    await apiCall('/api/publish-log', {
        method: 'POST',
        body: JSON.stringify({
            action: 'publish',
            examId, studentId, examType, studentName, examName,
            publishedBy: currentUser?.name,
            timestamp: new Date().toISOString()
        })
    });
    showNotification(`✅ Published ${studentName} - ${examName}`, false);
  }

  async function unpublishScore(examId, studentId, examType, studentName, examName) {
    const key = `${examType}_${examId}_${studentId}`;
    publishedScores.delete(key);
    savePublishedStatus();
    await apiCall('/api/publish-log', {
        method: 'POST',
        body: JSON.stringify({
            action: 'unpublish',
            examId, studentId, examType, studentName, examName,
            publishedBy: currentUser?.name,
            timestamp: new Date().toISOString()
        })
    });
    showNotification(`🔒 Unpublished ${studentName} - ${examName}`, false);
  }

  async function bulkPublishExam(examId, examName, examType, studentIds) {
    if (!confirm(`Publish ALL scores for "${examName}"? This will make all ${studentIds.length} results visible to students.`)) { return; }
    showLoading(`Publishing ${studentIds.length} scores...`);
    let count = 0;
    for (const studentId of studentIds) {
        const key = `${examType}_${examId}_${studentId}`;
        if (!publishedScores.has(key)) { publishedScores.add(key); count++; }
    }
    savePublishedStatus();
    hideLoading();
    showNotification(`✅ Published ${count} scores for ${examName}`, false);
    showScorePublishPanel();
  }

  async function bulkUnpublishExam(examId, examName, examType, studentIds) {
    if (!confirm(`UNPUBLISH ALL scores for "${examName}"? This will hide all ${studentIds.length} results from students.`)) { return; }
    showLoading(`Unpublishing ${studentIds.length} scores...`);
    let count = 0;
    for (const studentId of studentIds) {
        const key = `${examType}_${examId}_${studentId}`;
        if (publishedScores.has(key)) { publishedScores.delete(key); count++; }
    }
    savePublishedStatus();
    hideLoading();
    showNotification(`🔒 Unpublished ${count} scores for ${examName}`, false);
    showScorePublishPanel();
  }

  async function showScorePublishPanel() {
    if (currentUser?.role !== 'admin') {
        showNotification('Only administrators can access this panel', true);
        return;
    }
    showLoading('Loading Score Publishing Panel...');
    loadPublishedStatus();
    const blocks = ['BLOCK_0', 'BLOCK_1', 'BLOCK_2', 'BLOCK_3', 'BLOCK_4', 'BLOCK_5'];
    const config = await getConfig();
    let allExamsWithMarks = [];
    for (const block of blocks) {
        const subjects = config[block] || [];
        for (const subject of subjects) {
            const marks = await apiCall(`/api/marks/${block}/${subject.name}`, {});
            if (marks && marks.length > 0) {
                const hasScores = marks.some(m => {
                    const cat1 = parseFloat(m.cat1) || 0;
                    const cat2 = parseFloat(m.cat2) || 0;
                    const exam = parseFloat(m.exam) || 0;
                    return cat1 > 0 || cat2 > 0 || exam > 0;
                });
                if (hasScores) {
                    allExamsWithMarks.push({ block, subjectName: subject.name, assessmentType: subject.assessmentType, marks: marks, studentCount: marks.length });
                }
            }
        }
    }
    const nckMarks = await apiCall(`/api/marks/BLOCK_0/XY FORMS`, {});
    if (nckMarks && nckMarks.length > 0) {
        allExamsWithMarks.push({ block: 'NCK', subjectName: 'XY FORMS (Clinical Evaluation)', assessmentType: 'nck', marks: nckMarks, studentCount: nckMarks.length, isNCK: true });
    }
    const assessmentMarks = await apiCall(`/api/marks/BLOCK_0/ASSESSMENT AND CASE`, {});
    if (assessmentMarks && assessmentMarks.length > 0) {
        allExamsWithMarks.push({ block: 'NCK', subjectName: 'ASSESSMENT AND CASE (Written)', assessmentType: 'nck', marks: assessmentMarks, studentCount: assessmentMarks.length, isNCK: true });
    }
    let totalPublished = 0, totalScores = 0;
    for (const exam of allExamsWithMarks) {
        for (const mark of exam.marks) {
            totalScores++;
            const examType = exam.isNCK ? 'nck' : 'internal';
            const examId = `${exam.block}_${exam.subjectName}`;
            const studentId = mark.admission || mark.name;
            if (isScorePublished(examId, studentId, examType)) { totalPublished++; }
        }
    }
    const publishRate = totalScores > 0 ? ((totalPublished / totalScores) * 100).toFixed(1) : 0;
    const html = `
        <button class="back-btn" onclick="showMain()"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>
        <div class="header"><h3><i class="fas fa-eye-slash"></i> Score Publishing Control Panel</h3><p>Control which exam results students can see - Publish only when ready</p></div>
        <div class="stats-grid" style="margin-bottom: 20px;">
            <div class="stat-card"><div class="stat-number">${totalScores}</div><div class="stat-label">Total Scores Entered</div></div>
            <div class="stat-card" style="background: #d1fae5;"><div class="stat-number" style="color: #065f46;">${totalPublished}</div><div class="stat-label">Published to Students</div></div>
            <div class="stat-card" style="background: #fee2e2;"><div class="stat-number" style="color: #991b1b;">${totalScores - totalPublished}</div><div class="stat-label">Hidden from Students</div></div>
            <div class="stat-card"><div class="stat-number">${publishRate}%</div><div class="stat-label">Publication Rate</div></div>
        </div>
        <div class="card">
            <div class="card-title"><i class="fas fa-chart-line"></i> Exam Scores - Manage Publication
                <span style="margin-left: auto;"><button class="save-btn" onclick="showScorePublishPanel()" style="background: #6366f1;"><i class="fas fa-sync-alt"></i> Refresh</button></span>
            </div>
            <div style="overflow-x: auto;"><table style="width: 100%;"><thead><tr><th>Exam / Assessment</th><th>Block</th><th>Students</th><th>Published</th><th>Status</th><th>Actions</th></tr></thead><tbody>
                ${allExamsWithMarks.map(exam => {
                    const examId = `${exam.block}_${exam.subjectName}`;
                    const examType = exam.isNCK ? 'nck' : 'internal';
                    let publishedCount = 0;
                    const studentIds = [];
                    for (const mark of exam.marks) {
                        const studentId = mark.admission || mark.name;
                        studentIds.push(studentId);
                        if (isScorePublished(examId, studentId, examType)) { publishedCount++; }
                    }
                    const isFullyPublished = publishedCount === exam.marks.length;
                    const isPartiallyPublished = publishedCount > 0 && publishedCount < exam.marks.length;
                    let statusBadge = '';
                    if (isFullyPublished) {
                        statusBadge = '<span class="badge badge-pass"><i class="fas fa-eye"></i> Fully Published</span>';
                    } else if (isPartiallyPublished) {
                        statusBadge = '<span class="badge badge-warning"><i class="fas fa-eye-half"></i> Partially Published</span>';
                    } else {
                        statusBadge = '<span class="badge badge-fail"><i class="fas fa-eye-slash"></i> Not Published</span>';
                    }
                    return `
                        <tr style="border-bottom: 1px solid #e2e8f0;">
                            <td style="padding: 12px;"><strong>${exam.subjectName}</strong><br><small style="color: #64748b;">${exam.assessmentType === 'full' ? 'CAT1+CAT2+Exam' : (exam.assessmentType === 'single_cat' ? 'CAT+Exam' : 'Exam Only')}</small></td>
                            <td style="padding: 12px;">${exam.block.replace('_', ' ')}</td>
                            <td style="padding: 12px; text-align: center;">${exam.studentCount}</td>
                            <td style="padding: 12px; text-align: center;"><strong>${publishedCount}</strong> / ${exam.marks.length}
                                <div class="progress-bar" style="margin-top: 5px; width: 80px;"><div class="progress-fill" style="width: ${(publishedCount/exam.marks.length)*100}%; background: #10b981;"></div></div>
                            </td>
                            <td style="padding: 12px;">${statusBadge}</td>
                            <td style="padding: 12px;">
                                <button class="save-btn" onclick="showExamStudentsPanel('${examId}', '${exam.subjectName.replace(/'/g, "\\'")}', '${examType}', ${JSON.stringify(exam.marks).replace(/"/g, '&quot;')})" style="padding: 6px 12px; font-size: 11px; margin-right: 5px;">
                                    <i class="fas fa-users"></i> Manage Students
                                </button>
                                <button class="${isFullyPublished ? 'btn-warning' : 'btn-success'}" onclick="bulkPublishExam('${examId}', '${exam.subjectName.replace(/'/g, "\\'")}', '${examType}', ${JSON.stringify(studentIds)})" style="padding: 6px 12px; font-size: 11px; margin-right: 5px;">
                                    <i class="fas ${isFullyPublished ? 'fa-eye-slash' : 'fa-eye'}"></i> ${isFullyPublished ? 'Unpublish All' : 'Publish All'}
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('')}
            </tbody></table></div>

  function showExamStudentsPanel(examId, examName, examType, marks) {
    const panel = document.getElementById('studentsDetailPanel');
    const examNameSpan = document.getElementById('selectedExamName');
    const contentDiv = document.getElementById('studentsDetailContent');
    if (!panel || !contentDiv) return;
    examNameSpan.innerHTML = examName;
    let assessmentType = 'full';
    if (examName.includes('CAT+Exam')) assessmentType = 'single_cat';
    else if (examName.includes('Exam Only')) assessmentType = 'exam_only';
    const studentsHtml = `
        <table style="width: 100%;">
            <thead><tr>
                <th>#</th><th>Student Name</th><th>Admission</th>
                <th>CAT 1<br><small>(0-30)</small></th>
                <th>CAT 2<br><small>(0-30)</small></th>
                <th>Exam<br><small>(${assessmentType === 'exam_only' ? '0-100' : '0-70'})</small></th>
                <th>Final<br><small>Score</small></th>
                <th>Status</th>
                <th>Publication</th>
                <th>Action</th>
            </tr></thead>
            <tbody>
                ${marks.map((mark, idx) => {
                    const studentId = mark.admission || mark.name;
                    const isPublished = isScorePublished(examId, studentId, examType);
                    let cat1 = parseFloat(mark.cat1) || 0;
                    let cat2 = parseFloat(mark.cat2) || 0;
                    let examScore = parseFloat(mark.exam) || 0;
                    let nckAvg = 0;
                    if (mark.scores && mark.scores.length > 0) {
                        const validScores = mark.scores.filter(s => s > 0);
                        if (validScores.length > 0) { nckAvg = validScores.reduce((a,b) => a+b, 0) / validScores.length; }
                    }
                    let finalScore = 0;
                    let displayCat1 = '--', displayCat2 = '--', displayExam = '--', displayFinal = '--';
                    if (examType === 'nck') {
                        finalScore = nckAvg;
                        displayFinal = finalScore > 0 ? `${finalScore.toFixed(1)}%` : '--';
                        displayExam = mark.scores ? `${mark.scores.filter(s => s > 0).length} assessments` : '--';
                    } else {
                        if (assessmentType === 'full') {
                            const cappedCat1 = Math.min(cat1, 30), cappedCat2 = Math.min(cat2, 30), cappedExam = Math.min(examScore, 70);
                            finalScore = ((cappedCat1 + cappedCat2) / 60 * 30) + cappedExam;
                            finalScore = Math.round(finalScore * 10) / 10;
                            displayCat1 = cat1 > 0 ? `${cat1}` : '--';
                            displayCat2 = cat2 > 0 ? `${cat2}` : '--';
                            displayExam = examScore > 0 ? `${examScore}` : '--';
                        } else if (assessmentType === 'single_cat') {
                            const cappedCat1 = Math.min(cat1, 30), cappedExam = Math.min(examScore, 70);
                            finalScore = cappedCat1 + cappedExam;
                            finalScore = Math.round(finalScore * 10) / 10;
                            displayCat1 = cat1 > 0 ? `${cat1}` : '--';
                            displayCat2 = '--';
                            displayExam = examScore > 0 ? `${examScore}` : '--';
                        } else {
                            finalScore = Math.min(examScore, 100);
                            finalScore = Math.round(finalScore * 10) / 10;
                            displayCat1 = '--';
                            displayCat2 = '--';
                            displayExam = examScore > 0 ? `${examScore}` : '--';
                        }
                        displayFinal = finalScore > 0 ? `${finalScore}%` : '--';
                    }
                    const statusText = finalScore >= 60 ? 'PASS' : (finalScore > 0 ? 'FAIL' : 'PENDING');
                    const statusClass = finalScore >= 60 ? 'badge-pass' : (finalScore > 0 ? 'badge-fail' : 'badge-pending');
                    return `
                        <tr style="border-bottom: 1px solid #e2e8f0;">
                            <td style="padding: 8px;">${idx + 1}</td>
                            <td style="padding: 8px;"><strong>${mark.name || 'Unknown'}</strong></td>
                            <td style="padding: 8px;">${mark.admission || 'N/A'}</td>
                            <td style="padding: 8px; text-align: center;">${displayCat1}</td>
                            <td style="padding: 8px; text-align: center;">${displayCat2}</td>
                            <td style="padding: 8px; text-align: center;">${displayExam}</td>
                            <td style="padding: 8px; text-align: center;"><span class="badge ${statusClass}" style="font-size: 14px; font-weight: bold;">${displayFinal}</span></td>
                            <td style="padding: 8px; text-align: center;"><span class="badge ${statusClass}">${statusText}</span></td>
                            <td style="padding: 8px; text-align: center;">${isPublished ? '<span class="badge badge-pass"><i class="fas fa-eye"></i> Published</span>' : '<span class="badge badge-fail"><i class="fas fa-eye-slash"></i> Hidden</span>'}</td>
                            <td style="padding: 8px; text-align: center;">
                                ${isPublished ? 
                                    `<button class="btn-warning" onclick="unpublishScore('${examId}', '${studentId}', '${examType}', '${(mark.name || '').replace(/'/g, "\\'")}', '${examName.replace(/'/g, "\\'")}'); showExamStudentsPanel('${examId}', '${examName.replace(/'/g, "\\'")}', '${examType}', ${JSON.stringify(marks).replace(/"/g, '&quot;')})" style="padding: 4px 10px; font-size: 11px;">
                                        <i class="fas fa-eye-slash"></i> Hide
                                    </button>` :
                                    `<button class="save-btn" onclick="publishScore('${examId}', '${studentId}', '${examType}', '${(mark.name || '').replace(/'/g, "\\'")}', '${examName.replace(/'/g, "\\'")}'); showExamStudentsPanel('${examId}', '${examName.replace(/'/g, "\\'")}', '${examType}', ${JSON.stringify(marks).replace(/"/g, '&quot;')})" style="padding: 4px 10px; font-size: 11px;">
                                        <i class="fas fa-eye"></i> Publish
                                    </button>`
                                }
                            </td>
                        </tr>
                    `;
                }).join('')}
            </tbody>
        </table>
        <div style="margin-top: 15px; text-align: center;">
            <button class="save-btn" onclick="bulkPublishExam('${examId}', '${examName.replace(/'/g, "\\'")}', '${examType}', ${JSON.stringify(marks.map(m => m.admission || m.name))})">
                <i class="fas fa-eye"></i> Publish All Students
            </button>
            <button class="btn-warning" onclick="bulkUnpublishExam('${examId}', '${examName.replace(/'/g, "\\'")}', '${examType}', ${JSON.stringify(marks.map(m => m.admission || m.name))})" style="margin-left: 10px;">
                <i class="fas fa-eye-slash"></i> Hide All Students
            </button>
        </div>
    `;
    contentDiv.innerHTML = studentsHtml;
    panel.style.display = 'block';
    panel.scrollIntoView({ behavior: 'smooth' });
  }

  // ======================= COMPREHENSIVE ANALYTICS =======================
  async function showComprehensiveAnalytics() {
    showLoading('Loading advanced analytics...');
    const students = await apiCall('/api/students', {});
    const blocks = ['BLOCK_0', 'BLOCK_1', 'BLOCK_2', 'BLOCK_3', 'BLOCK_4', 'BLOCK_5'];
    let allStudentPerformance = {}, subjectPerformance = {}, blockPerformance = {}, clinicalPerformance = [];
    const config = await getConfig();
    for (let block of blocks) {
      blockPerformance[block] = { scores: [], subjects: [] };
      const subjects = config[block] || [];
      for (let subject of subjects) {
        const marks = await apiCall(`/api/marks/${block}/${subject.name}`, {});
        if (marks && marks.length) {
          for (let mark of marks) {
            const admission = mark.admission;
            if (!allStudentPerformance[admission]) {
              allStudentPerformance[admission] = { 
                name: mark.name, 
                admission: admission,
                subjects: [], 
                totalScore: 0, 
                subjectCount: 0,
                cat1Scores: [],
                cat2Scores: [],
                examScores: [],
                blockScores: {}
              };
            }
            let finalScore = 0;
            let cat1 = parseFloat(mark.cat1) || 0;
            let cat2 = parseFloat(mark.cat2) || 0;
            let exam = parseFloat(mark.exam) || 0;
            if (subject.assessmentType === 'full') {
              finalScore = Math.round(((Math.min(cat1,30) + Math.min(cat2,30)) / 60 * 30 + Math.min(exam,70)) * 10) / 10;
              if (cat1 > 0) allStudentPerformance[admission].cat1Scores.push(cat1);
              if (cat2 > 0) allStudentPerformance[admission].cat2Scores.push(cat2);
              if (exam > 0) allStudentPerformance[admission].examScores.push(exam);
            } else if (subject.assessmentType === 'single_cat') {
              finalScore = Math.round((Math.min(cat1,30) + Math.min(exam,70)) * 10) / 10;
              if (cat1 > 0) allStudentPerformance[admission].cat1Scores.push(cat1);
              if (exam > 0) allStudentPerformance[admission].examScores.push(exam);
            } else {
              finalScore = Math.round(Math.min(exam,100) * 10) / 10;
              if (exam > 0) allStudentPerformance[admission].examScores.push(exam);
            }
            if (finalScore > 0) {
              allStudentPerformance[admission].subjects.push({ name: subject.name, score: finalScore, block: block });
              allStudentPerformance[admission].totalScore += finalScore;
              allStudentPerformance[admission].subjectCount++;
              if (!allStudentPerformance[admission].blockScores[block]) {
                allStudentPerformance[admission].blockScores[block] = [];
              }
              allStudentPerformance[admission].blockScores[block].push(finalScore);
              if (!subjectPerformance[subject.name]) {
                subjectPerformance[subject.name] = { scores: [], block: block, assessmentType: subject.assessmentType };
              }
              subjectPerformance[subject.name].scores.push(finalScore);
              blockPerformance[block].scores.push(finalScore);
            }
          }
        }
      }
    }
    for (let adm in allStudentPerformance) {
      let student = allStudentPerformance[adm];
      student.overallAvg = student.subjectCount > 0 ? (student.totalScore / student.subjectCount).toFixed(2) : 0;
      student.cat1Avg = student.cat1Scores.length > 0 ? (student.cat1Scores.reduce((a,b) => a+b, 0) / student.cat1Scores.length).toFixed(2) : 0;
      student.cat2Avg = student.cat2Scores.length > 0 ? (student.cat2Scores.reduce((a,b) => a+b, 0) / student.cat2Scores.length).toFixed(2) : 0;
      student.examAvg = student.examScores.length > 0 ? (student.examScores.reduce((a,b) => a+b, 0) / student.examScores.length).toFixed(2) : 0;
