<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Nursing School System | NCK & Internal Marks | Nakuru College</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #10b981; --danger: #ef4444; --warning: #f59e0b; --info: #3b82f6; --dark: #1e293b; --gray: #64748b; --radius: 24px; --radius-sm: 12px; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1); --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1); --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1); --sidebar-width: 280px; --sidebar-collapsed: 72px; }
    
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; transition: all 0.3s ease; }
    body.dark-mode { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
    body.dark-mode .card, body.dark-mode .header, body.dark-mode .stat-card, body.dark-mode .selector-group, 
    body.dark-mode .user-info, body.dark-mode .subject-card, body.dark-mode table, body.dark-mode .modal-content, 
    body.dark-mode .login-container, body.dark-mode .sidebar { background: #1e293b; color: #f1f5f9; border-color: #334155; }
    body.dark-mode th { background: #0f172a; }
    body.dark-mode td { border-bottom-color: #334155; }
    body.dark-mode input, body.dark-mode select { background: #0f172a; color: #f1f5f9; border-color: #475569; }
    
    /* SIDEBAR STYLES - ONLY ADDITION TO ORIGINAL */
    .app-wrapper { display: flex; min-height: 100vh; }
    .sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: var(--sidebar-width); background: rgba(255,255,255,0.96); backdrop-filter: blur(12px); border-right: 1px solid rgba(99,102,241,0.2); box-shadow: 4px 0 20px rgba(0,0,0,0.05); z-index: 1000; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; }
    body.dark-mode .sidebar { background: rgba(30,41,59,0.96); border-right-color: rgba(99,102,241,0.3); }
    .sidebar.collapsed { width: var(--sidebar-collapsed); }
    .sidebar.collapsed .sidebar-logo span, .sidebar.collapsed .nav-item span, .sidebar.collapsed .user-section .user-details { display: none; }
    .sidebar.collapsed .nav-item i { margin-right: 0; font-size: 1.4rem; }
    .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid rgba(99,102,241,0.15); display: flex; align-items: center; gap: 12px; }
    .sidebar-logo i { font-size: 28px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .sidebar-logo span { font-weight: 800; font-size: 18px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .nav-menu { flex: 1; padding: 20px 12px; display: flex; flex-direction: column; gap: 8px; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 14px; cursor: pointer; transition: all 0.2s; color: var(--dark); font-weight: 500; }
    body.dark-mode .nav-item { color: #e2e8f0; }
    .nav-item i { width: 24px; font-size: 1.2rem; text-align: center; }
    .nav-item:hover { background: rgba(99,102,241,0.1); transform: translateX(4px); }
    .nav-item.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; box-shadow: 0 8px 16px -6px rgba(99,102,241,0.3); }
    .user-section { padding: 20px; border-top: 1px solid rgba(99,102,241,0.15); display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 40px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
    .user-details { flex: 1; overflow: hidden; }
    .user-name { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 11px; opacity: 0.7; }
    .logout-side { background: rgba(239,68,68,0.1); color: var(--danger); }
    .logout-side:hover { background: rgba(239,68,68,0.2); }
    
    /* MAIN CONTENT */
    .main-content { flex: 1; margin-left: var(--sidebar-width); transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px 24px; min-height: 100vh; }
    .sidebar.collapsed + .main-content { margin-left: var(--sidebar-collapsed); }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); padding: 12px 20px; border-radius: 40px; box-shadow: var(--shadow); display: none; }
    body.dark-mode .top-bar { background: rgba(30,41,59,0.8); }
    .menu-toggle { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--primary); display: none; }
    .theme-toggle { background: none; border: none; font-size: 20px; cursor: pointer; padding: 8px; border-radius: 40px; }
    
    /* ORIGINAL STYLES - ALL PRESERVED */
    .container { max-width: 1400px; margin: 0 auto; }
    .header { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: var(--radius); padding: 28px 32px; margin-bottom: 24px; text-align: center; box-shadow: var(--shadow-xl); border: 1px solid rgba(255,255,255,0.2); }
    .header h1 { background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; font-size: 32px; font-weight: 800; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: var(--radius); padding: 24px; text-align: center; cursor: pointer; transition: all 0.3s ease; box-shadow: var(--shadow); border: 1px solid #e2e8f0; position: relative; overflow: hidden; }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--primary), var(--secondary)); transform: scaleX(0); transition: transform 0.3s ease; }
    .stat-card:hover::before { transform: scaleX(1); }
    .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-xl); }
    .stat-number { font-size: 42px; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .stat-label { margin-top: 8px; font-size: 14px; font-weight: 500; color: var(--gray); }
    .selector-group { background: white; border-radius: 20px; padding: 20px 24px; margin-bottom: 24px; display: flex; gap: 24px; flex-wrap: wrap; align-items: center; box-shadow: var(--shadow); }
    select, input { padding: 12px 20px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 14px; font-weight: 500; background: white; cursor: pointer; transition: all 0.2s ease; }
    select:focus, input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
    .admin-menu-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; margin-bottom: 24px; }
    .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .menu-btn { padding: 14px; border: none; border-radius: 16px; font-size: 13px; font-weight: 600; cursor: pointer; color: white; transition: all 0.3s ease; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; gap: 8px; }
    .menu-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); }
    .btn-success { background: linear-gradient(135deg, #10b981, #059669); }
    .btn-info { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .btn-export { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
    .btn-dark { background: linear-gradient(135deg, #1e293b, #0f172a); }
    .btn-lock { background: linear-gradient(135deg, #dc2626, #b91c1c); }
    .user-info { background: white; border-radius: 20px; padding: 16px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; box-shadow: var(--shadow); }
    .logout-btn { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; }
    .card { background: white; border-radius: var(--radius); padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow); border: 1px solid #e2e8f0; }
    .card-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-left: 4px solid var(--primary); padding-left: 16px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; }
    th, td { padding: 12px 8px; text-align: left; vertical-align: middle; }
    th { background: linear-gradient(135deg, #667eea, #764ba2); color: white; font-weight: 600; font-size: 12px; white-space: nowrap; }
    td { border-bottom: 1px solid #e2e8f0; }
    tr:hover { background: rgba(99,102,241,0.05); }
    .pass-row { background-color: #d1fae5 !important; }
    .fail-row { background-color: #fee2e2 !important; }
    .pending-row { background-color: #fef3c7 !important; }
    body.dark-mode .pass-row { background-color: #064e3b !important; }
    body.dark-mode .fail-row { background-color: #7f1d1d !important; }
    body.dark-mode .pending-row { background-color: #78350f !important; }
    .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; gap: 4px; }
    .badge-pass { background: #d1fae5; color: #065f46; }
    .badge-fail { background: #fee2e2; color: #991b1b; }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-gold { background: #fef3c7; color: #92400e; }
    .badge-silver { background: #e5e7eb; color: #374151; }
    .badge-bronze { background: #fed7aa; color: #9a3412; }
    .setting-card { background: #f8fafc; border-radius: 16px; padding: 16px; margin-bottom: 12px; border-left: 4px solid var(--primary); }
    .log-entry { padding: 10px; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
    .subject-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap: 20px; margin-top: 20px; }
    .subject-card { background: white; border-radius: 20px; padding: 20px; cursor: pointer; transition: all 0.3s ease; box-shadow: var(--shadow); border-left: 5px solid var(--primary); }
    .subject-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-xl); }
    .subject-card.closed { opacity: 0.7; background: #fef2f2; border-left-color: #dc2626; cursor: not-allowed; }
    .subject-card.closed:hover { transform: none; }
    .subject-card h4 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .modal-content { background: white; border-radius: 28px; width: 90%; max-width: 900px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-xl); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 2px solid #f1f5f9; }
    .modal-header h3 { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .close { cursor: pointer; font-size: 24px; color: #94a3b8; transition: all 0.2s; }
    .close:hover { color: #ef4444; transform: rotate(90deg); }
    .modal-body { padding: 24px; }
    .modal-body .field { margin-bottom: 16px; }
    .modal-body label { display: block; font-weight: 600; margin-bottom: 6px; }
    .ranking-card { background: linear-gradient(135deg, #667eea10, #764ba210); border-radius: 16px; padding: 16px; margin-bottom: 12px; border-left: 4px solid var(--primary); }
    .ranking-number { font-size: 28px; font-weight: 800; color: var(--primary); margin-right: 16px; }
    .progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin: 8px 0; }
    .progress-fill { height: 100%; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 4px; transition: width 0.3s ease; }
    .shortcut-hint { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); color: white; padding: 6px 12px; border-radius: 40px; font-size: 10px; font-family: monospace; z-index: 999; cursor: pointer; }
    .shortcut-hint:hover { background: rgba(0,0,0,0.9); }
    .save-btn, .export-btn, .edit-btn, .delete-btn, .back-btn { padding: 8px 16px; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; }
    .save-btn { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .export-btn { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; }
    .edit-btn { background: #3b82f6; color: white; }
    .delete-btn { background: #ef4444; color: white; }
    .back-btn { background: #64748b; color: white; }
    .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .notification-toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 20px; border-radius: 40px; z-index: 10000; animation: slideInRight 0.3s ease; font-weight: 500; display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .notification-toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .notification-toast.warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .login-container { max-width: 420px; margin: 80px auto; background: white; padding: 40px; border-radius: 32px; box-shadow: var(--shadow-xl); }
    .login-container h2 { font-size: 24px; font-weight: 800; text-align: center; margin-bottom: 12px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .login-container button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .lecturer-card, .unit-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; box-shadow: var(--shadow); }
    .subject-badge { background: var(--primary); color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; margin: 2px; display: inline-block; }
    @media (max-width: 768px) { 
      body { padding: 12px; } 
      .sidebar { transform: translateX(-100%); width: 260px; position: fixed; }
      .sidebar.mobile-open { transform: translateX(0); }
      .main-content { margin-left: 0 !important; padding: 16px; }
      .menu-toggle { display: block; }
      .top-bar { display: flex; }
      .stats-grid, .admin-menu-grid, .menu-grid { grid-template-columns: repeat(2,1fr); }
      .admin-menu-grid { grid-template-columns: repeat(3,1fr); }
      th, td { padding: 8px 4px; font-size: 11px; }
      input[type="number"] { width: 55px; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
  // ======================= YOUR ORIGINAL CODE - 100% PRESERVED =======================
  const API_BASE_URL = 'https://nchsm-marks-proxy.onrender.com';
  const INTAKE_YEARS = ['2024', '2025', '2026'];
  
  let currentUser = null;
  let currentYear = '2026';
  let currentExamType = 'internal';
  let configCache = null;
  let currentMarksData = null, currentMarksBlock = null, currentMarksSubject = null, currentAssessmentType = null;
  let currentAdminMarks = null, currentAdminAssessmentType = null, currentAdminBlock = null, currentAdminSubject = null;
  let currentNCKMarks = null, currentNCKSheet = null;
  let fastEntryVisible = false;
  let autoSaveInterval = null;
  let unsavedChanges = false;
  
  // ======================= CORE FUNCTIONS =======================
  function showLoading(msg) { let l=document.querySelector('.loader'); if(l) l.remove(); l=document.createElement('div'); l.className='loader'; l.innerHTML=`<div class="spinner"></div><div class="loader-text">${msg||'Loading...'}</div>`; document.body.appendChild(l); }
  function hideLoading() { let l=document.querySelector('.loader'); if(l) l.remove(); }
  function showNotification(msg,isErr) { let t=document.createElement('div'); t.className='notification-toast'; if(isErr) t.classList.add('error'); t.innerHTML=`<i class="fas ${isErr?'fa-exclamation-circle':'fa-check-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
  
  async function apiCall(endpoint,opts={}) { 
    try { 
      const headers={'Content-Type':'application/json','X-Year':currentYear,'X-Exam-Type':currentExamType,'X-User-Role':currentUser?.role||''}; 
      const res=await fetch(API_BASE_URL+endpoint,{headers,...opts}); 
      if(!res.ok){
        const errorData=await res.json().catch(()=>({message:`HTTP ${res.status}`}));
        return {success:false,message:errorData.message};
      }
      const ct=res.headers.get('content-type'); 
      if(ct&&ct.includes('application/json')) return await res.json(); 
      return {error:'Non-JSON response'}; 
    } catch(e){ console.error(e); return {success:false,error:e.message}; } 
  }
  
  async function getConfig() { if(configCache) return configCache; configCache=await apiCall('/api/units',{}); return configCache; }
  function exportToCSV(data,filename) { if(!data||!data.length){ showNotification('No data to export',true); return; } const headers=Object.keys(data[0]); let csv=[headers.join(',')]; data.forEach(row=>{ const values=headers.map(h=>`"${String(row[h]||'').replace(/"/g,'""')}"`); csv.push(values.join(',')); }); const blob=new Blob([csv.join('\n')],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${filename}_${currentYear}_${new Date().toISOString().slice(0,19)}.csv`; a.click(); URL.revokeObjectURL(a.href); showNotification('Export completed!'); }
  function initDarkMode() { if(localStorage.getItem('darkMode')==='true') document.body.classList.add('dark-mode'); }
  function toggleDarkMode() { document.body.classList.toggle('dark-mode'); localStorage.setItem('darkMode',document.body.classList.contains('dark-mode')); }
  function closeModal() { document.querySelectorAll('.modal').forEach(m=>m.remove()); }
  
  function startAutoSave(saveFunction, interval = 30000) {
    if(autoSaveInterval) clearInterval(autoSaveInterval);
    autoSaveInterval = setInterval(() => {
      if(unsavedChanges && saveFunction) {
        saveFunction();
        unsavedChanges = false;
        showNotification('Auto-saved!', 'warning');
      }
    }, interval);
  }
  function markUnsaved() { unsavedChanges = true; }
  
  function fillDownValues() { 
    const inputs = document.querySelectorAll('#marksTable input[type="number"], #nckMarksContainer input[type="number"]'); 
    if(inputs.length === 0){ 
      showNotification('No inputs found', 'error'); 
      return; 
    } 
    const val = inputs[0].value; 
    for(let i = 1; i < inputs.length; i++){ 
      inputs[i].value = val; 
      inputs[i].dispatchEvent(new Event('change')); 
    } 
    showNotification(`Filled down: ${val || 'empty'} to ${inputs.length-1} cells`); 
    markUnsaved(); 
  }
  
  // ======================= LOGIN & MAIN =======================
  function checkLogin() { initDarkMode(); const saved=localStorage.getItem('nursingUser'); if(saved){ currentUser=JSON.parse(saved); const savedYear=localStorage.getItem('selectedYear'); currentYear=(savedYear&&INTAKE_YEARS.includes(savedYear))?savedYear:'2026'; showMain(); } else { showLogin(); } }
  
  function showLogin() { 
    const yearOptions=INTAKE_YEARS.map(y=>`<option value="${y}" ${y==='2026'?'selected':''}>🎓 March ${y} Class</option>`).join(''); 
    document.getElementById('app').innerHTML=`<div class="login-container"><div style="text-align:center;margin-bottom:24px;"><i class="fas fa-graduation-cap" style="font-size:48px;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;background-clip:text;color:transparent;"></i></div><h2>Nursing School System</h2><p style="text-align:center;color:#64748b;margin-bottom:32px;">Nakuru College of Health Sciences</p><select id="loginYear">${yearOptions}</select><input type="text" id="username" placeholder="👤 Username"><input type="password" id="password" placeholder="🔒 Password"><button onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Login</button><div id="loginError" style="color:#ef4444;margin-top:16px;text-align:center;"></div></div>`; 
  }
  
  async function doLogin() { 
    showLoading('Logging in...'); 
    const username=document.getElementById('username').value; 
    const password=document.getElementById('password').value; 
    const year=document.getElementById('loginYear').value; 
    currentYear=year; 
    localStorage.setItem('selectedYear',currentYear); 
    const result=await apiCall('/api/login',{method:'POST',body:JSON.stringify({username,password,year:currentYear})}); 
    hideLoading(); 
    if(result.success){ 
      currentUser=result.user; 
      localStorage.setItem('nursingUser',JSON.stringify(currentUser)); 
      showMain(); 
      showNotification(`Welcome ${currentUser.name}!`); 
    } else { 
      document.getElementById('loginError').innerHTML=result.message; 
    } 
  }
  
  function logout() { 
    localStorage.removeItem('nursingUser'); 
    currentUser=null; 
    configCache=null; 
    if(autoSaveInterval) clearInterval(autoSaveInterval); 
    showLogin(); 
  }
  
  // ======================= SIDEBAR INTEGRATION - WRAPS THE MAIN CONTENT =======================
  // This function creates the sidebar wrapper and injects your original main content into it
  function renderWithSidebar(contentHtml) {
    const sidebarHtml = `
      <div class="app-wrapper">
        <aside class="sidebar" id="mainSidebar">
          <div class="sidebar-logo">
            <i class="fas fa-graduation-cap"></i>
            <span>Nakuru Health</span>
          </div>
          <div class="nav-menu">

  window.updateXYAverage = function(idx) { 
    let scores=[]; 
    for(let c=0;c<22;c++){ 
      const val=parseFloat(document.getElementById(`xy_${idx}_${c}`)?.value); 
      if(!isNaN(val)&&val>0) scores.push(val); 
    } 
    const avg=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:0; 
    const status=avg>=60?'PASS':(scores.length?'FAIL':'PENDING'); 
    const avgEl = document.getElementById(`xyAvg_${idx}`);
    const statusEl = document.getElementById(`xyStatus_${idx}`);
    if(avgEl) avgEl.innerHTML=avg.toFixed(2); 
    if(statusEl) statusEl.innerHTML=`<span class="badge ${status==='PASS'?'badge-pass':'badge-fail'}">${status}</span>`; 
    const row=document.getElementById(`xy_${idx}_0`)?.parentElement?.parentElement; 
    if(row) row.className=status==='PASS'?'pass-row':(status==='FAIL'?'fail-row':'pending-row'); 
  };
  
  window.updateACTotal = function(idx) { 
    const columnCount = 12;
    let scores = []; 
    let hasAnyScore = false; 
    for (let c = 0; c < columnCount; c++) { 
      const input = document.getElementById(`ac_${idx}_${c}`); 
      if (input) { 
        const val = input.value; 
        if (val !== '' && !isNaN(parseFloat(val)) && parseFloat(val) > 0) { 
          scores.push(parseFloat(val)); 
          hasAnyScore = true; 
        } else { 
          scores.push(0); 
        } 
      } else { 
        scores.push(0); 
      } 
    } 
    const total = scores.reduce((a, b) => a + b, 0);

    if(totalEl) totalEl.innerHTML = total;

    if(statusEl) statusEl.innerHTML = `<span class="badge ${status === 'PASS' ? 'badge-pass' : (status === 'FAIL' ? 'badge-fail' : 'badge-pending')}">${status}</span>`; 
    if(avgEl){ avgEl.style.background = average >= 60 ? '#d1fae5' : (hasAnyScore ? '#fee2e2' : '#fef3c7'); } 
    const row = document.getElementById(`ac_${idx}_0`)?.parentElement?.parentElement;

  window.saveNCKMarks = async function() { 
    const sheetName = document.getElementById('nckSheetSelect').value; 
    let marksData = []; 
    if (sheetName === 'XY FORMS') { 
      const rows = document.querySelectorAll('#nckMarksContainer tbody tr'); 
      for (let i = 0; i < rows.length; i++) { 
        let scores = []; 
        for (let c = 0; c < 22; c++) { 
          scores.push(parseFloat(document.getElementById(`xy_${i}_${c}`)?.value) || 0); 
        } 
        marksData.push({ row: i + 2, scores: scores, gradedBy: document.getElementById(`xyGraded_${i}`)?.value || '' }); 
      } 
    } else { 
      const columnCount = 12;
      const rows = document.querySelectorAll('#nckMarksContainer tbody tr'); 
      for (let i = 0; i < rows.length; i++) { 
        let scores = []; 
        for (let c = 0; c < columnCount; c++) { 
          const val = document.getElementById(`ac_${i}_${c}`)?.value; 
          const score = (val !== '' && !isNaN(parseFloat(val))) ? parseFloat(val) : ''; 
          scores.push(score); 
        } 
        marksData.push({ row: i + 2, scores: scores, gradedBy: document.getElementById(`acGraded_${i}`)?.value || '' }); 
      } 
    } 
    showLoading('Saving NCK marks...'); 
    const result = await apiCall('/api/marks', { 
      method: 'POST', 
      body: JSON.stringify({ 
        block: 'BLOCK_0', 
        subject: sheetName, 
        marksData: marksData, 
        lecturerName: currentUser.name, 
        examType: 'nck', 
        userRole: currentUser?.role 
      }) 
    }); 
    hideLoading(); 
    showNotification(result.success ? 'NCK marks saved successfully!' : (result.message || 'Error saving NCK marks'), !result.success); 
    if (result.success) loadNCKMarks(); 
  };

  async function loadAdminMarks(block, subject, at) { 
    showLoading('Loading marks...'); 
    const marks = await apiCall(`/api/marks/${block}/${subject}`, {}); 
    
    let html = `<div class="export-bar" style="margin-bottom:16px;"><button class="export-btn" onclick="exportAdminMarks()">Export CSV</button><button class="btn-info" onclick="fillDownValues()" style="margin-left:10px;">Fill Down</button></div>
      <div style="overflow-x:auto;"><table style="width:100%"><thead><tr style="background:#667eea;color:white"><th>Admission</th><th>Name</th>`;
    
    if(at === 'full') html += '<th>CAT1 (0-30)</th><th>CAT2 (0-30)</th><th>Exam (0-70)</th>';
    else if(at === 'single_cat') html += '<th>CAT (0-30)</th><th>Exam (0-70)</th>';
    else html += '<th>Exam (0-100)</th>';
    
    html += '<th>Total</th><th>Status</th><th>Graded By</th></tr></thead><tbody>';
    
    window.currentAdminMarks = marks; 
    window.currentAdminAssessmentType = at; 
    window.currentAdminBlock = block; 
    window.currentAdminSubject = subject; 
    window.currentSaveFunction = saveAdminMarks;
    
    for(let i = 0; i < marks.length; i++){ 
      const m = marks[i]; 
      const cat1 = m.cat1 || ''; 
      const cat2 = m.cat2 || ''; 
      const exam = m.exam || ''; 
      let ncat1 = parseFloat(cat1) || 0; 
      let ncat2 = parseFloat(cat2) || 0; 
      let nexam = parseFloat(exam) || 0; 
      let total = 0; 
      
      if(at === 'full') total = Math.round(((Math.min(ncat1,30) + Math.min(ncat2,30)) / 60 * 30 + Math.min(nexam,70)) * 10) / 10;
      else if(at === 'single_cat') total = Math.round((Math.min(ncat1,30) + Math.min(nexam,70)) * 10) / 10;
      else total = Math.round(Math.min(nexam,100) * 10) / 10;
      
      const status = total >= 60 ? 'PASS' : (total > 0 ? 'FAIL' : ''); 
      const rowClass = total >= 60 ? 'pass-row' : 'fail-row';
      
      html += `<tr class="${rowClass}"><td style="padding:10px;">${m.admission}<\/td><td style="padding:10px;"><strong>${m.name}</strong><\/td>`;
      
      if(at === 'full'){ 
        html += `<td style="padding:10px;"><input type="number" id="acat1_${i}" value="${cat1}" min="0" max="30" step="0.5" onchange="updateAdminTotal(${i})"><\/td>
          <td style="padding:10px;"><input type="number" id="acat2_${i}" value="${cat2}" min="0" max="30" step="0.5" onchange="updateAdminTotal(${i})"><\/td>
          <td style="padding:10px;"><input type="number" id="aexam_${i}" value="${exam}" min="0" max="70" step="0.5" onchange="updateAdminTotal(${i})"><\/td>`; 
      } else if(at === 'single_cat'){ 
        html += `<td style="padding:10px;"><input type="number" id="acat1_${i}" value="${cat1}" min="0" max="30" step="0.5" onchange="updateAdminTotal(${i})"><\/td>
          <td style="padding:10px;"><input type="number" id="aexam_${i}" value="${exam}" min="0" max="70" step="0.5" onchange="updateAdminTotal(${i})"><\/td>`; 
      } else { 
        html += `<td style="padding:10px;"><input type="number" id="aexam_${i}" value="${exam}" min="0" max="100" step="0.5" onchange="updateAdminTotal(${i})"><\/td>`; 
      } 
      
      html += `<td id="atotal_${i}" style="font-weight:bold;">${total}<\/td>
        <td id="astatus_${i}">${status}<\/td>
        <td style="padding:10px;">${m.gradedBy || '-'}<\/td><\/tr>`; 
    } 
    
    html += `</tbody><\/table><\/div>
      <div style="text-align:center;margin-top:20px"><button class="save-btn" onclick="saveAdminMarks()">💾 Save All Marks<\/button><\/div>`; 
    
    document.getElementById('marksTable').innerHTML = html; 
    hideLoading(); 
    startAutoSave(saveAdminMarks, 30000);
  }
  
  window.updateAdminTotal = function(idx){ 
    const at = window.currentAdminAssessmentType || 'full'; 
    let cat1 = parseFloat(document.getElementById(`acat1_${idx}`)?.value) || 0; 
    let cat2 = parseFloat(document.getElementById(`acat2_${idx}`)?.value) || 0; 
    let exam = parseFloat(document.getElementById(`aexam_${idx}`)?.value) || 0; 
    let total = 0; 
    
    if(at === 'full') total = Math.round(((Math.min(cat1,30) + Math.min(cat2,30)) / 60 * 30 + Math.min(exam,70)) * 10) / 10;
    else if(at === 'single_cat') total = Math.round((Math.min(cat1,30) + Math.min(exam,70)) * 10) / 10;
    else total = Math.round(Math.min(exam,100) * 10) / 10;
    
    document.getElementById(`atotal_${idx}`).innerHTML = total; 
    document.getElementById(`astatus_${idx}`).innerHTML = total >= 60 ? 'PASS' : 'FAIL'; 
    const row = document.getElementById(`acat1_${idx}`)?.parentElement?.parentElement; 
    if(row) row.className = total >= 60 ? 'pass-row' : 'fail-row'; 
  };
  
  window.saveAdminMarks = async function(){ 
    let marksData = []; 
    const len = window.currentAdminMarks?.length || 0; 
    const at = window.currentAdminAssessmentType || 'full'; 
    
    for(let i = 0; i < len; i++){ 
      if(at === 'full') marksData.push({ row: i + 2, cat1: document.getElementById(`acat1_${i}`)?.value || '', cat2: document.getElementById(`acat2_${i}`)?.value || '', exam: document.getElementById(`aexam_${i}`)?.value || '' }); 
      else if(at === 'single_cat') marksData.push({ row: i + 2, cat1: document.getElementById(`acat1_${i}`)?.value || '', cat2: '', exam: document.getElementById(`aexam_${i}`)?.value || '' }); 
      else marksData.push({ row: i + 2, cat1: '', cat2: '', exam: document.getElementById(`aexam_${i}`)?.value || '' }); 
    } 
    
    showLoading('Saving marks...'); 
    const result = await apiCall('/api/marks', { method: 'POST', body: JSON.stringify({ block: window.currentAdminBlock, subject: window.currentAdminSubject, marksData: marksData, lecturerName: currentUser.name }) }); 
    hideLoading(); 
    showNotification(result?.success ? 'Marks saved successfully!' : 'Error saving marks', !result?.success); 
    if(result?.success) loadAdminMarks(window.currentAdminBlock, window.currentAdminSubject, window.currentAdminAssessmentType); 
  };

      exportToCSV(data, 'internal_marks'); 
    } 
  };

  async function showLecturerSubjects() { 
    showLoading('Loading your subjects...'); 
    const blocks = ['BLOCK_0', 'BLOCK_1', 'BLOCK_2', 'BLOCK_3', 'BLOCK_4', 'BLOCK_5']; 
    const lecturerSubjects = currentUser.subjects || []; 
    const config = await getConfig(); 
    const settings = await apiCall('/api/mark-entry/settings', {});
    
    const subjectsByBlock = {}; 
    for(let b of blocks) subjectsByBlock[b] = []; 
    
    for(let subj of lecturerSubjects){ 
      const parts = subj.split('|'); 
      const block = parts[0]; 
      const name = parts[1]; 
      let atype = 'full'; 
      if(config && config[block]){ 
        const found = config[block].find(c => c.name === name); 
        if(found) atype = found.assessmentType || 'full'; 
      } 
      
      let isSubjectOpen = true;
      let closedReason = '';
      if(settings.global && settings.global.enabled === false){ 
        isSubjectOpen = false; 
        closedReason = 'Global entry closed by administrator';
      } else if(settings[`${currentYear}_all`] && settings[`${currentYear}_all`].enabled === false){ 
        isSubjectOpen = false; 
        closedReason = `Entry closed for March ${currentYear} class`;
      } else if(settings[`${block}_${name}`] && settings[`${block}_${name}`].enabled === false){ 
        isSubjectOpen = false; 
        closedReason = `Entry closed for this subject`;
      }
      
      subjectsByBlock[block].push({ name, assessmentType: atype, isOpen: isSubjectOpen, closedReason }); 
    } 
    
    let html = `<button class="back-btn" onclick="showMain()"><i class="fas fa-arrow-left"></i> Back</button>

  async function loadMarksForSubject(block, subject, atype){ 
    showLoading('Loading marks...'); 
    const marks = await apiCall(`/api/marks/${encodeURIComponent(block)}/${encodeURIComponent(subject)}`, {}); 
    let html = `<button class="back-btn" onclick="showLecturerSubjects()">Back</button><div class="header"><h3>📝 ${subject}</h3><p>${block.replace('_', ' ')} | ${atype === 'full' ? 'CAT1+CAT2+Exam' : (atype === 'single_cat' ? 'CAT+Exam' : 'Exam Only')}</p></div><div id="marksTableContainer"></div>`; 
    updateContentArea(html);
    displayLecturerMarksTable(marks, block, subject, atype); 
    hideLoading(); 
  }
  
  function displayLecturerMarksTable(marks, block, subject, atype){ 
    if(!marks || !marks.length){ 
      document.getElementById('marksTableContainer').innerHTML = '<div class="card" style="text-align:center;">No data found</div>'; 
      return; 
    } 
    
    let html = `<div style="overflow-x:auto;"><table style="width:100%"><thead><tr style="background:#667eea;color:white"><th>Admission</th><th>Name</th>`;
    
    if(atype === 'full') html += '<th>CAT1 (0-30)</th><th>CAT2 (0-30)</th><th>Exam (0-70)</th>';
    else if(atype === 'single_cat') html += '<th>CAT (0-30)</th><th>Exam (0-70)</th>';
    else html += '<th>Exam (0-100)</th>';
    
    html += '<th>Total</th><th>Status</th><th>Graded By</th></tr></thead><tbody>';
    
    window.currentMarksData = marks; 
    window.currentMarksSubject = subject; 
    window.currentMarksBlock = block; 
    window.currentAssessmentType = atype; 
    window.currentSaveFunction = saveLecturerMarks;
    
    for(let i = 0; i < marks.length; i++){ 
      const m = marks[i]; 
      const cat1 = m.cat1 || ''; 
      const cat2 = m.cat2 || ''; 
      const exam = m.exam || ''; 
      let ncat1 = parseFloat(cat1) || 0; 
      let ncat2 = parseFloat(cat2) || 0; 
      let nexam = parseFloat(exam) || 0; 
      let total = 0; 
      
      if(atype === 'full') total = Math.round(((Math.min(ncat1,30) + Math.min(ncat2,30)) / 60 * 30 + Math.min(nexam,70)) * 10) / 10;
      else if(atype === 'single_cat') total = Math.round((Math.min(ncat1,30) + Math.min(nexam,70)) * 10) / 10;
      else total = Math.round(Math.min(nexam,100) * 10) / 10;
      
      const status = total >= 60 ? 'PASS' : (total > 0 ? 'FAIL' : ''); 
      const rowClass = total >= 60 ? 'pass-row' : 'fail-row';
      
      html += `<tr class="${rowClass}"><td style="padding:10px;">${m.admission}<\/td><td style="padding:10px;"><strong>${m.name}</strong><\/td>`;
      
      if(atype === 'full'){ 
        html += `<td style="padding:10px;"><input type="number" id="cat1_${i}" value="${cat1}" min="0" max="30" step="0.5" onchange="updateLecturerTotal(${i})"><\/td>
          <td style="padding:10px;"><input type="number" id="cat2_${i}" value="${cat2}" min="0" max="30" step="0.5" onchange="updateLecturerTotal(${i})"><\/td>
          <td style="padding:10px;"><input type="number" id="exam_${i}" value="${exam}" min="0" max="70" step="0.5" onchange="updateLecturerTotal(${i})"><\/td>`; 
      } else if(atype === 'single_cat'){ 
        html += `<td style="padding:10px;"><input type="number" id="cat1_${i}" value="${cat1}" min="0" max="30" step="0.5" onchange="updateLecturerTotal(${i})"><\/td>
          <td style="padding:10px;"><input type="number" id="exam_${i}" value="${exam}" min="0" max="70" step="0.5" onchange="updateLecturerTotal(${i})"><\/td>`; 
      } else { 
        html += `<td style="padding:10px;"><input type="number" id="exam_${i}" value="${exam}" min="0" max="100" step="0.5" onchange="updateLecturerTotal(${i})"><\/td>`; 
      } 
      
      html += `<td id="ltotal_${i}" style="font-weight:bold;">${total}<\/td>
        <td id="lstatus_${i}">${status}<\/td>
        <td style="padding:10px;">${m.gradedBy || '-'}<\/td><\/tr>`; 
    } 
    
    html += `</tbody><\/table><\/div>
      <div style="text-align:center;margin-top:20px"><button class="save-btn" onclick="saveLecturerMarks()">💾 Save Marks<\/button><\/div>`; 
    
    document.getElementById('marksTableContainer').innerHTML = html; 
    startAutoSave(saveLecturerMarks, 30000);
  }
  
  window.updateLecturerTotal = function(idx){ 
    const at = window.currentAssessmentType || 'full'; 
    let cat1 = parseFloat(document.getElementById(`cat1_${idx}`)?.value) || 0; 
    let cat2 = parseFloat(document.getElementById(`cat2_${idx}`)?.value) || 0; 
    let exam = parseFloat(document.getElementById(`exam_${idx}`)?.value) || 0; 
    let total = 0; 
    
    if(at === 'full') total = Math.round(((Math.min(cat1,30) + Math.min(cat2,30)) / 60 * 30 + Math.min(exam,70)) * 10) / 10;
    else if(at === 'single_cat') total = Math.round((Math.min(cat1,30) + Math.min(exam,70)) * 10) / 10;
    else total = Math.round(Math.min(exam,100) * 10) / 10;
    
    document.getElementById(`ltotal_${idx}`).innerHTML = total; 
    document.getElementById(`lstatus_${idx}`).innerHTML = total >= 60 ? 'PASS' : 'FAIL'; 
    const row = document.getElementById(`cat1_${idx}`)?.parentElement?.parentElement; 
    if(row) row.className = total >= 60 ? 'pass-row' : 'fail-row'; 
  };
  
  window.saveLecturerMarks = async function(){ 
    let marksData = []; 
    const len = window.currentMarksData?.length || 0; 
    const at = window.currentAssessmentType || 'full'; 
    
    for(let i = 0; i < len; i++){ 
      if(at === 'full') marksData.push({ row: i + 2, cat1: document.getElementById(`cat1_${i}`)?.value || '', cat2: document.getElementById(`cat2_${i}`)?.value || '', exam: document.getElementById(`exam_${i}`)?.value || '' }); 
      else if(at === 'single_cat') marksData.push({ row: i + 2, cat1: document.getElementById(`cat1_${i}`)?.value || '', cat2: '', exam: document.getElementById(`exam_${i}`)?.value || '' }); 
      else marksData.push({ row: i + 2, cat1: '', cat2: '', exam: document.getElementById(`exam_${i}`)?.value || '' }); 
    } 
    
    showLoading('Saving marks...'); 
    const result = await apiCall('/api/marks', { method: 'POST', body: JSON.stringify({ block: window.currentMarksBlock, subject: window.currentMarksSubject, marksData: marksData, lecturerName: currentUser.name }) }); 
    hideLoading(); 
    showNotification(result?.success ? 'Marks saved successfully!' : 'Error saving marks', !result?.success); 
    if(result?.success) loadMarksForSubject(window.currentMarksBlock, window.currentMarksSubject, window.currentAssessmentType); 
  };

      hideLoading(); 
      showNotification(result.success ? 'Unit deleted successfully!' : (result.message || 'Error deleting unit'), !result.success); 
      if(result.success){ configCache = null; showUnits(); } 
    } 
  }
  
  // ======================= INITIALIZATION =======================
  let sy = localStorage.getItem('selectedYear'); 
  if(sy && INTAKE_YEARS.includes(sy)) currentYear = sy; 
  let set = localStorage.getItem('selectedExamType'); 
  if(set) currentExamType = set; 
  checkLogin();
</script>
</body>
</html>
