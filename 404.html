<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>NCHSM Digital Campus</title>
    <script>
        // Get current path
        const path = window.location.pathname;
        const hash = window.location.hash;
        const search = window.location.search;
        
        // Remove trailing slash
        const cleanPath = path.replace(/\/$/, '');
        
        // Route mapping - without extra hashtags
        const routes = {
            '/': '/student',
            '/index.html': '/student',
            '/student': '/student.html',
            '/superadmin': '/superadmin.html',
            '/login': '/login.html',
            '/profile': '/student',
            '/calendar': '/student',
            '/learning-hub': '/student',
            '/attendance': '/student',
            '/exam-card': '/student',
            '/cats': '/student',
            '/resources': '/student',
            '/messages': '/student',
            '/support-tickets': '/student',
            '/nurseiq': '/student'
        };
        
        // Hash mapping (what comes after #)
        const hashMap = {
            '/profile': 'profile',
            '/calendar': 'calendar',
            '/learning-hub': 'learning-hub',
            '/attendance': 'attendance',
            '/exam-card': 'exam-card',
            '/cats': 'cats',
            '/resources': 'resources',
            '/messages': 'messages',
            '/support-tickets': 'support-tickets',
            '/nurseiq': 'nurseiq'
        };
        
        let destination;
        
        // Check if direct route exists
        if (routes[cleanPath]) {
            destination = routes[cleanPath];
        }
        // Check if it's a hash route
        else if (hashMap[cleanPath]) {
            // Clean: only one # symbol
            destination = '/student#' + hashMap[cleanPath];
        }
        // Default
        else {
            destination = '/student';
        }
        
        // Add search params if any
        if (search && !destination.includes('?')) {
            destination += search;
        }
        
        console.log('Redirecting to:', destination);
        window.location.href = destination;
    </script>
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif;">
        <div style="text-align: center;">
            <div style="width: 40px; height: 40px; border: 3px solid #4C1D95; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
            <p>Loading NCHSM Digital Campus...</p>
        </div>
    </div>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
