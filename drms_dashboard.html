<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DRMS Dashboard | NCHSM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0a2a3b; --primary-light: #123e52; --accent: #f4b942;
            --success: #2e7d64; --danger: #c53030; --gray-100: #f1f5f9; --gray-200: #e2e8f0; --gray-600: #4a5568;
        }
        body { font-family: 'Inter', sans-serif; background: var(--gray-100); color: #1a2c3e; }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white; padding: 0.8rem 2rem; display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 1rem; position: sticky; top: 0; z-index: 100;
        }
        .logo h1 { font-size: 1.3rem; }
        .logo p { font-size: 0.7rem; opacity: 0.8; }
        .header-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .user-info { display: flex; align-items: center; gap: 0.5rem; background: rgba(255,255,255,0.15); padding: 0.4rem 1rem; border-radius: 40px; }
        .role-badge { background: var(--accent); color: var(--primary); padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; margin-left: 0.5rem; }
        
        .btn { padding: 0.5rem 1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 0.85rem; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: var(--primary); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; }
        .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.75rem; }
        
        .app-container { display: flex; min-height: calc(100vh - 70px); flex-wrap: wrap; }
        .sidebar { width: 280px; background: white; border-right: 1px solid var(--gray-200); }
        body.dark .sidebar { background: #1a202c; }
        .nav { padding: 1.5rem 0; }
        .nav-group { margin-bottom: 1.5rem; }
        .nav-header { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gray-600); padding: 0.5rem 1.5rem; font-weight: 600; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 0.7rem 1.5rem; color: var(--gray-600); text-decoration: none; font-weight: 500; transition: all 0.2s; cursor: pointer; }
        .nav-item:hover { background: var(--gray-100); color: var(--primary); }
        .nav-item.active { background: linear-gradient(90deg, rgba(244,185,66,0.1) 0%, transparent 100%); border-left: 3px solid var(--accent); color: var(--primary); font-weight: 600; }
        .sidebar-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--gray-200); font-size: 0.7rem; text-align: center; }
        .main { flex: 1; padding: 1.5rem; overflow-y: auto; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: white; padding: 1rem; border-radius: 16px; border: 1px solid var(--gray-200); }
        .stat-number { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.75rem; color: var(--gray-600); }
        
        .search-bar { background: white; padding: 1rem; border-radius: 16px; margin-bottom: 1.5rem; display: flex; gap: 0.8rem; flex-wrap: wrap; border: 1px solid var(--gray-200); }
        .search-input { flex: 2; padding: 0.7rem; border: 1px solid var(--gray-200); border-radius: 12px; font-size: 0.9rem; }
        
        .table-container { background: white; border-radius: 16px; overflow-x: auto; border: 1px solid var(--gray-200); margin-bottom: 1.5rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 0.8rem 1rem; background: var(--gray-50); font-weight: 600; border-bottom: 1px solid var(--gray-200); }
        td { padding: 0.8rem 1rem; border-bottom: 1px solid var(--gray-200); }
        
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-pending { background: #feebc8; color: #7c2d12; }
        .badge-approved { background: #c6f6d5; color: #22543d; }
        .program-badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
        .program-krchn { background: #4C1D95; color: white; }
        .program-tvet { background: #f59e0b; color: white; }
        
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 0.3rem; font-size: 0.85rem; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 0.6rem; border: 1px solid var(--gray-200); border-radius: 10px; font-family: inherit; }
        .file-input { width: 100%; padding: 0.5rem; border: 1px dashed var(--gray-200); border-radius: 10px; background: var(--gray-50); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 20px; width: 90%; max-width: 500px; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
        .modal-lg { max-width: 800px; }
        .modal-xl { max-width: 1000px; }
        .modal-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; background: var(--gray-50); }
        .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .modal-body { padding: 1.5rem; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--gray-200); display: flex; justify-content: flex-end; gap: 0.5rem; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--success); color: white; padding: 0.8rem 1.2rem; border-radius: 12px; z-index: 1100; display: none; }
        .loading { text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--gray-200); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) { .app-container { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
<div class="app">
    <header class="header">
        <div class="logo"><h1><i class="fas fa-folder-open"></i> NCHSM Document Records System</h1><p>TVET & KRCHN Nursing | Document Lifecycle Management</p></div>
        <div class="header-right">
            <div class="user-info"><i class="fas fa-user-circle"></i><span id="userName">Loading...</span><span id="userRole" class="role-badge"></span><span id="userProgram" class="role-badge" style="background:#f59e0b;"></span></div>
            <button id="logoutBtn" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <nav class="nav" id="navMenu">
                <!-- Dynamic menu based on role -->
            </nav>
            <div class="sidebar-footer"><small>DRMS | NCHSM</small></div>
        </aside>

        <main class="main" id="mainContent"><div class="loading"><div class="spinner"></div> Loading...</div></main>
    </div>
</div>

<!-- Modals -->
<div id="docViewerModal" class="modal"><div class="modal-content modal-lg"><div class="modal-header"><h3 id="viewerTitle">Document Preview</h3><button class="modal-close" onclick="closeDocViewer()">&times;</button></div><div class="modal-body"><iframe id="docIframe" src="about:blank" style="width:100%; height:60vh; border:none;"></iframe></div><div class="modal-footer"><button id="downloadDocBtn" class="btn btn-primary">Download</button><button class="btn btn-outline" onclick="closeDocViewer()">Close</button></div></div></div>
<div id="uploadModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Upload Document</h3><button class="modal-close" onclick="closeUploadModal()">&times;</button></div><div class="modal-body"><form id="uploadForm"><div class="form-group"><label>Student *</label><select id="uploadStudentId" class="form-select" required></select></div><div class="form-group"><label>Title *</label><input type="text" id="docTitle" class="form-input" required></div><div class="form-group"><label>Category *</label><select id="docCategory" class="form-select"><option>Admission</option><option>Academic</option><option>Financial</option><option>Medical</option></select></div><div class="form-group"><label>Description</label><textarea id="docDesc" class="form-textarea" rows="2"></textarea></div><div class="form-group"><label>File *</label><input type="file" id="docFile" class="file-input" accept=".pdf,.jpg,.png,.doc,.docx" required></div><div class="form-actions"><button type="submit" class="btn btn-success">Upload</button><button type="button" class="btn btn-outline" onclick="closeUploadModal()">Cancel</button></div></form></div></div></div>
<div id="studentRecordModal" class="modal"><div class="modal-content modal-xl"><div class="modal-header"><h3 id="studentRecordTitle">Student Complete Record</h3><button class="modal-close" onclick="closeStudentRecordModal()">&times;</button></div><div class="modal-body" id="studentRecordBody"></div><div class="modal-footer"><button class="btn btn-primary" onclick="exportStudentPDF()">Export PDF</button><button class="btn btn-outline" onclick="closeStudentRecordModal()">Close</button></div></div></div>
<div id="editStudentModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Edit Student</h3><button class="modal-close" onclick="closeEditModal()">&times;</button></div><div class="modal-body"><form id="editForm"><input type="hidden" id="editId"><div class="form-group"><label>Full Name</label><input type="text" id="editName" class="form-input" required></div><div class="form-group"><label>Email</label><input type="email" id="editEmail" class="form-input" required></div><div class="form-group"><label>Program</label><select id="editProgram" class="form-select"><option value="KRCHN">KRCHN Nursing</option><option value="DPOTT">DPOTT</option><option value="DCH">DCH</option><option value="DHRIT">DHRIT</option><option value="DSL">DSL</option></select></div><div class="form-group"><label>Intake Year</label><input type="text" id="editIntake" class="form-input"></div><div class="form-group"><label>Block/Term</label><input type="text" id="editBlock" class="form-input"></div><div class="form-group"><label>Status</label><select id="editStatus" class="form-select"><option value="active">Active</option><option value="inactive">Inactive</option><option value="graduated">Graduated</option></select></div><div class="form-actions"><button type="submit" class="btn btn-success">Save</button><button type="button" class="btn btn-outline" onclick="closeEditModal()">Cancel</button></div></form></div></div></div>
<div id="approvalModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Approve Document</h3><button class="modal-close" onclick="closeApprovalModal()">&times;</button></div><div class="modal-body"><textarea id="approvalComments" class="form-textarea" rows="3" placeholder="Add comments..."></textarea></div><div class="modal-footer"><button class="btn btn-success" onclick="submitApproval('approve')">Approve</button><button class="btn btn-danger" onclick="submitApproval('reject')">Reject</button><button class="btn btn-outline" onclick="closeApprovalModal()">Cancel</button></div></div></div>

<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL = 'https://lwhtjozfsmbyihenfunw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3aHRqb3pmc21ieWloZW5mdW53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk2NTgxMjcsImV4cCI6MjA3NTIzNDEyN30.7Z8AYvPQwTAEEEhODlW6Xk-IR1FK3Uj5ivZS7P17Wpk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Get current session
let currentUser = null;
let allStudents = [];
let allDocs = [];
let currentApprovalDoc = null;

function showToast(msg, isErr) { const t = document.getElementById('toast'); t.textContent = msg; t.style.background = isErr ? '#c53030' : '#2e7d64'; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }

async function loadStudents() {
    let query = sb.from('consolidated_user_profiles_table').select('*').eq('role', 'student');
    // If lecturer, only see their program students
    if (currentUser?.role === 'lecturer' && currentUser?.program) {
        query = query.eq('program', currentUser.program);
    }
    const { data } = await query;
    allStudents = data || [];
    return allStudents;
}

async function loadDocs() {
    let query = sb.from('drms_documents').select('*').order('created_at', false);
    // If student, only see their own documents
    if (currentUser?.role === 'student') {
        query = query.eq('student_id', currentUser.user_id);
    }
    // If lecturer, only see documents for their program students
    if (currentUser?.role === 'lecturer' && currentUser?.program) {
        const { data: studentsInProgram } = await sb.from('consolidated_user_profiles_table').select('user_id').eq('program', currentUser.program);
        const studentIds = studentsInProgram?.map(s => s.user_id) || [];
        if (studentIds.length > 0) {
            query = query.in('student_id', studentIds);
        }
    }
    const { data } = await query;
    allDocs = data || [];
    return allDocs;
}

async function renderDashboard() {
    await loadDocs(); await loadStudents();
    const recentDocs = allDocs.slice(0, 10);
    let html = `<div class="stats-grid"><div class="stat-card"><div class="stat-number">${allDocs.length}</div><div class="stat-label">Total Documents</div></div><div class="stat-card"><div class="stat-number">${allStudents.length}</div><div class="stat-label">Students</div></div></div><div class="table-container"><h3 style="padding:1rem">📋 Recent Documents</h3><table><thead><tr><th>Student</th><th>Title</th><th>Category</th><th>Date</th><th>Actions</th></tr></thead><tbody>`;
    for(let d of recentDocs) {
        const s = allStudents.find(st => st.user_id === d.student_id);
        html += `<tr><td>${escapeHtml(s?.full_name || 'Unknown')}</td><td>${escapeHtml(d.title)}</td><td><span class="badge">${d.category}</span></td><td>${new Date(d.created_at).toLocaleDateString()}</td><td><button class="btn btn-sm btn-primary" onclick="viewDoc(${d.id})">View</button></td></tr>`;
    }
    html += `</tbody></div>`;
    document.getElementById('mainContent').innerHTML = html;
}

async function renderAllDocuments() {
    await loadDocs(); await loadStudents();
    let html = '';
    for(let d of allDocs) {
        const s = allStudents.find(st => st.user_id === d.student_id);
        html += `<tr><td>${escapeHtml(s?.full_name || 'Unknown')}</td><td><strong>${escapeHtml(d.title)}</strong><br><small>${escapeHtml(d.description || '')}</small></td><td><span class="badge">${d.category}</span></td><td>${new Date(d.created_at).toLocaleDateString()}</td><td><span class="badge ${d.status === 'approved' ? 'badge-approved' : 'badge-pending'}">${d.status || 'pending'}</span></td><td><button class="btn btn-sm btn-primary" onclick="viewDoc(${d.id})">View</button> ${currentUser?.role === 'admin' || currentUser?.role === 'superadmin' ? `<button class="btn btn-sm btn-danger" onclick="deleteDoc(${d.id})">Delete</button>` : ''}</td></tr>`;
    }
    document.getElementById('mainContent').innerHTML = `<div class="search-bar"><input type="text" id="docSearch" class="search-input" placeholder="Search..."><button id="searchBtn" class="btn btn-primary">Search</button></div><div class="table-container"><h3 style="padding:1rem">📋 All Documents (${allDocs.length})</h3><table><thead><tr><th>Student</th><th>Title</th><th>Category</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody id="docsBody">${html || '<tr><td colspan="6">No documents found</td></tr>'}</tbody></div>`;
    document.getElementById('searchBtn').onclick = () => { let term = document.getElementById('docSearch').value.toLowerCase(); let rows = document.querySelectorAll('#docsBody tr'); for(let r of rows) r.style.display = r.innerText.toLowerCase().includes(term) ? '' : 'none'; };
}

async function renderStudents() {
    await loadStudents();
    let html = '';
    for(let s of allStudents) {
        let docCount = allDocs.filter(d => d.student_id === s.user_id).length;
        html += `<tr><td><strong>${escapeHtml(s.full_name)}</strong><br><small>${escapeHtml(s.email)}</small></td><td><span class="program-badge program-${s.program === 'KRCHN' ? 'krchn' : 'tvet'}">${escapeHtml(s.program)}</span></td><td>${escapeHtml(s.intake_year || '-')}</td><td>${escapeHtml(s.block || '-')}</td><td>${docCount}</td><td><button class="btn btn-sm btn-primary" onclick="viewStudentRecord('${s.user_id}')">View Record</button> ${currentUser?.role === 'admin' || currentUser?.role === 'superadmin' ? `<button class="btn btn-sm btn-outline" onclick="openEditStudent('${s.user_id}')">Edit</button>` : ''}</td></tr>`;
    }
    document.getElementById('mainContent').innerHTML = `<div class="search-bar"><input type="text" id="studentSearch" class="search-input" placeholder="Search..."><button id="searchBtn" class="btn btn-primary">Search</button></div><div class="table-container"><h3 style="padding:1rem">👨‍🎓 Student Records</h3><table><thead><tr><th>Name</th><th>Program</th><th>Intake</th><th>Block</th><th>Documents</th><th>Actions</th></tr></thead><tbody id="studentsBody">${html || '<tr><td colspan="6">No students found</td></tr>'}</tbody></div>`;
    document.getElementById('searchBtn').onclick = () => { let term = document.getElementById('studentSearch').value.toLowerCase(); let rows = document.querySelectorAll('#studentsBody tr'); for(let r of rows) r.style.display = r.innerText.toLowerCase().includes(term) ? '' : 'none'; };
}

window.viewStudentRecord = async function(id) {
    await loadDocs();
    const s = allStudents.find(st => st.user_id === id);
    const studentDocs = allDocs.filter(d => d.student_id === id);
    let timelineHtml = '';
    for(let d of studentDocs) {
        timelineHtml += `<div style="border-left: 3px solid #f4b942; padding-left: 15px; margin-bottom: 15px;"><div style="font-size:11px; color:#666">${new Date(d.created_at).toLocaleString()}</div><div><span class="badge">${d.category}</span> <strong>${escapeHtml(d.title)}</strong></div><div>${escapeHtml(d.description || '')}</div><button class="btn btn-sm btn-primary" onclick="viewDoc(${d.id})">View Document</button></div>`;
    }
    document.getElementById('studentRecordTitle').innerHTML = `${s?.full_name} - Complete Record (${studentDocs.length} documents)`;
    document.getElementById('studentRecordBody').innerHTML = `<div style="background:#f0f0f0; padding:15px; border-radius:10px; margin-bottom:20px"><h3>${escapeHtml(s?.full_name)}</h3><p>Program: ${s?.program} | Intake: ${s?.intake_year} | Block: ${s?.block}<br>Email: ${escapeHtml(s?.email)}</p></div><h3>📄 Document Timeline</h3>${timelineHtml || '<p>No documents found</p>'}`;
    document.getElementById('studentRecordModal').style.display = 'flex';
};

async function renderUpload() {
    await loadStudents();
    let options = '<option value="">-- Select Student --</option>';
    let availableStudents = allStudents;
    if (currentUser?.role === 'lecturer' && currentUser?.program) {
        availableStudents = allStudents.filter(s => s.program === currentUser.program);
    }
    for(let s of availableStudents) options += `<option value="${s.user_id}">${escapeHtml(s.full_name)} (${s.program})</option>`;
    document.getElementById('mainContent').innerHTML = `<div class="table-container" style="padding:1.5rem"><form id="uploadForm"><div class="form-group"><label>Student *</label><select id="uploadStudentId" class="form-select" required>${options}</select></div><div class="form-group"><label>Title *</label><input type="text" id="docTitle" class="form-input" required></div><div class="form-group"><label>Category *</label><select id="docCategory" class="form-select"><option>Admission</option><option>Academic</option><option>Financial</option><option>Medical</option></select></div><div class="form-group"><label>Description</label><textarea id="docDesc" class="form-textarea" rows="2"></textarea></div><div class="form-group"><label>File *</label><input type="file" id="docFile" class="file-input" required></div><div class="form-actions"><button type="submit" class="btn btn-success">Upload</button></div></form></div>`;
    document.getElementById('uploadForm').onsubmit = async function(e) {
        e.preventDefault();
        const file = document.getElementById('docFile').files[0];
        if(!file) { showToast('Select a file', true); return; }
        const filePath = 'drms/' + Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9.-]/g, '_');
        await sb.storage.from('drms_files').upload(filePath, file);
        const { data: { publicUrl } } = sb.storage.from('drms_files').getPublicUrl(filePath);
        await sb.from('drms_documents').insert([{ student_id: document.getElementById('uploadStudentId').value, title: document.getElementById('docTitle').value, category: document.getElementById('docCategory').value, description: document.getElementById('docDesc').value, file_url: publicUrl, file_name: file.name, status: 'pending', created_at: new Date().toISOString() }]);
        showToast('Document uploaded!');
        document.getElementById('uploadForm').reset();
        await loadDocs();
        renderAllDocuments();
        renderDashboard();
    };
}

async function renderApprovals() {
    await loadDocs(); await loadStudents();
    let html = '';
    for(let d of allDocs) {
        if(d.status !== 'pending') continue;
        const s = allStudents.find(st => st.user_id === d.student_id);
        html += `<td>${escapeHtml(s?.full_name || 'Unknown')}</td><td>${escapeHtml(d.title)}</td><td><span class="badge">${d.category}</span></td><td>${new Date(d.created_at).toLocaleDateString()}</td><td><button class="btn btn-sm btn-success" onclick="openApproval(${d.id})">Approve</button> <button class="btn btn-sm btn-danger" onclick="rejectDoc(${d.id})">Reject</button></td></tr>`;
    }
    document.getElementById('mainContent').innerHTML = `<div class="table-container"><h3 style="padding:1rem">📋 Pending Approvals (${allDocs.filter(d => d.status === 'pending').length})</h3><table><thead><tr><th>Student</th><th>Title</th><th>Category</th><th>Date</th><th>Actions</th></tr></thead><tbody>${html || '<tr><td colspan="5">No pending approvals</tr>'}</tbody></div>`;
}

window.viewDoc = async function(id) {
    const d = allDocs.find(dc => dc.id === id);
    if(!d) return;
    document.getElementById('viewerTitle').innerHTML = d.title;
    document.getElementById('docIframe').src = d.file_url;
    document.getElementById('downloadDocBtn').onclick = () => window.open(d.file_url, '_blank');
    document.getElementById('docViewerModal').style.display = 'flex';
};

window.deleteDoc = async function(id) {
    if(!confirm('Delete this document?')) return;
    await sb.from('drms_documents').delete().eq('id', id);
    showToast('Document deleted');
    await loadDocs();
    renderAllDocuments();
    renderDashboard();
};

window.openApproval = function(id) { currentApprovalDoc = id; document.getElementById('approvalModal').style.display = 'flex'; };
window.submitApproval = async function(status) {
    await sb.from('drms_documents').update({ status: status === 'approve' ? 'approved' : 'rejected' }).eq('id', currentApprovalDoc);
    showToast('Document ' + (status === 'approve' ? 'approved' : 'rejected'));
    closeApprovalModal();
    await loadDocs();
    renderApprovals();
    renderDashboard();
};
window.rejectDoc = async function(id) { await sb.from('drms_documents').update({ status: 'rejected' }).eq('id', id); showToast('Document rejected'); await loadDocs(); renderApprovals(); renderDashboard(); };

window.openEditStudent = function(id) {
    const s = allStudents.find(st => st.user_id === id);
    if(!s) return;
    document.getElementById('editId').value = s.user_id;
    document.getElementById('editName').value = s.full_name;
    document.getElementById('editEmail').value = s.email;
    document.getElementById('editProgram').value = s.program;
    document.getElementById('editIntake').value = s.intake_year;
    document.getElementById('editBlock').value = s.block;
    document.getElementById('editStatus').value = s.status;
    document.getElementById('editStudentModal').style.display = 'flex';
};
document.getElementById('editForm').onsubmit = async function(e) {
    e.preventDefault();
    await sb.from('consolidated_user_profiles_table').update({ full_name: document.getElementById('editName').value, email: document.getElementById('editEmail').value, program: document.getElementById('editProgram').value, intake_year: document.getElementById('editIntake').value, block: document.getElementById('editBlock').value, status: document.getElementById('editStatus').value }).eq('user_id', document.getElementById('editId').value);
    showToast('Student updated!');
    closeEditModal();
    await loadStudents();
    renderStudents();
};

function closeDocViewer() { document.getElementById('docViewerModal').style.display = 'none'; }
function closeUploadModal() { document.getElementById('uploadModal').style.display = 'none'; }
function closeStudentRecordModal() { document.getElementById('studentRecordModal').style.display = 'none'; }
function closeEditModal() { document.getElementById('editStudentModal').style.display = 'none'; }
function closeApprovalModal() { document.getElementById('approvalModal').style.display = 'none'; }
window.exportStudentPDF = () => showToast('PDF export would generate here');

// Build dynamic menu based on role
function buildMenu() {
    const role = currentUser?.role;
    const navMenu = document.getElementById('navMenu');
    let menuHtml = `<div class="nav-group"><div class="nav-header">📊 DASHBOARD</div><a href="#" data-view="dashboard" class="nav-item active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></div>`;
    
    if (role === 'admin' || role === 'superadmin') {
        menuHtml += `<div class="nav-group"><div class="nav-header">👑 ADMIN</div>
            <a href="#" data-view="students" class="nav-item"><i class="fas fa-user-graduate"></i> Student Records</a>
            <a href="#" data-view="upload" class="nav-item"><i class="fas fa-upload"></i> Upload Document</a>
            <a href="#" data-view="documents" class="nav-item"><i class="fas fa-folder-open"></i> All Documents</a>
            <a href="#" data-view="approvals" class="nav-item"><i class="fas fa-check-double"></i> Pending Approvals</a>
        </div>`;
    } else if (role === 'lecturer') {
        menuHtml += `<div class="nav-group"><div class="nav-header">📚 LECTURER</div>
            <a href="#" data-view="students" class="nav-item"><i class="fas fa-user-graduate"></i> My Students</a>
            <a href="#" data-view="upload" class="nav-item"><i class="fas fa-upload"></i> Upload Document</a>
            <a href="#" data-view="documents" class="nav-item"><i class="fas fa-folder-open"></i> My Uploads</a>
        </div>`;
    } else if (role === 'student') {
        menuHtml += `<div class="nav-group"><div class="nav-header">🎓 STUDENT</div>
            <a href="#" data-view="documents" class="nav-item"><i class="fas fa-id-card"></i> My Documents</a>
        </div>`;
    }
    
    navMenu.innerHTML = menuHtml;
    
    // Attach event listeners to new menu items
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', async function(e) {
            e.preventDefault();
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            this.classList.add('active');
            const view = this.dataset.view;
            if (view === 'dashboard') await renderDashboard();
            else if (view === 'students') await renderStudents();
            else if (view === 'upload') await renderUpload();
            else if (view === 'documents') await renderAllDocuments();
            else if (view === 'approvals') await renderApprovals();
            else await renderDashboard();
        });
    });
}

// Initialize
async function init() {
    const sessionData = localStorage.getItem('drms_session');
    if (!sessionData) {
        window.location.href = 'drms_login.html';
        return;
    }
    
    currentUser = JSON.parse(sessionData);
    document.getElementById('userName').innerText = currentUser.full_name || currentUser.email;
    document.getElementById('userRole').innerText = currentUser.role?.toUpperCase() || 'USER';
    document.getElementById('userProgram').innerText = currentUser.program === 'KRCHN' ? '🎓 KRCHN' : '🛠️ TVET';
    document.getElementById('userProgram').style.background = currentUser.program === 'KRCHN' ? '#4C1D95' : '#f59e0b';
    
    buildMenu();
    await renderDashboard();
}

document.getElementById('logoutBtn').onclick = () => {
    localStorage.removeItem('drms_session');
    window.location.href = 'drms_login.html';
};

init();
</script>
