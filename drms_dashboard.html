<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DRMS Pro | Document Records Management System - NCHSM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0f2b3d; --primary-light: #1a415a; --accent: #f5b042;
            --success: #28a745; --danger: #dc3545; --gray-50: #f8f9fa;
            --gray-100: #f1f3f5; --gray-200: #e9ecef; --gray-600: #6c757d;
        }
        body { font-family: 'Inter', sans-serif; background: #e8ecf2; color: #1a2c3e; }
        body.dark { background: #141e28; color: #e8edf5; }
        
        .header { background: linear-gradient(135deg, #0f2b3d, #1a415a); color: white; padding: 0.8rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; position: sticky; top: 0; z-index: 100; }
        .logo h1 { font-size: 1.4rem; }
        .logo h1 i { color: #f5b042; margin-right: 8px; }
        .logo p { font-size: 0.7rem; opacity: 0.8; }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .user-info { display: flex; align-items: center; gap: 0.8rem; background: rgba(255,255,255,0.12); padding: 0.4rem 1.2rem; border-radius: 40px; }
        .role-badge { background: #f5b042; color: #0f2b3d; padding: 0.2rem 0.7rem; border-radius: 30px; font-size: 0.7rem; font-weight: 700; margin-left: 0.5rem; }
        .program-badge { padding: 0.2rem 0.7rem; border-radius: 30px; font-size: 0.7rem; font-weight: 700; background: #4C1D95; color: white; margin-left: 0.5rem; }
        
        .btn { padding: 0.5rem 1.2rem; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: #f5b042; color: #0f2b3d; }
        .btn-primary:hover { background: #e09d2a; transform: translateY(-1px); }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; }
        .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.75rem; }
        
        .app-container { display: flex; min-height: calc(100vh - 70px); }
        .sidebar { width: 280px; background: white; border-right: 1px solid #e9ecef; }
        body.dark .sidebar { background: #1a1f2e; border-right-color: #2f3648; }
        .nav { padding: 1.5rem 0; }
        .nav-group { margin-bottom: 1.5rem; }
        .nav-header { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #6c757d; padding: 0.5rem 1.8rem; font-weight: 600; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 0.7rem 1.8rem; color: #6c757d; text-decoration: none; font-weight: 500; transition: all 0.2s; cursor: pointer; }
        .nav-item:hover { background: rgba(245,176,66,0.1); color: #f5b042; }
        .nav-item.active { background: linear-gradient(90deg, rgba(245,176,66,0.15) 0%, transparent 100%); border-left: 3px solid #f5b042; color: #f5b042; font-weight: 600; }
        .sidebar-footer { padding: 1rem 1.5rem; border-top: 1px solid #e9ecef; font-size: 0.7rem; text-align: center; }
        .main { flex: 1; padding: 1.5rem; overflow-y: auto; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: white; padding: 1.2rem; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; }
        body.dark .stat-card { background: #1a1f2e; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: #f5b042; }
        .stat-number { font-size: 2rem; font-weight: 800; color: #0f2b3d; }
        body.dark .stat-number { color: #f5b042; }
        .stat-label { font-size: 0.75rem; color: #6c757d; margin-top: 0.3rem; }
        
        .search-bar { background: white; padding: 1rem; border-radius: 16px; margin-bottom: 1.5rem; display: flex; gap: 0.8rem; flex-wrap: wrap; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        body.dark .search-bar { background: #1a1f2e; }
        .search-input { flex: 2; padding: 0.7rem; border: 1px solid #e9ecef; border-radius: 10px; font-size: 0.9rem; }
        .filter-select { padding: 0.7rem; border: 1px solid #e9ecef; border-radius: 10px; background: white; }
        
        .table-container { background: white; border-radius: 16px; overflow-x: auto; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        body.dark .table-container { background: #1a1f2e; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 0.8rem 1rem; background: #f8f9fa; font-weight: 600; border-bottom: 1px solid #e9ecef; }
        td { padding: 0.8rem 1rem; border-bottom: 1px solid #e9ecef; }
        tr:hover { background: rgba(245,176,66,0.05); }
        
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-pending { background: #fff3e0; color: #f5a623; }
        .badge-approved { background: #e3f7ec; color: #28a745; }
        .program-badge-sm { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
        .program-krchn { background: #4C1D95; color: white; }
        .program-tvet { background: #f59e0b; color: white; }
        
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.85rem; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 0.7rem; border: 1px solid #e9ecef; border-radius: 10px; font-family: inherit; font-size: 0.9rem; }
        .file-input { width: 100%; padding: 0.5rem; border: 1px dashed #e9ecef; border-radius: 10px; background: #f8f9fa; }
        .form-actions { display: flex; gap: 1rem; margin-top: 1rem; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 24px; width: 90%; max-width: 1000px; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
        body.dark .modal-content { background: #1a1f2e; }
        .modal-header { padding: 1rem 1.5rem; border-bottom: 1px solid #e9ecef; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, #0f2b3d, #1a415a); color: white; }
        .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: white; }
        .modal-body { padding: 1.5rem; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid #e9ecef; display: flex; justify-content: flex-end; gap: 0.5rem; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; background: #28a745; color: white; padding: 0.8rem 1.2rem; border-radius: 50px; z-index: 1100; display: none; }
        .loading { text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 3px solid #e9ecef; border-top-color: #f5b042; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .chart-container { background: white; padding: 1rem; border-radius: 16px; margin-bottom: 1.5rem; }
        
        /* Document Viewer Styles */
        .pdf-viewer { width: 100%; height: 70vh; border: none; border-radius: 8px; }
        .image-viewer { max-width: 100%; max-height: 70vh; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .doc-viewer-fallback { text-align: center; padding: 40px; background: #f8f9fa; border-radius: 12px; }
        .doc-viewer-fallback i { font-size: 48px; color: #999; margin-bottom: 20px; }
        
        @media (max-width: 768px) { .app-container { flex-direction: column; } .sidebar { width: 100%; } .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
<div class="app">
    <header class="header">
        <div class="logo"><h1><i class="fas fa-folder-open"></i> NCHSM DRMS Pro</h1><p>Document Records Management | TVET & KRCHN</p></div>
        <div class="header-right">
            <div class="user-info"><i class="fas fa-user-circle"></i><span id="userName">Loading...</span><span id="userRole" class="role-badge"></span><span id="userProgram" class="program-badge"></span></div>
            <button id="logoutBtn" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar" id="sidebar"><nav class="nav" id="navMenu"></nav><div class="sidebar-footer"><small>DRMS Pro v6.0 | Enterprise</small></div></aside>
        <main class="main" id="mainContent"><div class="loading"><div class="spinner"></div> Loading...</div></main>
    </div>
</div>

<!-- Modals -->
<div id="docViewerModal" class="modal">
    <div class="modal-content modal-lg">
        <div class="modal-header">
            <h3 id="viewerTitle"><i class="fas fa-file"></i> Document Preview</h3>
            <button class="modal-close" onclick="closeDocViewer()">&times;</button>
        </div>
        <div class="modal-body" id="docViewerBody">
            <div class="loading"><div class="spinner"></div> Loading document...</div>
        </div>
        <div class="modal-footer">
            <button id="downloadDocBtn" class="btn btn-primary"><i class="fas fa-download"></i> Download</button>
            <button class="btn btn-outline" onclick="closeDocViewer()">Close</button>
        </div>
    </div>
</div>

<div id="uploadModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Upload Document</h3><button class="modal-close" onclick="closeUploadModal()">&times;</button></div><div class="modal-body"><form id="uploadForm"><div class="form-group"><label>Student *</label><select id="uploadStudentId" class="form-select" required></select></div><div class="form-group"><label>Title *</label><input type="text" id="docTitle" class="form-input" required></div><div class="form-group"><label>Category *</label><select id="docCategory" class="form-select"><option>Admission</option><option>Academic</option><option>Financial</option><option>Medical</option></select></div><div class="form-group"><label>Description</label><textarea id="docDesc" class="form-textarea" rows="2"></textarea></div><div class="form-group"><label>File *</label><input type="file" id="docFile" class="file-input" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" required></div><div class="form-actions"><button type="submit" class="btn btn-success">Upload</button><button type="button" class="btn btn-outline" onclick="closeUploadModal()">Cancel</button></div></form></div></div></div>

<div id="studentRecordModal" class="modal"><div class="modal-content modal-xl"><div class="modal-header"><h3 id="studentRecordTitle">Student Complete Record</h3><button class="modal-close" onclick="closeStudentRecordModal()">&times;</button></div><div class="modal-body" id="studentRecordBody"></div><div class="modal-footer"><button class="btn btn-primary" onclick="exportStudentPDF()">Export PDF</button><button class="btn btn-outline" onclick="closeStudentRecordModal()">Close</button></div></div></div>

<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL = 'https://lwhtjozfsmbyihenfunw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3aHRqb3pmc21ieWloZW5mdW53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk2NTgxMjcsImV4cCI6MjA3NTIzNDEyN30.7Z8AYvPQwTAEEEhODlW6Xk-IR1FK3Uj5ivZS7P17Wpk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null, allStudents = [], allDocs = [], chart = null;

function showToast(msg, isErr) { const t = document.getElementById('toast'); t.textContent = msg; t.style.background = isErr ? '#dc3545' : '#28a745'; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }

// FIXED: Document Viewer that actually displays files
window.viewDoc = async function(id) {
    const doc = allDocs.find(d => d.id === id);
    if(!doc) { showToast('Document not found', true); return; }
    
    const fileUrl = doc.file_url;
    const fileName = doc.file_name || 'document';
    const fileExt = (fileName.split('.').pop() || '').toLowerCase();
    
    document.getElementById('viewerTitle').innerHTML = '<i class="fas fa-file"></i> ' + escapeHtml(doc.title);
    
    let viewerHtml = '';
    
    // PDF files - display directly
    if (fileExt === 'pdf') {
        viewerHtml = '<iframe src="' + fileUrl + '#toolbar=1&navpanes=1" class="pdf-viewer" style="width:100%; height:70vh; border:none;"></iframe>';
    }
    // Images - display directly
    else if (['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp'].includes(fileExt)) {
        viewerHtml = '<div style="text-align:center; padding:20px;"><img src="' + fileUrl + '" class="image-viewer" alt="' + escapeHtml(doc.title) + '"></div>';
    }
    // Office documents - use Google Docs Viewer
    else if (['doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx'].includes(fileExt)) {
        const encodedUrl = encodeURIComponent(fileUrl);
        viewerHtml = '<iframe src="https://docs.google.com/gview?url=' + encodedUrl + '&embedded=true" class="pdf-viewer" style="width:100%; height:70vh; border:none;"></iframe>';
        viewerHtml += '<div class="doc-viewer-fallback" style="margin-top:10px;"><i class="fas fa-info-circle"></i> Google Docs is loading your document. <a href="' + fileUrl + '" target="_blank" class="btn btn-sm btn-primary">Click here if not visible</a></div>';
    }
    // Text files
    else if (['txt', 'csv', 'json', 'xml', 'html'].includes(fileExt)) {
        try {
            const response = await fetch(fileUrl);
            const text = await response.text();
            viewerHtml = '<pre style="background:#f8f9fa; padding:15px; border-radius:8px; overflow:auto; max-height:70vh; font-family:monospace;">' + escapeHtml(text.substring(0, 50000)) + '</pre>';
        } catch(e) {
            viewerHtml = '<div class="doc-viewer-fallback"><i class="fas fa-file-alt"></i><h4>Text File</h4><a href="' + fileUrl + '" class="btn btn-primary" target="_blank">Download File</a></div>';
        }
    }
    // Other files - show download option
    else {
        viewerHtml = '<div class="doc-viewer-fallback"><i class="fas fa-file fa-4x"></i><h4>' + fileExt.toUpperCase() + ' File</h4><p>Preview not available for this file type.</p><a href="' + fileUrl + '" class="btn btn-primary" target="_blank"><i class="fas fa-download"></i> Download File</a></div>';
    }
    
    document.getElementById('docViewerBody').innerHTML = viewerHtml;
    document.getElementById('downloadDocBtn').onclick = () => { window.open(fileUrl, '_blank'); addAudit('DOWNLOAD', 'Downloaded: ' + doc.title); };
    document.getElementById('docViewerModal').style.display = 'flex';
};

async function addAudit(action, details) { try { await sb.from('drms_audit_logs').insert([{ user_id: currentUser?.user_id, user_name: currentUser?.full_name, action, details, created_at: new Date().toISOString() }]); } catch(e) {} }

async function loadStudents() { const { data } = await sb.from('consolidated_user_profiles_table').select('*').eq('role', 'student'); allStudents = data || []; return allStudents; }
async function loadDocs() { const { data } = await sb.from('drms_documents').select('*').order('created_at', false); allDocs = data || []; return allDocs; }

async function renderDashboard() {
    await loadDocs(); await loadStudents();
    const totalDocs = allDocs.length;
    const pendingApprovals = allDocs.filter(d => d.status === 'pending').length;
    const categoryCount = { Admission:0, Academic:0, Financial:0, Medical:0 };
    allDocs.forEach(d => { if(categoryCount[d.category] !== undefined) categoryCount[d.category]++; });
    
    setTimeout(() => {
        const ctx = document.getElementById('statsChart')?.getContext('2d');
        if(ctx && chart) chart.destroy();
        if(ctx) chart = new Chart(ctx, { type: 'bar', data: { labels: Object.keys(categoryCount), datasets: [{ label: 'Documents by Category', data: Object.values(categoryCount), backgroundColor: '#f5b042' }] } });
    }, 100);
    
    let recentHtml = '';
    for(let i = 0; i < Math.min(10, allDocs.length); i++) {
        const d = allDocs[i];
        const s = allStudents.find(st => st.user_id === d.student_id);
        recentHtml += '<tr><td>' + escapeHtml(s?.full_name || 'Unknown') + '</td><td>' + escapeHtml(d.title) + '</td><td><span class="badge">' + (d.category || 'Other') + '</span></td><td>' + new Date(d.created_at).toLocaleDateString() + '</td><td><span class="badge ' + (d.status === 'approved' ? 'badge-approved' : 'badge-pending') + '">' + (d.status || 'pending') + '</span></td><td><button class="btn btn-sm btn-primary" onclick="viewDoc(' + d.id + ')">View</button></td></tr>';
    }
    document.getElementById('mainContent').innerHTML = '<div class="stats-grid"><div class="stat-card"><div class="stat-number">' + totalDocs + '</div><div class="stat-label">Total Documents</div></div><div class="stat-card"><div class="stat-number">' + pendingApprovals + '</div><div class="stat-label">Pending Approval</div></div><div class="stat-card"><div class="stat-number">' + allStudents.length + '</div><div class="stat-label">Active Students</div></div></div><div class="chart-container"><canvas id="statsChart" width="400" height="200"></canvas></div><div class="table-container"><h3 style="padding:1rem">📋 Recent Documents</h3><table class="data-table"><thead><tr><th>Student</th><th>Title</th><th>Category</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody>' + (recentHtml || '<tr><td colspan="6">No documents found</td></tr>') + '</tbody></table></div>';
}

async function renderAllDocuments() {
    await loadDocs(); await loadStudents();
    let html = '';
    for(let d of allDocs) {
        const s = allStudents.find(st => st.user_id === d.student_id);
        html += '<tr><td class="checkbox-col"><input type="checkbox" class="bulk-select" value="' + d.id + '"></td><td>' + escapeHtml(s?.full_name || 'Unknown') + '</td><td><strong>' + escapeHtml(d.title) + '</strong><br><small>' + escapeHtml(d.description || '') + '</small></td><td><span class="badge">' + (d.category || 'Other') + '</span></td><td>' + new Date(d.created_at).toLocaleDateString() + '</td><td><span class="badge ' + (d.status === 'approved' ? 'badge-approved' : 'badge-pending') + '">' + (d.status || 'pending') + '</span></td><td><button class="btn btn-sm btn-primary" onclick="viewDoc(' + d.id + ')">View</button> <button class="btn btn-sm btn-danger" onclick="deleteDoc(' + d.id + ')">Delete</button></td></tr>';
    }
    document.getElementById('mainContent').innerHTML = '<div class="search-bar"><input type="text" id="docSearch" class="search-input" placeholder="Search..."><button id="searchBtn" class="btn btn-primary">Search</button></div><div class="table-container"><h3 style="padding:1rem">📋 All Documents (' + allDocs.length + ')</h3><table class="data-table"><thead><tr><th class="checkbox-col"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th><th>Student</th><th>Title</th><th>Category</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody id="docsBody">' + (html || '<tr><td colspan="7">No documents found</td></tr>') + '</tbody></table></div>';
    document.getElementById('searchBtn').onclick = () => { let term = document.getElementById('docSearch').value.toLowerCase(); let rows = document.querySelectorAll('#docsBody tr'); for(let r of rows) r.style.display = r.innerText.toLowerCase().includes(term) ? '' : 'none'; };
}

async function renderStudents() {
    await loadStudents(); await loadDocs();
    let html = '';
    for(let s of allStudents) {
        let docCount = allDocs.filter(d => d.student_id === s.user_id).length;
        html += '<tr><td><strong>' + escapeHtml(s.full_name) + '</strong><br><small>' + escapeHtml(s.email) + '</small></td><td><span class="program-badge-sm program-' + (s.program === 'KRCHN' ? 'krchn' : 'tvet') + '">' + escapeHtml(s.program) + '</span></td><td>' + escapeHtml(s.intake_year || '-') + '</td><td>' + escapeHtml(s.block || '-') + '</td><td>' + docCount + '</td><td><button class="btn btn-sm btn-primary" onclick="viewStudentRecord(\'' + s.user_id + '\')">View Record</button></td></tr>';
    }
    document.getElementById('mainContent').innerHTML = '<div class="search-bar"><input type="text" id="studentSearch" class="search-input" placeholder="Search..."><button id="searchBtn" class="btn btn-primary">Search</button></div><div class="table-container"><h3 style="padding:1rem">👨‍🎓 Student Records</h3><table class="data-table"><thead><tr><th>Name</th><th>Program</th><th>Intake</th><th>Block</th><th>Documents</th><th>Actions</th></tr></thead><tbody id="studentsBody">' + (html || '<tr><td colspan="6">No students found</td></tr>') + '</tbody></table></div>';
    document.getElementById('searchBtn').onclick = () => { let term = document.getElementById('studentSearch').value.toLowerCase(); let rows = document.querySelectorAll('#studentsBody tr'); for(let r of rows) r.style.display = r.innerText.toLowerCase().includes(term) ? '' : 'none'; };
}

window.viewStudentRecord = async function(id) {
    await loadDocs();
    const s = allStudents.find(st => st.user_id === id);
    const studentDocs = allDocs.filter(d => d.student_id === id);
    let timelineHtml = '';
    for(let d of studentDocs) {
        timelineHtml += '<div style="border-left: 3px solid #f5b042; padding-left: 15px; margin-bottom: 15px;"><div style="font-size:11px; color:#666">' + new Date(d.created_at).toLocaleString() + '</div><div><span class="badge">' + (d.category || 'Other') + '</span> <strong>' + escapeHtml(d.title) + '</strong></div><div>' + escapeHtml(d.description || '') + '</div><button class="btn btn-sm btn-primary" onclick="viewDoc(' + d.id + ')">View Document</button></div>';
    }
    document.getElementById('studentRecordTitle').innerHTML = (s?.full_name || 'Student') + ' - Complete Record (' + studentDocs.length + ' documents)';
    document.getElementById('studentRecordBody').innerHTML = '<div style="background:#f0f0f0; padding:15px; border-radius:10px; margin-bottom:20px"><h3>' + escapeHtml(s?.full_name) + '</h3><p>Program: ' + (s?.program || '-') + ' | Intake: ' + (s?.intake_year || '-') + ' | Block: ' + (s?.block || '-') + '<br>Email: ' + escapeHtml(s?.email) + '</p></div><h3>📄 Document Timeline</h3>' + (timelineHtml || '<p>No documents found</p>');
    document.getElementById('studentRecordModal').style.display = 'flex';
};

async function renderUpload() {
    await loadStudents();
    let options = '<option value="">-- Select Student --</option>';
    for(let s of allStudents) options += '<option value="' + s.user_id + '">' + escapeHtml(s.full_name) + ' (' + s.program + ')</option>';
    document.getElementById('mainContent').innerHTML = '<div class="table-container" style="padding:1.5rem"><form id="uploadForm"><div class="form-group"><label>Student *</label><select id="uploadStudentId" class="form-select" required>' + options + '</select></div><div class="form-group"><label>Title *</label><input type="text" id="docTitle" class="form-input" required></div><div class="form-group"><label>Category *</label><select id="docCategory" class="form-select"><option>Admission</option><option>Academic</option><option>Financial</option><option>Medical</option></select></div><div class="form-group"><label>Description</label><textarea id="docDesc" class="form-textarea" rows="2"></textarea></div><div class="form-group"><label>File *</label><input type="file" id="docFile" class="file-input" required></div><div class="form-actions"><button type="submit" class="btn btn-success">Upload</button></div></form></div>';
    document.getElementById('uploadForm').onsubmit = async function(e) {
        e.preventDefault();
        const file = document.getElementById('docFile').files[0];
        if(!file) { showToast('Select a file', true); return; }
        const filePath = 'drms/' + Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9.-]/g, '_');
        const { error: upErr } = await sb.storage.from('drms_files').upload(filePath, file);
        if(upErr) { showToast('Upload failed: ' + upErr.message, true); return; }
        const { data: { publicUrl } } = sb.storage.from('drms_files').getPublicUrl(filePath);
        await sb.from('drms_documents').insert([{ student_id: document.getElementById('uploadStudentId').value, title: document.getElementById('docTitle').value, category: document.getElementById('docCategory').value, description: document.getElementById('docDesc').value, file_url: publicUrl, file_name: file.name, status: 'pending', created_at: new Date().toISOString() }]);
        showToast('Document uploaded!');
        document.getElementById('uploadForm').reset();
        await loadDocs();
        renderAllDocuments();
        renderDashboard();
    };
}

async function renderApprovals() {
    await loadDocs(); await loadStudents();
    let html = '';
    for(let d of allDocs) {
        if(d.status !== 'pending') continue;
        const s = allStudents.find(st => st.user_id === d.student_id);
        html += '<tr><td>' + escapeHtml(s?.full_name || 'Unknown') + '</td><td>' + escapeHtml(d.title) + '</td><td><span class="badge">' + (d.category || 'Other') + '</span></td><td>' + new Date(d.created_at).toLocaleDateString() + '</td><td><button class="btn btn-sm btn-success" onclick="approveDoc(' + d.id + ')">Approve</button> <button class="btn btn-sm btn-danger" onclick="rejectDoc(' + d.id + ')">Reject</button> <button class="btn btn-sm btn-outline" onclick="viewDoc(' + d.id + ')">View</button></td></tr>';
    }
    document.getElementById('mainContent').innerHTML = '<div class="table-container"><h3 style="padding:1rem">📋 Pending Approvals (' + allDocs.filter(d => d.status === 'pending').length + ')</h3><table class="data-table"><thead><tr><th>Student</th><th>Title</th><th>Category</th><th>Date</th><th>Actions</th></tr></thead><tbody>' + (html || '<tr><td colspan="5">No pending approvals</table></tr>') + '</tbody></table></div>';
}

window.approveDoc = async function(id) { await sb.from('drms_documents').update({ status: 'approved', approved_at: new Date().toISOString() }).eq('id', id); showToast('Document approved'); await loadDocs(); renderApprovals(); renderDashboard(); };
window.rejectDoc = async function(id) { await sb.from('drms_documents').update({ status: 'rejected' }).eq('id', id); showToast('Document rejected'); await loadDocs(); renderApprovals(); renderDashboard(); };
window.deleteDoc = async function(id) { if(!confirm('Delete this document?')) return; await sb.from('drms_documents').delete().eq('id', id); showToast('Document deleted'); await loadDocs(); renderAllDocuments(); renderDashboard(); };
window.toggleSelectAll = function() { let isChecked = document.getElementById('selectAll').checked; document.querySelectorAll('.bulk-select').forEach(cb => cb.checked = isChecked); };

function closeDocViewer() { document.getElementById('docViewerModal').style.display = 'none'; document.getElementById('docViewerBody').innerHTML = '<div class="loading"><div class="spinner"></div> Loading document...</div>'; }
function closeUploadModal() { document.getElementById('uploadModal').style.display = 'none'; }
function closeStudentRecordModal() { document.getElementById('studentRecordModal').style.display = 'none'; }
window.exportStudentPDF = () => showToast('PDF export would generate here');

function buildMenu() {
    const role = currentUser?.role;
    const navMenu = document.getElementById('navMenu');
    let menuHtml = '<div class="nav-group"><div class="nav-header">📊 DASHBOARD</div><a href="#" data-view="dashboard" class="nav-item active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></div>';
    if (role === 'admin' || role === 'superadmin') {
        menuHtml += '<div class="nav-group"><div class="nav-header">👑 ADMIN</div><a href="#" data-view="students" class="nav-item"><i class="fas fa-user-graduate"></i> Student Records</a><a href="#" data-view="upload" class="nav-item"><i class="fas fa-upload"></i> Upload Document</a><a href="#" data-view="documents" class="nav-item"><i class="fas fa-folder-open"></i> All Documents</a><a href="#" data-view="approvals" class="nav-item"><i class="fas fa-check-double"></i> Pending Approvals</a></div>';
    } else if (role === 'lecturer') {
        menuHtml += '<div class="nav-group"><div class="nav-header">📚 LECTURER</div><a href="#" data-view="students" class="nav-item"><i class="fas fa-user-graduate"></i> My Students</a><a href="#" data-view="upload" class="nav-item"><i class="fas fa-upload"></i> Upload Document</a><a href="#" data-view="documents" class="nav-item"><i class="fas fa-folder-open"></i> My Uploads</a></div>';
    } else if (role === 'student') {
        menuHtml += '<div class="nav-group"><div class="nav-header">🎓 STUDENT</div><a href="#" data-view="documents" class="nav-item"><i class="fas fa-id-card"></i> My Documents</a></div>';
    }
    navMenu.innerHTML = menuHtml;
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', async function(e) {
            e.preventDefault();
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            this.classList.add('active');
            const view = this.dataset.view;
            if (view === 'dashboard') await renderDashboard();
            else if (view === 'students') await renderStudents();
            else if (view === 'upload') await renderUpload();
            else if (view === 'documents') await renderAllDocuments();
            else if (view === 'approvals') await renderApprovals();
            else await renderDashboard();
        });
    });
}

async function init() {
    const sessionData = localStorage.getItem('drms_session');
    if (!sessionData) { window.location.href = 'drms_login.html'; return; }
    currentUser = JSON.parse(sessionData);
    document.getElementById('userName').innerText = currentUser.full_name || currentUser.email;
    document.getElementById('userRole').innerText = (currentUser.role || 'USER').toUpperCase();
    document.getElementById('userProgram').innerText = currentUser.program === 'KRCHN' ? '🎓 KRCHN' : '🛠️ TVET';
    document.getElementById('userProgram').style.background = currentUser.program === 'KRCHN' ? '#4C1D95' : '#f59e0b';
    buildMenu();
    await renderDashboard();
}
document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('drms_session'); window.location.href = 'drms_login.html'; };
init();
</script>
