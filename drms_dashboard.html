<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DRMS Complete | Document Records Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0a2a3b; --primary-light: #123e52; --accent: #f4b942;
            --success: #2e7d64; --danger: #c53030; --warning: #ed8936;
            --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0; --gray-600: #4a5568;
        }
        body { font-family: 'Inter', sans-serif; background: var(--gray-100); color: #1a2c3e; }
        body.dark { background: #1a202c; color: #f7fafc; --gray-50: #1a202c; --gray-100: #2d3748; --gray-200: #4a5568; }
        
        .header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: white; padding: 0.8rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; position: sticky; top: 0; z-index: 100; }
        .logo h1 { font-size: 1.3rem; }
        .logo p { font-size: 0.7rem; opacity: 0.8; }
        .header-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .user-info { display: flex; align-items: center; gap: 0.5rem; background: rgba(255,255,255,0.15); padding: 0.4rem 1rem; border-radius: 40px; }
        .role-badge { background: var(--accent); color: var(--primary); padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; margin-left: 0.5rem; }
        
        .btn { padding: 0.5rem 1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 0.85rem; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: var(--primary); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; }
        .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.75rem; }
        .btn-warning { background: var(--warning); color: white; }
        
        .app-container { display: flex; min-height: calc(100vh - 70px); flex-wrap: wrap; }
        .sidebar { width: 280px; background: white; border-right: 1px solid var(--gray-200); }
        body.dark .sidebar { background: var(--gray-50); }
        .nav { padding: 1.5rem 0; }
        .nav-group { margin-bottom: 1.5rem; }
        .nav-header { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gray-600); padding: 0.5rem 1.5rem; font-weight: 600; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 0.7rem 1.5rem; color: var(--gray-600); text-decoration: none; font-weight: 500; transition: all 0.2s; cursor: pointer; }
        .nav-item:hover { background: var(--gray-100); color: var(--primary); }
        .nav-item.active { background: linear-gradient(90deg, rgba(244,185,66,0.1) 0%, transparent 100%); border-left: 3px solid var(--accent); color: var(--primary); font-weight: 600; }
        .sidebar-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--gray-200); font-size: 0.7rem; text-align: center; }
        .main { flex: 1; padding: 1.5rem; overflow-y: auto; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: white; padding: 1rem; border-radius: 16px; border: 1px solid var(--gray-200); }
        .stat-number { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.75rem; color: var(--gray-600); }
        
        .search-bar { background: white; padding: 1rem; border-radius: 16px; margin-bottom: 1.5rem; display: flex; gap: 0.8rem; flex-wrap: wrap; border: 1px solid var(--gray-200); }
        .search-input { flex: 2; padding: 0.7rem; border: 1px solid var(--gray-200); border-radius: 12px; font-size: 0.9rem; }
        .filter-select { padding: 0.7rem; border: 1px solid var(--gray-200); border-radius: 12px; font-family: inherit; }
        
        .table-container { background: white; border-radius: 16px; overflow-x: auto; border: 1px solid var(--gray-200); margin-bottom: 1.5rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 0.8rem 1rem; background: var(--gray-50); font-weight: 600; border-bottom: 1px solid var(--gray-200); }
        td { padding: 0.8rem 1rem; border-bottom: 1px solid var(--gray-200); }
        .checkbox-col { width: 30px; }
        
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-pending { background: #feebc8; color: #7c2d12; }
        .badge-approved { background: #c6f6d5; color: #22543d; }
        .badge-expiring { background: #fed7d7; color: #742a2a; }
        .program-badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
        .program-krchn { background: #4C1D95; color: white; }
        .program-tvet { background: #f59e0b; color: white; }
        
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 0.3rem; font-size: 0.85rem; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 0.6rem; border: 1px solid var(--gray-200); border-radius: 10px; font-family: inherit; }
        .file-input { width: 100%; padding: 0.5rem; border: 1px dashed var(--gray-200); border-radius: 10px; background: var(--gray-50); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 20px; width: 90%; max-width: 600px; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
        .modal-lg { max-width: 800px; }
        .modal-xl { max-width: 1000px; }
        .modal-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; background: var(--gray-50); }
        .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .modal-body { padding: 1.5rem; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--gray-200); display: flex; justify-content: flex-end; gap: 0.5rem; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--success); color: white; padding: 0.8rem 1.2rem; border-radius: 12px; z-index: 1100; display: none; }
        .loading { text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--gray-200); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .chart-container { background: white; padding: 1rem; border-radius: 16px; margin-bottom: 1.5rem; }
        .version-timeline-item { border-left: 2px solid var(--accent); padding-left: 15px; margin-bottom: 15px; }
        
        @media (max-width: 768px) { .app-container { flex-direction: column; } .sidebar { width: 100%; } .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
<div class="app">
    <header class="header">
        <div class="logo"><h1><i class="fas fa-folder-open"></i> NCHSM DRMS Complete</h1><p>TVET & KRCHN | Document Lifecycle Management</p></div>
        <div class="header-right">
            <div class="user-info"><i class="fas fa-user-circle"></i><span id="userName">Loading...</span><span id="userRole" class="role-badge"></span><span id="userProgram" class="role-badge" style="background:#f59e0b;"></span></div>
            <button id="logoutBtn" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar" id="sidebar"><nav class="nav" id="navMenu"></nav><div class="sidebar-footer"><small>DRMS Complete v6.0</small></div></aside>
        <main class="main" id="mainContent"><div class="loading"><div class="spinner"></div> Loading...</div></main>
    </div>
</div>

<!-- Modals -->
<div id="docViewerModal" class="modal"><div class="modal-content modal-lg"><div class="modal-header"><h3 id="viewerTitle">Document Preview</h3><button class="modal-close" onclick="closeDocViewer()">&times;</button></div><div class="modal-body"><iframe id="docIframe" src="about:blank" style="width:100%; height:60vh; border:none;"></iframe></div><div class="modal-footer"><button id="downloadDocBtn" class="btn btn-primary">Download</button><button class="btn btn-outline" onclick="closeDocViewer()">Close</button></div></div></div>
<div id="uploadModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Upload Document</h3><button class="modal-close" onclick="closeUploadModal()">&times;</button></div><div class="modal-body"><form id="uploadForm"><div class="form-group"><label>Student *</label><select id="uploadStudentId" class="form-select" required></select></div><div class="form-group"><label>Title *</label><input type="text" id="docTitle" class="form-input" required></div><div class="form-group"><label>Category *</label><select id="docCategory" class="form-select"><option>Admission</option><option>Academic</option><option>Financial</option><option>Medical</option></select></div><div class="form-group"><label>Description</label><textarea id="docDesc" class="form-textarea" rows="2"></textarea></div><div class="form-group"><label>File *</label><input type="file" id="docFile" class="file-input" accept=".pdf,.jpg,.png,.doc,.docx" required></div><div class="form-actions"><button type="submit" class="btn btn-success">Upload</button><button type="button" class="btn btn-outline" onclick="closeUploadModal()">Cancel</button></div></form></div></div></div>
<div id="studentRecordModal" class="modal"><div class="modal-content modal-xl"><div class="modal-header"><h3 id="studentRecordTitle">Student Complete Record</h3><button class="modal-close" onclick="closeStudentRecordModal()">&times;</button></div><div class="modal-body" id="studentRecordBody"></div><div class="modal-footer"><button class="btn btn-primary" onclick="exportStudentPDF()">Export PDF</button><button class="btn btn-outline" onclick="closeStudentRecordModal()">Close</button></div></div></div>
<div id="editStudentModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Edit Student</h3><button class="modal-close" onclick="closeEditModal()">&times;</button></div><div class="modal-body"><form id="editForm"><input type="hidden" id="editId"><div class="form-group"><label>Full Name</label><input type="text" id="editName" class="form-input" required></div><div class="form-group"><label>Email</label><input type="email" id="editEmail" class="form-input" required></div><div class="form-group"><label>Program</label><select id="editProgram" class="form-select"><option value="KRCHN">KRCHN Nursing</option><option value="DPOTT">DPOTT</option><option value="DCH">DCH</option></select></div><div class="form-group"><label>Intake Year</label><input type="text" id="editIntake" class="form-input"></div><div class="form-group"><label>Block/Term</label><input type="text" id="editBlock" class="form-input"></div><div class="form-group"><label>Status</label><select id="editStatus" class="form-select"><option value="active">Active</option><option value="inactive">Inactive</option><option value="graduated">Graduated</option></select></div><div class="form-actions"><button type="submit" class="btn btn-success">Save</button><button type="button" class="btn btn-outline" onclick="closeEditModal()">Cancel</button></div></form></div></div></div>
<div id="approvalModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Approve Document</h3><button class="modal-close" onclick="closeApprovalModal()">&times;</button></div><div class="modal-body"><textarea id="approvalComments" class="form-textarea" rows="3" placeholder="Add comments..."></textarea><div class="form-group"><label>Digital Signature</label><input type="text" id="digitalSignature" class="form-input" placeholder="Type your full name to sign"></div></div><div class="modal-footer"><button class="btn btn-success" onclick="submitApproval('approve')">Approve & Sign</button><button class="btn btn-danger" onclick="submitApproval('reject')">Reject</button><button class="btn btn-outline" onclick="closeApprovalModal()">Cancel</button></div></div></div>
<div id="versionModal" class="modal"><div class="modal-content modal-lg"><div class="modal-header"><h3>Document Version History</h3><button class="modal-close" onclick="closeVersionModal()">&times;</button></div><div class="modal-body" id="versionBody"></div></div></div>
<div id="requestModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Request Document</h3><button class="modal-close" onclick="closeRequestModal()">&times;</button></div><div class="modal-body"><form id="requestForm"><div class="form-group"><label>Document Type</label><select id="requestType" class="form-select"><option>Official Transcript</option><option>Certificate</option><option>Admission Letter</option><option>Fee Statement</option></select></div><div class="form-group"><label>Reason</label><textarea id="requestReason" class="form-textarea" rows="3"></textarea></div><div class="form-group"><label>Delivery Method</label><select id="deliveryMethod" class="form-select"><option>Email</option><option>Pickup</option><option>Courier</option></select></div><div class="form-actions"><button type="submit" class="btn btn-primary">Submit Request</button></div></form></div></div></div>
<div id="bulkApprovalModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Bulk Approve Documents</h3><button class="modal-close" onclick="closeBulkApprovalModal()">&times;</button></div><div class="modal-body"><p id="bulkCountDisplay">0 documents selected</p><textarea id="bulkComments" class="form-textarea" rows="3" placeholder="Add comments for all..."></textarea><div class="form-group"><label>Digital Signature</label><input type="text" id="bulkSignature" class="form-input" placeholder="Type your full name to sign all"></div><div class="form-actions"><button class="btn btn-success" onclick="submitBulkApproval()">Approve All</button><button class="btn btn-danger" onclick="submitBulkApproval('reject')">Reject All</button></div></div></div></div>

<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL = 'https://lwhtjozfsmbyihenfunw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3aHRqb3pmc21ieWloZW5mdW53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk2NTgxMjcsImV4cCI6MjA3NTIzNDEyN30.7Z8AYvPQwTAEEEhODlW6Xk-IR1FK3Uj5ivZS7P17Wpk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null, allStudents = [], allDocs = [], allVersions = [], allRequests = [], notifications = [], chart = null, selectedBulkIds = [];

function showToast(msg, isErr) { const t = document.getElementById('toast'); t.textContent = msg; t.style.background = isErr ? '#c53030' : '#2e7d64'; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }
async function sendEmailNotification(to, subject, message) { console.log('📧 Email would send to:', to, subject); showToast(`Email notification sent to ${to}`); }
async function addAudit(action, details) { await sb.from('drms_audit_logs').insert([{ user_id: currentUser?.user_id, user_name: currentUser?.full_name, action, details, created_at: new Date().toISOString() }]); }

async function loadStudents() { let q = sb.from('consolidated_user_profiles_table').select('*').eq('role', 'student'); if (currentUser?.role === 'lecturer' && currentUser?.program) q = q.eq('program', currentUser.program); const { data } = await q; allStudents = data || []; return allStudents; }
async function loadDocs() { let q = sb.from('drms_documents').select('*').order('created_at', false); if (currentUser?.role === 'student') q = q.eq('student_id', currentUser.user_id); if (currentUser?.role === 'lecturer' && currentUser?.program) { const { data: studentsInProgram } = await sb.from('consolidated_user_profiles_table').select('user_id').eq('program', currentUser.program); const ids = studentsInProgram?.map(s => s.user_id) || []; if (ids.length) q = q.in('student_id', ids); } const { data } = await q; allDocs = data || []; return allDocs; }
async function loadVersions() { const { data } = await sb.from('drms_versions').select('*').order('version_date', false); allVersions = data || []; return allVersions; }
async function loadRequests() { let q = sb.from('document_requests').select('*').order('created_at', false); if (currentUser?.role === 'student') q = q.eq('student_id', currentUser.user_id); const { data } = await q; allRequests = data || []; return allRequests; }

async function renderDashboard() {
    await loadDocs(); await loadStudents(); await loadVersions();
    const totalDocs = allDocs.length;
    const pendingApprovals = allDocs.filter(d => d.status === 'pending').length;
    const expiringDocs = allDocs.filter(d => { const age = (new Date() - new Date(d.created_at)) / (1000*60*60*24*365); return age > 4.5 && age < 5; }).length;
    
    // Chart data
    const categoryCount = { Admission:0, Academic:0, Financial:0, Medical:0 };
    allDocs.forEach(d => { if(categoryCount[d.category] !== undefined) categoryCount[d.category]++; });
    
    setTimeout(() => {
        const ctx = document.getElementById('statsChart')?.getContext('2d');
        if(ctx && chart) chart.destroy();
        if(ctx) chart = new Chart(ctx, { type: 'bar', data: { labels: Object.keys(categoryCount), datasets: [{ label: 'Documents by Category', data: Object.values(categoryCount), backgroundColor: '#f4b942' }] } });
    }, 100);
    
    document.getElementById('mainContent').innerHTML = `
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number">${totalDocs}</div><div class="stat-label">Total Documents</div></div>
            <div class="stat-card"><div class="stat-number">${pendingApprovals}</div><div class="stat-label">Pending Approval</div></div>
            <div class="stat-card"><div class="stat-number">${expiringDocs}</div><div class="stat-label">Expiring Soon</div></div>
            <div class="stat-card"><div class="stat-number">${allStudents.length}</div><div class="stat-label">Active Students</div></div>
        </div>
        <div class="chart-container"><canvas id="statsChart" width="400" height="200"></canvas></div>
        <div class="table-container"><h3 style="padding:1rem">📋 Recent Documents</h3><table><thead><tr><th>Student</th><th>Title</th><th>Category</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody>${allDocs.slice(0,10).map(d => { const s = allStudents.find(st => st.user_id === d.student_id); return `<tr><td>${escapeHtml(s?.full_name || 'Unknown')}</td><td>${escapeHtml(d.title)}</td><td><span class="badge">${d.category}</span></td><td>${new Date(d.created_at).toLocaleDateString()}</td><td><span class="badge ${d.status === 'approved' ? 'badge-approved' : 'badge-pending'}">${d.status || 'pending'}</span></td><td><button class="btn btn-sm btn-primary" onclick="viewDoc(${d.id})">View</button> <button class="btn btn-sm btn-outline" onclick="viewVersionHistory(${d.id})">Versions</button></td></tr>`}).join('') || '<tr><td colspan="6">No documents</td></tr>'}</tbody></div>`;
}

async function renderAllDocuments() {
    await loadDocs(); await loadStudents();
    let html = '';
    for(let d of allDocs) {
        const s = allStudents.find(st => st.user_id === d.student_id);
        html += `<tr><td class="checkbox-col"><input type="checkbox" class="bulk-select" value="${d.id}"></td><td>${escapeHtml(s?.full_name || 'Unknown')}</td><td><strong>${escapeHtml(d.title)}</strong><br><small>${escapeHtml(d.description || '')}</small></td><td><span class="badge">${d.category}</span></td><td>${new Date(d.created_at).toLocaleDateString()}</td><td><span class="badge ${d.status === 'approved' ? 'badge-approved' : 'badge-pending'}">${d.status || 'pending'}</span></td><td>${d.signature || 'Not signed'}</td><td><button class="btn btn-sm btn-primary" onclick="viewDoc(${d.id})">View</button> <button class="btn btn-sm btn-outline" onclick="viewVersionHistory(${d.id})">Versions</button> <button class="btn btn-sm btn-danger" onclick="deleteDoc(${d.id})">Delete</button></td></tr>`;
    }
    document.getElementById('mainContent').innerHTML = `
        <div class="search-bar">
            <input type="text" id="docSearch" class="search-input" placeholder="Search title, student...">
            <select id="categoryFilter" class="filter-select"><option value="">All Categories</option><option>Admission</option><option>Academic</option><option>Financial</option><option>Medical</option></select>
            <input type="date" id="dateFrom" class="filter-select" placeholder="From Date">
            <input type="date" id="dateTo" class="filter-select" placeholder="To Date">
            <button id="searchBtn" class="btn btn-primary">Search</button>
            <button id="bulkDownloadBtn" class="btn btn-success">📦 Bulk Download (ZIP)</button>
            <button id="bulkApproveBtn" class="btn btn-warning">✓ Bulk Approve</button>
        </div>
        <div class="table-container"><h3 style="padding:1rem">📋 All Documents (${allDocs.length})</h3></td><thead><td><th class="checkbox-col"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th><th>Student</th><th>Title</th><th>Category</th><th>Date</th><th>Status</th><th>Signed By</th><th>Actions</th></tr></thead><tbody id="docsBody">${html || '<tr><td colspan="8">No documents found</td></tr>'}</tbody></div>`;
    
    document.getElementById('searchBtn').onclick = () => { let term = document.getElementById('docSearch').value.toLowerCase(); let cat = document.getElementById('categoryFilter').value; let from = document.getElementById('dateFrom').value; let to = document.getElementById('dateTo').value; let rows = document.querySelectorAll('#docsBody tr'); for(let r of rows) { let text = r.innerText.toLowerCase(); let match = text.includes(term) && (!cat || text.includes(cat.toLowerCase())); if(from && to) { let dateText = r.cells[4]?.innerText; if(dateText && (new Date(dateText) < new Date(from) || new Date(dateText) > new Date(to))) match = false; } r.style.display = match ? '' : 'none'; } };
    document.getElementById('bulkDownloadBtn').onclick = () => downloadSelectedAsZip();
    document.getElementById('bulkApproveBtn').onclick = () => openBulkApprovalModal();
}

window.toggleSelectAll = function() { let isChecked = document.getElementById('selectAll').checked; document.querySelectorAll('.bulk-select').forEach(cb => cb.checked = isChecked); };
function getSelectedDocIds() { let ids = []; document.querySelectorAll('.bulk-select:checked').forEach(cb => ids.push(cb.value)); return ids; }

async function downloadSelectedAsZip() {
    const selectedIds = getSelectedDocIds();
    if(selectedIds.length === 0) { showToast('Select documents first', true); return; }
    const selectedDocs = allDocs.filter(d => selectedIds.includes(String(d.id)));
    const zip = new JSZip();
    for(let doc of selectedDocs) {
        try { const response = await fetch(doc.file_url); const blob = await response.blob(); zip.file(`${doc.title.replace(/[^a-z0-9]/gi, '_')}.pdf`, blob); }
        catch(e) { console.error('Error downloading:', doc.title); }
    }
    const content = await zip.generateAsync({ type: "blob" });
    saveAs(content, `documents_export_${Date.now()}.zip`);
    showToast(`Downloaded ${selectedDocs.length} documents as ZIP`);
}

async function openBulkApprovalModal() {
    const selectedIds = getSelectedDocIds();
    if(selectedIds.length === 0) { showToast('Select documents first', true); return; }
    document.getElementById('bulkCountDisplay').innerHTML = `${selectedIds.length} documents selected for bulk approval`;
    selectedBulkIds = selectedIds;
    document.getElementById('bulkApprovalModal').style.display = 'flex';
}
async function submitBulkApproval(action = 'approve') {
    const signature = document.getElementById('bulkSignature')?.value;
    if(action === 'approve' && !signature) { showToast('Please enter your digital signature', true); return; }
    for(let id of selectedBulkIds) {
        await sb.from('drms_documents').update({ status: action === 'approve' ? 'approved' : 'rejected', signature: signature, approved_at: new Date().toISOString(), approved_by: currentUser?.full_name }).eq('id', id);
        await addAudit('BULK_APPROVAL', `${action === 'approve' ? 'Approved' : 'Rejected'} document ${id}`);
    }
    showToast(`${selectedBulkIds.length} documents ${action === 'approve' ? 'approved' : 'rejected'}`);
    closeBulkApprovalModal();
    await loadDocs();
    renderAllDocuments();
    renderDashboard();
}

window.downloadStudentFolder = async function(studentId) {
    const student = allStudents.find(s => s.user_id === studentId);
    const studentDocs = allDocs.filter(d => d.student_id === studentId);
    if(studentDocs.length === 0) { showToast('No documents for this student', true); return; }
    const zip = new JSZip();
    for(let doc of studentDocs) {
        try { const response = await fetch(doc.file_url); const blob = await response.blob(); zip.file(`${doc.title.replace(/[^a-z0-9]/gi, '_')}.pdf`, blob); }
        catch(e) {}
    }
    const content = await zip.generateAsync({ type: "blob" });
    saveAs(content, `${student?.full_name.replace(/\s/g, '_')}_documents.zip`);
    showToast(`Downloaded ${studentDocs.length} documents for ${student?.full_name}`);
};

window.viewStudentRecord = async function(id) {
    await loadDocs();
    const s = allStudents.find(st => st.user_id === id);
    const studentDocs = allDocs.filter(d => d.student_id === id);

        timelineHtml += `<div style="border-left: 3px solid #f4b942; padding-left: 15px; margin-bottom: 15px;"><div style="font-size:11px; color:#666">${new Date(d.created_at).toLocaleString()}</div><div><span class="badge">${d.category}</span> <strong>${escapeHtml(d.title)}</strong></div><div>${escapeHtml(d.description || '')}</div><div>Status: ${d.status} | Signed: ${d.signature || 'Not signed'}</div><button class="btn btn-sm btn-primary" onclick="viewDoc(${d.id})">View</button> <button class="btn btn-sm btn-outline" onclick="viewVersionHistory(${d.id})">Versions</button></div>`;
    }
    document.getElementById('studentRecordTitle').innerHTML = `${s?.full_name} - Complete Record (${studentDocs.length} documents)`;
    document.getElementById('studentRecordBody').innerHTML = `<div style="background:#f0f0f0; padding:15px; border-radius:10px; margin-bottom:20px"><h3>${escapeHtml(s?.full_name)}</h3><p>Program: ${s?.program} | Intake: ${s?.intake_year} | Block: ${s?.block}<br>Email: ${escapeHtml(s?.email)}</p></div><h3>📄 Document Timeline</h3>${timelineHtml || '<p>No documents found</p>'}`;

};

async function renderUpload() {
    await loadStudents();
    let availableStudents = allStudents;
    if (currentUser?.role === 'lecturer' && currentUser?.program) availableStudents = allStudents.filter(s => s.program === currentUser.program);
    let options = '<option value="">-- Select Student --</option>';
    for(let s of availableStudents) options += `<option value="${s.user_id}">${escapeHtml(s.full_name)} (${s.program})</option>`;
    document.getElementById('mainContent').innerHTML = `<div class="table-container" style="padding:1.5rem"><form id="uploadForm"><div class="form-group"><label>Student *</label><select id="uploadStudentId" class="form-select" required>${options}</select></div><div class="form-group"><label>Title *</label><input type="text" id="docTitle" class="form-input" required></div><div class="form-group"><label>Category *</label><select id="docCategory" class="form-select"><option>Admission</option><option>Academic</option><option>Financial</option><option>Medical</option></select></div><div class="form-group"><label>Description</label><textarea id="docDesc" class="form-textarea" rows="2"></textarea></div><div class="form-group"><label>File *</label><input type="file" id="docFile" class="file-input" required></div><div class="form-actions"><button type="submit" class="btn btn-success">Upload</button></div></form></div>`;
    document.getElementById('uploadForm').onsubmit = async function(e) {
        e.preventDefault();
        const file = document.getElementById('docFile').files[0];
        if(!file) { showToast('Select a file', true); return; }
        const filePath = 'drms/' + Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9.-]/g, '_');
        await sb.storage.from('drms_files').upload(filePath, file);
        const { data: { publicUrl } } = sb.storage.from('drms_files').getPublicUrl(filePath);
        const { data: newDoc } = await sb.from('drms_documents').insert([{ student_id: document.getElementById('uploadStudentId').value, title: document.getElementById('docTitle').value, category: document.getElementById('docCategory').value, description: document.getElementById('docDesc').value, file_url: publicUrl, file_name: file.name, status: 'pending', version: 1, created_at: new Date().toISOString() }]).select();
        await sb.from('drms_versions').insert([{ document_id: newDoc[0].id, version: 1, changes: 'Initial upload', version_date: new Date().toISOString(), changed_by: currentUser?.full_name }]);
        await addAudit('UPLOAD', `Uploaded: ${document.getElementById('docTitle').value}`);
        const student = allStudents.find(s => s.user_id === document.getElementById('uploadStudentId').value);
        await sendEmailNotification(student?.email, 'Document Uploaded', `A new document "${document.getElementById('docTitle').value}" has been uploaded for you.`);
        showToast('Document uploaded!');
        document.getElementById('uploadForm').reset();
        await loadDocs();
        renderAllDocuments();
        renderDashboard();
    };
}

async function renderExpiryAlerts() {
    await loadDocs(); await loadStudents();
    const expiringDocs = allDocs.filter(d => { const age = (new Date() - new Date(d.created_at)) / (1000*60*60*24*365); return age > 4.5 && age < 5; });
    let html = '';
    for(let d of expiringDocs) {
        const s = allStudents.find(st => st.user_id === d.student_id);
        const daysLeft = Math.ceil((5*365 - (new Date() - new Date(d.created_at)) / (1000*60*60*24)));

    }
    document.getElementById('mainContent').innerHTML = `<div class="table-container"><h3 style="padding:1rem">⚠️ Documents Expiring Soon (Retention: 5 years)</h3></table><thead><tr><th>Student</th><th>Title</th><th>Category</th><th>Upload Date</th><th>Status</th><th>Action</th></tr></thead><tbody>${html || '<tr><td colspan="6">No documents expiring soon</td>'}</tbody></div>`;

            <a href="#" data-view="students" class="nav-item"><i class="fas fa-user-graduate"></i> Student Records</a>
            <a href="#" data-view="upload" class="nav-item"><i class="fas fa-upload"></i> Upload Document</a>

            <a href="#" data-view="expiry" class="nav-item"><i class="fas fa-clock"></i> Expiry Alerts</a>
            <a href="#" data-view="audit" class="nav-item"><i class="fas fa-history"></i> Audit Trail</a>
        </div>`;
    } else if (role === 'lecturer') {
        menuHtml += `<div class="nav-group"><div class="nav-header">📚 LECTURER</div>
            <a href="#" data-view="students" class="nav-item"><i class="fas fa-user-graduate"></i> My Students</a>
            <a href="#" data-view="upload" class="nav-item"><i class="fas fa-upload"></i> Upload Document</a>
            <a href="#" data-view="documents" class="nav-item"><i class="fas fa-folder-open"></i> My Uploads</a>
        </div>`;
    } else if (role === 'student') {
        menuHtml += `<div class="nav-group"><div class="nav-header">🎓 STUDENT</div>
            <a href="#" data-view="documents" class="nav-item"><i class="fas fa-id-card"></i> My Documents</a>
            <a href="#" data-view="requests" class="nav-item"><i class="fas fa-paper-plane"></i> Request Document</a>
        </div>`;
    }
    navMenu.innerHTML = menuHtml;
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', async function(e) {
            e.preventDefault();
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            this.classList.add('active');
            const view = this.dataset.view;
            if (view === 'dashboard') await renderDashboard();
            else if (view === 'students') await renderStudents();
            else if (view === 'upload') await renderUpload();
            else if (view === 'documents') await renderAllDocuments();
            else if (view === 'approvals') await renderApprovals();
            else if (view === 'requests') await renderRequests();
            else if (view === 'expiry') await renderExpiryAlerts();
            else if (view === 'audit') await renderAudit();
            else await renderDashboard();
        });
    });
}

async function init() {
    const sessionData = localStorage.getItem('drms_session');
    if (!sessionData) { window.location.href = 'drms_login.html'; return; }
    currentUser = JSON.parse(sessionData);
    document.getElementById('userName').innerText = currentUser.full_name || currentUser.email;
    document.getElementById('userRole').innerText = currentUser.role?.toUpperCase() || 'USER';
    document.getElementById('userProgram').innerText = currentUser.program === 'KRCHN' ? '🎓 KRCHN' : '🛠️ TVET';
    document.getElementById('userProgram').style.background = currentUser.program === 'KRCHN' ? '#4C1D95' : '#f59e0b';
    buildMenu();
    await renderDashboard();
}
document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('drms_session'); window.location.href = 'drms_login.html'; };
init();
</script>
</body>
</html>
